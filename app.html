<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>PrayEcho</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Serif+KR:wght@200;300;400;500;600&display=swap');

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'Noto Serif KR',serif; overflow:hidden; background:#1a1410; 
  width:100vw; height:100vh; height:100dvh; }

#app { width:100%; height:100%; position:relative; overflow:hidden; }

/* 표지 */
#cover { position:absolute; inset:0; z-index:10; cursor:pointer; perspective:1500px; }
#cover-page { position:absolute; inset:0; transform-origin:left center;
  transform-style:preserve-3d; backface-visibility:hidden; }
#cover-front { position:absolute; inset:0; backface-visibility:hidden; }
#cover-front img { width:100%; height:100%; object-fit:fill; }
#cover-back { position:absolute; inset:0; backface-visibility:hidden;
  transform:rotateY(180deg); background:linear-gradient(135deg,#F5EDE0,#EDE4D4,#E8DFD0); }
#cover-shadow { position:absolute; top:0; bottom:0; width:50px; pointer-events:none; z-index:5; display:none; }

/* 앱 화면 */
#main { position:absolute; inset:0; display:flex; flex-direction:column; overflow:hidden; }
.texture { position:absolute; inset:0; pointer-events:none; }
.texture-1 { opacity:0.04;
  background-image:url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E"); }
.texture-2 { opacity:0.025;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(120,100,70,0.15) 3px,rgba(120,100,70,0.15) 4px); }
.texture-3 { background:radial-gradient(ellipse at center,transparent 60%,rgba(80,60,35,0.06) 100%); }

/* 날짜 */
#date-bar { padding:56px 30px 0; text-align:center; opacity:0; transition:opacity 0.6s ease; }
#date-bar.show { opacity:1; }
.date-text { font-size:10px; letter-spacing:5px; font-weight:200; }

/* 탭 컨텐츠 */
#tab-content { flex:1; position:relative; perspective:1400px; margin:8px 0; }
.tab-page { position:absolute; inset:0; display:flex; flex-direction:column; }

/* 기도하기 */
.pray-container { flex:1; display:flex; flex-direction:column; align-items:center; position:relative; overflow:hidden; padding-top:18vh; }




.ripple-area { position:relative; width:220px; height:220px; }
.ripple-ring { position:absolute; border-radius:50%; top:50%; left:50%;
  transform:translate(-50%,-50%); transition:opacity 0.5s; }
.center-btn { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:118px; height:118px; border-radius:50%; cursor:pointer;
  display:flex; align-items:center; justify-content:center; flex-direction:column;
  transition:all 0.6s; }
.center-highlight { position:absolute; top:12px; left:50%; transform:translateX(-50%);
  width:50px; height:20px; border-radius:50%; }
.pray-hint { margin-top:44px; text-align:center; font-size:13px; font-weight:300; letter-spacing:1px; line-height:1.8; }
.pray-sub { margin-top:20px; font-size:11px; font-weight:200; letter-spacing:2px; opacity:0.5; }

/* 메아리 응답 */
.echo-container { padding:0 36px; text-align:center; display:flex; flex-direction:column;
  align-items:center; justify-content:center; flex:1; position:relative; }
.echo-item { opacity:0; transform:translateY(20px); transition:all 1s cubic-bezier(0.25,0.46,0.45,0.94); }
.echo-item.show { opacity:1; transform:translateY(0); }
.echo-comfort { font-size:14px; line-height:1.8; font-weight:300; letter-spacing:1px; margin-bottom:36px; }
.echo-divider { width:40px; height:1.5px; margin-bottom:36px; }
.echo-verse { font-size:24px; line-height:2; font-weight:600; letter-spacing:2px;
  margin-bottom:24px; font-family:'Noto Serif KR',serif; word-break:keep-all; overflow-wrap:break-word; }
.echo-ref { font-size:11px; letter-spacing:4px; font-family:'Cormorant Garamond',serif;
  font-weight:500; opacity:0.6; }
.echo-back { margin-top:40px; cursor:pointer; font-size:11px; letter-spacing:3px; font-weight:200; }

/* 오늘의 말씀 */
.verse-container { flex:1; display:flex; flex-direction:column; justify-content:center; padding:0 38px; }
.verse-divider { width:50px; height:1.5px; margin:0 auto; }
.verse-ko { font-size:22px; line-height:2; font-weight:600; letter-spacing:1.5px;
  text-align:center; font-family:'Noto Serif KR',serif; word-break:keep-all; overflow-wrap:break-word; }
.verse-en { font-size:15px; line-height:1.8; font-weight:400; font-style:italic;
  font-family:'Cormorant Garamond',serif; text-align:center; white-space:pre-line; }
.verse-ref { font-size:12px; letter-spacing:4px; font-family:'Cormorant Garamond',serif;
  font-weight:500; text-align:center; }

/* 다이어리 */
.diary-container { flex:1; padding:16px 24px; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.diary-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
.diary-title { font-size:16px; font-weight:500; letter-spacing:2px; }
.diary-toggle { display:flex; gap:8px; }
.diary-toggle-btn { font-size:10px; letter-spacing:1px; padding:5px 12px; border-radius:12px;
  cursor:pointer; border:1px solid transparent; transition:all 0.3s; font-family:'Noto Serif KR',serif; font-weight:300; }
.diary-card { padding:18px 20px 18px 24px; margin-bottom:12px; border-radius:14px;
  border-left:4px solid; position:relative; overflow:hidden;
  box-shadow:0 3px 12px rgba(0,0,0,0.07),0 1px 3px rgba(0,0,0,0.04),inset 0 1px 0 rgba(255,255,255,0.35); }
.diary-card-texture { position:absolute; inset:0; opacity:0.035; pointer-events:none;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(100,80,50,0.12) 2px,rgba(100,80,50,0.12) 3px); }
.diary-card-top { position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25) 30%,rgba(255,255,255,0.25) 70%,transparent); pointer-events:none; }
.diary-date { font-size:10px; letter-spacing:2px; font-weight:200; }
.diary-verse-ref { font-size:10px; letter-spacing:1px; font-family:'Cormorant Garamond',serif; }
.diary-entry-title { font-size:14px; margin-top:10px; font-weight:400; }
.diary-tags { display:flex; gap:6px; margin-top:10px; }
.diary-tag { font-size:9px; padding:3px 10px; border-radius:10px; letter-spacing:1px;
  font-family:'Noto Serif KR',serif; }

/* 달력 */
.calendar { text-align:center; }
.cal-month { font-size:14px; font-weight:500; letter-spacing:2px; margin-bottom:16px; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; text-align:center; }
.cal-day-name { font-size:9px; padding:6px 0; font-weight:300; letter-spacing:1px; }
.cal-day { padding:8px 0; border-radius:8px; font-size:12px; font-family:'Cormorant Garamond',serif; }
.cal-dot { width:4px; height:4px; border-radius:2px; margin:3px auto 0; }

/* 네비게이션 */
#nav { padding:0 36px 44px; display:flex; justify-content:center; gap:44px;
  opacity:0; transition:opacity 0.6s ease; }
#nav.show { opacity:1; }
.nav-item { text-align:center; cursor:pointer; transition:opacity 0.3s; }
.nav-icon { margin-bottom:5px; }
.nav-label { font-size:9px; letter-spacing:2px; font-weight:300; }

/* 테마 점 */
#theme-dots { position:absolute; bottom:12px; left:0; right:0; display:flex;
  justify-content:center; gap:8px; opacity:0; transition:opacity 0.6s ease; }
#theme-dots.show { opacity:1; }
.theme-dot { height:7px; border-radius:4px; cursor:pointer; transition:all 0.3s; }

/* 빗방울 */
.raindrop { position:absolute; border-radius:50%; animation:raindrop 2.5s ease-in forwards; }
@keyframes raindrop { 0%{transform:translateY(0);opacity:0} 10%{opacity:0.6} 90%{opacity:0.3} 100%{transform:translateY(800px);opacity:0} }
@keyframes breathe { 0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.06} 50%{transform:translate(-50%,-50%) scale(1.06);opacity:0.03} }
@keyframes rippleOut { 0%{transform:translate(-50%,-50%) scale(0.9);opacity:0} 20%{opacity:0.12} 100%{transform:translate(-50%,-50%) scale(1.8);opacity:0} }
@keyframes rippleIn { 0%{transform:translate(-50%,-50%) scale(2.4);opacity:0} 25%{opacity:0.18} 85%{opacity:0.07} 100%{transform:translate(-50%,-50%) scale(0.85);opacity:0} }
@keyframes bgGlow { 0%,100%{opacity:0.4} 50%{opacity:0.7} }
@keyframes gentlePulse { 0%,100%{opacity:0.2} 50%{opacity:0.5} }
@keyframes fadeInSlow { from{opacity:0;transform:translateY(8px)} to{opacity:0.6;transform:translateY(0)} }
/* 다이어리 상세 모달 */
.diary-modal-overlay { position:absolute; inset:0; z-index:50; display:flex; flex-direction:column; }
@keyframes slideUp { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }
.diary-modal-inner { animation:slideUp 0.35s ease; flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:64px 36px 48px; display:flex; flex-direction:column; }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ─── 데이터 ───
const _FALLBACK_ = {"version":"1.0","created":"2026-05-05 14:32","total_echoes":1030,"tags":["가정","감사","건강","결단","관계","기다림","두려움","보호","불안","소망","순종","슬픔","신뢰","외로움","용서","인도하심","자녀양육","재정어려움","직장사업","축복","치유","평안","회개"],"echoes":[{"ref":"1 Peter 2:25","type":"고백형","tags":["인도하심","회개","신뢰","보호"],"full":"전에는 길 잃은 양 같았으나,\n이제는 당신의 영혼을\n돌보시는 목자요\n감독이신 분께로\n돌아오셨습니다.","compact":"길 잃은 양 같았던\n당신의 영혼이 이제\n목자께로 돌아왔습니다.","oneline":"이제 당신의 영혼은\n목자께로 돌아왔습니다.","comfort":"돌아온 발걸음을\n반기시는 분이\n언제나 기다리고 계십니다.","original_tag":"실패와 좌절","pastor":"Andy Stanley"},{"ref":"시편 23:3","type":"선언형","tags":["인도하심","소망","평안","보호"],"full":"내 영혼을 다시 살리시며,\n그의 이름에 합당한\n의의 길로 나를\n인도하시는 분이십니다.","compact":"내 영혼을 소생시키시고,\n의의 길로 인도하시는\n분이십니다.","oneline":"내 영혼을 소생시키시고\n의의 길로 인도하시는도다.","comfort":"이미 당신의 걸음을\n인도하시겠다고\n약속하신 분이에요.","original_tag":"실패와 좌절","pastor":"이찬수"},{"ref":"창세기 50:20","type":"선언형","tags":["인도하심","소망","보호","신뢰"],"full":"당신들은 나를 해하려 하였지만,\n하나님께서는 그 모든 것을\n선으로 바꾸셨으니,\n오늘과 같이 많은 백성의\n생명을 구원하시려는\n뜻이셨습니다.","compact":"사람의 악한 의도까지도\n하나님은 선으로 바꾸어\n구원하셨습니다.","oneline":"하나님은 악한 것을\n선으로 바꾸시어\n생명을 구원하게 하셨나니.","comfort":"가장 절망적인 순간에도\n당신을 위한 하나님의\n선한 뜻이 숨겨져 있습니다.","original_tag":"실패와 좌절","pastor":"이찬수"},{"ref":"시편 42:5","type":"고백형","tags":["불안","소망","신뢰","평안"],"full":"내 영혼아, 너는 어찌하여\n낙심하며 어찌하여\n내 속에서 불안해 하는가?\n너는 하나님께 소망을 두라.\n그분이 나타나 도우심으로\n말미암아 내가 여전히\n그분을 찬송하리로다.","compact":"내 영혼아, 낙심하고\n불안해하는가?\n하나님께 소망을 두라.\n그가 반드시 도우실 것이요,\n너는 찬송하리로다.","oneline":"내 영혼아, 하나님께\n소망을 두라.\n내가 여전히 찬송하리로다.","comfort":"당신의 불안까지도\n알고 계시는 분이\n그 자리에 함께 계십니다.","original_tag":"실패와 좌절","pastor":"이찬수"},{"ref":"창세기 1:1-2","type":"선언형","tags":["보호","평안","인도하심","신뢰"],"full":"태초에 하나님께서\n하늘과 땅을 창조하셨습니다.\n땅이 아직 형태를\n갖추지 못하고 비어 있었으며,\n어둠이 깊은 물 위를\n덮고 있었지만,\n하나님의 영은 물 위를\n감싸고 운행하고 계셨습니다.","compact":"땅이 혼돈하고 공허하며\n흑암이 깊은 위에도\n하나님의 영은 운행하고\n계셨습니다.","oneline":"하나님의 영은 혼돈 위에서\n운행하고 계시니라.","comfort":"당신의 삶이 혼란스럽고\n어둠 가운데 있을 때에도,\n그 위에 이미 하나님의 영이\n머물고 계십니다.","original_tag":"실패와 좌절","pastor":"이찬수"},{"ref":"마태복음 13:31-32","type":"위로형","tags":["소망","인도하심","축복"],"full":"또 비유로 말씀하시기를,\n하늘나라는 마치 사람이\n자기 밭에 심은 겨자씨\n한 알과 같으니,\n모든 씨앗 중에 가장 작은\n것이지만 자라난 후에는\n어떤 풀보다 크게 자라\n나무가 되어 공중의 새들이\n와서 그 가지에 깃들이느니라.","compact":"하늘나라는 겨자씨\n한 알 같으니,\n가장 작지만 자라면\n큰 나무가 되어 새들이\n깃들이느니라.","oneline":"가장 작은 씨앗이 자라\n큰 나무가 되어 공중의\n새들이 깃들이느니라.","comfort":"당신의 작은 시작과\n수고를 귀하게 보시는 분이\n그 안에 함께 계십니다.","original_tag":"실패와 좌절","pastor":"이찬수"},{"ref":"마태복음 4:19","type":"선언형","tags":["인도하심","소망","결단","축복"],"full":"예수님께서 말씀하시기를\n'나를 따라오라.\n내가 너희를 사람을 낚는\n어부가 되게 하리라'\n하셨습니다.","compact":"나를 따르라.\n내가 너희를 사람 낚는\n어부가 되게 하리라.","oneline":"내가 너희를 사람을 낚는\n어부가 되게 하리라.","comfort":"당신의 부르심을 먼저\n선포하신 분이 당신의\n삶을 인도하고 계십니다.","original_tag":"실패와 좌절","pastor":"이찬수"},{"ref":"요한복음 1:42","type":"선언형","tags":["인도하심","소망","신뢰","보호"],"full":"안드레가 시몬을\n예수님께로 데려오니,\n예수님께서 그를 보시고\n말씀하시기를\n'네가 요한의 아들 시몬이니,\n장차 게바라 불리리라'\n하셨습니다\n(게바는 베드로 곧\n반석이라는 뜻입니다).","compact":"예수께서 이르시되,\n네가 시몬이니 장차\n게바(베드로)라 불리리라.","oneline":"네가 요한의 아들 시몬이니\n장차 게바라 하리라.","comfort":"당신이 누구인지,\n무엇이 될지 먼저 아시고\n이름 지으신 분이 당신과\n함께 계십니다.","original_tag":"실패와 좌절","pastor":"이찬수"},{"ref":"시편 23:4","type":"고백형","tags":["두려움","보호","평안","신뢰"],"full":"내가 비록 사망의\n어두운 골짜기를\n지날지라도,\n해를 두려워하지 않을 것입니다.\n주님께서 나와 함께 계시며,\n주의 지팡이와 막대기가\n나를 안위하시기 때문입니다.","compact":"내가 사망의 골짜기를\n지날지라도 주께서\n함께하시니 해를\n두려워하지 않으리라.","oneline":"주께서 나와 함께하시니\n해를 두려워하지 않으리라.","comfort":"가장 어두운 곳에도\n함께 동행하시겠다고\n약속하신 분이 바로\n당신 곁에 계십니다.","original_tag":"실패와 좌절","pastor":"이찬수"},{"ref":"여호수아 3:5","type":"선언형","tags":["소망","기다림","인도하심","결단"],"full":"스스로를 성결하게 하십시오.\n여호와께서 내일 당신들\n가운데에 기이한 일들을\n행하시리라.\n주님께서 친히 놀라운\n역사를 이루실 것입니다.","compact":"스스로 성결하게 하십시오.\n여호와께서 내일 당신들\n가운데 놀라운 일들을\n행하시리라.","oneline":"여호와께서 내일 당신들\n가운데에 기이한 일들을\n행하시리라.","comfort":"당신의 준비에 응답하시며\n놀라운 역사를 시작하실\n분입니다.","original_tag":"실패와 좌절","pastor":"이찬수"},{"ref":"이사야 43:19","type":"선언형","tags":["소망","인도하심","보호","결단"],"full":"보아라, 내가\n새 일을 행하리니,\n이제 곧 나타날 것이라.\n너희가 그것을\n알지 못하겠느냐?\n반드시 내가\n광야에 길을 내고\n사막에 강을 흐르게 하리라.","compact":"내가 새 일을 행하리니,\n이제 곧 나타날 것이라.\n반드시 내가 광야에 길을,\n사막에 강을 내리라.","oneline":"반드시 내가 광야에 길을, 사막에 강을 내리라.","comfort":"당신의 길을 이미 만들고 계시는 분이에요.","original_tag":"실패와 좌절","pastor":"이찬수"},{"ref":"히브리서 12:2","type":"위로형","tags":["신뢰","소망","평안","인도하심"],"full":"믿음의 창시자요\n완성자이신 예수를\n바라봅시다.\n그분은 앞에 있는\n기쁨을 위하여\n십자가의 고난을 참으셨고,\n그 수치를\n개의치 아니하시고\n이제 하나님 보좌\n우편에 앉으셨도다.","compact":"믿음의 창시자요\n완성자이신 예수를\n바라보십시오.\n그분은 십자가를 참으시고\n하나님 보좌 우편에\n앉으셨도다.","oneline":"그분은 십자가를 참으시고 하나님 보좌 우편에 앉으셨도다.","comfort":"당신이 바라볼 분은 이미 승리하여 그 자리에 계십니다.","original_tag":"실패와 좌절","pastor":"이찬수"},{"ref":"시편 37:23-24","type":"선언형","tags":["인도하심","보호","신뢰","두려움"],"full":"여호와께서 사람의\n걸음을 정하시고,\n그 길을 기뻐하시나니,\n그가 넘어질지라도\n아주 엎드러지지\n아니할 것은,\n여호와께서 친히\n그의 손으로\n붙드심이로다.","compact":"여호와께서 사람의\n걸음을 정하시고\n그 길을 기뻐하시나니,\n넘어질지라도\n주님께서 손으로\n붙드심이로다.","oneline":"여호와께서 친히 그의 손으로 붙드심이로다.","comfort":"이미 당신의 걸음과 넘어짐까지 알고 붙드시겠다고 약속하신 분이에요.","original_tag":"실패와 좌절","pastor":"이찬수"},{"ref":"여호수아 8:1","type":"선언형","tags":["두려움","보호","인도하심","신뢰"],"full":"여호와께서\n여호수아에게\n말씀하시기를,\n두려워하지 말라,\n놀라지 말라!\n모든 군사를 이끌고\n아이로 올라가라.\n보라, 내가\n아이 왕과 그의 백성,\n그의 성읍과\n그의 땅을 다 네 손에\n넘겨 주었도다.","compact":"두려워하지 말라,\n놀라지 말라!\n내가 아이 왕과 그의 백성과\n그의 땅을 다 네 손에\n넘겨 주었도다.","oneline":"내가 그 땅을 다 네 손에 넘겨 주었도다.","comfort":"두려워할 필요 없어요. 이미 승리를 확언하신 분이 계시니까요.","original_tag":"실패와 좌절","pastor":"이찬수"},{"ref":"사도행전 3:19","type":"선언형","tags":["회개","치유","소망","평안"],"full":"그러므로 회개하고\n돌이켜,\n당신들의 죄 없이\n함을 받으십시오.\n그리하면 주님\n앞에서부터\n새롭게 되는 날이\n임할 것이요.\n주님께서 친히\n새로운 역사를\n허락하시리라.","compact":"회개하고 돌이켜\n죄 없이 함을\n받으십시오.\n그리하면 새롭게 되는 날이\n주 앞으로부터 이를 것이요.","oneline":"새롭게 되는 날이 주 앞으로부터 이를 것이요.","comfort":"당신의 회개를 기다리시며 새롭게 시작하실 준비를 하고 계신 분입니다.","original_tag":"실패와 좌절","pastor":"이찬수"},{"ref":"고린도전서 15:9-10","type":"고백형","tags":["감사","신뢰","보호","인도하심"],"full":"나는 사도 중에\n가장 작은 자요,\n하나님의 교회를\n박해하였으므로\n사도라 불릴 자격이\n없나이다.\n그러나 내가\n지금의 내가 된 것은\n오직 하나님의\n은혜로 된 것이오니,\n내게 주신 그분의\n은혜가 결코\n헛되지 아니하였도다.\n내가 수고하였으나,\n이는 내가 한 것이 아니요,\n오직 나와 함께 하신\n하나님의 은혜\n때문이었나이다.","compact":"내가 지금의 내가 된 것은\n하나님의 은혜로\n된 것이니,\n내게 주신 그분의\n은혜는 결코\n헛되지 아니하였도다.\n내가 수고한 것도\n오직 나와 함께 하신\n하나님의 은혜로라.","oneline":"내가 나 된 것은 하나님의 은혜로 된 것이니라.","comfort":"당신의 삶도 오직 그분의 은혜로 지탱되고 있음을 기억하십시오.","original_tag":"실패와 좌절","pastor":"이찬수"},{"ref":"디모데전서 1:12-14","type":"고백형","tags":["감사","용서","신뢰","치유","소망"],"full":"나를 강하게 하신\n우리 주 그리스도 예수께\n감사하나이다.\n주님께서 나를\n신실하게 여기사\n이 직분을 맡기셨으니,\n내가 전에는\n비방자요 박해자요\n폭행자였으나,\n주님의 긍휼을 입었도다.\n이는 내가 믿지\n아니할 때에\n알지 못하고\n행하였음이라.\n우리 주의 은혜가\n그리스도 예수 안에 있는\n믿음과 사랑과 함께\n넘치도록 풍성하였도다.","compact":"나를 능하게 하신\n그리스도 예수께\n감사하나니,\n주께서 나를\n신실하게 여겨\n직분을 맡기셨도다.\n내가 비방자였으나\n긍휼을 입었고,\n우리 주의 은혜가\n넘치도록 풍성하였도다.","oneline":"우리 주의 은혜가 넘치도록 풍성하였도다.","comfort":"당신의 모든 부족함보다 그분의 은혜가 훨씬 더 크고 풍성합니다.","original_tag":"실패와 좌절","pastor":"이찬수"},{"ref":"시편 147:2-3","type":"선언형","tags":["치유","슬픔","소망","평안"],"full":"여호와께서\n예루살렘을\n다시 세우시며,\n이스라엘의 흩어진\n자들을 모으시는도다.\n그분은 상심한\n자들을 고치시며,\n그들의 모든 상처를\n싸매시는도다.","compact":"여호와께서 흩어진\n자들을 모으시고,\n상심한 자들을 고치시며\n그들의 상처를\n싸매시는도다.","oneline":"상심한 자들을 고치시며 그들의 상처를 싸매시는도다.","comfort":"당신의 아픔을 가장 먼저 알고 싸매주시는 분이 계십니다.","original_tag":"실패와 좌절","pastor":"이찬수"},{"ref":"시편 147:10-11","type":"선언형","tags":["신뢰","소망","평안"],"full":"여호와께서는\n말의 힘이 세다 하여\n기뻐하지 않으시며,\n사람의 다리가\n억세다 하여\n기뻐하지 않으십니다.\n오직 여호와께서는\n당신을 경외하는\n자들과\n그 인자하심을\n바라는 자들을\n기뻐하시는도다.","compact":"여호와께서는\n당신을 경외하는 자들과\n그 인자하심을\n바라는 자들을\n기뻐하시는도다.","oneline":"하나님은 당신을 기뻐하시는도다.","comfort":"당신의 모든 것을 아시는 분이 당신을 기뻐하시고 기대하고 계십니다.","original_tag":"실패와 좌절","pastor":"이찬수"},{"ref":"마태복음 6:26","type":"위로형","tags":["불안","신뢰","보호","인도하심"],"full":"공중의 새를\n보십시오.\n씨를 뿌리지도 않고\n거두지도 않으며,\n창고에\n모아들이지도 않지만,\n당신의 하늘\n아버지께서 그들을\n먹이시는도다.\n하물며 당신은\n그것들보다 훨씬\n귀하지 아니하냐?","compact":"공중의 새도\n먹이시는 당신의 하늘\n아버지께서 당신을\n기르시는도다.\n당신은 그것들보다\n훨씬 귀하니라.","oneline":"당신의 하늘 아버지께서 당신을 기르시는도다.","comfort":"당신의 필요를 이미 아시고 채우시겠다고 말씀하신 분이 계십니다.","original_tag":"실패와 좌절","pastor":"이찬수"},{"ref":"누가복음 5:5","type":"고백형","tags":["신뢰","순종","직장사업","결단"],"full":"시몬이 대답하여 말하기를,\n'선생님, 우리가 밤이 새도록 수고했지만 아무것도 잡지 못했습니다.\n그러나 당신의 말씀에 의지하여, 제가 그물을 내리겠습니다.'","compact":"밤새 수고했지만 잡은 것이 없사오나,\n말씀에 의지하여 제가 그물을 내리리이다.","oneline":"말씀에 의지하여 제가 그물을 내리리이다.","comfort":"결과보다 당신의 신뢰와 순종을\n기뻐하시는 분이 있습니다.","original_tag":"실패와 좌절","pastor":"이찬수"},{"ref":"누가복음 5:10-11","type":"선언형","tags":["두려움","인도하심","소망","직장사업"],"full":"예수께서 시몬에게 말씀하시되,\n'두려워하지 말라.\n이제 후로는 네가 사람을 낚는 어부가 되리라.'","compact":"두려워하지 말라.\n이제 후로는 네가 사람을 취하리라.","oneline":"두려워하지 말라, 네가 사람을 취하리라.","comfort":"당신의 두려움 너머에 당신을 향한\n특별한 계획을 말씀하고 계십니다.","original_tag":"실패와 좌절","pastor":"이찬수"},{"ref":"갈라디아서 2:20","type":"고백형","tags":["신뢰","소망","결단","평안"],"full":"나는 그리스도와 함께 십자가에 못 박혔으니,\n이제는 내가 사는 것이 아니요, 오직 내 안에 그리스도께서 사시는도다.\n내가 이제 육체 가운데 사는 것은 나를 사랑하사 나를 위하여 자신을 주신 하나님의 아들을 믿는 믿음 안에서 사는 것이라.","compact":"이제는 내가 사는 것이 아니요 오직 내 안에 그리스도께서 사시는도다.\n나를 사랑하신 하나님의 아들을 믿는 믿음 안에서 사시기를.","oneline":"오직 내 안에 그리스도께서 사시는도다.","comfort":"당신 안에서 친히 살아가시겠다고\n말씀하신 분이 있으니까요.","original_tag":"실패와 좌절","pastor":"이찬수"},{"ref":"로마서 8:32","type":"선언형","tags":["재정어려움","보호","축복","신뢰"],"full":"자기 아들을 아끼지 아니하시고\n우리 모든 사람을 위하여 내어주신 분께서\n어찌 그 아들과 함께 모든 것을 우리에게 주시지 아니하시겠느냐?","compact":"자기 아들을 내주신 이가 어찌 그 아들과 함께\n모든 것을 우리에게 주시지 아니하시겠느냐?","oneline":"그 아들과 함께 모든 것을 우리에게 주시는도다.","comfort":"가장 귀한 것을 이미 주신 분이,\n당신에게 필요한 다른 어떤 것도 주시지 않을 리 없으시니까요.","original_tag":"실패와 좌절","pastor":"이찬수"},{"ref":"로마서 5:8","type":"선언형","tags":["용서","신뢰"],"full":"우리가 아직 죄인이었을 때에 그리스도께서 우리를 위하여 죽으심으로,\n하나님께서 우리에 대한 그분의 사랑을 확증하셨느니라.","compact":"우리가 죄인 되었을 때에도 그리스도께서 우리를 위하여 죽으심으로,\n하나님께서 우리에 대한 사랑을 확증하셨느니라.","oneline":"하나님께서 우리에 대한 사랑을 확증하셨느니라.","comfort":"당신을 향한 사랑을 이미 가장 확실한 방법으로\n보여주신 분입니다.","original_tag":"실패와 좌절","pastor":"이찬수"},{"ref":"Matthew 9:12-13","type":"선언형","tags":["치유","용서","회개"],"full":"예수께서 이 말씀을 들으시고 이르시되,\n'건강한 자에게는 의원이 필요 없고, 병든 자에게라야 필요하니라.\n내가 의인을 부르러 온 것이 아니요, 죄인을 부르러 왔노라.'","compact":"건강한 자에게는 의원이 필요 없고 병든 자에게라야 필요하니라.\n내가 의인을 부르러 온 것이 아니요 죄인을 부르러 왔노라.","oneline":"나는 의인을 부르러 온 것이 아니요, 죄인을 부르러 왔노라.","comfort":"완전한 당신을 부르신 것이 아니라,\n연약한 당신을 부르시고 찾아오신 분입니다.","original_tag":"죄책감","pastor":"Timothy Keller"},{"ref":"Hosea 6:6","type":"선언형","tags":["회개","관계","신뢰","결단"],"full":"나는 인애를 원하고\n제사를 원하지 아니하며,\n번제보다 하나님 아는 것을 원하노라.","compact":"나는 인애를 원하고 제사를 원하지 아니하며,\n번제보다 하나님 아는 것을 원하노라.","oneline":"나는 인애를 원하노라.","comfort":"형식적인 것보다 당신의 진심과 마음을\n먼저 구하시는 분입니다.","original_tag":"죄책감","pastor":"Timothy Keller"},{"ref":"요한복음 1:12","type":"선언형","tags":["소망","신뢰","보호","축복"],"full":"그 이름을 믿고\n영접하는 모든 이에게는 하나님의 자녀가 되는 권세를 주셨으니,\n이제 당신은 하나님의 귀한 자녀입니다.","compact":"그 이름을 믿는 이에게는\n하나님의 자녀가 되는 권세를 주셨으니.","oneline":"당신은 하나님의 귀한 자녀입니다.","comfort":"이미 당신에게 주어진 신분이에요.","original_tag":"죄책감","pastor":"Timothy Keller"},{"ref":"요한복음 17:23","type":"위로형","tags":["평안","관계","보호","신뢰"],"full":"아버지께서 예수님을 사랑하신 것처럼,\n당신 또한 그와 같이 사랑하신다는 것을\n세상으로 알게 하시려 합니다.","compact":"아버지께서 예수님을 사랑하신 것처럼,\n당신도 그와 같이 사랑하십니다.","oneline":"아버지께서 당신을 예수님처럼 사랑하십니다.","comfort":"그 크신 사랑이 이미 당신에게 흐르고 있으니까요.","original_tag":"죄책감","pastor":"Timothy Keller"},{"ref":"히브리서 4:16","type":"위로형","tags":["인도하심","신뢰","소망","보호"],"full":"그러므로 우리는 긍휼하심과,\n필요할 때마다 돕는 은혜를 받기 위하여\n담대하게 은혜의 보좌 앞으로 나아갈 수 있습니다.","compact":"긍휼하심과 돕는 은혜를 받기 위하여\n담대히 은혜의 보좌 앞에 나아가십시오.","oneline":"은혜의 보좌 앞에 나아가 돕는 은혜를 받으십시오.","comfort":"그 자리에 먼저 당신을 기다리시는 분이 있으니까요.","original_tag":"죄책감","pastor":"Timothy Keller"},{"ref":"John 8:34, 36","type":"선언형","tags":["소망","치유","평안","보호"],"full":"예수님께서 이르시기를, 진실로 진실로 당신에게 말하노니,\n죄를 짓는 자마다 죄의 종이라. 그러나 아들이 당신을 자유롭게 하면,\n당신은 참으로 자유로워질 것입니다.","compact":"아들이 당신을 자유롭게 하면,\n당신은 참으로 자유로워질 것입니다.","oneline":"아들이 당신을 자유롭게 할 것이니, 참으로 자유로울 것입니다.","comfort":"그분은 당신을 자유롭게 하시려고 오셨으니까요.","original_tag":"죄책감","pastor":"Timothy Keller"},{"ref":"Isaiah 53:5-6","type":"선언형","tags":["치유","용서","평안","회개"],"full":"그러나 그분은 우리의 허물 때문에 찔리셨고, 우리의 죄악 때문에 상하셨습니다.\n우리가 누리는 평화는 그분의 징벌로 말미암았고, 그분의 채찍으로 우리가 나음을 얻었도다.\n주님께서 우리 모두의 죄악을 그에게 담당시키셨습니다.","compact":"그분의 채찍으로 우리가 나음을 얻었도다.\n주님께서 우리 모두의 죄악을 그에게 담당시키셨습니다.","oneline":"그분의 채찍으로 우리가 나음을 얻었도다.","comfort":"당신의 짐을 짊어지신 분이 이미 계시니까요.","original_tag":"죄책감","pastor":"Timothy Keller"},{"ref":"Isaiah 54:1","type":"선언형","tags":["소망","축복","가정","기다림"],"full":"자녀를 낳지 못했던 너, 노래할지어다. 아이를 가져보지 못했던 너,\n기쁨으로 외치며 소리 높여라. 이는 홀로된 여인의 자녀가\n남편 있는 여인의 자녀보다 많을 것임이라, 여호와께서 말씀하시도다.","compact":"홀로된 여인의 자녀가 남편 있는 여인의 자녀보다 많을 것임이라,\n여호와께서 말씀하시도다.","oneline":"여호와께서 말씀하시기를, 너의 자녀가 많을 것이라.","comfort":"그분은 언제나 당신의 삶에 풍성함을 더하실 것입니다.","original_tag":"죄책감","pastor":"Timothy Keller"},{"ref":"Isaiah 54:5","type":"선언형","tags":["관계","신뢰","보호","소망"],"full":"이는 너를 지으신 분이 네 남편이 되시고, 그의 이름은 만군의 여호와이시며,\n이스라엘의 거룩한 분이 네 구속주이시며, 그는 온 땅의 하나님이라 불릴 것임이라.","compact":"너를 지으신 분이 네 남편이시요, 만군의 여호와이시며,\n네 구속주이시니라.","oneline":"너를 지으신 분이 네 남편이 되시고 네 구속주가 되시도다.","comfort":"당신의 가장 깊은 관계 속에서 먼저 붙들어 주시는 분이에요.","original_tag":"죄책감","pastor":"Timothy Keller"},{"ref":"이사야 6:5","type":"고백형","tags":["회개","신뢰","인도하심","슬픔"],"full":"그 때에 내가 말하기를, '화로다, 나여, 망하게 되었도다!\n나는 입술이 부정한 사람이며, 입술이 부정한 백성 중에 거하면서\n만군의 여호와이신 왕을 뵈었음이로다.'","compact":"나는 입술이 부정한 사람이요,\n만군의 여호와이신 왕을 뵈었음이로다.","oneline":"나는 입술이 부정한 자요, 주님을 뵈었음이로다.","comfort":"그분은 당신의 마음을 이미 알고 계십니다.","original_tag":"죄책감","pastor":"Timothy Keller"},{"ref":"이사야 6:6-7","type":"선언형","tags":["용서","치유","회개","평안"],"full":"그 때에 그 스랍 중 하나가 핀 숯을 가지고 내게로 날아와\n내 입술에 대며 이르기를, '보라, 이것이 네 입에 닿았으니\n네 악이 제하여졌고, 네 죄가 사하여졌느니라.'","compact":"이것이 네 입에 닿았으니 네 악이 제하여졌고,\n네 죄가 사하여졌느니라.","oneline":"네 죄가 사하여졌느니라.","comfort":"그분은 이미 당신의 죄를 덮으셨습니다.","original_tag":"죄책감","pastor":"Timothy Keller"},{"ref":"Romans 3:21-28","type":"선언형","tags":["용서","신뢰","평안","축복"],"full":"그러나 이제는 율법과 상관없이, 하나님께서 주시는 의가 나타났으니,\n율법과 선지자들이 이에 대하여 증언하였나이다. 이 하나님의 의는\n예수 그리스도를 믿음으로 말미암아 모든 믿는 자에게 미치나니,\n차별이 없으니 이는 모든 사람이 죄를 범하였으매\n하나님의 영광에 이르지 못하였으나, 그리스도 예수 안에 있는 구속으로 말미암아\n하나님의 은혜로 값없이 의롭다 함을 얻는 것이옵니다.","compact":"모든 사람이 죄를 범하였으매 하나님의 영광에 이르지 못하였으나,\n그리스도 예수 안에 있는 구속으로 말미암아 하나님의 은혜로 값없이 의롭다 함을 얻는 것이옵니다.","oneline":"하나님의 은혜로 값없이 의롭다 함을 얻는 것이옵니다.","comfort":"이미 그분의 은혜 안에서 자유를 얻었으니까요.","original_tag":"죄책감","pastor":"Timothy Keller"},{"ref":"2 Corinthians 5:21","type":"선언형","tags":["용서","신뢰","소망","평안"],"full":"하나님께서는 죄를 알지도 못하시는 그분을 우리를 위하여\n죄로 삼으셨으니, 이는 우리가 그분 안에서 하나님의 의가 되게 하려 하심이라.","compact":"죄를 알지 못하시는 그분을 우리를 위하여 죄로 삼으셨으니,\n우리가 그분 안에서 하나님의 의가 되게 하심이라.","oneline":"우리가 그분 안에서 하나님의 의가 되게 하셨도다.","comfort":"이미 당신의 존재를 완전히 새롭게 바꾸어 주신 분이에요.","original_tag":"죄책감","pastor":"Timothy Keller"},{"ref":"Romans 4:5","type":"선언형","tags":["신뢰","용서","평안"],"full":"그러나 일을 하지 아니할지라도 경건하지 아니한 자를\n의롭다 하시는 하나님을 믿는 자에게는, 그의 믿음을 의로 여기시는도다.","compact":"일을 하지 아니할지라도 경건하지 아니한 자를 의롭다 하시는 이를 믿는 자에게,\n그의 믿음을 의로 여기시리라.","oneline":"그의 믿음을 의로 여기시는도다.","comfort":"당신의 믿음을 가장 소중히 여기시는 분이니까요.","original_tag":"죄책감","pastor":"Timothy Keller"},{"ref":"마태복음 11:11","type":"선언형","tags":["소망","신뢰","축복"],"full":"내가 진실로 너희에게 말하노니, 여자가 낳은 자 중에\n세례 요한보다 큰 이가 일어남이 없도다.\n그러나 천국에서는 극히 작은 자라도 그보다 크니라.","compact":"천국에서는 극히 작은 자라도 그보다 크니라.","oneline":"천국에서는 극히 작은 자라도 크도다.","comfort":"당신의 가치를 그 어떤 것보다 더 크게 보시는 분이니까요.","original_tag":"죄책감","pastor":"Timothy Keller"},{"ref":"갈라디아서 2:16","type":"선언형","tags":["용서","신뢰","평안"],"full":"사람이 의롭게 되는 것은\n율법의 행위로\n말미암음이 아니요,\n오직 예수 그리스도를\n믿음으로 말미암는 줄 알므로,\n우리도 그리스도 예수를\n믿었나이다.\n이는 우리가\n율법의 행위로써가 아니고,\n그리스도를 믿음으로써\n의롭다 함을 얻으려 함이니,\n율법의 행위로써는\n의롭다 함을 얻을\n육체가 없느니라.","compact":"사람이 의롭게 되는 것은\n율법의 행위로\n말미암음이 아니요,\n오직 예수 그리스도를\n믿음으로 말미암느니라.","oneline":"오직 예수 그리스도를\n믿음으로 의롭다 함을 얻으리라.","comfort":"당신을 의롭다고\n선언하신 분이 계시니까요.","original_tag":"죄책감","pastor":"Timothy Keller"},{"ref":"1 John 3:19-20","type":"위로형","tags":["불안","신뢰","평안","용서"],"full":"이로써 우리가\n진리에 속한 줄을 알 것이요,\n또한 우리의 마음이\n우리를 책망할지라도,\n그분 앞에서는\n우리 마음을 안심시키리니,\n이는 하나님께서는\n우리의 마음보다 크시고\n모든 것을 아시기 때문이니라.","compact":"우리의 마음이\n우리를 책망할지라도,\n하나님께서는\n우리의 마음보다 크시고\n모든 것을 아시나이다.","oneline":"하나님께서는\n우리의 마음보다 크시고\n모든 것을 아시나이다.","comfort":"당신의 마음보다\n더 크고 넓게\n당신을 이해하시는 분이에요.","original_tag":"죄책감","pastor":"Tony Evans"},{"ref":"1 John 3:24","type":"선언형","tags":["보호","평안","신뢰","인도하심"],"full":"그분의 계명들을 지키는 자는\n그분 안에 거하고,\n그분도 그 안에 거하시느니라.\n우리에게 주신 성령으로 말미암아\n그분께서 우리 안에 거하시는 줄을\n우리가 아는도다.","compact":"그분 안에 거하는 자에게는,\n그분도 그 안에 거하시느니라.","oneline":"그분께서 우리 안에\n거하시나이다.","comfort":"당신 안에 이미\n영원히 함께 하시겠다고\n약속하신 분이에요.","original_tag":"죄책감","pastor":"Tony Evans"},{"ref":"Romans 8:1","type":"선언형","tags":["용서","평안","신뢰","보호"],"full":"그러므로 이제\n그리스도 예수 안에 있는 자에게는\n결코 정죄함이 없나니.","compact":"그리스도 예수 안에 있는 자에게는\n결코 정죄함이 없나이다.","oneline":"그리스도 예수 안에 있는 자에게는\n결코 정죄함이 없나이다.","comfort":"당신을 정죄하지\n않으시겠다고 이미\n선언하신 분이 계시니까요.","original_tag":"죄책감","pastor":"Tony Evans"},{"ref":"Matthew 1:21","type":"선언형","tags":["소망","회개","용서","보호"],"full":"마리아가 아들을 낳으리니,\n그 이름을 예수라 부르라.\n그가 자기 백성을\n그들의 죄에서\n구원하실 것임이라.","compact":"아들을 낳아 예수를 부르라.\n그가 백성을 죄에서\n구원하시리라.","oneline":"그가 자기 백성을\n그들의 죄에서\n구원하시리라.","comfort":"구원하시겠다고 이미\n선언하신 이름이에요.","original_tag":"죄책감","pastor":"Dr. Tony Evans"},{"ref":"1 John 2:2","type":"선언형","tags":["용서","치유","평안","소망"],"full":"그분은 우리 죄를 위한\n화목 제물이시니,\n우리 죄뿐 아니라\n온 세상의 죄를 위한 것이니이다.","compact":"그분은 우리 죄와\n온 세상의 죄를 위한\n화목 제물이시니이다.","oneline":"그분은 우리 죄를 위한\n화목 제물이시니이다.","comfort":"이미 화목 제물이\n되어주신 분이 계셔요.","original_tag":"죄책감","pastor":"Dr. Tony Evans"},{"ref":"1 John 5:4-5","type":"선언형","tags":["신뢰","소망","두려움","보호"],"full":"하나님께로부터 난 자마다\n세상을 이기나니,\n세상을 이기는 승리는 이것이니\n우리의 믿음이니라.\n예수가 하나님의 아들이심을\n믿는 자가 아니면\n누가 세상을 이기는 자냐?","compact":"하나님께로부터 난 자마다\n세상을 이기나니,\n우리의 믿음이\n세상을 이기는 승리니라.","oneline":"하나님께로부터 난 자마다\n세상을 이기느니라.","comfort":"이미 당신 안에\n세상을 이길 능력을\n두셨으니까요.","original_tag":"죄책감","pastor":"Tony Evans"},{"ref":"John 16:33","type":"선언형","tags":["평안","두려움","소망","보호"],"full":"내가 너희에게 이 말을 이른 것은\n너희로 내 안에서\n평안을 누리게 하려 함이라.\n세상에서는 너희가\n환난을 당할 것이나\n담대하라.\n내가 세상을 이겼노라.","compact":"세상에서는\n환난을 당할 것이나\n담대하라.\n내가 세상을 이겼노라.","oneline":"담대하라.\n내가 세상을 이겼노라.","comfort":"이미 세상을 이기신 분이\n당신과 함께 계세요.","original_tag":"죄책감","pastor":"Tony Evans"},{"ref":"1 John 1:5","type":"선언형","tags":["소망","평안","인도하심","신뢰"],"full":"우리가 그분에게서 듣고\n너희에게 전하는 소식은 이것이니,\n곧 하나님은 빛이시라.\n그분 안에는 어둠이\n전혀 없으시도다.","compact":"하나님은 빛이시라.\n그분 안에는 어둠이\n전혀 없으시도다.","oneline":"하나님은 빛이시라.\n그분 안에는 어둠이\n전혀 없으시도다.","comfort":"어떤 어둠 속에서도\n빛이 되시는 분이 계시니까요.","original_tag":"죄책감","pastor":"Tony Evans"},{"ref":"1 John 1:7","type":"선언형","tags":["용서","치유","회개","평안"],"full":"그러나 만일 우리가\n빛 가운데 행하면,\n그분께서 빛 가운데\n계신 것 같이\n우리도 서로 사귐이 있게 되고,\n그분의 아들 예수님의 피가\n우리를 모든 죄에서\n깨끗하게 하실 것이로다.","compact":"우리가 빛 가운데 행하면\n예수님의 피가\n우리를 모든 죄에서\n깨끗하게 하시리라.","oneline":"예수님의 피가\n우리를 모든 죄에서\n깨끗하게 하시리라.","comfort":"이미 깨끗하게 하시는\n은혜를 부어주시는 분이에요.","original_tag":"죄책감","pastor":"Tony Evans"},{"ref":"1 John 1:9","type":"선언형","tags":["회개","용서","평안","신뢰"],"full":"만일 우리가 우리의 죄를 자백하면,\n그분은 신실하시고 의로우사 우리 죄를 용서하시고,\n모든 불의에서 우리를 깨끗하게 하실 것이니라.","compact":"우리가 죄를 자백하면,\n그분은 신실하게 우리 죄를 용서하시고 깨끗하게 하시리라.","oneline":"그분은 신실하게 우리 죄를 용서하시고 깨끗하게 하시리라.","comfort":"당신이 돌아서기만 하면 용서하고\n깨끗하게 하실 분이 계셔요.","original_tag":"죄책감","pastor":"Tony Evans"},{"ref":"1 John 2:1-2","type":"선언형","tags":["용서","신뢰","평안","보호"],"full":"나의 어린 자녀들아, 내가 이 일들을 너희에게 쓰는 것은 너희로 죄를 짓지 않게 하려 함이라.\n만일 누가 죄를 지어도, 우리에게는 아버지와 함께 계시는 변호인, 곧 의로우신 예수 그리스도께서 계시느니라.\n그분은 우리 죄를 위한 화목 제물이시니, 우리 죄뿐 아니라 온 세상의 죄를 위한 것이니라.","compact":"누가 죄를 지어도 우리에게는 아버지와 함께 변호인 예수 그리스도께서 계시나니,\n그분은 우리 죄를 위한 화목 제물이시니라.","oneline":"우리에게는 아버지와 함께 변호인 예수 그리스도께서 계시느니라.","comfort":"이미 당신의 변호인이 되어 계신 분이 있으니까요.","original_tag":"죄책감","pastor":"Tony Evans"},{"ref":"시편 119:105","type":"고백형","tags":["인도하심","신뢰","소망","평안"],"full":"주의 말씀은 내 발에 등불이요,\n내 길에 빛이니이다.","compact":"주의 말씀은 내 발에 등불이요,\n내 길에 빛이니이다.","oneline":"주의 말씀은 내 발에 등불이요 내 길에 빛이니이다.","comfort":"당신의 길을 밝히시겠다고\n약속하신 분의 말씀이에요.","original_tag":"죄책감","pastor":"김선교"},{"ref":"로마서 5:20","type":"선언형","tags":["용서","소망","평안","감사"],"full":"율법이 들어온 것은\n죄가 더욱 많아지게 하려 함이라.\n그러나 죄가 더한 곳에 은혜가 더욱 넘쳤나니.","compact":"죄가 더한 곳에\n은혜가 더욱 넘쳤나니.","oneline":"죄가 더한 곳에 은혜가 더욱 넘쳤나니.","comfort":"당신의 모든 부족함보다 훨씬 크신 분의\n은혜가 기다리고 있어요.","original_tag":"죄책감","pastor":"김선교"},{"ref":"요한계시록 2:2-3","type":"위로형","tags":["인도하심","신뢰","소망","기다림"],"full":"제가 행한 수고와 인내를 주님께서 모두 알고 계십니다.\n악한 자들을 용납하지 않고, 주님의 이름을 위해 참으며\n견딘 모든 것을 알고 계십니다.","compact":"주님께서는 저의 수고와 인내를 아시고,\n주님의 이름을 위해 견딘 모든 것을 기억하십니다.","oneline":"주님께서 당신의 모든 수고와 인내를 아시나이다.","comfort":"그 모든 것을 처음부터 끝까지\n지켜보시며 헤아리고 계신 분이에요.","original_tag":"죄책감","pastor":"김선교"},{"ref":"로마서 8:6","type":"선언형","tags":["평안","인도하심","소망","결단"],"full":"육신의 생각은 사망에 이르나,\n영의 생각은 참된 생명과 평안에\n이르는 것이옵니다.","compact":"영의 생각은 참된 생명과 평안을\n가져다줄 것입니다.","oneline":"영의 생각은 생명과 평안입니다.","comfort":"이미 그 길을 제시하며\n평안을 예비하고 계신 분이 있어요.","original_tag":"죄책감","pastor":"김선교"},{"ref":"마태복음 19:26","type":"선언형","tags":["신뢰","소망","보호","인도하심"],"full":"예수님께서 그들을 보시며 말씀하셨습니다.\n'사람의 힘으로는 할 수 없으나,\n하나님께서는 모든 것을 능히 하실 수 있나이다.'","compact":"사람으로는 할 수 없으나,\n하나님께서는 모든 것을 능히 하실 수 있습니다.","oneline":"하나님으로서는 모든 것을 다 하실 수 있느니라.","comfort":"불가능해 보이는 그 자리에 이미 모든 것을\n가능하게 하시는 분이 계시니까요.","original_tag":"죄책감","pastor":"김선교"},{"ref":"마태복음 5:4","type":"위로형","tags":["슬픔","소망","평안"],"full":"슬퍼하며 애통하는 자들은 복이 있나니,\n그들이 반드시 위로를 받을 것이옵니다.","compact":"슬퍼하며 애통하는 자들에게 복이 있나니,\n주님께서 친히 위로하실 것입니다.","oneline":"애통하는 자가 복이 있나니, 반드시 위로를 받을 것이옵니다.","comfort":"당신의 슬픔을 아시고\n위로하시겠다고 약속하신 분이 있어요.","original_tag":"죄책감","pastor":"김선교"},{"ref":"빌립보서 3:8","type":"고백형","tags":["신뢰","결단","소망","감사"],"full":"오직 저의 주 그리스도 예수를 아는 지식이 가장 고상하기에,\n저는 모든 것을 해로 여기나이다.\n주님을 얻기 위해 모든 것을 잃어버리고 배설물로 여길지라도.","compact":"주 그리스도 예수를 아는 지식이 가장 고상하기에,\n모든 것을 잃고 주님을 얻기 원하나이다.","oneline":"그리스도 예수를 아는 지식이 가장 고상하나이다.","comfort":"그 마음을 너무나도 잘 아시는 분이 계시기에,\n주님 안에서 모든 것을 얻으실 것입니다.","original_tag":"죄책감","pastor":"김선교"},{"ref":"요한계시록 12:10","type":"선언형","tags":["보호","소망","평안"],"full":"하늘에서 큰 음성이 들려 이르기를,\n이제 우리 하나님의 구원과 능력과 나라와 그분의 그리스도의 권세가 나타났도다.\n우리 형제들을 밤낮으로 참소하던 자가 쫓겨났음이라.","compact":"우리 하나님의 구원과 능력과 나라와 그분의 권세가 나타났고,\n참소하던 자가 쫓겨났도다.","oneline":"하나님의 구원과 능력이 나타났으니, 참소하던 자가 쫓겨났도다.","comfort":"이미 승리하셨고,\n당신을 위해 싸우시는 분이 계시니까요.","original_tag":"죄책감","pastor":"이찬수"},{"ref":"로마서 7:24","type":"고백형","tags":["슬픔","회개","불안","외로움"],"full":"오호라, 나는\n이토록 곤고한 사람이로소이다.\n이 사망의 몸에서\n누가 나를 건져낼 수 있겠나이까?","compact":"오호라, 나는 곤고한 사람이로다.\n누가 이 사망의 몸에서\n나를 건져낼까?","oneline":"오호라, 나는 곤고한 사람이로소이다.","comfort":"당신의 깊은 탄식조차도 들으시고 공감하시는 분이 계시니까요.","original_tag":"죄책감","pastor":"이찬수"},{"ref":"로마서 8:37","type":"선언형","tags":["소망","보호","신뢰"],"full":"그러나 이 모든 일에,\n우리를 지극히 사랑하시는\n주님으로 말미암아\n우리가 넉넉히 이길 것이옵니다.","compact":"우리를 사랑하시는 이로 말미암아\n우리가 넉넉히 이기느니라.","oneline":"우리를 사랑하시는 이로 말미암아 우리가 넉넉히 이기느니라.","comfort":"사랑으로 이미 당신의 모든 싸움에서 승리를 약속하신 분이에요.","original_tag":"죄책감","pastor":"이찬수"},{"ref":"디모데후서 1:5","type":"위로형","tags":["가정","신뢰","소망","축복"],"full":"이는 제가 당신 안에\n거짓 없는 믿음이 있음을\n생각함이라.\n그 믿음은 먼저 당신의\n외조모 로이스와\n어머니 유니게 속에 있었으며,\n이제 당신 안에도 있는 것을\n확신하나이다.","compact":"당신 안에 거짓 없는 믿음이 있음을\n확신하나이다.\n그 믿음이 당신의 가정에\n이어져 내려왔나이다.","oneline":"당신 안에 거짓 없는 믿음이 있음을 확신하나이다.","comfort":"그 믿음의 뿌리를 아시고 기뻐하시는 분이 계시니까요.","original_tag":"죄책감","pastor":"이찬수"},{"ref":"디모데후서 3:15","type":"선언형","tags":["인도하심","소망","신뢰"],"full":"또한 어려서부터\n성경을 알았나니,\n성경은 능히 당신으로 하여금\n그리스도 예수 안에 있는\n믿음으로 말미암아\n구원에 이르는 지혜를\n얻게 할 것이옵니다.","compact":"성경은 능히 당신으로 하여금\n그리스도 예수 안에 있는 믿음으로\n구원에 이르는 지혜를\n얻게 할 것이옵니다.","oneline":"성경은 능히 당신으로 하여금 구원에 이르는 지혜를 얻게 할 것이옵니다.","comfort":"그 지혜의 길을 밝히 보여주시는 분이 이미 인도하고 계시니까요.","original_tag":"죄책감","pastor":"이찬수"},{"ref":"에스겔 37:3","type":"고백형","tags":["신뢰","소망","인도하심"],"full":"그가 제게 이르시되,\n'인자야, 이 뼈들이 능히\n살아날 수 있겠느냐?' 하시기로\n제가 대답했습니다.\n'주 여호와여,\n주님께서 아십니다.'","compact":"'이 뼈들이 능히\n살아날 수 있겠느냐?'\n주님께서 아십니다.","oneline":"주님, 주님께서 아십니다.","comfort":"모든 것을 아시는 주님이 이미 계십니다.","original_tag":"죄책감","pastor":"이찬수"},{"ref":"로마서 8:1-2","type":"선언형","tags":["용서","평안","보호","신뢰"],"full":"그러므로 이제\n그리스도 예수님 안에 있는\n자들에게는 결코 정죄함이 없나니,\n이는 그리스도 예수님 안에 있는\n생명의 성령의 법이\n죄와 사망의 법에서\n당신을 자유롭게 하였음입니다.","compact":"그리스도 예수님 안에 있는\n자에게는 결코 정죄함이 없나니,\n생명의 성령의 법이\n당신을 자유롭게 하였습니다.","oneline":"그리스도 예수님 안에 있는 자에게는 결코 정죄함이 없나이다.","comfort":"이미 정죄함에서 자유롭게 하신 분이 계십니다.","original_tag":"죄책감","pastor":"이찬수"},{"ref":"요한복음 8:11","type":"위로형","tags":["용서","회개","평안","결단"],"full":"예수님께서 이르시되,\n'나도 당신을 정죄하지 아니하노니,\n가서 다시는 죄를 범치 마십시오.'","compact":"나도 당신을 정죄하지 아니하노니,\n다시는 죄를 범치 마십시오.","oneline":"나도 당신을 정죄하지 아니하노니.","comfort":"당신을 정죄하지 않으시겠다고 이미 선언하신 분이 계십니다.","original_tag":"죄책감","pastor":"이찬수"},{"ref":"로마서 5:10","type":"선언형","tags":["소망","신뢰","평안","축복"],"full":"곧 우리가 원수 되었을 때에도\n그 아드님의 죽으심으로 말미암아\n하나님과 화목하게 되었으니,\n화목하게 된 자로서는 더욱\n그분의 살아나심으로 말미암아\n구원을 받을 것입니다.","compact":"우리가 원수 되었을 때에도\n하나님과 화목하게 되었으니,\n더욱 그분의 살아나심으로 말미암아\n구원을 받을 것입니다.","oneline":"그분의 살아나심으로 말미암아 구원을 받을 것입니다.","comfort":"이미 당신을 위해 모든 것을 이루신 분입니다.","original_tag":"죄책감","pastor":"이찬수"},{"ref":"요한복음 16:33","type":"선언형","tags":["평안","두려움","소망","신뢰"],"full":"내가 이 말을 당신들에게\n이르는 것은,\n당신들로 내 안에서\n평안을 누리게 하려 함이라.\n세상에서는 당신들이 환난을 당하나\n담대하십시오.\n내가 세상을 이기었노라.","compact":"세상에서는 환난을 당하나\n담대하십시오.\n내가 세상을 이기었노라.","oneline":"내가 세상을 이기었노라.","comfort":"이미 세상을 이기신 분이 당신과 함께 계십니다.","original_tag":"죄책감","pastor":"이찬수"},{"ref":"마가복음 2:5","type":"선언형","tags":["용서","평안","치유","회개"],"full":"예수님께서 그들의 믿음을 보시고\n중풍병자에게 이르시되,\n'작은 자여,\n당신의 죄 사함을 받았느니라.'","compact":"당신의 죄 사함을 받았느니라.","oneline":"당신의 죄 사함을 받았느니라.","comfort":"죄 없으신 그분이 당신의 죄를 이미 사해주셨습니다.","original_tag":"죄책감","pastor":"이찬수"},{"ref":"출애굽기 15:26","type":"선언형","tags":["건강","치유","보호","순종"],"full":"말씀하시기를, '네가 너의 하나님 나 여호와의 말을 들어 순종하고\n내 계명을 지키면, 내가 애굽 사람에게 내린 모든 질병 중 하나도\n네게 내리지 아니하리라. 나는 너를 치료하는 여호와임이라.'","compact":"네가 내 말을 순종하면 모든 질병을 내리지 아니하리니,\n나는 너를 치료하는 여호와임이라.","oneline":"나는 너를 치료하는 여호와임이라.","comfort":"이미 당신의 치료자이시며,\n당신을 돌보시는 분입니다.","original_tag":"죄책감","pastor":"이찬수"},{"ref":"로마서 8:1","type":"선언형","tags":["용서","평안","보호","신뢰"],"full":"그러므로 이제 그리스도 예수님 안에 있는 자들에게는\n결코 정죄함이 없나이다.","compact":"그리스도 예수님 안에 있는 자에게는\n결코 정죄함이 없나이다.","oneline":"결코 정죄함이 없나이다.","comfort":"당신을 정죄하지 않으시는 분의\n사랑 안에 있습니다.","original_tag":"죄책감","pastor":"이찬수"},{"ref":"마가복음 2:17","type":"위로형","tags":["용서","회개","신뢰","소망"],"full":"예수님께서 들으시고 그들에게 이르시되,\n'건강한 자에게는 의사가 쓸 데 없고, 병든 자에게라야 쓸 데 있느니라.\n나는 의인을 부르러 온 것이 아니요, 죄인을 부르러 왔노라.'","compact":"나는 의인을 부르러 온 것이 아니요,\n죄인을 부르러 왔노라.","oneline":"나는 죄인을 부르러 왔노라.","comfort":"당신을 부르기 위해 오신 분이 계십니다.","original_tag":"죄책감","pastor":"이찬수"},{"ref":"마태복음 9:13","type":"위로형","tags":["용서","회개","신뢰","소망"],"full":"너희는 가서 '내가 긍휼을 원하고\n제사를 원치 아니하노라' 하신 뜻이 무엇인지 배우라.\n나는 의인을 부르러 온 것이 아니요, 죄인을 부르러 왔노라.","compact":"나는 긍휼을 원하고\n죄인을 부르러 왔노라.","oneline":"나는 죄인을 부르러 왔노라.","comfort":"긍휼로 당신을 기다리시는 분이 계십니다.","original_tag":"죄책감","pastor":"이찬수"},{"ref":"요한복음 4:23-24","type":"선언형","tags":["관계","인도하심","소망","평안"],"full":"아버지께서는 영과 진리로 참되게 예배하는 자들을 찾으십니다.\n하나님은 영이시니,\n예배하는 자가 영과 진리로 예배할지니라.","compact":"아버지께서는 영과 진리로\n예배하는 자들을 찾으십니다.","oneline":"아버지께서 참된 예배자를 찾으십니다.","comfort":"당신을 영과 진리로 예배하도록\n찾고 계신 분이 바로 하나님이시니까요.","original_tag":"죄책감","pastor":"이찬수"},{"ref":"빌립보서 1:6","type":"선언형","tags":["신뢰","소망","인도하심","보호"],"full":"여러분 안에서 선한 일을 시작하신 분께서\n그리스도 예수의 날까지 그 일을 온전히 이루실 것을\n우리는 확신합니다.","compact":"여러분 안에서 시작하신 선한 일을\n예수님의 날까지 온전히 이루실 것입니다.","oneline":"시작하신 그 일을 온전히 이루실 줄을 확신합니다.","comfort":"그 일을 시작하신 분이 이미\n완성하시겠다고 먼저 말씀하셨으니까요.","original_tag":"죄책감","pastor":"이찬수"},{"ref":"디모데전서 1:14","type":"선언형","tags":["축복","감사","소망","평안"],"full":"우리 주님의 은혜가\n그리스도 예수 안에 있는 믿음과 사랑과 더불어\n넘치도록 풍성하였도다.","compact":"주님의 은혜가 믿음과 사랑과 함께\n넘치도록 풍성합니다.","oneline":"주님의 은혜가 넘치도록 풍성합니다.","comfort":"주님의 은혜는 언제나 당신에게\n넘치도록 풍성하니까요.","original_tag":"죄책감","pastor":"이찬수"},{"ref":"요한1서 3:1","type":"선언형","tags":["자녀양육","관계","소망","평안"],"full":"보십시오, 아버지께서 우리에게 어떠한 사랑을 베풀어 주셨는지요!\n우리를 하나님의 자녀라 일컬음을 받게 하셨으니,\n참으로 우리가 그와 같습니다.","compact":"아버지께서 우리에게 베푸신 사랑을 보십시오.\n우리를 하나님의 자녀라 부르셨습니다.","oneline":"우리를 하나님의 자녀라 부르셨습니다.","comfort":"당신은 이미 그분의 귀한 자녀이니까요.","original_tag":"죄책감","pastor":"이찬수"},{"ref":"사도행전 15:16","type":"선언형","tags":["소망","치유","보호","인도하심"],"full":"이 후에 내가 돌아와서 다윗의 무너진 장막을 다시 지을 것이며,\n그 허물어진 것들을 다시 일으켜 세울 것입니다.","compact":"내가 돌아와 무너진 것을 다시 짓고\n일으켜 세울 것입니다.","oneline":"무너진 것을 다시 일으켜 세울 것입니다.","comfort":"그분은 무너진 것을 다시 세우시는 분이시니까요.","original_tag":"죄책감","pastor":"이찬수"},{"ref":"이사야 6:7","type":"선언형","tags":["용서","회개","평안","치유"],"full":"이것이 네 입술에 닿았으니,\n보라, 네 악이 제하여졌고\n네 죄가 사하여졌도다.","compact":"네 악이 제하여졌고\n네 죄가 사하여졌습니다.","oneline":"네 죄가 사하여졌느니라.","comfort":"당신을 먼저 깨끗하게 하시고자 하신 분의\n마음이 이미 있었으니까요.","original_tag":"죄책감","pastor":"이찬수"},{"ref":"시편 8:1","type":"고백형","tags":["감사","소망","신뢰","평안"],"full":"오, 우리 주 여호와여,\n주의 이름이 온 땅에\n어찌 그리 아름다운지요!\n주의 영광이 하늘 위에\n드높으시옵니다.","compact":"주님의 이름이 온 땅에\n어찌 그리 아름다운지요!\n주의 영광이 하늘을\n덮었나이다.","oneline":"주의 이름이 온 땅에 어찌 그리 아름다운지요!","comfort":"온 땅을 덮은 영광의 이름이\n당신의 기도를 듣고 있으니까요.","original_tag":"죄책감","pastor":"이찬수"},{"ref":"고린도후서 4:7","type":"고백형","tags":["신뢰","소망","인도하심","평안"],"full":"우리가 이 보배를\n질그릇 같은 몸에 지녔으니,\n이는 그 엄청난 능력이\n우리에게서 나온 것이 아니라\n하나님께 있음을\n알게 하려 함이라.","compact":"우리가 이 보배를\n질그릇에 가졌으니,\n큰 능력은 하나님께 있습니다.","oneline":"큰 능력은 하나님께 있습니다.","comfort":"그 엄청난 능력은 이미\n당신 안에 있는 것이 아니라,\n하나님께 있습니다.","original_tag":"죄책감","pastor":"이찬수"},{"ref":"창세기 50:19-20","type":"선언형","tags":["인도하심","소망","보호","평안"],"full":"요셉이 이르되 두려워 마소서.\n당신들은 나를 해하려\n하였으나,\n하나님께서는 그것을\n선으로 바꾸사\n오늘과 같이 많은 생명을\n구원하게 하셨나이다.","compact":"하나님께서는 당신들의\n악한 의도조차\n선으로 바꾸시어\n많은 생명을 구원하셨나이다.","oneline":"하나님께서 모든 것을 선으로 바꾸어 생명을 구원하시나이다.","comfort":"가장 힘든 순간에도\n돌이키시는 분이 계시니까요.","original_tag":"용서","pastor":"Andy Stanley"},{"ref":"창세기 41:16","type":"선언형","tags":["인도하심","소망","평안"],"full":"요셉이 바로에게 답하여\n아뢰옵나니,\n제가 아니라\n하나님께서 바로께\n평안한 답을 주시리이다.","compact":"제가 아니라\n하나님께서 바로께\n평안한 답을 주시리이다.","oneline":"하나님께서 평안한 답을 주시리이다.","comfort":"모든 질문에 해답을\n주시는 분이 계시니까요.","original_tag":"용서","pastor":"Andy Stanley"},{"ref":"창세기 39:20-21","type":"위로형","tags":["보호","인도하심","평안","외로움"],"full":"요셉이 옥에 갇혔으나,\n여호와께서는 요셉과\n함께하시고,\n그에게 인자함을 더하시어\n간수장에게 은혜를\n얻게 하셨나이다.","compact":"여호와께서 요셉과\n함께하시고,\n그에게 은혜를 더하셨나이다.","oneline":"여호와께서 요셉과 함께하시고 은혜를 더하시니라.","comfort":"어떤 곳에 있든 먼저\n함께하고 계시는 분이 있어요.","original_tag":"용서","pastor":"Andy Stanley"},{"ref":"창세기 45:5","type":"선언형","tags":["인도하심","소망","용서","평안"],"full":"당신들이 나를 이곳에\n팔았다고 하여\n근심하거나 한탄하지 마소서.\n하나님께서 생명을 구원하시려\n나를 당신들보다 먼저\n보내셨나이다.","compact":"하나님께서 생명을 구원하시려\n나를 당신들보다 먼저\n보내셨으니,\n근심하지 마소서.","oneline":"하나님께서 생명을 구원하시려 먼저 보내셨나이다.","comfort":"상황 너머의 큰 그림을\n그리시는 분이 계시니까요.","original_tag":"용서","pastor":"Andy Stanley"},{"ref":"Matthew 8:8","type":"고백형","tags":["신뢰","치유","소망","결단"],"full":"백부장이 대답하여\n아뢰옵나니,\n주여, 제가 감당할 수\n없사오니\n제 지붕 아래로 들어오심을\n마땅히 여기지 아니하나이다.\n오직 말씀으로만 하시옵소서,\n그러면 제 하인이 나으리이다.","compact":"오직 말씀으로만 하시옵소서,\n그러면 제 하인이 나으리이다.","oneline":"오직 말씀으로만 하시면 나으리이다.","comfort":"당신의 간절한 믿음을\n들으시는 분이 계시니까요.","original_tag":"용서","pastor":"Andy Stanley"},{"ref":"Romans 5:8","type":"선언형","tags":["소망","신뢰","용서","평안"],"full":"우리가 아직 죄인이었을 때에\n그리스도께서 우리를 위하여\n죽으심으로,\n하나님께서는 우리를 향한\n자기의 사랑을 나타내셨나이다.","compact":"하나님께서는 우리가 아직\n죄인이었을 때에\n그리스도께서 우리를 위해\n죽으심으로 사랑을\n나타내셨나이다.","oneline":"하나님께서 우리를 향한 자기의 사랑을 나타내셨나이다.","comfort":"당신의 존재 자체를\n사랑하시는 분이 계시니까요.","original_tag":"용서","pastor":"Andy Stanley"},{"ref":"시편 103:13-14","type":"선언형","tags":["불안","신뢰","보호","평안"],"full":"아버지가 자식을 긍휼히\n여김 같이,\n여호와께서는 자기를\n경외하는 자를\n긍휼히 여기시나이다.\n이는 주께서 우리의 체질을\n아시며,\n우리가 단지 먼지뿐임을\n기억하심이로다.","compact":"여호와께서는 자기를\n경외하는 자를 긍휼히\n여기시나니,\n주께서 우리의 연약한 체질을\n아시며 기억하시나이다.","oneline":"여호와께서는 우리의 연약함을 아시고 긍휼히 여기시나이다.","comfort":"우리가 얼마나 연약한지\n먼저 아시는 분이 계시니까요.","original_tag":"용서","pastor":"Dr. Timothy Keller"},{"ref":"시편 103:8-10","type":"선언형","tags":["용서","평안","신뢰","축복"],"full":"여호와는 긍휼이 많으시고\n은혜로우시며,\n노하기를 더디 하시고\n인자하심이 풍부하시도다.\n자주 경책하지 아니하시며,\n노를 영원히 품지\n아니하시리로다.\n우리의 죄를 따라 우리를\n처벌하지 아니하시며,\n우리의 죄악을 따라 우리에게\n그대로 갚지 아니하셨나이다.","compact":"여호와는 긍휼이 많으시고\n은혜로우시며,\n노하기를 더디 하시고\n인자하심이 풍부하시도다.\n우리의 죄를 따라 우리를\n처벌하지 아니하시나이다.","oneline":"여호와는 긍휼이 많으시고 은혜로우시며 인자하심이 풍부하시도다.","comfort":"당신의 모든 것을 용서하시고\n사랑으로 품으시는 분이\n계시니까요.","original_tag":"용서","pastor":"Dr. Timothy Keller"},{"ref":"시편 103:17","type":"선언형","tags":["신뢰","보호","가정","축복"],"full":"여호와의 인자하심은\n주님을 경외하는 자들에게\n영원부터 영원까지 이르며,\n주님의 의로우심은\n자손의 자손에게 이르리이다.","compact":"주님의 인자하심은\n영원히 이르며,\n의로우심은 대대에 이르리이다.","oneline":"주님의 인자하심은 영원토록 함께하십니다.","comfort":"당신의 자녀와 그 자녀에게까지 미치실 사랑을 약속하신 분입니다.","original_tag":"용서","pastor":"Dr. Timothy Keller"},{"ref":"Exodus 12:12-13","type":"선언형","tags":["보호","신뢰","두려움","평안"],"full":"제가 이 밤에 애굽 땅을\n두루 다니며\n모든 처음 난 것을 치리니,\n사람과 짐승을 막론하고\n애굽의 모든 신에게\n벌을 내리리이다.\n나는 여호와이니라.\n그 피는 당신들이 있는 집에\n표적이 될 것이요,\n제가 그 피를 볼 때\n당신들을 넘어갈 것이니,\n내가 애굽을 칠 때\n어떤 재앙도 당신들을\n해치지 못하리이다.","compact":"제가 그 피를 볼 때\n당신들을 넘어갈 것이며,\n어떤 재앙도 당신들을\n해치지 못하리이다.","oneline":"피를 볼 때 당신들을 넘어가며, 재앙이 당신들을 해치지 못하리이다.","comfort":"이미 당신의 안전을 위하여 표시해 두셨고, 그 안에서 보호하시겠다고 선언하신 분입니다.","original_tag":"용서","pastor":"Timothy Keller"},{"ref":"Genesis 22:7-8","type":"선언형","tags":["신뢰","인도하심","재정어려움","소망"],"full":"이삭이 아버지 아브라함에게\n아뢰되, '아버지!'\n아브라함이 '내 아들아,\n왜 부르느냐?' 대답하니,\n이삭이 말하되\n'불과 나무는 여기에 있는데,\n번제할 어린 양은\n어디 있나이까?'\n아브라함이 대답하되\n'내 아들아,\n번제할 어린 양은\n하나님께서 친히\n준비하시리라.'","compact":"아브라함이 대답하되\n'내 아들아,\n번제할 어린 양은\n하나님께서 친히\n준비하시리라.'","oneline":"하나님께서 친히 어린 양을 준비하시리라.","comfort":"이미 모든 것을 준비하시겠다고 말씀하신 분이시니까요.","original_tag":"용서","pastor":"Timothy Keller"},{"ref":"누가복음 6:20-22","type":"선언형","tags":["소망","평안","슬픔","재정어려움"],"full":"예수께서 눈을 들어\n제자들을 보시고\n이르시되,\n너희 가난한 자들은\n복이 있나니,\n하나님의 나라가\n너희의 것임이라.\n지금 주린 자들은\n복이 있나니,\n너희가 배부르게 될 것이요.\n지금 우는 자들은\n복이 있나니,\n너희가 웃게 될 것임이라.","compact":"너희 가난한 자는\n복이 있나니,\n하나님의 나라가\n너희 것임이요.\n주린 자는 배부름을\n얻을 것이요.\n우는 자는 웃게 될 것이라.","oneline":"너희 가난한 자들은 복이 있나니, 하나님의 나라가 너희의 것이요, 우는 자는 웃게 되리라.","comfort":"지금 당신이 겪는 모든 슬픔과 고난을 아시고, 그 끝에 웃음을 약속하신 분이에요.","original_tag":"용서","pastor":"Timothy Keller"},{"ref":"창세기 50:19-21","type":"위로형","tags":["보호","인도하심","자녀양육","소망","두려움"],"full":"요셉이 그들에게 이르되,\n'두려워하지 마소서.\n제가 하나님을 대신하리이까?\n당신들은 저를 해하려 하였으나,\n하나님께서는 그것을\n선으로 바꾸사\n오늘과 같이 많은 백성의\n생명을 구원하게 하시려\n하셨나니,\n당신들은 두려워하지 마소서.\n제가 당신들과\n당신들의 자녀들을\n기르리이다.'","compact":"당신들은 저를 해하려 하였으나,\n하나님께서는 그것을\n선으로 바꾸셨으니,\n두려워하지 마소서.\n제가 당신들과\n당신들의 자녀들을\n기르리이다.","oneline":"하나님께서 모든 것을 선으로 바꾸시고, 당신과 자녀를 기르시리라.","comfort":"모든 고난까지도 선으로 바꾸시는 분이 당신의 앞길에 서 계십니다.","original_tag":"용서","pastor":"팀 켈러"},{"ref":"로마서 12:19","type":"선언형","tags":["용서","평안","신뢰","관계"],"full":"사랑하는 자들아,\n당신들이 직접 원수를\n갚지 말고,\n하나님의 진노하심에\n맡기세요.\n기록되었으되,\n'원수 갚는 것은 내게 있으니,\n내가 갚으리라'고\n주님께서 말씀하시니라.","compact":"원수 갚는 것은 내게 있으니,\n내가 갚으리라고\n주께서 말씀하시니라.","oneline":"원수 갚는 것은 내게 있으니, 내가 갚으리라.","comfort":"이미 당신의 모든 억울함과 정의를 다루시겠다고 선언하신 분이 계십니다.","original_tag":"용서","pastor":"팀 켈러"},{"ref":"잠언 25:21-22","type":"선언형","tags":["용서","축복","관계","신뢰"],"full":"당신의 원수가\n배고파하거든 음식을 먹이고,\n목말라하거든\n물을 마시게 하십시오.\n그리하는 것은 핀 숯을\n그의 머리에 놓는 것과 같으며,\n여호와께서 당신에게\n갚아 주시리라.","compact":"원수를 선대하면\n여호와께서 당신에게\n갚아 주시리라.","oneline":"여호와께서 당신에게 갚아 주시리라.","comfort":"당신의 선행에 대해 반드시 보상하시겠다고 약속하신 분입니다.","original_tag":"용서","pastor":"팀 켈러"},{"ref":"Luke 15:31-32","type":"선언형","tags":["가정","축복","신뢰","소망","관계"],"full":"아버지가 이르되,\n'내 아들아,\n너는 항상 나와 함께 있고,\n내가 가진 모든 것이\n너의 것이로다.\n그러나 이 네 동생은\n죽었다가 다시 살아났고,\n잃었다가 찾았으니\n우리가 기뻐하고\n즐거워하는 것이\n마땅하니라.'","compact":"'내 아들아,\n너는 항상 나와 함께 있고,\n내가 가진 모든 것이\n너의 것이로다.'","oneline":"너는 항상 나와 함께 있고, 내가 가진 모든 것이 너의 것이니라.","comfort":"모든 것을 당신에게 이미 주셨고, 영원히 함께 하시겠다고 약속하신 분입니다.","original_tag":"용서","pastor":"Timothy Keller"},{"ref":"호세아 3:1-5","type":"선언형","tags":["신뢰","용서","관계","소망"],"full":"여호와께서 내게 이르시되,\n'이스라엘 자손이\n다른 신을 섬기고\n건포도 과자를 즐길지라도\n여호와가 그들을 사랑하나니,\n너는 또 가서\n타인의 사랑을 받아\n음녀가 된 그 여자를\n사랑하라.'","compact":"이스라엘 자손이\n다른 신을 섬길지라도\n여호와가 그들을\n사랑하나니.","oneline":"여호와가 그들을 사랑하나니.","comfort":"당신의 어떤 모습이라도 사랑하시겠다고 먼저 말씀하신 분이에요.","original_tag":"용서","pastor":"팀 켈러"},{"ref":"이사야 54:5","type":"선언형","tags":["외로움","관계","신뢰","보호","소망"],"full":"이는 당신을 지으신 분이\n당신의 남편이시요,\n그의 이름은 만군의\n여호와이시기 때문입니다.","compact":"당신을 지으신 분이\n당신의 남편이시라.","oneline":"당신을 지으신 분이 당신의 남편이십니다.","comfort":"당신을 가장 가까이서 돌보고 사랑하시겠다고 먼저 약속하신 분이에요.","original_tag":"용서","pastor":"팀 켈러"},{"ref":"이사야 62:5","type":"선언형","tags":["소망","평안","축복","신뢰"],"full":"신랑이 신부를\n기뻐함 같이,\n당신의 하나님이\n당신을 기뻐하시리라.","compact":"신랑이 신부를\n기뻐함 같이,\n하나님이 당신을\n기뻐하시리라.","oneline":"당신의 하나님이 당신을 기뻐하시리라.","comfort":"그 기쁨의 대상은\n바로 당신입니다.","original_tag":"용서","pastor":"팀 켈러"},{"ref":"에베소서 1:11","type":"선언형","tags":["인도하심","소망","신뢰","보호"],"full":"모든 일을 그의\n뜻의 결정대로\n이루시는 분의\n계획을 따라,\n우리는 예정된\n기업이 되었으니.","compact":"하나님의 계획을 따라,\n우리는 예정된\n기업이 되었으니.","oneline":"우리는 하나님의 계획 안에서 예정된 기업입니다.","comfort":"이미 그분의 계획 안에\n당신의 자리가 있습니다.","original_tag":"용서","pastor":"Tony Evans"},{"ref":"에베소서 2:14-16","type":"선언형","tags":["평안","관계","용서"],"full":"그분은 우리의\n화평이십니다.\n원수 된 것을\n십자가로 소멸하시고,\n하나님과 화목하게 하셨으니,\n이제 우리는\n그분 안에서\n하나 된 새 사람입니다.","compact":"그분은 우리의\n화평이시며,\n십자가로 원수 된 것을\n소멸하시고\n화목하게 하셨습니다.","oneline":"그분은 우리의 화평이시며, 당신을 하나님과 화목하게 하셨습니다.","comfort":"그분은 이미\n당신을 위해\n평화를 이루셨습니다.","original_tag":"용서","pastor":"Tony Evans"},{"ref":"고린도후서 5:17-18","type":"선언형","tags":["소망","평안","축복","치유","결단"],"full":"누구든지 그리스도\n안에 있으면\n새로운 피조물입니다.\n이전 것은\n지나갔으니\n보십시오,\n새 것이 되었도다.\n이 모든 것이\n하나님께로부터\n났습니다.","compact":"그리스도 안에\n있으면 새로운\n피조물입니다.\n이전 것은\n지나갔으니 보라,\n새 것이 되었도다.","oneline":"당신은 그리스도 안에서 새로운 피조물입니다.","comfort":"당신의 새 시작은\n이미 예비되어\n있습니다.","original_tag":"용서","pastor":"Tony Evans"},{"ref":"Exodus 12:13","type":"선언형","tags":["보호","평안","신뢰","축복"],"full":"내가 그 피를 볼 때에,\n내가 너를 넘어가\n보호하리라.","compact":"내가 피를 볼 때에,\n너를 넘어가\n보호하리라.","oneline":"내가 너를 넘어가 보호하리라.","comfort":"당신을 보호하시겠다고\n먼저 말씀하신 분이에요.","original_tag":"용서","pastor":"Dr. Tony Evans"},{"ref":"Revelation 12:11","type":"선언형","tags":["보호","소망","신뢰","두려움"],"full":"그들은 어린양의\n피와 그들의\n증언의 말씀으로\n사탄을 이겼도다.","compact":"어린양의 피로 말미암아\n그들이 이겼도다.","oneline":"어린양의 피로 당신은 승리할 수 있습니다.","comfort":"당신을 위한 승리는\n이미 그 피 안에\n있습니다.","original_tag":"용서","pastor":"Dr. Tony Evans"},{"ref":"로마서 5:8 (개념 인용)","type":"선언형","tags":["용서","신뢰","소망","평안"],"full":"우리가 아직\n죄인 되었을 때에,\n그리스도께서 우리를\n위하여 죽으심으로,\n하나님께서 우리에 대한\n자신의 사랑을\n확증하셨습니다.","compact":"우리가 죄인\n되었을 때에도,\n하나님께서 우리에 대한\n사랑을 확증하셨습니다.","oneline":"하나님께서 당신을 향한 사랑을 이미 확증하셨습니다.","comfort":"당신이 어떤 모습이든,\n그분은 먼저\n사랑을 보여주셨습니다.","original_tag":"용서","pastor":"김선교"},{"ref":"호세아 13:4 (인용)","type":"선언형","tags":["외로움","보호","신뢰","인도하심","평안"],"full":"내가 광야에서도\n당신과 함께\n있었던 당신의\n하나님 여호와입니다.","compact":"광야에서도\n당신과 함께\n있었던 당신의\n하나님 여호와입니다.","oneline":"나는 당신의 하나님 여호와이며, 항상 함께 합니다.","comfort":"가장 고독한\n길에서도 당신과\n동행하시는 분입니다.","original_tag":"용서","pastor":"김선교"},{"ref":"출애굽기 15:26","type":"선언형","tags":["건강","치유","보호","순종"],"full":"주님께서 이르시되,\n당신이 주님의\n음성에 귀 기울여 순종하고,\n주님의 의로운\n길을 따르며\n모든 규례를 지키면,\n내가 애굽 사람에게\n내린 어떠한 질병도\n당신에게 내리지 않으리라.\n나는 당신을 치료하는 여호와임이라.","compact":"당신이 주님의\n길을 따르면\n어떠한 질병도\n내리지 않으리니,\n나는 당신을 치료하는 여호와임이라.","oneline":"나는 당신을 치료하는 여호와임이라.","comfort":"이미 당신의\n치유자가 되어주시는 분이에요.","original_tag":"용서","pastor":"이찬수"},{"ref":"시편 34:18","type":"선언형","tags":["슬픔","보호","회개"],"full":"여호와께서는\n마음이 상한 자를\n가까이하시고,\n진심으로 통회하는\n자를 구원하시는도다.","compact":"마음이 상한 자를\n가까이하시고,\n통회하는 자를\n구원하시는도다.","oneline":"마음이 상한 자를 가까이하시는도다.","comfort":"그 자리에 먼저\n서 계신 분이\n있으니까요.","original_tag":"용서","pastor":"이찬수"},{"ref":"이사야 54:10","type":"선언형","tags":["소망","평안","신뢰","보호"],"full":"산들은 떠나고\n언덕들은 옮겨질지라도,\n나의 자비는 결코\n당신에게서 떠나지 아니하며,\n나의 화평의 언약은\n흔들리지 아니하리라.\n당신을 긍휼히 여기시는\n여호와께서 친히 말씀하셨으니.","compact":"산이 옮겨질지라도\n주님의 자비와 화평의 언약은\n흔들리지 아니하리라.","oneline":"나의 화평의 언약은 흔들리지 아니하리라.","comfort":"이미 붙드시겠다고 먼저 말씀하신 분이에요.","original_tag":"용서","pastor":"이찬수"},{"ref":"에스겔 34:25","type":"선언형","tags":["평안","보호","소망","신뢰"],"full":"내가 또 그들과\n화평의 언약을 맺고\n악한 짐승을\n그 땅에서 그치게 하리니,\n그들이 빈 들에\n평안히 거하며\n수풀 가운데에서\n안전하게 지낼 것이라.","compact":"내가 화평의 언약을 맺고,\n그들이 빈 들에\n평안히 거하게 하리라.","oneline":"그들이 빈 들에 평안히 거하며 안전하게 지낼 것이라.","comfort":"당신이 어디에 있든 안전을 약속하신 분이에요.","original_tag":"용서","pastor":"이찬수"},{"ref":"히브리서 8:10","type":"선언형","tags":["신뢰","인도하심","소망","평안"],"full":"주님께서 이르시되,\n그날 후에 내가\n이스라엘 집과 맺을 언약은\n이것이니, 나의 법을\n그들의 생각에 두며\n그들의 마음에 기록하리라.\n나는 그들의 하나님이 되고,\n그들은 나의 백성이 되리라.","compact":"내 법을 그들의 생각과\n마음에 기록하리라.\n나는 그들의 하나님이 되리라.","oneline":"나는 그들의 하나님이 되고 그들은 나의 백성이 되리라.","comfort":"이미 당신의 삶 가운데 함께하고 계시는 분이에요.","original_tag":"용서","pastor":"이찬수"},{"ref":"요한복음 14:27","type":"선언형","tags":["평안","두려움","신뢰"],"full":"평안을 당신에게 끼치노니,\n곧 나의 평안을\n당신에게 주노라.\n내가 주는 것은\n세상이 주는 것과\n같지 아니하니,\n당신의 마음에\n근심하지도 말고\n두려워하지도 마십시오.","compact":"나의 평안을\n당신에게 주노니,\n세상이 주는 것과\n같지 아니하리라.","oneline":"나의 평안을 당신에게 주노라.","comfort":"그분이 주시는 평안은 세상이 줄 수 없는 것이니까요.","original_tag":"용서","pastor":"이찬수"},{"ref":"히브리서 4:15","type":"위로형","tags":["슬픔","두려움","신뢰"],"full":"우리에게 계신\n대제사장께서는\n우리의 모든 연약함을\n깊이 동정하시고,\n모든 일에서 우리와\n똑같이 시험을 받으셨으나\n죄는 없으신 분입니다.","compact":"우리의 대제사장은\n우리의 연약함을\n동정하시고,\n모든 시험을 우리와\n똑같이 받으신 분입니다.","oneline":"우리의 모든 연약함을 동정하시는 분이 계십니다.","comfort":"당신의 모든 아픔과 연약함을 이미 다 아시는 분이 계세요.","original_tag":"용서","pastor":"이찬수"},{"ref":"시편 23:5","type":"고백형","tags":["보호","축복","평안","감사"],"full":"주님께서 저의\n원수들 앞에서\n저에게 상을 차려 주시고,\n저의 머리에 기름을\n부어 주셨으니,\n제 잔이 넘칩니다.","compact":"주님께서 원수들 앞에서\n상을 차려 주셨으니,\n제 잔이 넘칩니다.","oneline":"주께서 제 잔을 넘치게 채워 주십니다.","comfort":"이미 풍성하게 채우고 계신 분이 있으니까요.","original_tag":"용서","pastor":"이찬수"},{"ref":"출애굽기 20:2","type":"선언형","tags":["인도하심","보호","신뢰","소망"],"full":"나는 너를 이집트 땅,\n종 되었던 곳에서\n인도하여 낸 너의 하나님\n여호와이니라.","compact":"나는 너를\n종 되었던 곳에서\n인도하여 낸 너의 하나님\n여호와니라.","oneline":"나는 너를 인도하여 낸 너의 하나님 여호와니라.","comfort":"과거부터 인도하신 분이 지금도 함께 계시니까요.","original_tag":"용서","pastor":"이찬수"},{"ref":"요한1서 4:10-11","type":"위로형","tags":["용서","신뢰","평안","소망"],"full":"사랑은 바로 여기에 있습니다.\n우리가 하나님을\n사랑한 것이 아니라,\n하나님께서 우리를\n먼저 사랑하셔서\n우리 죄를 위해\n화목 제물로\n그분의 아들을\n보내주셨습니다.","compact":"우리가 하나님을\n사랑한 것이 아니요,\n하나님께서 우리를 사랑하사\n우리 죄를 속하기 위해\n아들을 보내셨음이라.","oneline":"하나님께서 우리를 먼저 사랑하셨습니다.","comfort":"가장 큰 사랑으로 이미 당신을 구원하신 분입니다.","original_tag":"용서","pastor":"이찬수"},{"ref":"로마서 14:4","type":"선언형","tags":["신뢰","보호","인도하심","소망"],"full":"남의 종을 비판하는\n너는 누구냐?\n그가 서 있든 넘어지든\n그것은 자기 주인에게\n달려 있으며,\n그가 서게 될 것이니,\n이는 그를 세우시는\n권능이 주님께\n있기 때문입니다.","compact":"그가 세움을 받으리니,\n이는 그를 세우시는\n권능이 주님께\n있기 때문입니다.","oneline":"그를 세우시는 권능이 주님께 있으니 세움 받을 것입니다.","comfort":"세우시는 권능을 가진 분이 이미 당신을 붙들고 계시니까요.","original_tag":"용서","pastor":"이찬수"},{"ref":"골로새서 3:13","type":"위로형","tags":["용서","평안","관계","회개"],"full":"누가 누구에게\n불만이 있더라도\n서로 용납하며\n피차 용서하세요.\n주님께서 이미 당신을\n용서하셨듯이 말입니다.","compact":"주님께서 당신을\n용서하신 것과 같이,\n당신도 용서할 수 있습니다.","oneline":"주님께서 이미 당신을 용서하셨습니다.","comfort":"가장 먼저 당신을 용서하신 분이 이미 거기 계시니까요.","original_tag":"용서","pastor":"이찬수"},{"ref":"마태복음 9:35","type":"선언형","tags":["치유","건강","소망","평안"],"full":"예수님께서 모든 도시와\n마을을 두루 다니시며\n회당에서 가르치시고,\n천국 복음을 전파하시며\n모든 병과\n모든 약한 것을 고치셨습니다.","compact":"예수님께서 모든 병과\n모든 약한 것을 고치셨습니다.","oneline":"예수님께서 모든 병을 고치셨습니다.","comfort":"이미 당신의 모든 아픔을 알고 고치시는 분입니다.","original_tag":"용서","pastor":"이찬수"},{"ref":"마태복음 9:36","type":"위로형","tags":["슬픔","불안","평안","신뢰"],"full":"무리들을 보시고\n불쌍히 여기셨습니다.\n그들이 목자 없는 양과 같이\n고생하며 기진해 있었기 때문입니다.","compact":"주님께서는 당신의\n고생과 기진함을\n불쌍히 여기시는도다.","oneline":"주님께서 당신의 모든 고생을 불쌍히 여기십니다.","comfort":"당신의 지치고 힘든 마음을 이미 헤아리고 계신 분입니다.","original_tag":"용서","pastor":"이찬수"},{"ref":"요한1서 3:16","type":"위로형","tags":["용서","소망","신뢰","평안"],"full":"그분께서 우리를 위하여\n목숨을 버리셨으니,\n우리는 이로써\n참된 사랑을 알게 됩니다.","compact":"그분께서 우리를 위하여\n목숨을 버리셨으니,\n이로써 참된 사랑을 압니다.","oneline":"그분께서 우리를 위해 목숨을 버리셨습니다.","comfort":"가장 큰 사랑으로 이미 모든 것을 주신 분이에요.","original_tag":"용서","pastor":"이찬수"},{"ref":"누가복음 22:42","type":"고백형","tags":["결단","순종","인도하심","두려움"],"full":"예수님께서 고백하시기를,\n'아버지여, 만일\n아버지의 뜻이거든\n이 잔을 내게서 옮기시옵소서.\n그러나 내 원대로 마시옵고\n아버지의 원대로\n되기를 원하나이다'\n하셨나이다.","compact":"아버지의 뜻이라면\n이 잔을 옮겨 주소서.\n그러나 제 뜻대로 마시옵고\n아버지의 뜻대로\n되기를 원하나이다.","oneline":"제 뜻대로 마시옵고 아버지의 뜻대로 되기를 원하나이다.","comfort":"당신의 깊은 고민도 그분은 이미 아십니다. 그 자리에 먼저 서 계신 분이 있으니까요.","original_tag":"용서","pastor":"이찬수"},{"ref":"에베소서 6:12","type":"위로형","tags":["불안","두려움","보호","신뢰"],"full":"우리의 싸움은\n혈과 육을 상대하는 것이 아니요,\n통치자들과 권세들과\n이 어둠의 세상 주관자들과\n하늘에 있는\n악한 영들을 상대함이니이다.","compact":"우리의 씨름은\n사람과의 싸움이 아니요,\n보이지 않는\n영적 세력과의 싸움입니다.","oneline":"우리의 씨름은 혈과 육을 상대하는 것이 아니니이다.","comfort":"당신이 홀로 싸우는 것이 아닙니다. 진짜 싸움의 본질을 아시는 분이 함께하십니다.","original_tag":"용서","pastor":"이찬수"},{"ref":"마태복음 5:9","type":"선언형","tags":["평안","축복","관계","가정"],"full":"화평하게 하는 자는\n복이 있나니,\n그들이 하나님의 아들이라\n일컬음을 받을 것임이니이다.","compact":"화평하게 하는 자는\n복이 있으니,\n하나님의 아들이라\n불릴 것입니다.","oneline":"화평하게 하는 자는 하나님의 아들이라 불릴 것이니이다.","comfort":"하나님께서 이미 당신을 자신의 자녀로 부르실 준비를 마치셨습니다.","original_tag":"용서","pastor":"이찬수"},{"ref":"고린도전서 14:33","type":"선언형","tags":["평안","신뢰","보호"],"full":"하나님께서는\n무질서의 하나님이 아니시요,\n오직 화평의 하나님이심을\n기억하십시오.","compact":"하나님은 무질서의\n하나님이 아니시요,\n오직 화평의\n하나님이십니다.","oneline":"하나님은 오직 화평의 하나님이십니다.","comfort":"당신의 혼란 속에서도 그분은 평안을 가져오시는 분이세요.","original_tag":"용서","pastor":"이찬수"},{"ref":"골로새서 1:20","type":"선언형","tags":["평안","용서","소망","치유"],"full":"그의 십자가의 피로\n화평을 이루시어,\n땅과 하늘의 모든 만물이\n그로 말미암아\n자신과 화목하게 되기를\n하나님께서 기뻐하십니다.","compact":"주님께서는 십자가의 피로\n화평을 이루셨으니,\n모든 것이 그분 안에서\n화목하게 되기를\n하나님께서 기뻐하십니다.","oneline":"하나님은 십자가의 피로 만물의 화평을 이루셨습니다.","comfort":"이미 모든 것을 화목하게 하시려는 그분의 기쁨이 당신에게 향해 있습니다.","original_tag":"용서","pastor":"이찬수"},{"ref":"로마서 5:1","type":"선언형","tags":["평안","신뢰","용서","소망"],"full":"그러므로 우리가 믿음으로\n의롭다 하심을 받았으니,\n우리 주 예수\n그리스도로 말미암아\n하나님과 화평을 누리게 되었나이다.","compact":"믿음으로 의롭다 하심을\n받았으니,\n그리스도로 말미암아\n하나님과 화평을\n누리게 되었습니다.","oneline":"우리는 예수 그리스도로 말미암아 하나님과 화평을 누립니다.","comfort":"이미 그분께서 당신과 평화롭게 지내기를 원하시며 길을 여셨습니다.","original_tag":"용서","pastor":"이찬수"},{"ref":"빌립보서 1:15-18","type":"고백형","tags":["감사","소망","신뢰","직장사업"],"full":"겉치레로 하든\n참으로 하든\n무슨 방도로 하든지\n전파되는 것은 그리스도이니,\n이로써 나는 기뻐하고\n또한 기뻐하리라.","compact":"어떤 방법으로든\n그리스도가 전파되니,\n나는 이로써 기뻐하고\n기뻐하리라.","oneline":"무슨 방도로 하든지 전파되는 것은 그리스도니, 나는 기뻐하고 기뻐하리라.","comfort":"당신의 모든 상황 속에서도 그리스도가 드러나시는 것을 그분은 기뻐하십니다.","original_tag":"용서","pastor":"이찬수"},{"ref":"민수기 14:28","type":"선언형","tags":["인도하심","신뢰","두려움","축복"],"full":"여호와의 말씀에, 내 삶을 두고\n맹세하노니, 너희 말이 내 귀에\n들린 대로 내가 너희에게 행하리라.","compact":"주님께서 맹세하시기를, 너희 말이 내 귀에 들린 대로 내가 너희에게 행하리라.","oneline":"네 말이 내 귀에 들린 대로 내가 너희에게 행하리라.","comfort":"당신의 모든 기도를 귀 기울여 듣고 계신 분이 계십니다.","original_tag":"용서","pastor":"이찬수"},{"ref":"열왕기하 5:2-3","type":"위로형","tags":["건강","치유","소망","신뢰"],"full":"이스라엘에서 잡혀온 어린 소녀가 여주인에게 말했습니다.\n'저의 주인이 사마리아에 계신 선지자 앞에 가셨다면 좋겠나이다.\n그 선지자가 그분의 나병을 고치실 것입니다.'","compact":"사마리아 선지자가 당신의 병을 고칠 것입니다.","oneline":"하나님께서 당신의 병을 고치실 것입니다.","comfort":"이미 치유의 길을 예비하시고 알려주시는 분입니다.","original_tag":"용서","pastor":"이찬수"},{"ref":"시편 81:10","type":"선언형","tags":["소망","신뢰","보호","재정어려움"],"full":"나는 당신을 이집트 땅에서 인도하여 낸 주님,\n당신의 하나님입니다. 당신의 입을 크게 여십시오.\n내가 그것을 채워 드릴 것입니다.","compact":"당신의 입을 크게 여십시오. 내가 그것을 채워 드릴 것입니다.","oneline":"내가 당신의 입을 채워 드릴 것입니다.","comfort":"이미 채우시겠다고 먼저 말씀하신 분이에요.","original_tag":"용서","pastor":"이찬수"},{"ref":"요한1서 4:19","type":"고백형","tags":["관계","신뢰","평안"],"full":"우리가 사랑하는 것은\n그분께서 먼저 우리를\n사랑하셨기 때문입니다.","compact":"우리가 사랑하는 것은 그분께서 먼저 우리를 사랑하셨기 때문입니다.","oneline":"그분께서 먼저 우리를 사랑하셨습니다.","comfort":"사랑의 시작은 언제나 그분에게 있으니까요.","original_tag":"용서","pastor":"이찬수"},{"ref":"창세기 4:7","type":"선언형","tags":["결단","회개","보호","두려움"],"full":"네가 선을 행하면 어찌 낯을 들지 못하겠느냐?\n죄가 너를 원하나, 너는 죄를 다스릴지니라.","compact":"죄가 당신을 원하나,\n당신은 죄를 다스릴지니라.","oneline":"당신은 죄를 다스릴지니라.","comfort":"스스로를 다스릴 수 있는 힘을 이미 주신 분이에요.","original_tag":"용서","pastor":"이찬수"},{"ref":"누가복음 15:20","type":"위로형","tags":["용서","가정","회개"],"full":"아직도 거리가 멀리 떨어져 있었는데,\n아버지가 그를 보시고 불쌍히 여기시어\n달려가 목을 안고 입을 맞추셨습니다.","compact":"아직 거리가 먼데, 아버지가 당신을 보시고\n달려와 안고 입을 맞추셨습니다.","oneline":"아버지가 당신을 보시고 달려와 안아주실 것입니다.","comfort":"이미 먼저 기다리며 보고 계신 분이 계세요.","original_tag":"용서","pastor":"이찬수"},{"ref":"시편 34:8","type":"선언형","tags":["신뢰","보호","축복","평안"],"full":"주님의 선하심을 맛보아 아십시오.\n그분께 피하는 자는 복이 있도다.","compact":"주님께 피하는 자는 복이 있도다.","oneline":"그분께 피하는 자는 복이 있도다.","comfort":"선하심으로 늘 당신을 품어주실 분입니다.","original_tag":"용서","pastor":"이찬수"},{"ref":"창세기 41:51-52","type":"고백형","tags":["치유","소망","감사","보호"],"full":"하나님께서 내 모든 고난과 아버지의 온 집 일을 잊어버리게 하셨다고 요셉이 말했습니다.\n그리고 하나님께서 내가 수고한 땅에서 나를 번성하게 하셨다고 말했더라.","compact":"하나님께서 내 모든 고난을 잊게 하시고,\n내가 수고한 땅에서 나를 번성하게 하셨습니다.","oneline":"하나님께서 당신의 고난을 잊게 하시고, 당신을 번성하게 하십니다.","comfort":"아픔을 기쁨으로 바꾸고, 고난의 땅에서 열매 맺게 하시는 분이에요.","original_tag":"용서","pastor":"이찬수"},{"ref":"고린도후서 4:16","type":"고백형","tags":["소망","신뢰","건강"],"full":"그러므로 우리는 낙심하지 않습니다.\n우리의 겉사람은 낡아지나,\n우리의 속사람은 날마다 새로워지는도다.","compact":"겉사람은 낡아지나,\n속사람은 날마다 새로워지는도다.","oneline":"당신의 속사람은 날마다 새로워지는도다.","comfort":"낡아지는 순간에도 당신 안의 새로움을 만들어가시는 분이에요.","original_tag":"용서","pastor":"이찬수"},{"ref":"사도행전 22:10","type":"위로형","tags":["인도하심","신뢰","불안","소망"],"full":"제가 아뢰기를 '주님, 제가 무엇을 하리이까?'\n주님께서 이르시되 '일어나 나아가십시오.\n당신이 행할 모든 것을 그곳에서 누가 이르리라 하실 것이옵니다.'","compact":"주님께서 말씀하시되 '일어나십시오.\n당신이 행할 모든 것을 주께서 일러줄 것이옵니다.'","oneline":"당신이 행할 모든 것을 주께서 일러줄 것이옵니다.","comfort":"이미 당신의 모든 걸음을 인도하고 계시는 분이 계시니까요.","original_tag":"용서","pastor":"이찬수"},{"ref":"요나 1:1","type":"선언형","tags":["인도하심","신뢰","소망","평안"],"full":"여호와의 말씀이\n당신에게 임하겠으니,\n귀 기울여 들으십시오.","compact":"여호와의 말씀이\n당신에게 임하리라.","oneline":"주님의 말씀이 임하리라.","comfort":"이미 당신의 삶에 말씀하고\n계시는 분이 계시니까요.","original_tag":"용서","pastor":"이찬수"},{"ref":"요나 1:2","type":"선언형","tags":["보호","신뢰","불안","평안"],"full":"여호와의 말씀이 임하였으니,\n그 어떤 악독도 주님 앞에\n숨겨지지 아니하고 상달되었음이니이다.","compact":"주님의 말씀이 임하사, 모든 악독이\n그분 앞에 상달되었음을 아옵니다.","oneline":"모든 악독이 주님 앞에 상달되었음이니라.","comfort":"숨겨진 것은 하나도 없으니\n염려 마십시오.","original_tag":"용서","pastor":"이찬수"},{"ref":"시편 1:2-3","type":"선언형","tags":["소망","축복","인도하심","신뢰"],"full":"오직 주님의 말씀을 기뻐하여 밤낮으로 묵상하는 사람에게는,\n시냇가에 심은 나무처럼 때를 따라 열매를 맺고 잎사귀가 마르지 않는 축복이 있을 것입니다.\n그가 하는 모든 일 또한 형통할 것이옵니다.","compact":"주님의 말씀을 묵상하는 당신의 삶은 시냇가 나무처럼 풍성하고,\n모든 일이 형통할 것이옵니다.","oneline":"주님을 묵상하는 모든 일이 다 형통하리로다.","comfort":"당신의 걸음마다 형통을\n약속하고 계시니까요.","original_tag":"용서","pastor":"이찬수"},{"ref":"로마서 13:11-12","type":"위로형","tags":["소망","평안","신뢰","기다림"],"full":"여러분, 잠에서 깨어나십시오.\n우리의 구원이 처음 믿었을 때보다\n지금 더욱 가까이 다가왔음이니이다.","compact":"우리의 구원이 처음 믿었을 때보다\n지금 더욱 가까이 다가왔음을 기억하십시오.","oneline":"우리의 구원이 지금 더욱 가까이 다가왔나이다.","comfort":"이미 당신의 구원이 가까이 와 있으니\n안심하세요.","original_tag":"용서","pastor":"이찬수"},{"ref":"베드로전서 4:7-8","type":"선언형","tags":["용서","관계","평안","소망"],"full":"무엇보다도 뜨겁게 서로 사랑하십시오.\n사랑은 허다한 죄를 덮을 것이옵니다.","compact":"뜨겁게 서로 사랑하십시오.\n사랑은 허다한 죄를 덮을 것이옵니다.","oneline":"사랑은 허다한 죄를 덮느니라.","comfort":"사랑이 모든 것을 덮어줄 것이니\n두려워 마십시오.","original_tag":"용서","pastor":"이찬수"},{"ref":"마가복음 5:15","type":"위로형","tags":["치유","건강","평안","소망"],"full":"예수님께 나아오자, 이전에는 귀신 들렸던 자가 이제 옷을 입고\n온전한 정신으로 앉아 있는 것을 보게 되었나이다.\n그리하여 사람들이 주님의 권능을 보고 두려워하였나이다.","compact":"이전에 귀신 들렸던 자가 옷을 입고 온전한 정신으로 앉아 있는 것을 보십시오.\n주님의 치유는 이처럼 온전하옵니다.","oneline":"온전한 정신으로 앉아 있는 것을 보리라.","comfort":"치유의 손길이 이미 당신을\n붙들고 있습니다.","original_tag":"용서","pastor":"이찬수"},{"ref":"요나 4:1-2","type":"고백형","tags":["신뢰","소망","평안","보호"],"full":"주님께서는 은혜로우시며 자비로우시며 노하기를 더디하시고\n인애가 크시어, 뜻을 돌이켜 재앙을 내리지 아니하시는\n하나님이심을 제가 아나이다.","compact":"주님은 은혜와 자비가 크시며, 노하기를 더디하시고\n인애가 깊으신 하나님이십니다.","oneline":"주님은 은혜와 자비가 크신 하나님이십니다.","comfort":"당신을 향한 주님의 마음은\n언제나 자비와 인애로 가득합니다.","original_tag":"용서","pastor":"이찬수"},{"ref":"베드로전서 4:11","type":"선언형","tags":["감사","신뢰","소망","축복"],"full":"모든 일에 예수 그리스도로 말미암아\n하나님이 영광을 받으실 것이니,\n그분께 영광과 권능이 영원무궁토록 있나이다. 아멘.","compact":"모든 일에 하나님이 영광을 받으시며,\n그분께 영광과 권능이 영원토록 있나이다.","oneline":"하나님께 영광과 권능이 영원무궁토록 있나이다.","comfort":"이미 영원한 영광과 권능을\n가지고 계신 분이 당신과 함께하십니다.","original_tag":"후회","pastor":"이찬수"},{"ref":"창세기 50:20","type":"위로형","tags":["소망","인도하심","신뢰","보호"],"full":"사람들은 주님께 해를 끼치려 하였으나,\n하나님께서는 그것을 선으로 바꾸셨고,\n많은 생명을 구원하는 놀라운 일을 이루셨습니다.","compact":"사람의 악한 의도마저 하나님은 선으로 바꾸시어,\n많은 생명을 구원하는 일을 이루셨습니다.","oneline":"하나님께서는 모든 것을 합력하여 선을 이루시는 분이십니다.","comfort":"하나님께서는 이미 그 모든 계획 속에\n당신의 선을 준비해 두셨어요.","original_tag":"신앙회의","pastor":"Andy Stanley"},{"ref":"창세기 39:2","type":"선언형","tags":["보호","인도하심","직장사업","축복"],"full":"여호와께서 요셉과 함께하시니,\n그가 형통한 자가 되어\n애굽 주인 보디발의 집에 거하게 되었나이다.","compact":"여호와께서 당신과 함께하시니,\n당신은 형통할 것입니다.","oneline":"여호와께서 당신과 함께하시니 형통할 것입니다.","comfort":"그 자리에 이미 함께하시겠다고\n약속하신 분이 있으니까요.","original_tag":"신앙회의","pastor":"Andy Stanley"},{"ref":"갈라디아서 6:14","type":"고백형","tags":["신뢰","소망","결단"],"full":"그러나 내게는\n우리 주 예수 그리스도의\n십자가 외에는\n결코 자랑할 것이 없나이다.\n그리스도로 말미암아\n세상은 나를 대하여\n십자가에 못 박혔고,\n나 또한 세상을 대하여\n그러합니다.","compact":"오직 예수 그리스도의\n십자가만을 자랑하며,\n세상에 대하여\n죽은 자로 서겠습니다.","oneline":"오직 그리스도의 십자가만이 나의 자랑입니다.","comfort":"세상의 어떤 것도 그분의 사랑과 비교될 수 없음을 이미 고백하셨으니까요.","original_tag":"신앙회의","pastor":"존 파이퍼 (John Piper)"},{"ref":"Isaiah 46:9-10","type":"선언형","tags":["신뢰","인도하심","소망","보호"],"full":"옛적 일을 기억하라.\n나는 하나님이라,\n다른 이가 없도다.\n나는 하나님이라,\n나 같은 이가 없도다.\n내가 시초부터\n종말을 알리며,\n아직 이루지 아니한 일을\n옛적부터 보이노라.\n나의 뜻이 설 것이요,\n내가 나의 모든\n기뻐하는 것을 이루리라.","compact":"나는 하나님이라,\n나 같은 이가 없도다.\n나의 뜻이 설 것이요,\n내가 모든 기뻐하는 것을\n이루리라.","oneline":"나의 뜻이 설 것이요, 내가 모든 것을 이루리라.","comfort":"당신의 모든 염려를 넘어서, 그분의 뜻은 이미 서 있고 반드시 이루어질 것입니다.","original_tag":"신앙회의","pastor":"John Piper"},{"ref":"Romans 8:16-17","type":"선언형","tags":["신뢰","자녀양육","축복","소망"],"full":"성령께서 친히\n우리의 영과 더불어\n우리가 하나님의 자녀임을\n증언하시나니,\n자녀이면 또한 상속자\n곧 하나님의 상속자요\n그리스도와 함께한\n공동 상속자이니라.\n우리가 그와 함께\n영광을 받기 위하여\n고난도 함께 받아야\n할 것이니라.","compact":"성령께서 우리가\n하나님의 자녀임을\n증언하시나니,\n당신은 하나님의 상속자이며\n그리스도와 함께한\n공동 상속자입니다.","oneline":"당신은 하나님의 자녀요, 상속자입니다.","comfort":"이미 당신의 정체성을 선언하시고 모든 것을 상속으로 주신 분이 계십니다.","original_tag":"신앙회의","pastor":"John Piper"},{"ref":"Revelation 5:9-10","type":"선언형","tags":["축복","소망","신뢰","보호"],"full":"그들이 새 노래를\n불러 이르되,\n'주님은 두루마리를\n취하시고\n그 인봉을 떼기에\n합당하시도다.\n주님께서 죽임을\n당하시고,\n그 보혈로 모든 족속과\n방언과 백성과\n나라 가운데서\n사람들을 사서\n하나님께 드리셨으며,\n그들을 우리 하나님을 위한\n왕과 제사장으로\n삼으셨으니,\n그들이 땅 위에서\n다스릴 것이로다.'","compact":"주님께서 우리를\n그 보혈로 사서\n하나님께 드리셨고,\n왕과 제사장으로\n삼으셨으니,\n우리가 땅 위에서\n다스릴 것입니다.","oneline":"주님께서 당신을 왕과 제사장으로 삼으셨습니다.","comfort":"이미 당신을 향한 그분의 영원한 계획이 완성될 것을 확신하게 하신 분입니다.","original_tag":"신앙회의","pastor":"John Piper"},{"ref":"Romans 8:28","type":"선언형","tags":["신뢰","소망","인도하심","평안"],"full":"우리가 알거니와,\n하나님을 사랑하는 자들,\n곧 그의 뜻대로\n부르심을 입은 자들에게는\n모든 것이 합력하여\n선을 이루느니라.","compact":"하나님을 사랑하는\n당신에게는,\n모든 것이 합력하여\n선을 이루리라.","oneline":"모든 것이 합력하여 당신에게 선을 이룰 것입니다.","comfort":"이미 붙드시겠다고 먼저 말씀하신 분이에요.","original_tag":"신앙회의","pastor":"John Piper"},{"ref":"Romans 8:32","type":"선언형","tags":["보호","축복","신뢰","감사"],"full":"자기 아들을 아끼지\n아니하시고\n우리 모든 사람을 위하여\n내어주신 이가\n어찌 그 아들과 함께\n모든 것을 우리에게\n은혜로 주지\n아니하시겠습니까?","compact":"자기 아들을 내어주신 이가,\n어찌 우리에게 모든 것을\n주지 아니하시겠습니까?","oneline":"그분은 우리에게 모든 것을 은혜로 주실 것입니다.","comfort":"이미 가장 귀한 것을 내어주신 분이니까요.","original_tag":"신앙회의","pastor":"John Piper"},{"ref":"Romans 8:35, 38-39","type":"선언형","tags":["보호","신뢰","평안","두려움"],"full":"누가 우리를\n그리스도의 사랑에서\n끊으리요?\n환난이나 곤고나\n박해나 굶주림이나\n헐벗음이나 위험이나\n칼이겠습니까?\n내가 확신하노니\n사망이나 생명이나\n천사들이나 권세자들이나\n현재 일이나 장래 일이나\n능력이나 높음이나\n깊음이나 다른 어떤\n피조물이라도 우리를\n우리 주 그리스도 예수 안에 있는\n하나님의 사랑에서\n끊을 수 없으리라.","compact":"그 어떤 것도 우리를\n그리스도 예수 안에 있는\n하나님의 사랑에서\n끊을 수 없으리라.","oneline":"그 어떤 것도 우리를 하나님의 사랑에서 끊을 수 없습니다.","comfort":"이미 그 사랑 안에 깊이 잠겨있으니까요.","original_tag":"신앙회의","pastor":"John Piper"},{"ref":"예레미야 32:38-41","type":"선언형","tags":["보호","축복","소망","신뢰","가정"],"full":"그들은 나의 백성이 되겠고\n나는 그들의 하나님이\n될 것이며,\n내가 그들을 떠나지\n아니하리라는\n영원한 언약을\n그들에게 세우겠고,\n기쁨으로 그들에게\n복을 주되\n나의 마음과 정성을 다하여\n이 땅에 심으리라.","compact":"그들은 나의 백성,\n나는 그들의 하나님이\n될 것이며,\n내가 영원히 그들을\n떠나지 않고\n기쁨으로 복을 주며\n이 땅에 심으리라.","oneline":"내가 나의 마음과 정성을 다하여 당신을 이 땅에 심으리라.","comfort":"당신을 향한 그분의 마음과 정성은 변함이 없으니까요.","original_tag":"신앙회의","pastor":"존 파이퍼 (John Piper)"},{"ref":"고린도후서 12:9","type":"선언형","tags":["신뢰","치유","평안","두려움"],"full":"주님께서 말씀하시기를\n\"내 은혜가 네게\n족하도다.\n이는 내 능력이\n약한 데서\n온전하여짐이라.\"\n하셨습니다.","compact":"\"내 은혜가 네게 족하며,\n내 능력이 약한 데서\n온전하여진다.\"고\n주님께서 말씀하셨습니다.","oneline":"내 은혜가 네게 족하며, 내 능력이 약한 데서 온전하여짐이라.","comfort":"주님의 능력은 당신의 연약함 속에서 더욱 온전하게 드러나니까요.","original_tag":"신앙회의","pastor":"존 파이퍼 (John Piper)"},{"ref":"고린도전서 1:25","type":"선언형","tags":["신뢰","소망","두려움","인도하심"],"full":"하나님의 어리석음이\n사람의 지혜보다\n더 지혜롭고,\n하나님의 약하심이\n사람의 강함보다\n더 강하니라.","compact":"하나님의 어리석음은\n사람보다 지혜롭고,\n하나님의 약하심은\n사람보다 강하니라.","oneline":"하나님의 약하심이 사람보다 강하니라.","comfort":"그분의 강함은 당신의 기대 너머에 있으니까요.","original_tag":"신앙회의","pastor":"팀 켈러 (Timothy Keller)"},{"ref":"빌립보서 2:12-13","type":"선언형","tags":["인도하심","소망","신뢰","결단"],"full":"당신 안에서 행하시는 분은\n하나님이시니,\n자신의 기쁘신 뜻을 위하여\n당신에게 소원을 두시고\n친히 이루어 가게 하실\n것입니다.","compact":"하나님께서 당신 안에서\n행하시며,\n자신의 기쁘신 뜻을 위하여\n소원을 두시고\n이루어가실 것입니다.","oneline":"당신 안에서 행하시는 이는 하나님이십니다.","comfort":"이미 그분께서 당신 안에서 시작하셨으니까요.","original_tag":"신앙회의","pastor":"팀 켈러 (Timothy Keller)"},{"ref":"빌립보서 4:6-7","type":"선언형","tags":["평안","보호","불안","신뢰"],"full":"그리하면 모든 지각에 뛰어난\n하나님의 평강이\n그리스도 예수 안에서\n당신의 마음과 생각을\n지키시리라.","compact":"하나님의 평강이\n그리스도 예수 안에서\n당신의 마음과 생각을\n지키시리라.","oneline":"하나님의 평강이 당신의 마음과 생각을 지키실 것입니다.","comfort":"이미 그 평안이 당신을 보호하고 계시니까요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"John 14:9","type":"선언형","tags":["신뢰","인도하심","소망"],"full":"예수께서 대답하시기를\n\"나를 본 자는\n아버지를 보았거늘,\n어찌하여 아버지를\n보여 달라고 말합니까?\"\n라고 하셨습니다.","compact":"나를 본 자는\n아버지를 보았습니다.","oneline":"나를 본 자는 아버지를 보았나니.","comfort":"이미 그분 안에서 모든 것을 볼 수 있으니까요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"John 17:3","type":"선언형","tags":["소망","신뢰","인도하심","감사"],"full":"영생은 이것이니,\n곧 유일하신 참 하나님과\n그분이 보내신\n예수 그리스도를\n아는 것입니다.","compact":"영생은 유일하신\n참 하나님과\n그분이 보내신\n예수 그리스도를\n아는 것입니다.","oneline":"영생은 참 하나님과 예수 그리스도를 아는 것입니다.","comfort":"이미 영생의 문이 당신에게 열려 있으니까요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"Jeremiah 9:23-24","type":"선언형","tags":["신뢰","인도하심","감사","결단"],"full":"여호와께서 이같이 말씀하시되\n\"지혜로운 자는 그의 지혜를\n자랑하지 말고,\n용사는 그의 용맹을\n자랑하지 말며,\n부자는 그의 부유함을\n자랑하지 말라.\n자랑하는 자는 이것으로\n자랑할지니,\n곧 나를 깨달아 아는 것과,\n내가 여호와인 줄을\n아는 것이라.\n나는 땅에서 인애와 정의와\n공의를 행하는 자이니,\n나는 이 일들을 기뻐하노라.\"\n주님의 말씀이니라.","compact":"여호와는 땅에서 인애와\n정의와 공의를\n행하는 자이니,\n그분은 이 일들을\n기뻐하시도다.","oneline":"나는 인애와 정의와 공의를 행하며 그것을 기뻐하는 여호와니라.","comfort":"그분은 이미 당신의 인애와 정의를 기뻐하고 계시니까요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"Psalm 2:4-6","type":"선언형","tags":["보호","신뢰","소망","평안"],"full":"하늘에 좌정하신 이가\n웃으시며\n주께서 그들을 비웃으시는도다.\n그의 진노하심으로 그들을\n꾸짖으시며\n맹렬한 노여움으로 그들을\n두렵게 하시기를\n\"내가 나의 왕을\n내 거룩한 산\n시온에 세웠도다.\"\n하셨도다.","compact":"하늘에 계신 주님께서\n말씀하시기를\n\"내가 나의 왕을\n내 거룩한 산\n시온에 세웠도다.\"\n하셨도다.","oneline":"내가 나의 왕을 내 거룩한 산 시온에 세웠도다.","comfort":"이미 당신 위에 굳건한 왕이 세워져 계시니까요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"Psalm 2:7-8","type":"선언형","tags":["축복","소망","신뢰","인도하심"],"full":"주님의 칙령을 선포하리라.\n그분께서 내게 말씀하시기를\n\"너는 나의 아들이라.\n오늘 내가 너를 낳았도다.\n내게 구하라,\n그리하면 내가 뭇 나라를\n네 유업으로 주리니\n땅 끝까지 네 소유가 되리로다.\"\n하셨도다.","compact":"\"너는 나의 아들이라.\n내게 구하면 뭇 나라를\n네 유업으로 주리니\n땅 끝까지 네 소유가 되리로다.\"","oneline":"내게 구하라, 그리하면 뭇 나라를 네 유업으로 주리라.","comfort":"이미 당신에게 큰 유업을 약속하신 분이에요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"Psalm 2:12","type":"위로형","tags":["보호","평안","신뢰","두려움"],"full":"그 아들에게 입 맞추라,\n그렇지 아니하면 진노하사\n너희가 길에서 망하리니\n그의 진노가 잠깐에\n불붙을 것임이로다.\n그에게 피하는 모든 자는\n복이 있도다.","compact":"그에게 피하는 모든 자는\n복이 있도다.","oneline":"그에게 피하는 모든 자는 복이 있도다.","comfort":"이미 당신의 피난처가 되어 주시는 분이니까요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"Hebrews 11:1","type":"위로형","tags":["신뢰","소망","불안","결단"],"full":"믿음은 우리가 바라는\n것들에 대한 확신이요,\n보이지 않는 것들에 대한\n증거이니라.","compact":"믿음은 바라는 것에 대한\n확신이요,\n보이지 않는 것에 대한\n증거가 되는 도다.","oneline":"믿음은 바라는 것에 대한 확신이요, 보이지 않는 것에 대한 증거가 되느니라.","comfort":"당신의 마음속에 이미 주신 선물이에요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"Hebrews 11:6","type":"선언형","tags":["신뢰","소망","보호","축복"],"full":"하나님께 나아가는 자는\n그분이 계신 것과,\n그분을 간절히 찾는\n자들에게\n반드시 상 주시는 분임을\n믿어야 하나니.","compact":"그분은 당신을 간절히\n찾는 자들에게 반드시\n상 주시는도다.","oneline":"그분은 당신을 간절히 찾는 자들에게 상 주시는도다.","comfort":"이미 상 주시겠다고 약속하신 분이에요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"Matthew 11:4-6","type":"선언형","tags":["치유","소망","보호","축복"],"full":"예수님께서 말씀하셨으니,\n맹인이 눈을 뜨고,\n다리 저는 사람이 걸으며,\n나병 환자가 깨끗해지고,\n못 듣던 사람이 듣고,\n죽은 사람이 살아나는 도다.\n가난한 사람들에게도\n복음이 전파되는 도다.","compact":"맹인이 눈을 뜨고,\n병든 자가 고침 받으며,\n가난한 자에게 복음이\n전파되는 도다.","oneline":"하나님께서 친히 치유하시고 회복시키시는도다.","comfort":"그분은 지금도 당신의 삶에 역사하시는 분이에요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"창세기 15:6","type":"선언형","tags":["신뢰","소망","용서","결단"],"full":"아브람이 여호와를 믿었을 때,\n여호와께서 그의 믿음을\n의로 여기셨느니라.\n주님은 당신의 믿음 또한\n의롭다 여기시는 도다.","compact":"당신이 믿으면,\n주님께서 그것을 의로\n여기시는도다.","oneline":"주님은 당신의 믿음을 의롭다 여기시는도다.","comfort":"당신의 마음을 이미 알고 계신 분이에요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"히브리서 6:17-19","type":"선언형","tags":["소망","신뢰","보호","평안"],"full":"하나님은 약속을 받는 자들에게\n그 뜻이 변하지 아니함을\n충분히 나타내시려고\n맹세로 보증하셨느니라.\n우리가 가진 이 소망은\n영혼의 닻 같아서\n튼튼하고 견고한 도다.","compact":"주님의 뜻은 변하지 아니함을\n맹세로 보증하셨으니,\n우리의 소망은 영혼의 닻처럼\n튼튼하고 견고한 도다.","oneline":"하나님의 약속은 변함없고,\n우리의 소망은 견고한\n영혼의 닻이 되는 도다.","comfort":"이미 변치 않겠다고 스스로 맹세하신 분이에요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"Isaiah 54:1","type":"선언형","tags":["소망","축복","자녀양육","외로움"],"full":"주님께서 말씀하시기를,\n\"아이를 낳지 못하던 너,\n노래하여라!\n해산의 고통을 겪어본 적\n없는 너,\n소리 높여 기뻐 외쳐라!\n이는 황량한 여인의 자녀가\n남편 있는 여인의 자녀보다\n더 많을 것임이라.\"","compact":"\"아이를 낳지 못하던 너,\n노래하고 기뻐 외쳐라!\n너의 자녀가 더 많을 것임이라\"\n주님께서 말씀하시는 도다.","oneline":"황량한 여인의 자녀가\n번성할 것이라\n주님께서 선포하시는도다.","comfort":"하나님은 불가능한 일도 가능하게 하시는 분이에요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"Romans 8:15-17","type":"선언형","tags":["자녀양육","신뢰","소망","평안"],"full":"두려움에 다시 종노릇하는\n영을 받은 것이 아니라,\n양자의 영을 받았으므로\n우리가 '아바 아버지'라\n부르짖느니라.\n성령이 친히 우리 영과 더불어\n우리가 하나님의 자녀임을\n증언하시나니,\n자녀이면 또한 상속자\n곧 하나님의 상속자요\n그리스도와 함께 한\n상속자니이다.","compact":"우리는 두려움의 종이 아닌\n양자의 영을 받았으니,\n아바 아버지라 부르짖습니다.\n성령이 친히 우리가\n하나님의 자녀임을\n증언하십니다.","oneline":"성령이 친히 우리가\n하나님의 자녀임을\n증언하시나니.","comfort":"그분께서는 이미 당신을 자신의 자녀로 삼으셨습니다.","original_tag":"신앙회의","pastor":"Dr. Timothy Keller"},{"ref":"Romans 8:1","type":"선언형","tags":["용서","평안","신뢰"],"full":"그러므로 이제 그리스도\n예수 안에 있는 자에게는\n결코 정죄함이 없나니.","compact":"그리스도 예수 안에 있는\n자에게는 결코 정죄함이\n없습니다.","oneline":"결코 정죄함이 없나니.","comfort":"그 자리에 대한 판단은 이미 끝났으니까요.","original_tag":"신앙회의","pastor":"Dr. Timothy Keller"},{"ref":"Romans 8:38-39","type":"선언형","tags":["보호","신뢰","평안","두려움"],"full":"내가 확신하노니\n사망이나 생명이나,\n천사들이나 권세자들이나,\n현재 일이나 장래 일이나,\n능력이나 높음이나 깊음이나,\n다른 어떤 피조물이라도\n우리 주 그리스도 예수 안에 있는\n하나님의 사랑에서\n우리를 끊을 수 없으리라.","compact":"그 어떤 피조물도 우리를\n우리 주 그리스도 예수 안에 있는\n하나님의 사랑에서\n끊을 수 없으리라.","oneline":"아무것도 하나님의 사랑에서\n우리를 끊을 수 없으리라.","comfort":"이미 영원한 사랑으로 붙드시겠다고 약속하신 분이에요.","original_tag":"신앙회의","pastor":"Dr. Timothy Keller"},{"ref":"Acts 1:8","type":"선언형","tags":["인도하심","직장사업","결단","소망"],"full":"오직 성령이 너희에게 임하시면\n너희가 권능을 받고,\n예루살렘과 온 유대와\n사마리아와 땅 끝까지\n이르러 내 증인이 되리라.","compact":"성령이 너희에게 임하시면\n너희가 권능을 받고\n내 증인이 되리라.","oneline":"너희가 권능을 받고 내 증인이 되리라.","comfort":"힘을 주시겠다고 먼저 말씀하신 분이니까요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"Acts 1:11","type":"선언형","tags":["소망","기다림","신뢰"],"full":"갈릴리 사람들아,\n어찌하여 서서 하늘을\n쳐다보느냐?\n너희 가운데서 하늘로\n올려지신 이 예수는\n너희가 하늘로 가심을\n본 그대로 다시 오시리라.","compact":"너희 가운데서 하늘로\n올려지신 이 예수는\n너희가 본 그대로\n다시 오시리라.","oneline":"예수는 너희가 본 그대로 다시 오시리라.","comfort":"약속을 반드시 이루시는 분이니까요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"Luke 24:37-39","type":"위로형","tags":["불안","두려움","신뢰","평안"],"full":"그들은 놀라고 무서워\n유령을 보는 줄 생각하거늘,\n예수께서 이르시되\n'어찌하여 불안해하며\n너희 마음에 의심이\n일어나느냐?\n내 손과 발을 보고\n나인 줄 알라.\n영은 살과 뼈가 없으되\n너희 보는 바와 같이\n나는 있느니라.'","compact":"예수께서 이르시되\n'어찌하여 불안해하며\n너희 마음에 의심이\n일어나느냐?\n내 손과 발을 보고\n나인 줄 알라.'","oneline":"어찌하여 불안해하며\n의심이 일어나느냐?\n나인 줄 알라.","comfort":"지금 당신의 마음에 찾아오신 분이 있어요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"Revelation 1:17-18","type":"선언형","tags":["두려움","소망","평안","신뢰"],"full":"내가 그를 볼 때에\n그의 발 앞에 엎드러져\n죽은 자 같이 되매,\n그가 오른손을 내게 얹고\n이르시되, '두려워하지 말라.\n나는 처음이요 마지막이요,\n살아있는 자라.\n내가 전에 죽었었으나\n볼지어다 이제 세세토록\n살아 있어 사망과 음부의\n열쇠를 가졌노니.'","compact":"두려워하지 말라.\n나는 처음이요 마지막이요,\n살아있는 자라.\n사망과 음부의 열쇠를\n가졌노니.","oneline":"두려워하지 말라. 내가 사망과 음부의 열쇠를 가졌노니.","comfort":"이미 사망과 모든 것을 이기신 분이니까요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"Matthew 7:7-8","type":"선언형","tags":["인도하심","소망","신뢰","평안"],"full":"구하라 그리하면\n너희에게 주실 것이요,\n찾으라 그리하면\n찾아낼 것이요,\n문을 두드리라 그리하면\n너희에게 열릴 것이니.\n구하는 자마다 받을 것이요,\n찾는 자는 찾아낼 것이요,\n문을 두드리는 자에게는\n열릴 것임이라.","compact":"구하라 그리하면\n주실 것이요,\n찾으라 그리하면\n찾아낼 것이요,\n두드리라 그리하면\n열릴 것이니.","oneline":"구하는 자마다 받을 것이요, 찾는 자는 찾아낼 것이요.","comfort":"문을 열어 주시겠다고 먼저 말씀하신 분이에요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"John 1:51","type":"선언형","tags":["소망","보호","인도하심","신뢰"],"full":"진실로 진실로\n너희에게 이르노니,\n너희는 하늘이 열리고\n하나님의 천사들이\n인자 위에 오르락내리락\n하는 것을 보리라.","compact":"너희는 하늘이 열리고\n하나님의 천사들이\n인자 위에 오르락내리락\n하는 것을 보리라.","oneline":"하늘이 열리고 하나님의 천사들이 오르내리는 것을 보리라.","comfort":"보이지 않는 곳에서도 하나님이 일하고 계십니다.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"열왕기상 19:18","type":"선언형","tags":["외로움","신뢰","소망","보호"],"full":"그러나 내가 이스라엘\n가운데에 칠천 명을\n남기리니,\n그들은 다 바알에게\n무릎 꿇지 아니하고\n입 맞추지 아니한\n자들이니라.","compact":"내가 이스라엘 가운데\n칠천 명을 남기리니,\n바알에게 무릎 꿇지 않은\n자들이니라.","oneline":"내가 이스라엘 가운데 바알에게 무릎 꿇지 않은 칠천 명을 남기리라.","comfort":"보이지 않는 곳에서도 함께하는 동역자들이 있으니까요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"Matthew 5:13","type":"선언형","tags":["소망","결단","직장사업","인도하심"],"full":"너희는 세상의 소금이니라.","compact":"너희는 세상의 소금이니라.","oneline":"너희는 세상의 소금이니라.","comfort":"당신의 존재 자체가 세상을 의미 있게 합니다.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"Matthew 5:14","type":"선언형","tags":["소망","결단","직장사업","인도하심"],"full":"너희는 세상의 빛이니라.\n산 위에 있는 성이\n숨겨지지 못할 것이요.","compact":"너희는 세상의 빛이니라.","oneline":"너희는 세상의 빛이니라.","comfort":"당신의 존재 자체가 세상을 밝히는 등불입니다.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"요한복음 12:47","type":"선언형","tags":["소망","평안","신뢰","보호"],"full":"내가 온 것은 세상을\n심판하려 함이 아니요,\n세상을 구원하려 함이로라.","compact":"내가 온 것은 세상을\n구원하려 함이로라.","oneline":"내가 온 것은 세상을 구원하려 함이로라.","comfort":"당신을 향한 하나님의 마음은 구원입니다.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"Psalm 39:12","type":"고백형","tags":["슬픔","신뢰","외로움"],"full":"여호와여, 나의 기도를\n들으시고,\n나의 부르짖음에 귀를\n기울이시며,\n나의 눈물에 잠잠하지\n마옵소서.","compact":"나의 기도를 들으시고,\n나의 눈물에 잠잠하지\n마옵소서.","oneline":"나의 기도를 들으시고 나의 눈물에 잠잠하지 마옵소서.","comfort":"당신의 눈물을 보고 계신 분이 있습니다.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"Psalm 126:5-6","type":"위로형","tags":["슬픔","소망","기다림","축복"],"full":"눈물을 흘리며 씨를\n뿌리는 자는 기쁨으로\n거두리로다.\n울며 씨를 뿌리러\n나가는 자는 정녕\n기쁨으로 그 곡식 단을\n가지고 돌아오리로다.","compact":"눈물을 흘리며 씨를\n뿌리는 자는 기쁨으로\n거두리로다.","oneline":"눈물을 흘리며 씨를 뿌리는 자는 기쁨으로 거두리로다.","comfort":"수고의 눈물을 보시는 분이 풍성한 기쁨으로 갚으십니다.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"2 Corinthians 4:17","type":"위로형","tags":["슬픔","소망","평안"],"full":"우리의 잠시 받는\n환난의 경한 것이\n지극히 크고 영원한\n영광의 중한 것을\n우리에게 이루게 함이니.","compact":"우리의 잠시 받는\n환난은 영원한 영광을\n이루게 함이니.","oneline":"우리의 환난은 영원한 영광을 이루리로다.","comfort":"당신의 고난은 더 큰 영광을 향한 통로입니다.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"시편 3:3-4","type":"고백형","tags":["불안","두려움","보호","신뢰"],"full":"오 여호와여,\n주님은 나를 에워싸는 방패이시요,\n나의 영광이시며,\n나의 머리를 드시는 분이시도다.\n내가 소리 내어\n여호와께 부르짖으니,\n그의 거룩한 산에서\n응답하시는도다.","compact":"주님은 나를 에워싸는 방패이시요,\n나의 머리를 드시는 분이시도다.","oneline":"주님은 나의 방패이시며, 나의 머리를 드시는 분이시도다.","comfort":"당신을 에워싸는 방패가 되어 주시며,\n당신의 고개를 들어 올리실 분이 있으니까요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"창세기 15:1","type":"선언형","tags":["두려움","불안","보호","축복","신뢰"],"full":"이 일 후에 여호와의 말씀이\n환상 중에 아브람에게\n임하여 이르시되,\n'아브람아, 두려워하지 말라.\n나는 너의 방패요,\n너의 지극히 큰 상급이니라.'","compact":"아브람아, 두려워하지 말라.\n나는 너의 방패요,\n너의 지극히 큰 상급이니라.","oneline":"두려워하지 말라. 나는 너의 방패요, 너의 큰 상급이니라.","comfort":"두려워할 필요 없어요.\n그 자리에 먼저 방패가 되어주시겠다고 말씀하신 분이 있으니까요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"요한1서 4:18","type":"위로형","tags":["두려움","평안","보호","신뢰"],"full":"사랑 안에는 두려움이 없습니다.\n온전한 사랑은\n두려움을 내쫓으니,\n두려움은 형벌과\n관련이 있기 때문입니다.\n두려워하는 자는 사랑 안에서\n온전하게 되지 못합니다.","compact":"사랑 안에는 두려움이 없습니다.\n온전한 사랑이\n두려움을 내쫓습니다.","oneline":"온전한 사랑은 두려움을 내쫓습니다.","comfort":"이미 온전한 사랑이 당신을 감싸고 있습니다.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"창세기 9:11-13","type":"선언형","tags":["보호","소망","신뢰","축복"],"full":"내가 너희와 언약을 세우리니,\n다시는 홍수로 모든 생물을\n멸하지 아니할 것이요,\n땅을 멸할 홍수가 다시는\n있지 아니하리라.\n이 무지개가 영원한 언약의\n증거가 되리라.","compact":"다시는 홍수로 멸하지 않으리라.\n무지개가 언약의 증거가 되리라.","oneline":"내가 다시는 너희를 홍수로 멸하지 않으리라.","comfort":"이 약속은 영원히 변치 않는 약속입니다.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"이사야 53:5","type":"선언형","tags":["평안","치유","소망","감사"],"full":"그분께서 징계를 받으심으로\n우리가 평화를 누리게 되었고,\n그분께서 채찍에 맞으심으로\n우리가 치유를 받았나이다.","compact":"그분의 징계로\n우리에게 평화가,\n그분의 채찍으로\n우리에게 치유가 임했나이다.","oneline":"그분으로 인해 우리는 평화와 치유를 받았나이다.","comfort":"당신의 고통을 이미 대신 짊어지신 분이 계십니다.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"Genesis 12:1-3","type":"선언형","tags":["축복","인도하심","소망","보호"],"full":"주님께서 아브람에게\n이르시되,\n'내가 너를 큰 민족으로\n만들고\n너에게 복을 주리라.\n네 이름을 위대하게 하여\n너는 복이 될 것이라.\n너를 축복하는 자에게\n내가 복을 내리고,\n너를 저주하는 자를\n내가 저주하리니,\n땅의 모든 족속이\n너로 말미암아\n복을 얻을 것이라.'","compact":"내가 너를 큰 민족으로\n만들고\n복을 주리라.\n네 이름이 위대해지고\n복이 될 것이라.","oneline":"내가 너에게 복을 주고 너를 복이 되게 하리라.","comfort":"이미 당신에게 놀라운 약속을 주신 분이 계십니다.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"히브리서 7:25","type":"선언형","tags":["신뢰","소망","보호","평안"],"full":"그러므로 그분께서\n당신을 힘입어\n하나님께 나아가는 자들을\n온전히 구원하실 수 있으니,\n이는 그분께서 항상\n살아 계셔서\n그들을 위하여\n간구하고 계시기 때문입니다.","compact":"그분께서 항상\n살아 계셔서\n당신을 위해 간구하시며\n온전히 구원하실 수 있습니다.","oneline":"그분은 당신을 온전히 구원하시며, 항상 당신을 위해 간구하십니다.","comfort":"당신을 위해 쉬지 않고 기도하시는 분이 계십니다.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"베드로전서 2:9","type":"선언형","tags":["축복","보호","소망","신뢰"],"full":"그러나 여러분은\n택하신 족속이요,\n왕 같은 제사장들이요,\n거룩한 나라이며,\n그분의 소유가 된 백성입니다.\n이는 여러분을\n어둠 속에서 불러내어\n그분의 놀라운 빛으로\n들어가게 하신 분의\n아름다운 덕을\n선포하게 하려 하심이라.","compact":"여러분은 택하신 족속이요\n왕 같은 제사장이며,\n그분의 소유된 백성입니다.","oneline":"당신은 택하신 족속이요, 그분의 소유된 백성입니다.","comfort":"당신의 존재 자체가 그분의 놀라운 계획 안에 있습니다.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"John 14:27","type":"위로형","tags":["평안","두려움","소망"],"full":"평안을 여러분에게 남기노니,\n나의 평안을\n여러분에게 주노라.\n내가 여러분에게 주는 것은\n세상이 주는 것과\n같지 아니하니,\n여러분은 마음에\n근심하지도 말고\n두려워하지도 말라.","compact":"나의 평안을\n여러분에게 주노라.\n마음에 근심하지도 말고\n두려워하지도 말라.","oneline":"나의 평안을 여러분에게 주노라.","comfort":"그분께서 이미 당신의 마음에 평안을 두셨습니다.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"John 11:25-26","type":"선언형","tags":["소망","치유","신뢰","평안"],"full":"예수님께서 말씀하시기를,\n'나는 부활이요 생명이니,\n나를 믿는 자는\n죽어도 살겠고,\n무릇 살아서\n나를 믿는 자는\n영원히 죽지 아니하리라.'","compact":"나는 부활이요 생명이니,\n나를 믿는 자는 영원히\n죽지 아니하리라.","oneline":"나는 부활이요 생명이니, 나를 믿는 자는 영원히 죽지 아니하리라.","comfort":"생명 되시는 분이 당신의 삶을 붙들고 계십니다.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"시편 42:5","type":"고백형","tags":["소망","불안","신뢰","감사"],"full":"내 영혼아, 어찌하여 낙심하며 어찌하여 내 속에서 불안해하는가?\n너는 하나님께 소망을 두라. 나는 그가 나타나 도우심으로 말미암아\n여전히 그를 찬송하리로다, 나의 구원자, 나의 하나님!","compact":"내 영혼아, 어찌 낙심하고 불안해하는가?\n하나님께 소망을 두라. 나는 여전히 그분을 찬송하리라.","oneline":"하나님께 소망을 두라. 나는 나의 구원자, 나의 하나님을 여전히 찬송하리라.","comfort":"당신의 마음에 소망을 주시는 분이 계십니다.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"시편 42:8","type":"위로형","tags":["보호","평안","신뢰","소망"],"full":"낮에는 여호와께서 그의 사랑을 베푸시고,\n밤에는 그의 노래가 나와 함께하니,\n내 생명의 하나님께 드리는 기도이로다.","compact":"낮에는 주의 사랑을, 밤에는 주의 노래가 나와 함께하니,\n내 생명의 하나님께 드리는 기도이로다.","oneline":"주의 사랑과 노래가 낮과 밤으로 나와 함께하시도다.","comfort":"그분은 당신의 모든 순간을 함께하고 계십니다.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"Jeremiah 31:16-17","type":"선언형","tags":["자녀양육","소망","기다림"],"full":"여호와께서 이같이 말씀하시도다. 당신의 울음소리를 그치고 눈물을 멈추십시오.\n당신의 수고가 반드시 상급을 받을 것이라 주님께서 선언하십니다.\n당신의 미래에는 분명한 소망이 있을 것이며, 당신의 자녀들이 그들의 땅으로 돌아올 것이라 주님께서 약속하셨습니다.","compact":"울음과 눈물을 멈추십시오. 당신의 수고는 상급을 받을 것이며,\n미래에는 소망이 있을 것입니다. 주님께서 자녀들의 돌아옴을 약속하십니다.","oneline":"당신의 미래에는 소망이 있으리라 주님께서 말씀하시도다.","comfort":"이미 상급과 소망, 그리고 자녀의 돌아옴을 약속하신 분이에요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"Jeremiah 31:33-34","type":"선언형","tags":["신뢰","보호","평안","인도하심"],"full":"여호와께서 말씀하시도다. 내가 그들의 마음에 나의 법을 기록할 것이요,\n나는
