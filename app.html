도 무너뜨리는도다.","comfort":"당신이 홀로 싸우는 것이 아니기에, 가장 강력한 무기를 이미 가지고 계시니까요.","original_tag":"소망","pastor":"이찬수"},{"ref":"창세기 21:1-2","type":"선언형","tags":["신뢰","소망","기다림","축복"],"full":"여호와께서 말씀하신 대로\n사라를 찾아 돌보셨고,\n말씀하신 대로 사라에게\n행하셨나이다.\n그분께서 정하신 때가 되어\n노년의 아브라함에게\n아들을 낳게 하셨나이다.","compact":"여호와께서 말씀하신 대로\n사라를 돌보시고\n행하셨나이다.","oneline":"말씀하신 대로 반드시 행하시리라.","comfort":"이미 약속하신 분이니, 당신에게도 동일하게 이루실 분이에요.","original_tag":"소망","pastor":"이찬수"},{"ref":"사무엘상 1:10-11","type":"고백형","tags":["슬픔","소망","기다림","자녀양육"],"full":"한나가 마음이 괴로워\n여호와께 기도하고\n통곡하였나이다.\n만군의 여호와여,\n주의 여종의 고통을 돌보시고\n나를 기억하사\n주의 여종을 잊지 마옵소서.","compact":"마음이 괴로워 주께 기도하며,\n고통을 돌보시고\n기억해 주시기를\n간구하나이다.","oneline":"주께서 나의 고통을 돌보시고 기억하시리이다.","comfort":"당신의 깊은 마음의 소리를 주님은 이미 듣고 계시답니다.","original_tag":"소망","pastor":"이찬수"},{"ref":"요한일서 3:2","type":"선언형","tags":["소망","가정","보호","축복"],"full":"사랑하는 자들아,\n우리가 지금은 하나님의 자녀이옵니다.\n장래에 어떻게 될지는\n아직 온전히 나타나지 않았으나,\n그분께서 나타나시면\n우리가 그분과 같아질 것을 아나니,\n그분의 참모습을 그대로\n볼 것이기 때문이옵니다.","compact":"우리는 지금\n하나님의 자녀이옵니다.\n그분 나타나시면\n우리도 그분과 같으리이다.","oneline":"우리는 지금 하나님의 자녀로다.","comfort":"당신은 이미 가장 존귀한 존재로 부름받았으니까요.","original_tag":"소망","pastor":"이찬수"},{"ref":"1 John 3:1-3","type":"선언형","tags":["가정","축복","소망","평안"],"full":"보라,\n아버지께서 우리에게\n얼마나 큰 사랑을 베푸셨는지,\n우리로 하여금 하나님의 자녀라\n불리게 하셨도다!\n진실로 우리가 그러하니이다.","compact":"아버지께서 우리에게\n큰 사랑을 베푸사,\n우리가 하나님의 자녀라\n불리게 하셨도다.","oneline":"우리는 하나님의 자녀로다!","comfort":"당신은 이미 무한한 사랑을 받는 가장 소중한 하나님의 자녀이니까요.","original_tag":"외로움","pastor":"Timothy Keller"},{"ref":"John 1:12","type":"선언형","tags":["축복","신뢰","소망","보호"],"full":"영접하는 자,\n곧 그분의 이름을\n믿는 자들에게는\n하나님의 자녀가 되는\n권세를 주셨나이다.","compact":"그 이름을\n믿는 자들에게\n하나님의 자녀가 되는\n권세를 주셨도다.","oneline":"하나님의 자녀가 되는 권세를 주셨도다.","comfort":"당신은 이미 이 권세를 가진 존귀한 존재이니까요.","original_tag":"외로움","pastor":"Timothy Keller"},{"ref":"Romans 8:19","type":"위로형","tags":["소망","기다림","축복","평안"],"full":"모든 피조물이\n간절히 고대하는 것은\n하나님의 자녀들이\n온전히 드러나는\n것이옵니다.","compact":"온 피조물이\n하나님의 자녀들이\n드러나기를\n간절히 기다리나이다.","oneline":"하나님의 자녀들이\n나타날 때를\n온 천하가\n기다리는도다.","comfort":"온 우주가\n당신의 영광스러운\n모습을 기다리고 있어요.","original_tag":"외로움","pastor":"Timothy Keller"},{"ref":"열왕기상 2:3","type":"선언형","tags":["인도하심","순종","축복","직장사업"],"full":"네 하나님 여호와의\n명령을 지켜\n그 길로 행하라.\n그리하면 네가\n무엇을 하든지\n어디로 가든지\n형통할 것이니라.","compact":"여호와의 명령을\n지켜 행하면,\n네가 어디로 가든지\n형통하리라.","oneline":"네가 어디로 가든지\n형통하리라.","comfort":"당신이 순종의 길을\n걸을 때,\n형통케 하시는 분이\n함께하시니까요.","original_tag":"노년의 삶","pastor":"이찬수"},{"ref":"시편 71:9","type":"고백형","tags":["외로움","두려움","신뢰","보호"],"full":"나이가 들어\n힘이 쇠약해질 때에도\n저를 버리지 마시고,\n저를 떠나지 마옵소서.","compact":"늙고 힘이 쇠약할 때에도\n주님, 저를 버리지 마옵소서.","oneline":"늙고 쇠약할 때에도\n저를 떠나지 마옵소서.","comfort":"당신의 모든 때를\n붙드시겠다고\n약속하신 분이에요.","original_tag":"노년의 삶","pastor":"이찬수"},{"ref":"시편 71:18","type":"고백형","tags":["소망","신뢰","인도하심","보호"],"full":"오 하나님,\n제가 늙어 백발이\n될 때에도\n저를 버리지 마옵소서.\n주의 힘을 후대에,\n주의 능력을\n미래의 모든 사람에게\n전할 때까지\n저를 떠나지 마옵소서.","compact":"늙어 백발이 될 때에도\n저를 버리지 마시고,\n주의 능력을\n다음 세대에 전하게 하소서.","oneline":"주의 능력을\n다음 세대에 전하기까지\n저를 떠나지 마옵소서.","comfort":"당신의 사명을\n기억하시고,\n그 완성을 위해\n함께하실 분이세요.","original_tag":"노년의 삶","pastor":"이찬수"},{"ref":"Romans 6:23","type":"선언형","tags":["소망","감사","축복"],"full":"죄의 삯은 사망이나,\n하나님께서 우리 주\n예수 그리스도를 통해\n주시는 은혜의 선물은\n영원한 생명임이라.","compact":"죄의 결과는 사망이지만,\n하나님의 은혜의 선물은\n영원한 생명임이라.","oneline":"하나님의 선물은\n영원한 생명임이라.","comfort":"이미 영원한 생명을\n약속하고\n선물하신 분이 계세요.","original_tag":"신앙 성장","pastor":"John Piper"},{"ref":"2 Corinthians 3:18","type":"선언형","tags":["소망","인도하심","치유"],"full":"우리는 모두\n가려진 얼굴이 아닌,\n주님의 영광을\n거울로 보듯 바라보며,\n주님의 영으로 말미암아\n영광에서 영광으로\n그와 같은 형상으로\n변화되고 있도다.","compact":"우리는 주님의 영광을\n보며,\n주님의 영으로\n영광에서 영광으로\n변화되고 있도다.","oneline":"우리는 주님의 영으로\n말미암아\n변화되고 있도다.","comfort":"당신을 가장\n아름다운 모습으로\n빚어가시는 분이\n바로 주님이세요.","original_tag":"신앙 성장","pastor":"Tony Evans"},{"ref":"디모데후서 2:21","type":"선언형","tags":["결단","순종","소망","축복"],"full":"그러므로 누구든지\n이런 것들에서\n자신을 깨끗하게 하면,\n귀하게 쓰는 그릇이 되어\n거룩하고 주인이\n쓰시기에 합당하며,\n모든 선한 일에\n준비가 되리라.","compact":"자신을 깨끗하게 하면,\n귀하게 쓰이는 그릇이 되어\n모든 선한 일에\n준비가 되리라.","oneline":"모든 선한 일에\n준비함이 되리라.","comfort":"당신을 향한\n주님의 아름다운\n계획이 이미\n준비되어 있어요.","original_tag":"신앙 성장","pastor":"이찬수"},{"ref":"갈라디아서 1:4","type":"위로형","tags":["용서","감사","평안"],"full":"그리스도께서 우리\n아버지 하나님의 뜻을 따라,\n이 악한 세대에서\n우리를 건지시고\n우리의 죄를 대속하시기 위해\n자신을 주셨습니다.","compact":"그리스도께서 우리를\n이 악한 세대에서\n건지시고 죄를\n대속하시기 위해\n자신을 주셨습니다.","oneline":"그리스도께서 우리를\n건지시고 죄를\n대속하기 위해\n자신을 주셨습니다.","comfort":"이미 당신의\n가장 깊은 필요를\n채우기 위해\n모든 것을 주신 분이에요.","original_tag":"세속적 유혹","pastor":"Tony Evans"},{"ref":"시편 140:5","type":"고백형","tags":["불안","두려움","보호","신뢰"],"full":"교만한 자들이\n저를 해하려\n올무와 줄을 놓으며,\n길가에 그물과\n함정을 두었나이다.","compact":"교만한 자들이\n저를 해하려\n함정을 두었나이다.","oneline":"교만한 자들이\n저를 해하려\n함정을 두었나이다.","comfort":"당신을 둘러싼\n모든 것을 아시고,\n그 가운데 계신 분이\n있어요.","original_tag":"마음 관리","pastor":"이찬수"},{"ref":"빌립보서 1:20-21","type":"고백형","tags":["소망","결단","신뢰","평안"],"full":"제 간절한 기대와 소망은\n아무 일에든지\n부끄러워하지 않고,\n지금도 전과 같이\n온전히 담대하여\n제가 살든지 죽든지\n제 몸에서 그리스도께서\n존귀하게 되시는 것입니다.\n이는 제게 사는 것이\n그리스도이며,\n죽는 것도 유익하기\n때문입니다.","compact":"살든지 죽든지\n제 몸에서 그리스도께서\n존귀하게 되시기를 원합니다.\n제게 사는 것이\n그리스도이기에,\n죽는 것도 유익합니다.","oneline":"제게 사는 것이\n그리스도이니\n죽는 것도 유익함이라.","comfort":"당신이 걸어가는\n그 길의 결국은\n영광일 것입니다.","original_tag":"고난과역경","pastor":"이찬수"},{"ref":"빌립보서 1:23-24","type":"고백형","tags":["관계","소망","결단","가정"],"full":"저는 그 두 가지 사이에 끼여 있습니다.\n차라리 이 세상을 떠나 그리스도와 함께 있는 것이 훨씬 더 좋은 일이라 그렇게 하고 싶으나,\n제가 육신으로 있는 것이 여러분을 위하여 더 유익하리라 생각합니다.","compact":"그리스도와 함께 있는 것이 훨씬 더 좋지만,\n여러분 위하여 제가 육신으로 있는 것이 더 유익하리라 믿습니다.","oneline":"육신으로 있는 것이 여러분을 위하여 더 유익하리라.","comfort":"당신의 존재 자체가\n누군가에게 유익이 될 것입니다.","original_tag":"고난과역경","pastor":"이찬수"},{"ref":"마태복음 23:12","type":"선언형","tags":["순종","인도하심","축복","평안"],"full":"누구든지 자신을 높이는 자는 낮아질 것이요,\n자신을 낮추는 자는 높아지리라.","compact":"자신을 높이는 자는 낮아지고,\n자신을 낮추는 자는 높아지리라.","oneline":"자신을 낮추는 자는 높아지리라.","comfort":"스스로 낮추는 마음을 헤아리시는 분이\n당신과 함께 계십니다.","original_tag":"고난과역경","pastor":"이찬수"},{"ref":"고린도후서 12:10","type":"고백형","tags":["신뢰","소망","두려움","평안"],"full":"그러므로 저는 그리스도를 위하여\n약한 것들과 능욕과 궁핍과 박해와 곤고를 기뻐하오니,\n이는 제가 약할 그때에 강하기 때문입니다.","compact":"그리스도를 위하여 약한 것들을 기뻐하오니,\n제가 약할 그때에 강합니다.","oneline":"제가 약할 그때에 강함이라.","comfort":"당신의 연약함 속에서 힘을 주시겠다고 먼저\n말씀하신 분이 계십니다.","original_tag":"고난과역경","pastor":"이찬수"},{"ref":"느헤미야 8:10","type":"선언형","tags":["소망","평안","신뢰","감사"],"full":"주님으로 인하여 기뻐하는 것이\n바로 여러분의 힘이니라.","compact":"주님으로 인하여 기뻐하는 것이\n너희의 힘이니라.","oneline":"여호와로 인하여 기뻐하는 것이 너희의 힘이니라.","comfort":"기쁨의 근원이 바로\n당신 안에 있습니다.","original_tag":"고난과역경","pastor":"이찬수"},{"ref":"Genesis 1:26","type":"선언형","tags":["소망","보호","자녀양육","신뢰"],"full":"하나님께서 말씀하시기를,\n'우리의 형상을 따라, 우리의 모양대로\n사람을 만들자...'라고 하셨습니다.","compact":"하나님께서 말씀하시기를,\n'우리의 형상을 따라 사람을 만들자'고 하셨습니다.","oneline":"우리의 형상을 따라 사람을 만들자.","comfort":"당신은 처음부터 그렇게\n존귀하게 창조된 존재입니다.","original_tag":"하나님의 사랑","pastor":"Timothy Keller"},{"ref":"Genesis 1:31","type":"선언형","tags":["감사","평안","축복","소망"],"full":"하나님께서 자신이 만드신 모든 것을 보시니,\n보시기에 심히 좋았더라.\n저녁이 되고 아침이 되니 이는 여섯째 날이니라.","compact":"하나님께서 자신이 만드신 모든 것을 보시니,\n보시기에 심히 좋았더라.","oneline":"하나님께서 만드신 모든 것은 보시기에 심히 좋았더라.","comfort":"당신의 삶도 그의 눈에는\n처음부터 그렇게 좋은 것이었습니다.","original_tag":"하나님의 사랑","pastor":"Timothy Keller"},{"ref":"요한복음 1:1, 14","type":"선언형","tags":["신뢰","소망","보호","평안"],"full":"태초에 말씀이 계셨으니,\n이 말씀이 하나님과 함께 계셨고, 이 말씀은 곧 하나님이시니라...\n그 말씀이 육신이 되어 우리 가운데 거하시매.","compact":"태초에 말씀이 계셨고 그 말씀이 곧 하나님이시며,\n그 말씀이 육신이 되어 우리 가운데 거하시니라.","oneline":"그 말씀이 육신이 되어 우리 가운데 거하시니라.","comfort":"가장 높으신 분이 당신과 함께 계시기 위해\n이 땅에 오셨습니다.","original_tag":"구원의 확신","pastor":"팀 켈러 (Timothy Keller)"},{"ref":"요한복음 9:3","type":"선언형","tags":["인도하심","치유","소망","신뢰"],"full":"예수께서 대답하시기를,\n'이 사람이나 그 부모가 죄를 범한 것이 아니라,\n그에게서 하나님의 하시는 일을 나타내고자 하심이니라'고 하셨습니다.","compact":"이 사람이나 그 부모가 죄를 범한 것이 아니라,\n그에게서 하나님의 하시는 일을 나타내고자 하심이니라.","oneline":"그에게서 하나님의 하시는 일을 나타내고자 하심이니라.","comfort":"지금 겪고 있는 모든 것에도\n하나님의 뜻과 섭리가 있습니다.","original_tag":"고난의 의미","pastor":"하용조"},{"ref":"요한복음 9:5","type":"선언형","tags":["소망","인도하심","평안","보호"],"full":"내가 세상에 있는 동안에는\n세상의 빛이니라.","compact":"내가 세상에 있는 동안에는\n세상의 빛이니라.","oneline":"내가 세상에 있는 동안에는 세상의 빛이니라.","comfort":"가장 밝은 빛이 지금\n당신과 함께 이 세상에 있습니다.","original_tag":"고난의 의미","pastor":"하용조"},{"ref":"Proverbs 19:17","type":"선언형","tags":["재정어려움","축복","감사","관계"],"full":"가난한 자에게 자비를 베푸는 자는\n주께 꾸어 드리는 것이니,\n주께서 그가 행한 대로 갚아주시리로다.","compact":"가난한 자에게 자비를 베푸는 자에게,\n주께서 반드시 갚아주시리로다.","oneline":"주께서 자비를 베푼 자에게 갚아주시리로다.","comfort":"작은 나눔도 잊지 않고 더 큰 것으로 갚아주시겠다고\n약속하신 분이에요.","original_tag":"감사","pastor":"Timothy Keller"},{"ref":"사사기 15:18-19","type":"위로형","tags":["치유","소망","신뢰","보호"],"full":"삼손이 목이 말라 주께 부르짖자,\n하나님께서 한 우묵한 곳을 터뜨려 물을 솟아나게 하셨으니,\n그 물을 마시고 정신이 회복되어 소생하였도다.","compact":"목마른 자의 부르짖음에, 하나님께서 물을 터뜨려\n정신을 회복하고 소생하게 하셨도다.","oneline":"하나님께서 물을 터뜨려 정신을 회복시키고 소생하게 하셨도다.","comfort":"가장 절박한 순간에도 이미 응답하시겠다고\n말씀하신 분이에요.","original_tag":"감사","pastor":"이찬수"},{"ref":"사무엘상 7:12","type":"고백형","tags":["보호","인도하심","신뢰","감사"],"full":"사무엘이 돌을 세워 이르기를,\n여호와께서 여기까지 우리를 도우셨나이다, 하였도다.\n그 이름을 에벤에셀이라 불렀도다.","compact":"여호와께서 여기까지 우리를 도우셨나이다.\n에벤에셀!","oneline":"여호와께서 여기까지 우리를 도우셨도다.","comfort":"지금까지 함께하셨던 분이기에,\n앞으로도 붙들어 주실 거예요.","original_tag":"감사","pastor":"이찬수"},{"ref":"시편 128:1","type":"선언형","tags":["축복","소망","평안","인도하심"],"full":"여호와를 경외하며 그분의 길을 걷는 자마다\n복이 있도다.","compact":"여호와를 경외하며 그의 길을 걷는 자마다\n복이 임하리로다.","oneline":"여호와를 경외하는 자에게 복이 있으리로다.","comfort":"그 복은 당신의 삶에 이미 예비되어 있으니까요.","original_tag":"감사","pastor":"이찬수"},{"ref":"시편 128:2","type":"선언형","tags":["직장사업","재정어려움","축복","소망"],"full":"수고한 대로 거두리로다.\n당신이 복되고 형통하리로다.","compact":"네 수고가 결실을 맺으리니,\n복되고 형통하리로다.","oneline":"네가 수고한 대로 복되고 형통하리로다.","comfort":"당신의 노력을 기쁘게 보시고\n반드시 결실하게 하실 분이 있어요.","original_tag":"감사","pastor":"이찬수"},{"ref":"시편 128:3","type":"선언형","tags":["가정","자녀양육","축복","관계"],"full":"당신의 집 안방에 있는 아내는\n결실한 포도나무 같고,\n식탁에 둘러앉은 자식들은 어린 감람나무 같으리로다.","compact":"아내는 결실한 포도나무 같고,\n자녀들은 어린 감람나무 같으리로다.","oneline":"당신의 가정이 아름답고 복되리로다.","comfort":"사랑하는 이들을 통해 이미 충만한 복을\n부어주셨다고 말씀하신 분이에요.","original_tag":"감사","pastor":"이찬수"},{"ref":"신명기 8:16","type":"선언형","tags":["인도하심","소망","보호","축복"],"full":"당신의 조상들도 알지 못하던 만나를 광야에서 먹이셨으니,\n이는 다 당신을 낮추시고 시험하셨지만,\n마침내 당신에게 복을 주려 하심이었나이다.","compact":"당신을 낮추고 시험하셨지만,\n결국 당신에게 복을 주려 하심이었나이다.","oneline":"마침내 당신에게 복을 주려 하심이었나이다.","comfort":"그 모든 과정 속에도 당신을 향한 그분의 선한 뜻이\n담겨 있었어요.","original_tag":"감사","pastor":"이찬수"},{"ref":"출애굽기 16:4","type":"선언형","tags":["재정어려움","인도하심","보호","신뢰"],"full":"보라, 내가 당신을 위하여 하늘에서 양식을\n비같이 내릴 것이니,\n당신이 날마다 일용할 것을 거둘 것입니다.","compact":"내가 당신을 위하여 하늘에서 양식을 내리리니,\n날마다 거두게 될 것입니다.","oneline":"내가 당신을 위하여 하늘에서 양식을 내릴 것입니다.","comfort":"필요한 것을 채우시겠다고\n친히 말씀하신 분이에요.","original_tag":"감사","pastor":"이찬수"},{"ref":"시편 100:1-5","type":"선언형","tags":["신뢰","소망","평안","보호"],"full":"그분은 우리를 지으신 분이요, 우리는 그분의 것이니,\n그분의 백성이요 그분이 기르시는 양이로다. 여호와는 선하시고\n그분의 인자하심이 영원하며, 그분의 성실하심이 대대에 이르리로다.","compact":"그분은 우리를 지으신 분이요, 그분의 인자하심이 영원하며,\n성실하심이 대대에 이르리로다.","oneline":"그분의 성실하심이 대대에 이르리로다.","comfort":"당신을 향한 그분의 성실하심은\n결코 변치 않으니까요.","original_tag":"감사","pastor":"이찬수"},{"ref":"시편 42:11","type":"고백형","tags":["불안","소망","신뢰","평안"],"full":"내 영혼아, 어찌하여 낙심하며 내 속에서 불안해하는가?\n하나님께 소망을 두라. 그분이 나타나 도우심으로 말미암아\n내가 여전히 내 하나님을 찬송하리로다.","compact":"내 영혼아, 낙심하고 불안해하는가? 하나님께 소망을 두라.\n그분이 도우심으로 말미암아 내가 여전히 찬송할 것입니다.","oneline":"하나님께 소망을 두라, 그분이 도우실 것입니다.","comfort":"당신의 소망이 헛되지 않을 것을\n이미 아시는 분이에요.","original_tag":"감사","pastor":"이찬수"},{"ref":"Ezekiel 36:26","type":"선언형","tags":["회개","소망","치유","평안"],"full":"내가 당신에게 새 마음을 주고, 당신 안에 새 영을 둘 것이라.\n당신에게서 돌 같은 마음을 제거하고\n살처럼 부드러운 마음을 줄 것이라.","compact":"내가 당신에게 새 마음과 새 영을 주고,\n돌 같은 마음을 제거하고 부드러운 마음을 줄 것이라.","oneline":"내가 당신에게 새 마음과 새 영을 줄 것이라.","comfort":"당신의 변화를 가장 먼저\n약속하신 분이에요.","original_tag":"자기 의","pastor":"Timothy Keller"},{"ref":"이사야 60:1-3","type":"선언형","tags":["소망","보호","인도하심","평안"],"full":"일어나 빛을 발하라.\n이는 당신의 빛이 이르렀고 여호와의 영광이 당신 위에 임하였음이니라.\n어둠이 땅을 덮을지라도, 오직 여호와께서 당신 위에 임하실 것이며 그분의 영광이 당신 위에 나타날 것입니다.","compact":"당신의 빛이 이르렀고 여호와의 영광이 당신 위에 임하였음이니라.\n어둠 속에서도 그분의 영광이 당신 위에 나타날 것입니다.","oneline":"여호와의 영광이 당신 위에 임할 것이라.","comfort":"가장 짙은 어둠 속에서도\n당신을 빛으로 비추시겠다고 약속하신 분이에요.","original_tag":"신앙의 의미","pastor":"Timothy Keller"},{"ref":"요한복음 12:32","type":"선언형","tags":["인도하심","소망","신뢰","평안"],"full":"내가 땅에서 들리면,\n모든 사람을 내게로 이끌겠노라 하시니.","compact":"내가 높이 들리면,\n모든 사람을 내게로 이끌 것이라.","oneline":"내가 모든 사람을 내게로 이끌 것이라.","comfort":"당신의 삶 또한 그분께서\n이끄시겠다고 약속하신 길 위에 있어요.","original_tag":"신앙의 의미","pastor":"Timothy Keller"},{"ref":"John 1:29","type":"선언형","tags":["용서","평안","회개","신뢰"],"full":"보라, 세상의 죄를 지고 가는\n하나님의 어린 양이로다!","compact":"세상 죄를 지고 가는\n하나님의 어린 양이로다!","oneline":"세상 죄를 지고 가는 하나님의 어린 양이로다.","comfort":"당신의 모든 죄를 대신\n짊어지신 분이 여기 계시니까요.","original_tag":"구원","pastor":"Dr. Tony Evans"},{"ref":"2 Corinthians 5:21","type":"선언형","tags":["용서","신뢰","평안","소망"],"full":"죄를 알지도 못하신 그분께서\n우리를 위하여 죄가 되셨으니,\n이는 우리로 하여금 그분 안에서 하나님의 의가 되게 하려 하심이라.","compact":"죄 없으신 그분께서 우리를 위해 죄가 되셨으니,\n우리가 그분 안에서 하나님의 의가 될 것입니다.","oneline":"우리가 그분 안에서 하나님의 의가 될 것입니다.","comfort":"당신의 의로움을 이미 온전히\n이루어 놓으신 분이 계시니까요.","original_tag":"구원","pastor":"Dr. Tony Evans"},{"ref":"Ephesians 2:10","type":"선언형","tags":["인도하심","소망","신뢰","보호"],"full":"우리는 하나님께서 직접 만드신 작품입니다.\n그리스도 예수 안에서 선한 일을 하도록 창조되었으니,\n이 일들은 하나님께서 이미 우리를 위해 미리 예비해 두신 것입니다.","compact":"우리는 하나님께서 만드신 작품이며,\n이미 예비된 선한 일을 위해 지어졌습니다.","oneline":"우리는 하나님께서 미리 예비하신 선한 일을 위해 지어진 작품입니다.","comfort":"이미 하나님께서 당신을 향한\n아름다운 계획을 세워두셨으니까요.","original_tag":"삶의 의미","pastor":"Timothy Keller"},{"ref":"시편 51:11-12","type":"고백형","tags":["회개","소망","평안","신뢰"],"full":"주 앞에서 저를 쫓아내지 마시고,\n주의 성령을 저에게서 거두지 마옵소서.\n주의 구원의 즐거움을 저에게 회복시켜 주시고, 자원하는 심령으로 저를 붙들어 주옵소서.","compact":"주의 성령을 거두지 마시고,\n구원의 즐거움을 회복시키사 저를 붙들어 주옵소서.","oneline":"주의 성령으로 저를 붙들어 주옵소서.","comfort":"그 애통한 마음을 하나님께서 아시고\n이미 귀 기울이고 계십니다.","original_tag":"허무함","pastor":"이찬수"},{"ref":"1 Peter 2:9-10","type":"선언형","tags":["소망","보호","축복","신뢰"],"full":"그러나 여러분은 택함 받은 족속이요, 왕 같은 제사장들이요, 거룩한 나라요, 하나님의 특별한 소유된 백성입니다.\n이는 여러분을 어둠 속에서 불러내어 그의 놀라운 빛으로 인도하신 분의 찬양을 선포하게 하려 하심입니다.\n이전에는 백성이 아니었으나, 이제는 하나님의 백성이요, 긍휼을 얻지 못하였으나, 이제는 긍휼을 얻은 자들입니다.","compact":"여러분은 택함 받은 족속이요 왕 같은 제사장이며, 하나님의 특별한 소유된 백성입니다.\n이제는 하나님의 백성이요 긍휼을 얻은 자들입니다.","oneline":"여러분은 하나님의 특별한 소유된 백성입니다.","comfort":"하나님께서 이미 당신을\n가장 특별한 존재로 택하셨으니까요.","original_tag":"신앙 공동체","pastor":"Timothy Keller"},{"ref":"Exodus 19:5-6","type":"선언형","tags":["보호","축복","신뢰","소망"],"full":"이제 너희가 내 말에 온전히 순종하고 나의 언약을 지키면,\n너희는 모든 민족 가운데서 나의 특별한 보물이 될 것이다.\n온 땅이 다 내 것이지만, 너희는 나를 위한 제사장 나라요, 거룩한 백성이 될 것이다.","compact":"나의 언약을 지키면, 너희는 나의 특별한 보물이 되리라.\n너희는 제사장 나라요 거룩한 백성이 될 것이다.","oneline":"너희는 나의 특별한 보물이 되리라.","comfort":"하나님은 이미 당신을\n가장 귀한 보물로 여기고 계십니다.","original_tag":"신앙 공동체","pastor":"Timothy Keller"},{"ref":"Hosea 2:23","type":"선언형","tags":["소망","신뢰","보호","축복"],"full":"내가 '내 백성이 아니라' 불리던 자들에게\n'너는 내 백성이라' 말하리니,\n그들은 '주는 나의 하나님이시로다' 말할 것이라.","compact":"내가 '내 백성이 아니라' 불리던 자들에게\n'너는 내 백성이라' 말하리라.","oneline":"내가 '너는 내 백성이라' 말하리라.","comfort":"하나님께서는 당신을 자신의 백성으로\n부르시기를 이미 기뻐하고 계십니다.","original_tag":"신앙 공동체","pastor":"Timothy Keller"},{"ref":"데살로니가전서 5:5-6","type":"선언형","tags":["소망","신뢰","평안","보호"],"full":"여러분은 모두 빛의 자녀요, 낮의 자녀들입니다.\n우리는 밤이나 어둠에 속하지 않았으니,\n그러므로 다른 이들처럼 잠들지 말고 오직 깨어 정신을 차려야 할 것입니다.","compact":"여러분은 모두 빛의 자녀요, 낮의 자녀들입니다.\n우리는 어둠에 속하지 않았습니다.","oneline":"여러분은 빛의 자녀요 낮의 자녀입니다.","comfort":"하나님께서 당신을 어둠의 자녀가 아닌\n빛의 자녀로 삼아주셨으니까요.","original_tag":"회개","pastor":"이찬수"},{"ref":"사무엘하 12:13","type":"선언형","tags":["용서","회개","평안","보호"],"full":"다윗이 나단에게 고백하기를\n'내가 여호와께 죄를 범하였나이다' 하매,\n나단이 다윗에게 말하기를\n'여호와께서 당신의 죄를 이미 용서하셨으니,\n당신은 죽지 않을 것이오.'","compact":"여호와께서 당신의 죄를 이미 용서하셨으니,\n당신은 죽지 않을 것이오.","oneline":"여호와께서 당신의 죄를 용서하셨나이다.","comfort":"그분은 이미 당신의 진심을 아시고\n용서를 허락하셨습니다.","original_tag":"회개","pastor":"이찬수"},{"ref":"에베소서 5:8","type":"선언형","tags":["소망","신뢰","평안","축복"],"full":"여러분은 전에는 어둠이었으나,\n이제는 주 안에서 빛입니다.\n그러므로 빛의 자녀답게 행하십시오.","compact":"여러분은 전에는 어둠이었으나,\n이제는 주 안에서 빛입니다.","oneline":"여러분은 이제 주 안에서 빛입니다.","comfort":"그분께서 이미 당신을 어둠에서\n빛으로 옮겨주셨으니까요.","original_tag":"물질주의","pastor":"이찬수"},{"ref":"시편 131:1","type":"고백형","tags":["회개","평안","신뢰"],"full":"여호와여, 제 마음은 교만하지 아니하며,\n제 눈은 오만하지 아니하나이다.\n저는 너무 큰일이나 감당하지 못할 놀라운 일을 하려고 애쓰지 아니하나이다.","compact":"여호와여, 제 마음이 교만하지 않고 오만하지 않으니,\n감당 못할 일을 힘쓰지 아니하나이다.","oneline":"저는 큰일과 감당 못할 일을 하려고 애쓰지 아니하나이다.","comfort":"자신을 돌아보는 그 마음에\n주님께서 함께하십니다.","original_tag":"영적공허함","pastor":"이찬수"},{"ref":"J \n내가 너희에게 보내리니,\n위로부터 능력으로\n입혀질 것이라.","oneline":"아버지께서 약속하신\n능력을 당신에게\n보내실 것입니다.","comfort":"그 능력으로 당신을\n입히시겠다고 이미\n약속하셨습니다.","original_tag":"기도생활","pastor":"이찬수"},{"ref":"사무엘하 23:1, 4-5","type":"선언형","tags":["신뢰","소망","가정","축복"],"full":"그는 해 돋는 아침 빛 같고,\n구름 한 점 없는\n아침 같으며,\n비 내린 후 맑게 갠 날,\n땅에서 솟아나는\n새 풀 같으시도다.\n하나님께서 저와 영원한\n언약을 세우사,\n모든 것을 질서 있게\n갖추시고 견고하게 하셨으니,\n이것이 저의 모든 구원이요\n모든 소원입니다.","compact":"하나님께서 영원한\n언약을 세우사,\n나의 모든 구원과\n나의 모든 소원을\n반드시 이루실 것입니다.","oneline":"나의 모든 구원과\n나의 모든 소원을\n반드시 이루실 것입니다.","comfort":"하나님이 먼저 약속하시고\n굳게 세우신 언약이니까요.","original_tag":"자녀양육","pastor":"이찬수"},{"ref":"사무엘하 7:16","type":"선언형","tags":["가정","보호","축복","소망"],"full":"네 집과 네 나라가\n내 앞에서 영원히 보전되고,\n네 왕위가 영원히 견고하리라\n내가 약속하노라.","compact":"네 집과 왕위가\n내 앞에서 영원히 견고하리라\n내가 약속하노라.","oneline":"네 왕위가 영원히\n견고하리라.","comfort":"흔들리지 않도록 이미\n굳게 세워 두신\n약속이니까요.","original_tag":"자녀양육","pastor":"이찬수"},{"ref":"요엘 2:28","type":"선언형","tags":["소망","인도하심","자녀양육","축복"],"full":"그 후에 내가 내 영을\n모든 사람에게 부어 주리니,\n너희 자녀들은 예언할 것이요,\n너희 늙은이들은 꿈을 꾸며,\n너희 젊은이들은\n환상을 볼 것이라\n내가 선언하노라.","compact":"내가 내 영을 모든 사람에게\n부어 주리니,\n너희는 예언하고\n꿈꾸며 환상을\n볼 것이라.","oneline":"내가 내 영을 모든 사람에게\n부어 주리라.","comfort":"이미 부어주시겠다고\n약속하신 성령님이\n당신 안에 계시니까요.","original_tag":"자녀양육","pastor":"이찬수"},{"ref":"열왕기상 19:5-8","type":"위로형","tags":["외로움","슬픔","보호","치유"],"full":"지쳐 로뎀 나무 아래\n누워 자고 있을 때\n천사가 어루만지며 이르기를,\n'일어나 먹으라.\n네가 갈 길이\n너무 멀까 하노라'\n하시니,\n그가 먹고 힘을 얻어\n사십 주야를 걸어\n하나님의 산 호렙에\n이르렀습니다.","compact":"지쳐 쓰러진 이에게\n천사가 '일어나 먹으라.\n네가 갈 길이\n너무 멀까 하노라'\n하며 먹을 것을\n주었느니라.","oneline":"일어나 먹으라,\n네가 갈 길이\n너무 멀까 하노라.","comfort":"당신의 길을 아시고\n미리 힘을 공급하시는\n분이 계시니까요.","original_tag":"자녀양육","pastor":"이찬수"},{"ref":"창세기 17:7","type":"선언형","tags":["가정","자녀양육","보호","축복"],"full":"내가 내 언약을 너와\n네 대대 후손 사이에 세워\n영원한 언약을 삼고,\n너와 네 후손의\n하나님이 되리라\n내가 선포하노라.","compact":"내가 너와 네 후손 사이에\n영원한 언약을 세워,\n너희의 하나님이 되리라.","oneline":"내가 너와 네 후손의\n하나님이 되리라.","comfort":"당신과 당신의 대를\n이으시겠다고 먼저\n약속하신 분이에요.","original_tag":"자녀양육","pastor":"이찬수"},{"ref":"창세기 48:15","type":"고백형","tags":["신뢰","인도하심","감사","보호"],"full":"나의 조부 아브라함과\n아버지 이삭이 섬기던 하나님,\n나의 태어남으로부터 오늘까지\n나를 먹이시고 기르신\n하나님을 찬양하나이다.","compact":"나의 태어남으로부터 지금까지,\n나를 먹이시고 기르신\n하나님이십니다.","oneline":"나의 태어남으로부터 지금까지\n나를 기르신 하나님.","comfort":"당신을 처음부터 지금까지\n돌보시고 인도하신\n분이 계시니까요.","original_tag":"자녀양육","pastor":"이찬수"},{"ref":"마가복음 6:30-32","type":"위로형","tags":["평안","치유","슬픔","기다림"],"full":"예수께서 제자들에게\n이르시되,\n'너희는 따로\n한적한 곳에 가서\n잠깐 쉬어라.'\n오고 가는 사람이 많아\n음식 먹을 겨를도\n없었음이니라.","compact":"예수께서 '너희는 따로\n한적한 곳에 가서\n잠깐 쉬어라'\n하시니.","oneline":"너희는 따로\n한적한 곳에 가서\n잠깐 쉬어라.","comfort":"바쁜 걸음 멈추고\n쉬기를 원하시는\n분이 계시니까요.","original_tag":"직장 스트레스","pastor":"이찬수"},{"ref":"시편 23:2-3","type":"고백형","tags":["평안","인도하심","치유","신뢰"],"full":"그분께서 나를 푸른\n풀밭에 눕게 하시며,\n잔잔한 물가로\n인도하시는도다.\n내 영혼을 소생시키시고,\n그분의 이름을 위하여\n의의 길로 인도하시는도다.","compact":"그분께서 나를 푸른\n풀밭에 눕게 하시고\n잔잔한 물가로\n인도하시며,\n내 영혼을 소생시키시는도다.","oneline":"그분께서 내 영혼을\n소생시키시는도다.","comfort":"당신의 영혼을 살리시고\n회복시키기를 원하시는\n분이 당신을 인도하시니까요.","original_tag":"직장 스트레스","pastor":"이찬수"},{"ref":"다니엘 3:18","type":"고백형","tags":["결단","신뢰","두려움","보호"],"full":"그리 아니하실지라도\n왕이여, 우리가 왕의 신들을\n섬기지 아니하고\n왕이 세우신 금 신상에게\n절하지도 아니할 것을\n아시옵소서.","compact":"하나님께서 우리를\n구원하지 아니하실지라도,\n우리는 왕의 신들을\n섬기지 아니할 것입니다.","oneline":"하나님이 우리를 구원하지 아니하실지라도 우리는 주를 섬기리라.","comfort":"어떤 상황에서도 흔들리지 않는\n믿음으로 서 계신 분이\n당신과 함께 계시니까요.","original_tag":"세상 속의 그리스도인","pastor":"이찬수"},{"ref":"누가복음 10:19","type":"선언형","tags":["보호","두려움","평안"],"full":"보라, 내가 너희에게\n뱀과 전갈을 밟고\n원수의 모든 능력을\n제어할 권능을 주었으니,\n너희를 해칠 자가 결코 없으리라\n내가 선포하노라.","compact":"내가 너희에게 원수의\n모든 능력을 제어할\n권능을 주었으니,\n아무도 너희를 해치지 못하리라.","oneline":"아무도 너희를 해치지 못하리라.","comfort":"이미 당신에게\n모든 악한 세력을\n이길 권능을 주셨고\n지켜주시겠다고 약속하셨으니까요.","original_tag":"세상 속의 그리스도인","pastor":"이찬수"},{"ref":"누가복음 22:29","type":"선언형","tags":["소망","축복","인도하심","가정"],"full":"내 아버지께서 나라를\n내게 맡기신 것 같이,\n나도 여러분에게\n나의 나라를 맡기겠노라.","compact":"내 아버지께서 내게\n나라를 주신 것처럼,\n나도 여러분에게\n나라를 주겠노라.","oneline":"내가 여러분에게 나의 나라를 맡기겠노라.","comfort":"왕의 자녀들에게 마땅히 주어질 기업이니까요.","original_tag":"신앙 정체성","pastor":"Tony Evans"},{"ref":"베드로전서 2:9","type":"선언형","tags":["소망","축복","보호","신뢰"],"full":"그러나 여러분은 택하신 족속이요\n왕 같은 제사장들이요\n거룩한 나라요\n하나님의 소유된 백성이니,\n이는 여러분을 어둠에서\n불러내어 그의 놀라운 빛으로\n인도하신 분의 아름다운 덕을\n선포하게 하려 하심이라.","compact":"여러분은 택하신 족속이요\n왕 같은 제사장들이며\n하나님의 소유된 백성이니,\n그분의 덕을 선포하게 하려 함이라.","oneline":"여러분은 하나님의 택하신 족속이요 소유된 백성이라.","comfort":"이미 그렇게 정하신 분이 계시니까요.","original_tag":"신앙 정체성","pastor":"Tony Evans"},{"ref":"갈라디아서 2:20","type":"고백형","tags":["신뢰","소망","결단","평안"],"full":"내가 그리스도와 함께\n십자가에 못 박혔으니,\n이제는 내가 사는 것이 아니요\n오직 내 안에 그리스도께서\n사시는 것이라.\n이제 내가 육체 가운데\n사는 것은 나를 사랑하시어\n나를 위해 자신을 버리신\n하나님의 아들을 믿는\n믿음 안에서 사는 것이니이다.","compact":"이제는 내가 사는 것이 아니요,\n오직 내 안에 그리스도께서\n사시나이다.\n나는 나를 사랑하사\n자신을 버리신 하나님의 아들을\n믿는 믿음 안에서 사나이다.","oneline":"이제는 내가 사는 것이 아니요, 오직 내 안에 그리스도께서 사시나이다.","comfort":"여러분 안에서 새로운 삶을\n시작하게 하신 분이 계시니까요.","original_tag":"신앙 정체성","pastor":"Tony Evans"},{"ref":"빌립보서 3:20","type":"선언형","tags":["소망","신뢰","기다림","평안"],"full":"그러나 우리의 시민권은\n하늘에 있는지라,\n우리는 그곳으로부터\n구원자이신 주 예수\n그리스도를 기다리나이다.","compact":"우리의 시민권은\n하늘에 있습니다.\n우리는 주 예수 그리스도를\n기다립니다.","oneline":"우리의 시민권은 하늘에 있나이다.","comfort":"이미 확실하게 정해진 본향이 있으니까요.","original_tag":"신앙 정체성","pastor":"Tony Evans"},{"ref":"갈라디아서 6:17","type":"고백형","tags":["신뢰","보호","평안","결단"],"full":"이제부터는 누구든지\n나를 괴롭게 하지 말라.\n나는 내 몸에 예수님의\n흔적을 지니고 있노라.","compact":"나는 내 몸에\n예수님의 흔적을\n지니고 있나이다.","oneline":"나는 예수님의 흔적을 지니고 있나이다.","comfort":"이미 그분께서 여러분을\n소유로 삼으셨으니까요.","original_tag":"신앙 정체성","pastor":"이찬수"},{"ref":"이사야 26:3-4","type":"선언형","tags":["평안","신뢰","보호","두려움"],"full":"주님께서는 심지가 견고한 자를\n평강하고 평강하도록 지키시리니,\n이는 그가 주님을 신뢰함이니이다.\n여러분은 여호와를\n영원히 신뢰하십시오.\n주 여호와는 영원한 반석이심이로다.","compact":"주님께서는 심지가 견고한 자를\n평강하도록 지키시리니,\n그는 주님을 신뢰함이니이다.\n주 여호와는 영원한 반석이심이로다.","oneline":"주님은 심지가 견고한 자를 평강하도록 지키시리라.","comfort":"이미 영원한 반석으로\n서 계신 분이 있으니까요.","original_tag":"번아웃","pastor":"이찬수"},{"ref":"Colossians 2:15","type":"선언형","tags":["보호","신뢰","두려움","소망"],"full":"그분께서는 통치자들과\n권세들을 무장 해제시키시어,\n십자가를 통하여 그들을 이기시고\n만천하에 드러내셨나이다.","compact":"그분께서는 통치자들과\n권세들을 무장 해제시키시고\n십자가로 그들을 이기셨나이다.","oneline":"그분께서는 십자가를 통해 모든 // ─── 매칭 ───
function situationScore(echoSituations, prayerSituations) {
  // 상황 키워드 유사도 계산 (부분 문자열 매칭 포함)
  if (!echoSituations || !prayerSituations) return 0;
  let score = 0;
  for (const ps of prayerSituations) {
    for (const es of echoSituations) {
      // 완전 일치
      if (ps === es) { score += 10; continue; }
      // 한쪽이 다른 쪽을 포함
      if (ps.includes(es) || es.includes(ps)) { score += 7; continue; }
      // 단어 단위 겹침 (2글자 이상 단어)
      const pWords = ps.replace(/[의에서을를이가로부터]/g,' ').split(/\s+/).filter(w => w.length >= 2);
      const eWords = es.replace(/[의에서을를이가로부터]/g,' ').split(/\s+/).filter(w => w.length >= 2);
      for (const pw of pWords) {
        for (const ew of eWords) {
          if (pw === ew) score += 4;
          else if (pw.includes(ew) || ew.includes(pw)) score += 2;
        }
      }
    }
  }
  return score;
}

function findEcho(aiTags, aiSituations) {
  const hasSituations = aiSituations && aiSituations.length > 0;
  const hasTags = aiTags && aiTags.length > 0;

  // 1차: 태그 필터로 후보 풀 축소 (situations 있어도 태그로 먼저 좁힘)
  let pool = hasTags
    ? ECHOES.filter(e => e.tags.some(t => aiTags.includes(t)))
    : [...ECHOES];
  if (pool.length === 0) pool = [...ECHOES];

  // 최근 중복 방지
  let filtered = pool.filter(e => !state.recentRefs.includes(e.ref));
  if (filtered.length === 0) {
    state.recentRefs = [];
    filtered = pool;
  }

  // 2차: situations 기반 점수 매칭
  if (hasSituations) {
    const scored = filtered.map(e => ({
      echo: e,
      sitScore: situationScore(e.situations, aiSituations),
      tagScore: hasTags ? e.tags.filter(t => aiTags.includes(t)).length : 0,
      boost: e.boost || 0,
    }));

    // 점수순 정렬 (situation > tag > boost)
    scored.sort((a, b) => {
      if (b.sitScore !== a.sitScore) return b.sitScore - a.sitScore;
      if (b.tagScore !== a.tagScore) return b.tagScore - a.tagScore;
      return b.boost - a.boost;
    });

    // 상위 후보 중에서 타입 다양성 고려하여 선택
    const topN = scored.slice(0, Math.min(10, scored.length));
    if (topN.length > 0 && topN[0].sitScore > 0) {
      // situation 점수가 있는 상위 3개 중 랜덤 (가중치 적용)
      const best = topN.filter(s => s.sitScore > 0).slice(0, 3);
      if (best.length > 0) {
        const weights = best.map((s, i) => 3 - i); // [3, 2, 1]
        const total = weights.reduce((a, b) => a + b, 0);
        let r = Math.random() * total;
        let pick = best[0].echo;
        for (let i = 0; i < best.length; i++) {
          r -= weights[i];
          if (r <= 0) { pick = best[i].echo; break; }
        }
        state.recentRefs.push(pick.ref);
        if (state.recentRefs.length > 20) state.recentRefs.shift();
        return pick;
      }
    }
  }

  // 3차: situations 매칭 실패 시 기존 태그+타입 가중치 방식
  const W = {'선언형':3, '고백형':2, '위로형':1};
  const weighted = [];
  for (const e of filtered) {
    const w = W[e.type] || 1;
    for (let i = 0; i < w; i++) weighted.push(e);
  }
  const echo = weighted[Math.floor(Math.random() * weighted.length)];
  state.recentRefs.push(echo.ref);
  if (state.recentRefs.length > 20) state.recentRefs.shift();
  return echo;
}

  const n = new Date();
  const days = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
  return `${n.getFullYear()}년 ${n.getMonth()+1}월 ${n.getDate()}일 ${days[n.getDay()]}`;
}

function renderTab(idx) {
  const t = getTheme();
  if (idx === 1) return renderPray(t);

        <div class="center-btn" onclick="${state.prayState==='echoed' ? 'restartPray()' : 'togglePray()'}"
          style="background:radial-gradient(circle at 38% 32%,${t.primary}${isPraying?'25':'15'},${t.primary}${isPraying?'0A':'06'} 60%);
            border:1.5px solid ${t.primary}${isPraying?'45':'1C'};
            box-shadow:${isPraying
              ? `0 4px 20px ${t.primary}18,0 0 40px ${t.primary}10,inset 0 -3px 8px ${t.primary}10`

          <div class="center-highlight" style="background:radial-gradient(ellipse,rgba(255,255,255,${isPraying?0.08:0.04}),transparent 70%)"></div>
          ${isPraying
            ? `<div id="pray-timer" style="font-size:22px;font-weight:500;letter-spacing:2px;color:${t.primary};font-family:'Cormorant Garamond',serif">${fmtTime(state.praySeconds)}</div>`
            : isEcho ? '' : `<div style="font-size:12px;letter-spacing:3px;color:${t.textLight};font-weight:300">기도하기</div>`
          }
        </div>
      </div>

      ${isEcho && e ? `
        <div style="text-align:center;padding:0 36px;position:absolute;top:62%;left:0;right:0;z-index:1">
          <div class="echo-item ${state.echoPhase>=1?'show':''}" style="color:${t.text}">
            <div class="echo-verse" style="white-space:pre-line">${verse}</div>
          </div>
          <div class="echo-item ${state.echoPhase>=2?'show':''}" style="margin-top:16px">
            <div class="echo-ref" style="color:${t.textMuted}">— ${e.ref} —</div>
          </div>
          <div class="echo-item ${state.echoPhase>=2?'show':''}" style="background:linear-gradient(90deg,transparent,${t.accent},transparent);
            width:40px;height:1.5px;margin:16px auto 0;opacity:${state.echoPhase>=2?0.6:0}"></div>
          <div class="echo-item ${state.echoPhase>=3?'show':''}" style="color:${t.textLight};margin-top:16px">
            <div class="echo-comfort" style="font-size:12px;white-space:pre-line">${e.comfort}</div>
          </div>

            <div class="echo-back" style="color:${t.textMuted};animation:fadeInSlow 1s ease 0.5s forwards;opacity:0;margin-top:28px" onclick="endEcho()">터치하여 돌아가기</div>

}

function renderCalendar(t) {
  const n = new Date();
  const dayNames = ['일','월','화','수','목','금','토'];
  let html = `<div class="calendar">
    <div class="cal-month" style="color:${t.text}">${n.getFullYear()}년 ${n.getMonth()+1}월</div>
    <div class="cal-grid">
      ${dayNames.map(d => `<div class="cal-day-name" style="color:${t.textMuted}">${d}</div>`).join('')}
      ${Array(new Date(n.getFullYear(),n.getMonth(),1).getDay()).fill('<div></div>').join('')}
      ${Array.from({length:new Date(n.getFullYear(),n.getMonth()+1,0).getDate()}).map((_,i) => {
        const day = i+1;
        const dateKey = `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const has = state.diary.some(e => e.date===dateKey);
        const isToday = day===n.getDate();
        return `<div class="cal-day" style="background:${isToday?t.primary+'12':'transparent'}">
          <div style="color:${isToday?t.primary:t.textLight};font-weight:${isToday?600:400}">${day}</div>
          ${has?`<div class="cal-dot" style="background:${t.accent}"></div>`:''}
        </div>`;
      }).join('')}
    </div>
  </div>`;
  return html;
}

function fmtTime(s) { return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }

// ─── 액션 ───
function flipCover() {
  if (state.phase !== 'cover') return;
  state.phase = 'flipping';
  const page = document.getElementById('cover-page');
  const shadow = document.getElementById('cover-shadow');
  let start = null;
  shadow.style.display = 'block';
  function animate(ts) {
    if (!start) start = ts;
    const p = Math.min((ts - start) / 800, 1);
    const eased = 1 - Math.pow(1 - p, 3);
    const angle = eased * 180;
    page.style.transform = `rotateY(-${angle}deg)`;
    shadow.style.left = `${Math.max(0, (1-eased)*40)}%`;
    shadow.style.background = `linear-gradient(90deg,rgba(0,0,0,${0.12*Math.sin(eased*Math.PI)}),transparent)`;
    if (p < 1) requestAnimationFrame(animate);
    else {
      state.phase = 'app';
      render();
    }
  }
  requestAnimationFrame(animate);
}

function switchTab(idx) {
  if (idx === state.activeTab) return;
  state.activeTab = idx;
  render();
}

function setTheme(key) {
  state.themeKey = key;
  render();
}

function toggleTag(tag) {
  const i = state.selectedTags.indexOf(tag);
  if (i >= 0) state.selectedTags.splice(i, 1);
  else if (state.selectedTags.length < 2) state.selectedTags.push(tag);
  else { state.selectedTags.shift(); state.selectedTags.push(tag); }
  render();
}

function togglePray() {
  if (state.prayState === 'idle') {
    state.prayState = 'praying';
    state.praySeconds = 0;
    if (window.ReactNativeWebView) {
      window.ReactNativeWebView.postMessage(JSON.stringify({action:'startPray'}));
    }
    prayTimer = setInterval(() => {
      state.praySeconds++;
      const el = document.getElementById('pray-timer');
      if (el) el.textContent = fmtTime(state.praySeconds);
    }, 1000);
    startRain();
    startAmbient();
    render();
  } else if (state.prayState === 'praying') {
    clearInterval(prayTimer);
    stopRain();
    stopAmbient();
    state.prayState = 'responding';
    startWaitingMusic();
    if (window.ReactNativeWebView) {
      // 네이티브에 기도 종료 알림 → Whisper/Gemini 처리 후 __proceedEcho 호출됨
      window.ReactNativeWebView.postMessage(JSON.stringify({action:'endPray', seconds:state.praySeconds}));
      if (window.__startEchoTimeout) window.__startEchoTimeout();
      render();
    } else {
      // 브라우저 테스트: AI 없이 바로 에코
      window.__proceedEcho(null);
    }
  }
}

function saveDiaryAndReset(openDiaryAfter) {
  // 다이어리에 기록 — echoVerse가 사라지기 전에 먼저 저장 데이터 준비
  const e = state.echoVerse;
  const echoText = state.echoText;
  const prayTitle = state.prayTitle;
  const praySeconds = state.praySeconds;

  if (e) {
    const now = new Date();
    const entry = {
      date: now.toISOString().slice(0,10),
      time: now.toTimeString().slice(0,5),
      duration: praySeconds,
      title: prayTitle || '기도의 시간',
      tags: e.tags ? e.tags.slice(0,2) : [],
      echo_ref: e.ref,
      echo_verse: echoText || e.oneline || '',
      bookmarked: false
    };
    // WebView 다이어리에 추가
    state.diary.unshift({
      date: entry.date,
      tags: entry.tags,
      title: entry.title,
      ref: entry.echo_ref,
      verse: entry.echo_verse,
      comfort: e.comfort || '',
      bookmarked: false
    });
    // 네이티브 AsyncStorage 저장
    if (window.ReactNativeWebView) {
      window.ReactNativeWebView.postMessage(JSON.stringify({
        action: 'saveDiary',
        entry: entry
      }));
    }
  }
  if (openDiaryAfter) {
    state.activeTab = 2;
  }

  // 상태 초기화
  stopWaitingMusic();
  state.prayState = 'idle';
  state.echoVerse = null;
  state.echoText = null;
  state.prayTitle = null;
  state.echoPhase = 0;
}

function endEcho() {
  saveDiaryAndReset(true);
  render();
}

function restartPray() {
  saveDiaryAndReset(false);
  // 바로 새 기도 시작
  togglePray();
}

function goToCover() {
  state.phase = 'cover';
  state.activeTab = 1;

function startRain() {
  rainInterval = setInterval(() => {

    area.appendChild(drop);
    setTimeout(() => drop.remove(), 3000);

}

// ─── 앰비언트 사운드 (동굴 물방울) ───
let _ambientCtx = null;
let _ambientInterval = null;
let _ambientGain = null;

function startAmbient() {
  try {
    if (_ambientCtx) stopAmbient();
    _ambientCtx = new (window.AudioContext || window.webkitAudioContext)();
    _ambientGain = _ambientCtx.createGain();
    _ambientGain.gain.value = 0;
    _ambientGain.connect(_ambientCtx.destination);
    // 부드럽게 페이드인
    _ambientGain.gain.linearRampToValueAtTime(0.15, _ambientCtx.currentTime + 2);

    function dropSound() {
      if (!_ambientCtx) return;
      const t = _ambientCtx.currentTime;
      // 물방울 — 짧은 사인파 + 빠른 감쇠
      const osc = _ambientCtx.createOscillator();
      const g = _ambientCtx.createGain();
      const f = _ambientCtx.createBiquadFilter();
      // 주파수 랜덤 (높은 물방울 소리)
      const baseFreq = 800 + Math.random() * 1200;
      osc.type = 'sine';
      osc.frequency.setValueAtTime(baseFreq, t);
      osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.4, t + 0.15);
      // 리버브 느낌 — 밴드패스 필터
      f.type = 'bandpass';
      f.frequency.value = 1200;
      f.Q.value = 0.8;
      // 볼륨 엔벨로프
      const vol = 0.03 + Math.random() * 0.07;
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.3 + Math.random() * 0.4);

      osc.connect(f);
      f.connect(g);
      g.connect(_ambientGain);
      osc.start(t);
      osc.stop(t + 0.8);
    }

    // 즉시 한 방울
    dropSound();
    // 불규칙 간격으로 물방울 (1.5~4초)
    function scheduleDrop() {
      if (!_ambientCtx) return;
      dropSound();
      const next = 1500 + Math.random() * 2500;
      _ambientInterval = setTimeout(scheduleDrop, next);
    }
    _ambientInterval = setTimeout(scheduleDrop, 1000 + Math.random() * 2000);
  } catch (e) {
    console.warn('Ambient sound error:', e);
  }
}

function stopAmbient() {
  if (_ambientInterval) { clearTimeout(_ambientInterval); _ambientInterval = null; }
  if (_ambientGain && _ambientCtx) {
    try {
      _ambientGain.gain.linearRampToValueAtTime(0, _ambientCtx.currentTime + 1);
      setTimeout(() => {
        try { _ambientCtx.close(); } catch(e) {}
        _ambientCtx = null; _ambientGain = null;
      }, 1200);
    } catch(e) {
      try { _ambientCtx.close(); } catch(e2) {}
      _ambientCtx = null; _ambientGain = null;
    }
  }
}

// ─── 대기 중 배경음악 (네이티브 재생) ───
function startWaitingMusic() {
  if (window.ReactNativeWebView) {
    window.ReactNativeWebView.postMessage(JSON.stringify({action:'startMusic'}));
  }
}

function stopWaitingMusic() {
  if (window.ReactNativeWebView) {
    window.ReactNativeWebView.postMessage(JSON.stringify({action:'stopMusic'}));
  }
}

// render() is called inside initEchoes()


// ─── 네이티브 브릿지 ───
let _echoTimeout = null;

window.__proceedEcho = function(aiData) {
  try {
    if (_echoTimeout) { clearTimeout(_echoTimeout); _echoTimeout = null; }
    if (aiData && aiData.title) state.prayTitle = aiData.title;

    // AI 매칭 결과(bestRefs)가 있으면 우선 사용
    let _echo = null;
    if (aiData && Array.isArray(aiData.bestRefs) && aiData.bestRefs.length > 0) {
      for (const ref of aiData.bestRefs) {
        const found = ECHOES.find(e => e.ref === ref && !state.recentRefs.includes(e.ref));
        if (found) { _echo = found; break; }
      }
      // 전부 최근 사용이면 첫 번째라도 선택
      if (!_echo) _echo = ECHOES.find(e => e.ref === aiData.bestRefs[0]);
    }

    // AI 매칭 실패 시 로컬 폴백
    if (!_echo) {
      const tags = (aiData && Array.isArray(aiData.tags)) ? aiData.tags : null;
      _echo = findEcho(tags, null);
    }
    if (!_echo) { state.prayState = 'idle'; render(); return; }
    state.echoVerse = _echo;
    const _vv = [_echo.compact, _echo.oneline].filter(Boolean);
    state.echoText = _vv.length > 0 ? _vv[Math.floor(Math.random() * _vv.length)] : (_echo.oneline || _echo.compact || _echo.full || '');
    state.echoPhase = 0;
    render();
    setTimeout(() => { state.echoPhase = 1; render(); }, 600);
    setTimeout(() => { state.echoPhase = 2; render(); }, 1800);
    setTimeout(() => { state.echoPhase = 3; render(); }, 3200);
    setTimeout(() => { state.prayState = 'echoed'; render(); }, 4000);
  } catch(err) {
    console.error('proceedEcho error:', err);
    state.prayState = 'idle'; render();
  }
};

window.__nativeEchoReady = function(data) {
  window.__proceedEcho(data);
};

// 네이티브에서 저장된 다이어리 데이터 수신
window.__loadDiary = function(entries) {
  if (entries && entries.length > 0) {
    state.diary = entries.map(function(e) {
      return {
        date: e.date || '',
        tags: e.tags || [],
        title: e.title || e.echo_verse || '',
        ref: e.echo_ref || e.ref || '',
        verse: e.echo_verse || '',
        comfort: e.comfort || '',
        bookmarked: e.bookmarked || false
      };
    });
    render();
  }
};

// 안전장치: 네이티브 응답 15초 타임아웃 → 자체 폴백
window.__startEchoTimeout = function() {
  if (_echoTimeout) clearTimeout(_echoTimeout);
  _echoTimeout = setTimeout(() => {
    if (state.prayState === 'responding' && !state.echoVerse) {
      console.warn('Echo timeout: using fallback');
      window.__proceedEcho(null);
    }
  }, 15000);
};
