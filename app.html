으니\n여호와께서 저를\n붙드심이로다.\n천만인이 저를 에워싸도\n두려워하지 아니하리이다.","oneline":"여호와께서 나를 붙드심이로다.","comfort":"이미 당신을 붙들고\n계시며, 두려워할 필요\n없다고 말씀하신 분이 계십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"잠언 19:21","type":"선언형","tags":["인도하심","신뢰","소망","평안"],"full":"사람의 마음에는 많은\n계획이 있을지라도,\n오직 여호와 하나님의\n뜻만이 온전히 설\n것이옵니다.","compact":"사람의 많은 계획이 있어도,\n오직 여호와의 뜻만이\n온전히 설 것이옵니다.","oneline":"오직 여호와의 뜻만이 온전히 설 것이옵니다.","comfort":"이미 당신의 걸음을\n계획하고 계신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"갈라디아서 5:24","type":"선언형","tags":["회개","결단","신뢰","평안"],"full":"그리스도 예수께 속한\n사람들은, 육체와 함께\n그 정욕과 탐심을\n십자가에 못 박았나이다.","compact":"예수께 속한 사람들은,\n육체와 정욕과 탐심을\n십자가에 못 박았나이다.","oneline":"육체와 정욕과 탐심을 십자가에 못 박았나이다.","comfort":"이미 당신 안에서\n이루어진 승리입니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"누가복음 15:4","type":"위로형","tags":["보호","소망","외로움","신뢰"],"full":"양 백 마리 중 하나를 잃으면,\n아흔아홉 마리를 들에 두고라도\n그 잃은 것을 찾아내기까지 찾아다니시는 분이 바로 주님이십니다.","compact":"잃은 양 한 마리를 찾아내기까지\n찾아다니시는 분이 주님이십니다.","oneline":"잃은 것을 찾아내기까지 찾아다니시나이다.","comfort":"당신을 절대 포기하지 않는\n사랑이 먼저 있어요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"야고보서 1:2-5","type":"선언형","tags":["인도하심","신뢰","소망","결단"],"full":"여러분 중에 누구든지 지혜가 부족하거든,\n모든 사람에게 후하게 주시고 꾸짖지 아니하시는 하나님께 구하십시오.\n그리하면 주님께서 분명히 주실 것이옵니다.","compact":"지혜가 부족하거든, 후하게 주시고 꾸짖지 아니하시는 하나님께 구하십시오.\n그리하면 주님께서 주실 것이옵니다.","oneline":"하나님께 구하면 주실 것이옵니다.","comfort":"이미 주시겠다고 먼저\n약속하신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"히브리서 5:8-9","type":"선언형","tags":["소망","신뢰","평안","보호"],"full":"그분은 하나님의 아들이시면서도\n받으신 고난으로 순종을 배우셨습니다.\n그리하여 온전하게 되셨으니, 당신께 순종하는 모든 이에게 영원한 구원의 근원이 되실 것이옵니다.","compact":"고난으로 순종을 배우시고 온전하게 되셨으니,\n당신께 순종하는 모든 이에게 영원한 구원의 근원이 되실 것이옵니다.","oneline":"주님은 영원한 구원의 근원이 되십니다.","comfort":"이미 구원을 이루신 분이\n당신을 붙들고 계세요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"이사야 55:7","type":"선언형","tags":["용서","회개","신뢰","평안"],"full":"악인은 자기 길을, 불의한 자는 자기 생각을 버리고\n여호와께로 돌아오십시오. 그리하면 그분께서 긍휼히 여기실 것이며,\n우리 하나님께로 돌아오면 그분께서 너그럽게 용서하실 것이옵니다.","compact":"여호와께로 돌아오십시오. 그리하면 그분께서 긍휼히 여기실 것이며,\n너그럽게 용서하실 것이옵니다.","oneline":"하나님께 돌아오면 너그럽게 용서하실 것이옵니다.","comfort":"이미 당신을 향해\n팔을 벌리고 계신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"시편 56:3","type":"고백형","tags":["두려움","불안","신뢰","평안"],"full":"제가 두려워하는 그 날에,\n오직 주님만을 의지하겠나이다.","compact":"두려운 날에,\n오직 주님만을 의지하겠나이다.","oneline":"두려운 날에 주님을 의지하겠나이다.","comfort":"이미 당신의 손을\n잡고 계신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"디모데후서 1:7","type":"선언형","tags":["두려움","불안","평안","신뢰"],"full":"하나님께서 우리에게 주신 것은\n두려워하는 마음이 아니옵고,\n오직 능력과 사랑과 절제하는 마음이니이다.","compact":"하나님이 주신 것은 두려워하는 마음이 아니요,\n능력과 사랑과 절제하는 마음이니이다.","oneline":"두려워하는 마음이 아니요, 능력과 사랑과 절제하는 마음이니이다.","comfort":"이미 당신 안에 용기와\n평안을 심어두신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"로마서 8:31","type":"선언형","tags":["보호","신뢰","두려움","평안"],"full":"이 일에 대하여 우리가 무슨 말을 하겠습니까?\n만일 하나님께서 우리 편이시라면,\n누가 감히 우리를 대적할 수 있겠습니까?","compact":"하나님께서 우리 편이시라면,\n누가 우리를 대적할 수 있겠습니까?","oneline":"하나님이 우리 편이시면, 아무도 우리를 대적할 수 없습니다.","comfort":"가장 강력한 보호자께서\n당신 편에 서 계시니 안심하세요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"고린도전서 4:20","type":"선언형","tags":["소망","신뢰","결단"],"full":"하나님의 나라는 헛된 말에 있지 아니하며,\n오직 그 능력이 나타나는 것에 있음이라.","compact":"하나님의 나라는 말에 있지 아니하고\n오직 능력에 있음이라.","oneline":"하나님의 나라는 오직 능력에 있음이라.","comfort":"하나님은 말로만 일하시는\n분이 아니십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"시편 46:10","type":"선언형","tags":["신뢰","평안","두려움","인도하심"],"full":"하나님께서 말씀하시기를 “너희는 고요히 잠잠하며\n내가 곧 하나님 됨을 알지어다. 내가 뭇 나라 가운데서 높임을 받으리라.\n온 세상에서 높임을 받으리라.” 하시도다.","compact":"고요히 잠잠하며 내가 하나님 됨을 알지어다.\n내가 뭇 나라 가운데서 높임을 받으리라.","oneline":"고요히 잠잠하며 내가 하나님 됨을 알지어다.","comfort":"모든 것을 주관하시는 분이\n당신의 하나님이시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한계시록 22:16","type":"선언형","tags":["소망","인도하심","신뢰","평안"],"full":"나 예수는 교회들을 위하여\n나의 사자를 보내어 이 모든 것들을 너희에게 증언하게 하였노라.\n나는 다윗의 뿌리요 그의 자손이니, 곧 빛나는 새벽 별이라 하시더라.","compact":"나는 다윗의 뿌리요 자손이니\n곧 광명한 새벽 별이라 하시더라.","oneline":"나는 빛나는 새벽 별이라.","comfort":"당신의 길을 비추는 가장 밝은 별이\n항상 당신을 인도할 것입니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"사도행전 16:6-7","type":"선언형","tags":["인도하심","신뢰","기다림","보호"],"full":"성령께서 아시아에서 말씀을 전하지 못하게 하셨고,\n사도들이 비두니아로 가고자 애썼으나\n예수의 영이 그들을 허락하지 아니하시었나이다.","compact":"예수의 영이 그들의 길을\n허락하지 아니하시었나이다.","oneline":"예수의 영이 당신의 길을 주관하시느니라.","comfort":"당신의 길을 가장 잘 아시는 분이 이미\n모든 것을 계획하고 계십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"빌립보서 4:11-12","type":"고백형","tags":["감사","평안","재정어려움","신뢰","결단"],"full":"제가 궁핍하여 이 말을 하는 것이 아닙니다.\n어떠한 형편에 처하든지 저는 스스로 만족하는 비결을 배웠나이다.\n저는 비천하게 될 줄도 알고 풍요롭게 될 줄도 알며, 배부름과 배고픔, 풍부함과 궁핍함 등 모든 상황 속에서 살아가는 일체의 비결을 배웠나이다.","compact":"어떠한 형편에든지 저는 자족하기를 배웠나이다.\n모든 상황 속에서 살아가는 비결을 배웠나이다.","oneline":"저는 모든 상황 속에서 만족하는 비결을 배웠나이다.","comfort":"이미 모든 상황을 뛰어넘는 지혜가\n당신 안에 있으니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"시편 62:5","type":"고백형","tags":["소망","신뢰","기다림","평안","두려움"],"full":"나의 영혼아, 고요히 잠잠하며\n오직 하나님만을 바라보아라.\n진실로 나의 모든 소망이 그분으로부터 나오는도다.","compact":"나의 영혼아, 잠잠히 하나님만 바라라.\n나의 소망이 그분으로부터 나오는도다.","oneline":"나의 모든 소망은 오직 하나님으로부터 나오는도다.","comfort":"당신의 가장 깊은 소망까지도\n이미 알고 계신 분이 있습니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"출애굽기 3:10-11","type":"선언형","tags":["인도하심","직장사업","결단","보호"],"full":"이제 내가 당신을 바로에게 보내어,\n당신이 나의 백성 이스라엘 자손을\n이집트에서 인도하여 내게 하리라.","compact":"내가 당신을 보내어 내 백성을\n이집트에서 인도하여 내게 하리라.","oneline":"내가 당신을 보내어 내 백성을 인도하게 하리라.","comfort":"당신의 길을 먼저\n준비하신 분입니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"마가복음 1:17-18","type":"선언형","tags":["소망","인도하심","직장사업","결단"],"full":"예수께서 그들에게 말씀하시기를\n'나를 따라오십시오.\n내가 당신들을 사람을 낚는 어부가 되게 할 것입니다' 하시니,","compact":"나를 따라오십시오.\n내가 당신들을 사람 낚는 어부가 되게 할 것입니다.","oneline":"내가 당신들을 사람 낚는 어부가 되게 할 것입니다.","comfort":"이미 당신의 목적을\n세워두신 분입니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"이사야 58:11","type":"선언형","tags":["인도하심","평안","소망","보호"],"full":"주 여호와께서 당신을 항상 인도하시고,\n메마른 곳에서도 당신의 영혼을 만족하게 하시며, 당신의 뼈를 견고하게 하리라.\n당신은 물 댄 동산 같겠고, 물이 끊어지지 아니하는 샘 같을 것입니다.","compact":"주께서 당신을 항상 인도하여 메마른 곳에서도 영혼을 만족하게 하시며,\n물 댄 동산 같게 하실 것입니다.","oneline":"여호와께서 당신을 항상 인도하여 메마른 곳에서도 만족하게 하시리라.","comfort":"메마른 길 위에서도\n함께 걸으시는 분이 계시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"느헤미야 8:10","type":"위로형","tags":["평안","소망","신뢰","감사"],"full":"근심하지 마십시오.\n주 여호와로 인하여 기뻐하는 것이\n바로 당신의 힘입니다.","compact":"근심하지 마십시오.\n주 여호와로 인하여 기뻐하는 것이 당신의 힘입니다.","oneline":"여호와로 인하여 기뻐하는 것이 당신의 힘이니라.","comfort":"당신이 기댈 힘이\n이미 준비되어 있습니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"베드로전서 5:7","type":"위로형","tags":["불안","평안","보호","신뢰"],"full":"당신의 모든 염려를 주님께 맡기십시오.\n이는 그분께서 당신을 돌보시기 때문입니다.","compact":"당신의 모든 염려를 주님께 맡기십시오.\n그분께서 당신을 돌보십니다.","oneline":"그분께서 당신을 돌보십니다.","comfort":"이미 당신의 염려를 아시는 분이\n그 자리에 계시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"창세기 17:5","type":"선언형","tags":["소망","축복","가정","인도하심"],"full":"이제부터는 당신의 이름을 아브람이라 하지 아니하고\n아브라함이라 하리니,\n이는 내가 당신을 여러 민족의 아버지가 되게 할 것임이라.","compact":"이제 당신의 이름은 아브라함이라 불릴 것이니,\n내가 당신을 여러 민족의 아버지가 되게 할 것입니다.","oneline":"내가 당신을 여러 민족의 아버지가 되게 할 것입니다.","comfort":"당신의 정체성을 먼저\n선언하신 분입니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"이사야 9:7","type":"선언형","tags":["소망","평안","보호","신뢰"],"full":"그분의 통치와 평화가 영원히 더할 것이며,\n다윗의 왕좌와 그분의 나라를 굳건히 세우시고, 이제부터 영원히 정의와 공의로 보존하실 것이라.\n만군의 여호와의 열심이 이 모든 것을 이루실 것입니다.","compact":"그분의 통치와 평화가 영원히 더할 것이며, 그 나라를 영원히 정의와 공의로 보존하실 것입니다.\n주님의 열심이 이를 이루시리라.","oneline":"만군의 여호와의 열심이 이 모든 것을 이루시리라.","comfort":"이미 당신의 영원한 평화를\n약속하신 분입니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"누가복음 22:31-32","type":"선언형","tags":["두려움","불안","신뢰","보호"],"full":"시몬아, 사탄이 너희를 밀 까부르듯 하려고 요구하였으나,\n그러나 내가 너를 위하여 네 믿음이 떨어지지 않기를 기도하였노라.","compact":"내가 너를 위하여\n네 믿음이 떨어지지 않기를 기도하였노라.","oneline":"네 믿음이 떨어지지 않기를 내가 기도하였노라.","comfort":"그분의 간절한 기도가\n늘 당신과 함께하니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"열왕기상 19:5-7","type":"위로형","tags":["인도하심","소망","보호","치유"],"full":"지쳐 쓰러져 잠들었을 때에도, 여호와께서 당신을 어루만지시며\n말씀하시기를, '일어나 먹으라. 네가 갈 길이 너무 멀기 때문이라' 하시며\n필요한 것을 예비해 주십니다.","compact":"지친 당신을 어루만지시며 '일어나 먹으라' 하시는 분이 계십니다.\n갈 길이 너무 멀어도 예비해 주십니다.","oneline":"지친 당신의 갈 길을 위해 이미 예비해 두셨나이다.","comfort":"당신의 걸음을 멈추지 않도록\n이미 채비해 두신 분이 계세요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한복음 10:11","type":"선언형","tags":["보호","신뢰","인도하심","평안"],"full":"나는 선한 목자이니,\n선한 목자는 양들을 위하여 목숨을 주느니라.\n당신의 모든 것을 책임지시겠다고 선언하신 분이십니다.","compact":"나는 선한 목자라.\n선한 목자는 양들을 위해 목숨을 주느니라.","oneline":"나는 당신의 선한 목자이도다.","comfort":"당신의 모든 필요를 아시고\n먼저 움직이시는 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"마가복음 6:34","type":"위로형","tags":["인도하심","슬픔","평안","보호"],"full":"예수께서 당신을 보시고 목자 없는 양 같음을 인하여\n불쌍히 여기셨나이다.\n그분은 당신의 길을 친히 가르쳐 주실 것이옵니다.","compact":"당신을 목자 없는 양 같이 여기사\n불쌍히 여기시나니, 그분께서 친히 가르치시리이다.","oneline":"당신을 불쌍히 여기시는 분이 계시나이다.","comfort":"당신의 모든 방황을 아시고\n품으시는 분이 있으니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"에스겔 34:23","type":"선언형","tags":["인도하심","보호","소망","신뢰"],"full":"주 여호와께서 말씀하시기를,\n내가 한 목자를 당신 위에 세워 먹이게 하리니,\n그가 당신을 먹이고 당신의 목자가 될 것이라 선언하시나이다.","compact":"내가 한 목자를 세워\n당신을 먹이고 목자가 되게 하리라.","oneline":"내가 당신의 목자를 세워 먹이게 하리라.","comfort":"이미 당신을 위한 목자를\n예비해 두신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한계시록 7:17","type":"선언형","tags":["슬픔","소망","치유","평안","인도하심"],"full":"보좌 가운데 계신 어린 양이 당신의 목자가 되사\n생명수 샘으로 인도하시고,\n하나님께서 당신의 눈에서 모든 눈물을 씻어 주실 것이라.","compact":"어린 양이 당신의 목자가 되어 생명수 샘으로 인도하시고,\n모든 눈물을 씻어 주실 것이라.","oneline":"하나님께서 당신의 모든 눈물을 씻어 주시리라.","comfort":"당신의 눈물을 보시고\n가장 좋은 것으로 닦아주실 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"마가복음 5:36","type":"위로형","tags":["두려움","신뢰","평안","보호"],"full":"예수께서 당신에게 이르시기를,\n'두려워하지 말고, 오직 믿기만 하라' 하시도다.\n그분의 말씀이 당신을 붙드시리라.","compact":"예수께서 이르시되\n'두려워 말고 오직 믿기만 하라' 하시도다.","oneline":"두려워 말고, 오직 믿기만 하라.","comfort":"당신의 두려움을 가장 잘 아시는 분이\n먼저 그 자리에 계시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"시편 145:19","type":"선언형","tags":["소망","신뢰","보호","축복"],"full":"하나님께서는 당신을 경외하는 자들의 소원을 이루시고,\n당신의 부르짖음을 들으사 구원하시리로다.","compact":"당신을 경외하는 자들의 소원을 이루시고,\n그 부르짖음을 들으사 구원하시리로다.","oneline":"하나님께서 당신의 소원을 이루시고 구원하시리로다.","comfort":"당신의 가장 깊은 바람까지도\n들어주실 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"마가복음 5:28","type":"고백형","tags":["신뢰","치유","소망","결단"],"full":"여인이 마음속으로\n'내가 주님의 옷에만 손을 대어도\n반드시 구원을 받으리라' 생각하였나이다.","compact":"주의 옷에만 손을 대어도\n구원을 받으리라 생각함일러라.","oneline":"주의 옷에만 손을 대어도 구원을 받으리라.","comfort":"이미 믿음 하나로\n모든 것을 바꾸신 분이 계시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한복음 15:5","type":"선언형","tags":["인도하심","소망","직장사업","관계"],"full":"나는 포도나무요 너희는 가지라.\n사람이 내 안에 거하고 내가 그 안에 거하면,\n그는 많은 열매를 맺을 것이요, 나를 떠나서는 너희가 아무것도 할 수 없음이니라.","compact":"나는 포도나무요 너희는 가지라.\n내 안에 거하면 열매를 맺나니, 나를 떠나서는 아무것도 할 수 없음이라.","oneline":"내 안에 거하면 사람이 열매를 많이 맺으리라.","comfort":"가장 풍성한 열매를 맺도록\n이미 당신을 붙들고 계신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"히브리서 10:36","type":"위로형","tags":["기다림","소망","신뢰","평안"],"full":"여러분에게 인내가 필요한 것은,\n여러분이 하나님의 뜻을 행한 후에\n하나님께서 약속하신 것을 받기 위함입니다.","compact":"인내가 필요함은 하나님의 뜻을 행한 후\n약속하신 것을 받기 위함이라.","oneline":"하나님께서 약속하신 것을 받게 될 것입니다.","comfort":"이미 그 약속을 이루시겠다고\n먼저 말씀하신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"갈라디아서 3:13","type":"선언형","tags":["치유","보호","평안","감사"],"full":"그리스도께서 우리를 위하여 저주를 받으시고,\n율법의 저주에서 우리를 속량하셨습니다. 나무에 달리신 분이 저주 아래 있는 자라는 기록이 있었으나,\n주님께서 친히 그 저주를 대신 지셨습니다.","compact":"그리스도께서 우리를 위해 저주를 받으사,\n율법의 저주에서 우리를 속량하셨습니다.","oneline":"그리스도께서 우리를 저주에서 속량하셨습니다.","comfort":"이미 모든 저주를\n끊어내신 분이 계시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"에스겔 1:3","type":"선언형","tags":["보호","인도하심","신뢰","소망"],"full":"여호와의 말씀이 에스겔에게 특별히 임하시고,\n여호와의 권능이 그 위에 있으셨습니다.\n그 권능이 바로 당신 위에 또한 임하시리라.","compact":"여호와의 말씀이 임하시고,\n여호와의 권능이 당신 위에 있으리라.","oneline":"여호와의 권능이 당신 위에 있으리라.","comfort":"이미 당신의 삶 가운데 가장 강력한 힘으로\n역사하고 계시는 분이 계시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"이사야 60:22","type":"선언형","tags":["소망","인도하심","축복","신뢰"],"full":"그 작은 자가 천을 이루겠고,\n그 약한 자가 강대한 나라를 이룰 것이라.\n때가 되면 나 여호와가 속히 이 모든 것을 이루리라.","compact":"그 작은 자가 천을 이루겠고,\n약한 자가 강국을 이룰 것이라. 내가 속히 이루리라.","oneline":"나 여호와가 속히 이루리라.","comfort":"이미 당신의 연약함 속에서\n일하시겠다고 말씀하신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"잠언 16:9","type":"고백형","tags":["인도하심","신뢰","평안","직장사업"],"full":"사람이 마음으로 자기의 길을 계획할지라도,\n그의 걸음을 인도하시는 이는 오직\n여호와 하나님이심을 믿습니다.","compact":"사람이 계획할지라도,\n그의 걸음을 인도하시는 이는 여호와시니라.","oneline":"여호와께서 당신의 걸음을 인도하실 것입니다.","comfort":"이미 당신의 모든 걸음을 가장 완벽한 길로\n이끄시겠다고 약속하신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"창세기 1:2-3","type":"선언형","tags":["소망","평안","인도하심","보호"],"full":"땅이 혼돈하고 공허하며 깊은 어둠이 있었을 때에도,\n하나님의 영은 수면 위에 운행하고 계셨습니다.\n하나님이 '빛이 있으라!' 말씀하시니, 곧 빛이 생겨났습니다.","compact":"혼돈하고 흑암이 깊을 때, 하나님의 영이 운행하시니\n'빛이 있으라' 말씀에 빛이 있었습니다.","oneline":"하나님이 '빛이 있으라' 말씀하시니, 빛이 있었습니다.","comfort":"가장 혼란스러운 상황 속에서도\n질서를 만드시는 분이 계시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"빌립보서 3:9","type":"고백형","tags":["신뢰","회개","평안","감사"],"full":"제가 가진 의는 율법에서 난 것이 아니요,\n오직 그리스도를 믿음으로 말미암아 얻은 것이니,\n곧 믿음으로 하나님께로부터 난 의임을 고백합니다.","compact":"제가 가진 의는 오직 그리스도를 믿음으로 말미암아\n하나님께로부터 난 의입니다.","oneline":"제가 가진 의는 오직 그리스도를 믿음으로 말미암은 것입니다.","comfort":"그 의로움을 이미 받으셨으니,\n염려하실 필요가 없습니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"마가복음 7:34-35","type":"선언형","tags":["치유","건강","소망","보호"],"full":"하늘을 우러러 탄식하시며\n'에바다', 곧 '열려라' 하시니,\n그의 귀가 열리고 혀가 풀려 말이 분명하게 되었도다.","compact":"'에바다', 곧 '열려라' 하시니,\n닫혔던 귀가 열리고 묶였던 혀가 풀렸습니다.","oneline":"그의 귀가 열리고 혀가 풀려 말이 분명하게 되었도다.","comfort":"막혔던 것들을 열어주시는 분이\n언제나 함께하고 계시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"시편 127:1","type":"선언형","tags":["인도하심","신뢰","직장사업","가정"],"full":"여호와께서 집을 세우지 아니하시면, 그 집을 세우는 자의 수고는 헛되리라.\n여호와께서 성을 지키지 아니하시면, 파수꾼의 깨어 있음이 헛되도다.","compact":"주님께서 세우지 않으시면 우리의 수고는 헛되며,\n주님께서 지키지 않으시면 우리의 깨어 있음도 헛되도다.","oneline":"여호와께서 세우셔야 우리의 수고가 헛되지 않도다.","comfort":"모든 수고와 노력 뒤에는 당신을 돌보시는\n주님의 손길이 있음을 잊지 마세요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한복음 11:40","type":"선언형","tags":["신뢰","소망","평안","결단"],"full":"예수님께서 말씀하시기를\n'내 말이, 네가 믿으면\n하나님의 영광을 보리라' 하지 아니하였느냐?","compact":"'네가 믿으면 하나님의\n영광을 보리라'고 말씀하셨습니다.","oneline":"네가 믿으면 하나님의 영광을 보리라.","comfort":"보여주시고자 하는 영광이\n이미 준비되어 기다리고 있습니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"창세기 17:19","type":"선언형","tags":["소망","신뢰","축복","가정","기다림"],"full":"하나님께서 말씀하시기를, '아니라,\n네 아내 사라가 네게 아들을 낳으리니\n너는 그 이름을 이삭이라 하라.\n내가 그와 내 언약을 세우리니,\n그의 후손에게 영원한 언약이 되리라.'","compact":"네 아내 사라가 네게 아들을 낳으리니,\n그와 네 후손에게 영원한 언약을 세우리라.","oneline":"네 아내 사라가 네게 아들을 낳으리라.","comfort":"불가능해 보이는 약속도\n반드시 이루시는 분이시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"스가랴 4:6-7","type":"선언형","tags":["인도하심","신뢰","소망","직장사업","보호"],"full":"만군의 여호와께서 말씀하시되\n'이는 힘으로 되지 아니하며 능력으로 되지 아니하고\n오직 나의 영으로 되느니라.\n큰 산아, 네가 무엇이냐?\n네가 스룹바벨 앞에서 평지가 되리라.'","compact":"힘과 능력이 아닌 오직 나의 영으로 되느니라.\n큰 산이라도 평지가 되리라.","oneline":"오직 나의 영으로 되느니라. 큰 산이 평지가 되리라.","comfort":"당신 앞에 놓인 큰 산도\n이미 평지가 되리라 선언하신 분이 계십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"마가복음 4:8","type":"위로형","tags":["소망","축복","직장사업","감사"],"full":"좋은 땅에 떨어진 씨앗은 자라 무성하여\n삼십 배, 육십 배, 혹은 백 배의\n결실을 맺었느니라.","compact":"좋은 땅에 떨어진 씨앗처럼,\n삼십 배, 육십 배, 백 배의 결실을 맺으리라.","oneline":"좋은 땅에 떨어져 삼십 배, 육십 배, 백 배의 결실을 맺으리라.","comfort":"당신의 작은 시작이 놀라운 결실로\n이어지게 하시는 분이 함께하십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"마가복음 3:33-35","type":"선언형","tags":["관계","가정","순종","평안"],"full":"예수님께서 대답하시기를\n'누가 내 어머니이며 동생들이냐?' 하시고,\n둘러앉은 자들을 보시며 말씀하시기를\n'내 어머니와 내 동생들을 보라.\n누구든지 하나님의 뜻대로 행하는 자가\n곧 내 형제요 자매요 어머니이니라.'","compact":"누구든지 하나님의 뜻대로 행하는 자가\n곧 나의 형제요 자매요 어머니이니라.","oneline":"하나님의 뜻대로 행하는 자가 곧 내 가족이니라.","comfort":"혈연을 넘어, 주님의 뜻 안에 있는\n당신을 가장 소중한 가족으로 여기십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한일서 4:19","type":"고백형","tags":["신뢰","소망","감사","관계"],"full":"우리가 사랑하는 것은\n그분께서 먼저 우리를\n사랑하셨기 때문입니다.","compact":"우리가 사랑하는 것은\n그분께서 먼저 우리를 사랑하셨기 때문입니다.","oneline":"그분께서 먼저 우리를 사랑하셨습니다.","comfort":"이미 먼저 사랑해주신 분이 계십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"에베소서 5:8-9","type":"선언형","tags":["소망","인도하심","평안","보호"],"full":"이전에는 어둠이었으나,\n이제는 주 안에서 빛이 되었으니\n빛의 자녀답게 살아갈 것입니다.\n빛의 열매는 모든 선함과\n의로움과 진실함에 있습니다.","compact":"이전에는 어둠이었으나 이제 주 안에서 빛이 되었으니,\n빛의 자녀답게 살아갈 것입니다.","oneline":"이제 주 안에서 빛이 되셨습니다.","comfort":"어둠 속에 있다고 느낄 때도,\n이미 빛이신 분이 함께하십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"마태복음 5:14-16","type":"선언형","tags":["소망","인도하심","직장사업","축복"],"full":"여러분은 세상의 빛입니다.\n산 위에 세워진 마을이 숨겨질 수 없듯이,\n여러분의 빛을 숨기지 않을 것입니다.\n여러분의 착한 행실을 통해\n하나님께 영광을 돌리게 될 것입니다.","compact":"여러분은 세상의 빛입니다. 그 빛을 숨기지 마십시오.\n여러분의 행실을 통해 하나님께 영광을 돌리게 될 것입니다.","oneline":"여러분은 세상의 빛이십니다.","comfort":"이미 빛으로 부름 받으신 분이니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"에베소서 2:10","type":"선언형","tags":["신뢰","인도하심","소망","보호"],"full":"우리는 그분께서 만드신 걸작품입니다.\n그리스도 예수 안에서 선한 일을 위해 지으심을 받았으니,\n하나님께서 미리 예비하신 그 길을 걸어가게 될 것입니다.","compact":"우리는 그분께서 만드신 걸작품입니다. 선한 일을 위해\n지으심을 받았으니, 그 길을 걸어가게 될 것입니다.","oneline":"우리는 그분께서 만드신 걸작품입니다.","comfort":"만드신 분이 가장 잘 아시며,\n가장 좋은 길로 인도하실 것입니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"시편 51:6","type":"선언형","tags":["신뢰","인도하심","회개","소망"],"full":"주님께서는 중심의 진실함을 원하시니,\n당신의 은밀한 지혜를 가르쳐 주실 것입니다.","compact":"주님은 중심의 진실함을 원하시니,\n은밀한 지혜를 가르쳐 주실 것입니다.","oneline":"주님께서 은밀한 지혜를 가르쳐 주실 것입니다.","comfort":"당신이 진실한 마음을 원하실 때,\n이미 지혜를 가르치시겠다고 약속하신 분입니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"창세기 12:3","type":"선언형","tags":["축복","보호","가정","소망"],"full":"당신을 축복하는 자에게는 내가 복을 내리고,\n당신을 저주하는 자에게는 내가 저주할 것입니다.\n땅의 모든 족속이 당신으로 인해 복을 얻게 될 것입니다.","compact":"당신을 축복하는 자에게는 복을 내리고,\n당신으로 인해 땅의 모든 족속이 복을 얻게 될 것입니다.","oneline":"당신을 축복하는 자에게 내가 복을 내릴 것입니다.","comfort":"당신을 위한 축복을\n이미 선포하신 분입니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"사도행전 20:32","type":"선언형","tags":["신뢰","소망","보호","축복"],"full":"이제 제가 여러분을 주님과\n그 은혜의 말씀에 맡겨드립니다.\n그 말씀이 여러분을 능히 든든히 세우고,\n거룩하게 하심을 입은 모든 자 가운데\n기업이 있게 하실 것입니다.","compact":"그 은혜의 말씀이 여러분을 능히 든든히 세우고,\n거룩한 기업이 있게 하실 것입니다.","oneline":"그 말씀이 여러분을 능히 든든히 세우실 것입니다.","comfort":"이미 당신을 든든히\n세우시겠다고 말씀하신 분입니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"시편 1:2","type":"고백형","tags":["신뢰","소망","평안","감사"],"full":"오직 주님의 말씀을 즐거워하며,\n그분의 율법을 밤낮으로 깊이 묵상합니다.","compact":"오직 주님의 말씀을 즐거워하며,\n그 말씀을 밤낮으로 묵상합니다.","oneline":"주님의 말씀을 즐거워하며 묵상하는도다.","comfort":"말씀 속에서 이미 참된\n즐거움을 찾게 될 분입니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"시편 50:15","type":"선언형","tags":["두려움","신뢰","보호","소망"],"full":"환난의 날에 저를 부르십시오.\n제가 당신을 건져 올릴 것이니,\n당신이 저를 영화롭게 하리로다.","compact":"환난의 날에 저를 부르십시오.\n제가 당신을 건져 올릴 것입니다.","oneline":"제가 당신을 건져 올리리이다.","comfort":"그 자리에 먼저 서 계신\n분이 있으니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"빌립보서 1:21","type":"고백형","tags":["신뢰","소망","결단","평안"],"full":"제가 살아가는 것은\n그리스도이시며,\n죽는 것 또한 유익함이라.","compact":"살아가는 것은 그리스도이시니\n죽는 것 또한 유익함이라.","oneline":"내게 사는 것은 그리스도이시라.","comfort":"그 고백을 기뻐 받으시는\n분이 계시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"에베소서 3:16","type":"선언형","tags":["보호","치유","평안","소망"],"full":"하나님의 영광의 풍성함을 따라,\n그분의 성령으로 말미암아 당신의\n속사람을 능력으로 강건하게 하시옵소서.","compact":"그분의 성령으로 당신의 속사람을\n능력으로 강건하게 하시옵소서.","oneline":"당신의 속사람을 능력으로 강건하게 하실 것입니다.","comfort":"당신의 깊은 곳까지\n붙들어주시는 분이 계시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"에베소서 3:18-19","type":"위로형","tags":["관계","평안","소망","축복"],"full":"능히 모든 성도와 함께\n지식을 뛰어넘는 그리스도의 사랑을 깨닫고,\n그 사랑의 너비와 길이와 높이와 깊이가 어떠한지 알아,\n하나님의 모든 충만함으로 당신에게\n충만하게 하시기를 구합니다.","compact":"지식을 뛰어넘는 그리스도의 사랑을\n깨달아 하나님의 충만함으로\n당신에게 충만하게 하시기를 구합니다.","oneline":"하나님의 모든 충만함으로 당신에게 충만하게 하실 것입니다.","comfort":"이미 넘치도록 채우시겠다고\n먼저 말씀하신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"고린도후서 5:14","type":"선언형","tags":["관계","신뢰","소망"],"full":"그리스도의 사랑이\n저희를 강권하시는도다.","compact":"그리스도의 사랑이\n저희를 이끄시는도다.","oneline":"그리스도의 사랑이 저희를 강권하시는도다.","comfort":"그 사랑으로 당신을\n강하게 붙드시는 분이 계시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"이사야 43:18-19","type":"선언형","tags":["소망","인도하심","보호","축복"],"full":"이전 일을 기억하지 말고\n옛날 일을 생각하지 마십시오.\n보십시오, 내가 새 일을 행하리니\n이제 나타낼 것입니다.\n반드시 내가 광야에 길을,\n사막에 강을 내리리라.","compact":"내가 새 일을 행하리니\n이제 나타낼 것입니다.\n반드시 광야에 길을,\n사막에 강을 내리리라.","oneline":"반드시 내가 광야에 길을, 사막에 강을 내리리라.","comfort":"새 길을 만드시는 분이시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"이사야 43:16-17","type":"선언형","tags":["보호","인도하심","두려움","신뢰"],"full":"나 여호와가 이같이 말하노라.\n바다 가운데에 길을, 큰 물 가운데에\n지름길을 내고 대적들을 소멸하기를\n꺼져가는 등불 같게 하였노라.","compact":"바다 가운데 길을 내고\n대적들을 꺼져가는 등불 같게\n하였노라.","oneline":"바다 가운데에 길을 내는 이가 나 여호와로다.","comfort":"막힌 곳에 길을 내시며\n당신을 보호하시는 분이십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"예레미야 33:2-3","type":"선언형","tags":["인도하심","신뢰","소망","평안"],"full":"일을 행하시는 여호와,\n그것을 만들며 성취하시는 여호와께서\n이와 같이 이르시도다.\n너는 내게 부르짖으라.\n내가 너에게 응답하고,\n네가 알지 못하는 크고 은밀한 일을 네게 보이리라.","compact":"너는 내게 부르짖으라.\n내가 네게 응답하겠고,\n네가 알지 못하는 크고 은밀한 일을\n네게 보이리라.","oneline":"내가 네게 응답하고, 크고 은밀한 일을 네게 보이리라.","comfort":"이미 응답하시겠다고\n먼저 말씀하신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"고린도전서 15:10","type":"고백형","tags":["감사","신뢰","인도하심","축복"],"full":"그러나 제가\n지금의 제가 된 것은\n오직 하나님의 은혜로\n된 것입니다.\n제게 주신 그분의 은혜가\n결코 헛되지 아니하여,\n제가 모든 사도보다\n더 많이 수고하였으나,\n이는 제가 한 것이 아니요\n오직 저와 함께하신\n하나님의 은혜로\n된 것이로다.","compact":"제가 지금의 제가 된 것은\n오직 하나님의 은혜로\n된 것입니다.\n제가 한 것이 아니요\n오직 저와 함께하신\n하나님의 은혜로\n된 것이로다.","oneline":"오직 하나님의 은혜로 된 것이로다.","comfort":"그 은혜는 이미 당신의 삶에도 함께 하고 있으니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"마태복음 15:28","type":"선언형","tags":["소망","치유","신뢰","보호"],"full":"그때 예수님께서\n대답하여 이르시되,\n'여자여, 네 믿음이\n참으로 크도다.\n네가 원하는 대로\n될 것이라' 하시니,\n바로 그 시각부터\n그녀의 딸이 나았습니다.","compact":"네 믿음이 크도다.\n네가 원하는 대로\n될 것이라 하시니.","oneline":"네가 원하는 대로 될 것이라.","comfort":"당신의 믿음이 닿는 곳에 이미 이루시겠다고 먼저 말씀하신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한복음 1:4-5","type":"위로형","tags":["소망","두려움","보호","평안"],"full":"그분 안에 생명이\n있었으니,\n이 생명은 사람들의\n빛이었습니다.\n그 빛이 어둠 속에\n비치었으나,\n어둠은 그 빛을\n이기지 못하였습니다.","compact":"생명은 사람들의 빛이라.\n빛이 어둠에 비치되\n어둠이 이기지 못하였도다.","oneline":"빛이 어둠에 비치되 어둠이 이기지 못하였도다.","comfort":"어둠이 아무리 깊어도, 그 빛을 이길 수 없음을 이미 알고 계신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"예레미야 29:10","type":"선언형","tags":["기다림","소망","인도하심","보호"],"full":"여호와께서 이와 같이\n말씀하시나니,\n바벨론에서 칠십 년이\n차면 내가 너희를 돌보고\n너희에게 한 나의 선한\n약속을 이루어\n너희를 다시 이곳으로\n돌아오게 하리라.","compact":"칠십 년이 차면\n내가 너희를 돌보고\n나의 선한 약속을\n이루어 주리라.","oneline":"내가 너희를 돌보고 나의 선한 약속을 이루어 주리라.","comfort":"돌보시겠다고, 그리고 약속을 이루시겠다고 이미 먼저 말씀하신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"예레미야 29:5-7","type":"위로형","tags":["가정","직장사업","평안","소망"],"full":"너희는 집을 짓고\n거기에 살며\n텃밭을 만들고\n그 열매를 먹으라.\n아내를 맞이하여\n자녀를 낳고,\n그들이 번성하여\n줄어들지 않게 하라.\n또한 너희를 포로로\n가게 한 그 성읍의\n평안을 구하고\n여호와께 기도하라.\n그 성읍이 평안해야\n너희도 평안할 것임이라.","compact":"그 성읍의 평안을\n구하고\n여호와께 기도하라.\n그 성읍이 평안해야\n너희도 평안할 것임이라.","oneline":"그 성읍이 평안해야 너희도 평안할 것임이라.","comfort":"당신이 있는 그 자리에서도 평안을 누리도록, 이미 길을 열어두신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"이사야 55:8-9","type":"선언형","tags":["인도하심","신뢰","소망","평안"],"full":"이는 나의 생각이\n너희의 생각과 다르며,\n나의 길이 너희의 길과\n다름이니라.\n여호와의 말씀이니라.\n하늘이 땅보다 높음 같이,\n나의 길은 너희의 길보다\n높고\n나의 생각은 너희의\n생각보다 높음이니라.","compact":"내 생각과 내 길은\n너희의 것과 다르니,\n하늘이 땅보다 높음 같이\n높도다.","oneline":"나의 길은 너희의 길보다 높으며 나의 생각은 너희의 생각보다 높음이니라.","comfort":"당신의 이해를 뛰어넘는 더 큰 계획을 이미 가지고 계신 분입니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"골로새서 3:15","type":"위로형","tags":["평안","감사","관계","소망"],"full":"그리스도의 평강이\n당신의 마음을\n주장하게 하십시오.\n당신은 이 평강을 위하여\n한 몸으로 부르심을\n받았으니,\n또한 감사하는 자가\n되십시오.","compact":"평강을 위하여\n한 몸으로 부르심을\n받았으니,\n평강이 당신의 마음을\n주장하게 하십시오.","oneline":"당신은 평강을 위하여 부르심을 받았나니.","comfort":"평강의 자리로 당신을 초대하고 먼저 부르신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"예레미야 29:12","type":"선언형","tags":["소망","신뢰","기다림"],"full":"너희가 내게 부르짖으며\n내게 와서 기도하면,\n내가 너희들의 기도를\n들을 것이라.","compact":"내게 부르짖으며\n기도하면,\n내가 너희의 기도를\n들을 것이라.","oneline":"내가 너희들의 기도를 들을 것이요.","comfort":"이미 당신의 목소리에 귀 기울이시겠다고 먼저 약속하신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"마태복음 5:16","type":"위로형","tags":["소망","결단","인도하심","직장사업"],"full":"이와 같이 당신의 빛이\n사람들 앞에 비치게 하여,\n그들로 하여금 당신의\n선한 행실을 보고\n하늘에 계신 당신의\n아버지께 영광을\n돌리게 하십시오.","compact":"당신의 빛이\n사람들 앞에 비치게\n하십시오.\n그들로 아버지께\n영광을 돌리게 하리라.","oneline":"당신의 빛으로 하늘 아버지께 영광이 되리라.","comfort":"당신 안의 빛이 이미 세상에 비춰지고 있음을 아시는 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"고린도후서 5:17","type":"선언형","tags":["소망","회개","평안","결단"],"full":"그런즉 누구든지\n그리스도 안에 있으면\n새로운 피조물이라.\n이전 것은 지나갔으니,\n보라, 모든 것이\n새롭게 되었도다.","compact":"그리스도 안에 있으면\n새로운 피조물이라.\n보라, 새 것이 되었도다.","oneline":"보라, 새 것이 되었도다.","comfort":"어제의 당신이 어떠했든, 오늘 새로운 시작을 선포하신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"창세기 18:14","type":"선언형","tags":["신뢰","소망","축복","인도하심"],"full":"여호와께 능하지 못한 일이\n있겠습니까?\n정해진 때에 제가 다시\n돌아오리니,\n사라에게 아들이 있을 것입니다.","compact":"여호와께 능하지 못한 일은\n없으니,\n정해진 때에 사라에게\n아들이 있으리라.","oneline":"여호와께 능하지 못한 일은 없으리라.","comfort":"불가능이 없는 분이시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"창세기 21:6","type":"고백형","tags":["감사","소망","축복"],"full":"사라가 말하기를, 하나님이 나를\n웃게 하시니,\n이 소식을 듣는 모든 이가\n나와 함께 웃으리로다.","compact":"하나님께서 나를\n웃게 하시니,\n듣는 자가 다 나와 함께\n웃으리로다.","oneline":"하나님께서 나를 웃게 하시리로다.","comfort":"하나님은 결국 당신을 웃게 하시는 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"로마서 8:39","type":"선언형","tags":["평안","보호","신뢰","두려움"],"full":"어떤 높음이나 깊음이나,\n다른 어떤 피조물이라도 우리를\n우리 주 그리스도 예수 안에 있는\n하나님의 사랑에서\n끊을 수 없으리라.","compact":"어떤 피조물도 우리를\n하나님의 사랑에서\n끊을 수 없으리라.","oneline":"어떤 것도 우리를 하나님의 사랑에서 끊을 수 없으리라.","comfort":"하나님의 사랑은 이미 당신을 굳건히 붙들고 있으니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"창세기 15:1","type":"선언형","tags":["두려움","보호","신뢰","인도하심"],"full":"아브람아, 두려워하지 말라.\n나는 너의 방패요,\n너의 지극히 큰 상급이니라.","compact":"두려워하지 말라.\n나는 너의 방패요,\n너의 큰 상급이니라.","oneline":"나는 너의 방패요 너의 지극히 큰 상급이니라.","comfort":"이미 당신의 방패가 되어주시는 분이 계시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"창세기 15:4-5","type":"선언형","tags":["소망","축복","자녀양육","인도하심"],"full":"여호와의 말씀이 임하여\n이르시되,\n그 사람이 네 상속자가 아니라\n네 몸에서 날 자가\n네 상속자가 되리라.\n하늘의 뭇별을 세어보라,\n네 자손이 이와 같으리라.","compact":"네 몸에서 날 자가\n네 상속자가 되리라.\n네 자손이 뭇별과 같으리라.","oneline":"네 몸에서 날 자가 네 상속자가 되리라.","comfort":"이미 당신의 앞길을 예비하고 계신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"마태복음 16:16","type":"고백형","tags":["신뢰","결단","소망"],"full":"시몬 베드로가 대답하여\n말하기를,\n주는 그리스도시요,\n살아 계신 하나님의\n아들이시니이다.","compact":"주는 그리스도시요,\n살아 계신 하나님의\n아들이시니이다.","oneline":"주는 그리스도시요 살아 계신 하나님의 아들이시니이다.","comfort":"당신의 모든 고백을 가장 기뻐하시는 분이 바로 그분입니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"마태복음 16:18","type":"선언형","tags":["보호","평안","신뢰","소망"],"full":"내가 네게 이르노니,\n너는 베드로라.\n내가 이 반석 위에\n내 교회를 세우리니,\n음부의 권세가 결코\n이기지 못하리라.","compact":"내가 이 반석 위에\n내 교회를 세우리니,\n음부의 권세가\n이기지 못하리라.","oneline":"음부의 권세가 결코 이기지 못하리라.","comfort":"당신이 서 있는 반석은 흔들리지 않을 것이니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"시편 104:15","type":"선언형","tags":["감사","평안","축복","재정어려움"],"full":"하나님께서 사람의 마음을\n기쁘게 하는 포도주와\n사람의 얼굴을 윤택하게 하는\n기름과\n사람의 마음을 힘있게 하는\n양식을 주셨도다.","compact":"사람의 마음을 기쁘게 하는\n포도주와\n힘있게 하는 양식을\n주셨도다.","oneline":"사람의 마음을 힘있게 하는 양식을 주셨도다.","comfort":"필요한 모든 것을 이미 당신에게 주시는 분이세요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한복음 16:24","type":"선언형","tags":["소망","감사","평안"],"full":"지금까지는 내 이름으로\n아무것도 구하지 아니하였으나,\n이제 구하십시오.\n그러면 받게 될 것이니,\n당신의 기쁨이 충만하게\n될 것입니다.","compact":"구하십시오.\n그러면 받으리니,\n당신의 기쁨이 충만하게\n될 것입니다.","oneline":"구하면 받으리니, 당신의 기쁨이 충만하리라.","comfort":"이미 충만한 기쁨을 약속하신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"빌립보서 3:13-14","type":"고백형","tags":["소망","결단","인도하심","신뢰"],"full":"형제자매 여러분, 나는 아직\n내가 잡은 줄로 여기지 않습니다.\n오직 한 일, 곧 뒤에 있는 것은\n잊어버리고\n앞에 있는 것을 잡으려 합니다.\n푯대를 향하여\n그리스도 예수 안에서\n하나님이 위에서 부르신\n부름의 상을 위하여\n달려갈 것입니다.","compact":"뒤에 있는 것은 잊어버리고\n앞에 있는 것을 잡으려 합니다.\n푯대를 향하여\n나아갈 것입니다.","oneline":"하나님이 부르신 부름의 상을 향하여 달려가리라.","comfort":"당신이 나아갈 길의 푯대가 이미 세워져 있습니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"고린도후서 4:8-9","type":"위로형","tags":["불안","두려움","보호","소망"],"full":"우리가 사방으로\n우겨쌈을 당하여도\n짓눌리지 아니하며,\n답답한 일을 당하여도\n낙심하지 아니할 것입니다.\n박해를 받아도 버려지지 아니하며,\n거꾸러뜨림을 당하여도\n결코 망하지 않을 것입니다.","compact":"우겨쌈을 당하여도\n짓눌리지 아니하며,\n박해를 받아도 버려지지\n아니할 것입니다.","oneline":"우리는 결코 버려지거나 망하지 않을 것입니다.","comfort":"당신이 홀로 서 있는 그 자리에 함께 서 계신 분이 있습니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한복음 17:14","type":"위로형","tags":["외로움","불안","평안","소망"],"full":"내가 아버지의 말씀을\n그들에게 주었습니다.\n세상이 그들을 미워하는 것은\n내가 세상에 속하지 아니함 같이,\n그들도 세상에 속하지\n아니하기 때문입니다.","compact":"세상이 당신을 미워해도\n낙심하지 마십시오.\n당신은 세상에 속한 자가\n아니기 때문입니다.","oneline":"당신은 세상에 속한 자가 아닙니다.","comfort":"세상이 줄 수 없는 평안을 이미 받으신 분입니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"여호수아 10:8","type":"선언형","tags":["보호","인도하심","신뢰"],"full":"여호와께서 말씀하시기를\n'그들을 두려워하지 마십시오.\n내가 그들을 당신의 손에\n넘겨주었으니,\n그들 중에서 아무도\n당신을 당할 자 없을 것입니다.'","compact":"그들을 두려워하지 마십시오.\n아무도 당신을 당할 자\n없을 것입니다.","oneline":"아무도 당신을 당할 자 없을 것입니다.","comfort":"이미 승리를 약속하신 분이 그 자리에 계십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"여호수아 1:5","type":"선언형","tags":["보호","인도하심","신뢰","평안"],"full":"당신의 평생에 당신을\n능히 대적할 자가\n없을 것입니다.\n내가 모세와 함께 있었던\n것같이 당신과 함께\n있을 것이기 때문입니다.\n내가 당신을 떠나지\n아니하며 버리지\n아니할 것입니다.","compact":"당신을 대적할 자가\n없을 것입니다.\n내가 당신을 떠나지\n아니하며 버리지\n아니할 것입니다.","oneline":"내가 당신을 떠나지 아니하며 버리지 아니하리라.","comfort":"당신을 먼저 붙들고 계신 분이 있습니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"시편 18:29","type":"고백형","tags":["신뢰","결단","소망"],"full":"내가 주님을 의뢰하고\n적군을 향해 달려 나아갑니다.\n나의 하나님을 의지하고\n어떤 장애물도 뛰어넘을 것입니다.","compact":"주님을 의뢰하고\n적군을 향해 달리며,\n하나님을 의지하여\n담을 뛰어넘습니다.","oneline":"내 하나님을 의지하고 어떤 담도 뛰어넘을 것입니다.","comfort":"당신의 용기를 북돋아 주시는 분이 그곳에 함께 계십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"이사야 54:1","type":"선언형","tags":["소망","가정","축복"],"full":"잉태하지 못하며\n출산하지 못했던 당신은\n이제 기뻐 노래하십시오.\n이는 홀로 된 여인의 자녀가\n남편 있는 자의 자녀보다\n많으리라는 여호와의 말씀이\n있기 때문입니다.","compact":"잉태하지 못했던 당신은\n노래하십시오.\n홀로 된 여인의 자녀가\n더 많아질 것이라고\n여호와께서 말씀하셨습니다.","oneline":"홀로 된 당신의 자녀가 더 많아질 것입니다.","comfort":"당신의 빈자리를 채우시겠다고 약속하신 분이 먼저 기다리고 있습니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"빌립보서 3:7-8","type":"고백형","tags":["소망","결단","신뢰","감사"],"full":"그러나 제게 유익하던\n모든 것들을,\n저는 그리스도를 위하여\n손실로 여겼나이다.\n더욱이 모든 것을\n주 예수 그리스도를 아는\n지식의 탁월함 때문에\n손실로 여김은,\n제가 그분을 위하여\n모든 것을 잃고\n그것들을 배설물로 여겨\n그리스도를 얻기 위함입니다.","compact":"주 예수 그리스도를 아는\n지식의 탁월함 때문에\n모든 것을 손실로 여기며,\n그리스도를 얻기 위함입니다.","oneline":"내 주 그리스도 예수를 아는 지식이 가장 탁월함이라.","comfort":"그 모든 것을 능가하는 가장 고귀한 가치를 이미 찾으셨으니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한계시록 21:4","type":"선언형","tags":["소망","평안","슬픔"],"full":"하나님께서 그들의 눈에서\n모든 눈물을 닦아 주실 것이니,\n다시는 사망도, 슬픔도,\n울부짖음도, 아픔도\n없을 것입니다.\n이전의 모든 것들이\n다 지나갔음이라.","compact":"모든 눈물을 닦아 주시리니,\n다시는 슬픔도, 아픔도\n없을 것입니다.","oneline":"모든 눈물을 닦아 주시리니, 다시는 슬픔도 아픔도 없을 것입니다.","comfort":"그 모든 눈물의 자리 위에 새로운 시작을 약속하신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한복음 2:5","type":"고백형","tags":["순종","신뢰","인도하심","결단"],"full":"주님의 어머니께서\n하인들에게 이르시되,\n\"주님께서 당신들에게\n무슨 말씀을 하시든지,\n그대로 행하라\"\n하셨나이다.","compact":"주님께서 당신에게\n무슨 말씀을 하시든지,\n그대로 행하라.","oneline":"주님께서 무슨 말씀을 하시든지 그대로 행하라.","comfort":"그 말씀이 가장 좋은 길임을 이미 알고 계신 분이 있었으니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한복음 2:23-25","type":"위로형","tags":["신뢰","평안","인도하심"],"full":"유월절에 예수님께서\n예루살렘에 계실 때,\n많은 사람이 주님의\n행하시는 표적을 보고\n그 이름을 믿었으나,\n주님께서는 그들에게\n자신을 의탁하지\n아니하셨으니,\n이는 친히 모든 사람을\n아심이요, 사람에 대하여\n그 누구의 증언도\n받으실 필요가\n없으셨기 때문입니다.\n주님께서는 사람의 속에\n있는 것을 친히 아셨음이니라.","compact":"주님께서는 친히\n모든 사람을 아셨으니,\n사람의 속에 있는 것을\n친히 아셨음이니라.","oneline":"주님께서는 친히 사람의 속에 있는 것을 아셨음이니라.","comfort":"당신의 마음 깊은 곳까지도 이미 다 아시는 분이 옆에 계시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한복음 3:3","type":"선언형","tags":["소망","회개","결단","인도하심"],"full":"예수님께서 대답하여 이르시되,\n\"진실로 진실로\n당신에게 이르노니,\n사람이 거듭나지 아니하면\n하나님의 나라를\n볼 수 없나이다.\"","compact":"사람이 거듭나지 아니하면\n하나님의 나라를\n볼 수 없나이다.","oneline":"사람이 거듭나지 아니하면 하나님의 나라를 볼 수 없나이다.","comfort":"그 시작을 돕고\n이끄시겠다고 약속하신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한복음 3:5","type":"선언형","tags":["소망","회개","결단","인도하심"],"full":"예수님께서 대답하시되,\n\"진실로 진실로\n당신에게 이르노니,\n사람이 물과 성령으로\n나지 아니하면\n하나님의 나라에\n들어갈 수 없나이다.\"","compact":"물과 성령으로\n나지 아니하면\n하나님의 나라에\n들어갈 수 없나이다.","oneline":"물과 성령으로 나지 아니하면 하나님의 나라에 들어갈 수 없나이다.","comfort":"새로운 시작을\n늘 기다리시며\n이끄시는 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"신명기 8:15","type":"위로형","tags":["인도하심","보호","신뢰"],"full":"주님께서는 당신을 인도하여\n크고 두려운 광야,\n곧 불뱀과 전갈이 있고\n물 없는 메마른 땅을\n지나게 하셨으며,\n또한 당신을 위하여\n단단한 반석에서\n물을 내주셨나이다.","compact":"광야를 지나게 하셨고,\n단단한 반석에서\n물을 내주셨나이다.","oneline":"단단한 반석에서 물을 내주셨나이다.","comfort":"그 길을 혼자\n걷게 하시지 않고\n늘 함께하시며\n돌보시는 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한계시록 22:20","type":"선언형","tags":["소망","기다림","신뢰","평안"],"full":"이 모든 것을 증언하신\n주님께서 이르시되,\n\"내가 진실로\n속히 오리라\" 하십니다.\n아멘, 주 예수여\n오시옵소서.","compact":"\"내가 진실로\n속히 오리라\" 하십니다.\n아멘, 주 예수여\n오시옵소서.","oneline":"내가 진실로 속히 오리라.","comfort":"그 약속은 반드시\n이루어질 것이기에\n희망을 놓지 않아도\n괜찮아요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"욥기 42:5","type":"고백형","tags":["신뢰","인도하심","소망","평안"],"full":"제가 주님께 대하여\n그저 귀로 듣기만\n하였사오나,\n이제는 제 눈으로\n주님을 뵈옵나이다.","compact":"주님에 대해\n귀로 듣기만 하던 제가,\n이제는 눈으로\n주님을 뵈옵나이다.","oneline":"이제는 제 눈으로 주님을 뵈옵나이다.","comfort":"깊은 만남을\n허락하시는 분이시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"창세기 1:3-4","type":"선언형","tags":["소망","인도하심","평안","보호"],"full":"하나님께서 이르시되,\n'빛이 있으라!' 하시니,\n곧 빛이 있었고,\n그 빛이 하나님이\n보시기에 참 좋았더라.","compact":"'빛이 있으라!' 하시니\n빛이 있었고,\n하나님 보시기에\n참 좋았더라.","oneline":"'빛이 있으라!' 하시니 곧 빛이 있었도다.","comfort":"가장 어두운 곳에서도\n빛을 창조하시는\n분이 계시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"누가복음 19:8-9","type":"선언형","tags":["소망","축복","평안","감사"],"full":"예수님께서 삭개오에게\n이르시되,\n'오늘 구원이 이 집에\n이르렀으니,\n이 사람도 아브라함의\n참된 자손임이로다!'","compact":"'오늘 구원이 이 집에\n이르렀으니,\n이 사람도 아브라함의\n자손임이로다.'","oneline":"오늘 구원이 이 집에 이르렀도다.","comfort":"누구에게나 구원을\n베푸시는 분이 계시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"창세기 12:1-3","type":"선언형","tags":["축복","인도하심","소망","보호"],"full":"여호와께서 아브람에게\n약속하시기를,\n'내가 너로 큰 민족을\n이루게 하고\n네게 복을 주어\n네 이름을 창대하게 하리니,\n너는 복의 근원이 될지라.\n너를 축복하는 자에게는\n내가 복을 내리고,\n너를 저주하는 자에게는\n내가 저주하리니,\n땅의 모든 족속이\n너로 말미암아\n복을 얻으리라.'","compact":"'내가 너로 큰 민족을\n이루고\n네게 복을 주어\n네 이름을 창대하게 하리니,\n너는 복이 될지라.'","oneline":"내가 너로 큰 민족을 이루고 네 이름을 창대하게 하리라.","comfort":"이미 풍성한 약속으로\n당신을 붙드시겠다고\n말씀하신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"열왕기상 18:41","type":"선언형","tags":["기다림","소망","인도하심","축복"],"full":"엘리야가 아합에게\n이르기를,\n'올라가서 먹고 마시소서,\n큰 비 소리가 있나이다!'","compact":"엘리야가 이르기를,\n'큰 비 소리가 있나이다!'","oneline":"큰 비 소리가 있나이다.","comfort":"기다리던 비를\n내리게 하시는\n분이 계시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한복음 20:28","type":"고백형","tags":["신뢰","감사","소망","결단"],"full":"도마가 주님께 대답하여\n이르기를,\n'나의 주님이시요,\n나의 하나님이시니이다!'","compact":"도마가 대답하여,\n'나의 주님이시요,\n나의 하나님이시니이다!'","oneline":"나의 주님이시요, 나의 하나님이시니이다!","comfort":"주님의 이름을\n부르는 모든 순간에\n함께하시는 분이시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한복음 20:29","type":"선언형","tags":["신뢰","소망","축복","평안"],"full":"예수님께서 도마에게 이르시되,\n'너는 나를 본 고로 믿느냐?\n보지 못하고도 믿는 자들은\n참으로 복되도다!'","compact":"예수님께서 이르시되,\n'보지 못하고도\n믿는 자들은 복되도다.'","oneline":"보지 못하고도\n믿는 자들은 복되도다.","comfort":"보이지 않아도 변함없이 함께 계신 분이시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"마가복음 5:35-36","type":"선언형","tags":["두려움","신뢰","소망","평안"],"full":"예수님께서 회당장에게\n이르시되, '두려워하지 말라.\n오직 믿기만 하라!'","compact":"'두려워하지 말라.\n오직 믿기만 하라.'","oneline":"두려워하지 말고\n오직 믿기만 하라.","comfort":"가장 절망적인 순간에도 '두려워 말라' 말씀하시는 분이 계시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"사도행전 20:24","type":"고백형","tags":["결단","인도하심","소망","신뢰"],"full":"그러나 제가 달려갈 길과\n주 예수님께 받은 사명,\n곧 하나님의 은혜의 복음을\n증언하는 일을\n마치기 위해서는\n나의 생명조차도 조금도\n귀한 것으로\n여기지 아니하노라.","compact":"내가 받은 사명을 마치려\n함에는 나의 생명조차\n귀한 것으로\n여기지 아니하노라.","oneline":"나의 생명조차 조금도\n귀한 것으로\n여기지 아니하노라.","comfort":"맡겨주신 사명을 온전히 이루도록 당신을 이끄시는 분이 계시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"디모데후서 4:6-7","type":"고백형","tags":["소망","결단","신뢰","감사"],"full":"나는 이미 전제처럼 부어지고\n나의 떠날 시간이\n가까이 왔습니다.\n저는 선한 싸움을 싸웠고,\n저의 달려갈 길을 마쳤으며,\n믿음을 지켰습니다.","compact":"저는 선한 싸움을 싸웠고,\n저의 달려갈 길을 마쳤으며,\n믿음을 지켰습니다.","oneline":"저는 저의 달려갈 길을\n마쳤고, 믿음을 지켰습니다.","comfort":"하나님께서는 당신의 모든 여정을 기억하십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"시편 56:3-4","type":"고백형","tags":["두려움","불안","신뢰","평안"],"full":"내가 두려워하는 그 날에도,\n주님을 의지할 것입니다.\n저는 하나님을 신뢰하고\n그 말씀을 찬송할 것이니,\n하나님을 의지하였으므로\n아무것도 두려워하지\n않을 것입니다.\n피조물이 내게 무엇을\n할 수 있겠습니까?","compact":"내가 두려워하는 날에도\n주님을 의지하리니,\n하나님을 신뢰하였으므로\n두려워하지 않을 것입니다.","oneline":"내가 하나님을 의지하였은즉\n두려워하지 아니하리니.","comfort":"주님께서는 당신의 모든 두려움을 이미 아시고 붙드십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"스가랴 4:7","type":"선언형","tags":["인도하심","소망","보호","결단"],"full":"큰 산아, 네가 무엇이냐?\n네가 스룹바벨 앞에서\n평지가 되리라.\n그가 머릿돌을 내놓을 때에,\n사람들이 외치기를 '은총,\n은총이 그에게\n있을지어다!' 하리라.","compact":"큰 산아, 네가 무엇이냐?\n네가 스룹바벨 앞에서\n평지가 되리라.","oneline":"큰 산아, 네가\n평지가 되리라!","comfort":"이미 그 산을 움직이시겠다고 약속하신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"아모스 5:4","type":"선언형","tags":["소망","인도하심","보호","평안"],"full":"여호와께서 이스라엘 족속에게\n이와 같이 말씀하시기를,\n너희는 나를 찾으라.\n그리하면 너희가 살리라.","compact":"나를 찾으라,\n그리하면 너희가 살리라.","oneline":"나를 찾으라,\n그리하면 살리라.","comfort":"생명의 근원이 당신을 기다리십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"출애굽기 13:21","type":"위로형","tags":["인도하심","보호","평안","신뢰"],"full":"여호와께서\n그들 앞에서 가시며,\n낮에는 구름 기둥으로\n그들의 길을 인도하시고,\n밤에는 불 기둥으로\n그들을 비추사 낮이나 밤이나\n계속 나아가게 하시니라.","compact":"낮에는 구름 기둥으로,\n밤에는 불 기둥으로\n그들의 길을 인도하시니.","oneline":"여호와께서 낮이나 밤이나\n그들의 길을 인도하시니.","comfort":"어떤 길을 가더라도, 그분은 늘 당신의 앞에서 인도하고 계십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"시편 23:1-2","type":"선언형","tags":["신뢰","평안","인도하심","보호"],"full":"여호와는 나의 목자이시니,\n내게 부족함이 없으리로다.\n그분이 나를 푸른 풀밭에\n눕게 하시며, 쉴 만한\n잔잔한 물가로\n인도하시는도다.","compact":"여호와는 나의 목자이시니,\n내게 부족함이 없으리로다.\n나를 쉴 만한 물가로\n인도하시는도다.","oneline":"여호와는 나의 목자시니,\n내게 부족함이 없으리로다.","comfort":"당신의 삶을 가장 잘 아시는 분이, 가장 좋은 길로 인도하고 계십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"마가복음 9:24","type":"고백형","tags":["신뢰","회개","불안","결단"],"full":"곧 그 아이의 아버지가\n소리를 질러 말씀드리기를,\n'제가 믿습니다!\n저의 믿음 없음을\n도와주소서!' 하더라.","compact":"제가 믿습니다!\n저의 믿음 없음을\n도와주소서!","oneline":"제가 믿나이다,\n저의 믿음 없음을\n도와주소서.","comfort":"주님께서는 당신의 연약함까지도 이미 다 알고 계십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"마태복음 17:20","type":"선언형","tags":["신뢰","소망","결단","불안"],"full":"예수께서 말씀하시기를,\n'너희 믿음이 작은 까닭이니라.\n진실로 너희에게 이르노니,\n만일 너희에게 겨자씨\n한 알 만한 믿음이 있다면,\n이 산더러 '여기서 저기로\n옮겨지라!' 할 것이요,\n그러면 옮겨질 것이며,\n너희가 못할 것이\n아무것도 없으리로다.","compact":"너희에게 겨자씨\n한 알 만한 믿음이 있다면,\n이 산을 옮길 것이요,\n너희가 못할 것이\n아무것도 없으리로다.","oneline":"너희에게 믿음이 있다면, 못할 것이 아무것도 없으리로다.","comfort":"당신이 보기에 불가능한 일도,\n그분께는 아무것도 아닙니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"시편 23:2","type":"선언형","tags":["평안","인도하심","신뢰","보호"],"full":"그분께서 저를 푸른\n풀밭에 눕게 하시고,\n쉴 만한 물가로 인도하시는도다.","compact":"주님께서 저를 푸른\n풀밭에 눕게 하시고,\n쉴 만한 물가로 인도하시나이다.","oneline":"그분께서 저를 쉴 만한 물가로 인도하시는도다.","comfort":"이미 가장 좋은 곳으로 인도하시겠다고\n말씀하신 분이시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"사도행전 9:4-6","type":"선언형","tags":["인도하심","신뢰","소망"],"full":"네가 행할 것을 네게\n이를 자가 있을 것이니라.","compact":"네가 행할 것을 네게\n이를 자가 있느니라.","oneline":"네가 행할 것을 네게 이를 자가 있느니라.","comfort":"앞으로 나아갈 길을 가르쳐 줄\n분이 이미 계십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"사사기 16:28","type":"고백형","tags":["두려움","슬픔","치유","소망"],"full":"주 여호와여, 부르짖나이다.\n저를 기억하옵소서.\n하나님이여, 구하오니,\n오직 이번만 저를 강하게 하옵소서.","compact":"주님, 저를 기억하소서.\n오직 이번만 저를 강하게 하옵소서.","oneline":"주님, 저를 기억하시고, 강하게 하옵소서.","comfort":"가장 낮은 곳에서도\n당신의 부르짖음을\n들으시는 분이 계십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"디모데전서 1:13-14","type":"고백형","tags":["용서","회개","감사","소망"],"full":"제가 전에는 하나님을\n비방하고 박해하며\n모욕하던 자였으나,\n도리어 긍휼을 입었나니,\n이는 제가 믿지 않을 때\n알지 못하고 행했음이라.\n우리 주님의 은혜가\n그리스도 예수 안에 있는\n믿음과 사랑과 함께\n넘치도록 풍성하였도다.","compact":"제가 전에는 비방하고\n박해하던 자였으나,\n주님의 은혜가 넘치도록 풍성하였나이다.","oneline":"우리 주의 은혜가 넘치도록 풍성하였도다.","comfort":"당신을 향한 그분의 은혜 또한\n결코 마르지 않을 것입니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"빌립보서 2:9","type":"선언형","tags":["신뢰","소망","보호","축복"],"full":"이로 인하여 하나님께서\n그분을 지극히 높이시어,\n모든 이름 위에 뛰어난\n이름을 주셨느니라.","compact":"하나님께서 그분을\n지극히 높이시어,\n모든 이름 위에 뛰어난\n이름을 주셨도다.","oneline":"하나님께서 모든 이름 위에 뛰어난 이름을 주셨느니라.","comfort":"높고 위대하신 분께서\n당신의 기도를 듣고 계십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"고린도후서 2:14-15","type":"고백형","tags":["감사","신뢰","소망","관계"],"full":"항상 우리를 그리스도 안에서\n승리하게 하시고,\n우리를 통하여 각처에서\n그리스도를 아는 향기를\n나타내시는 하나님께 감사하나이다.\n우리는 구원받는 자들에게나\n망하는 자들에게나,\n하나님 앞에서 그리스도의 향기임이라.","compact":"하나님께서는 항상 우리를\n그리스도 안에서 이기게 하시고,\n우리는 하나님 앞에서\n그리스도의 향기임이라.","oneline":"우리는 하나님 앞에서 그리스도의 향기임이라.","comfort":"당신은 그분께 가장 귀한 향기입니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한복음 6:67-68","type":"고백형","tags":["소망","신뢰","인도하심","결단"],"full":"주님, 영원한 생명의 말씀이\n오직 주께만 있사오니,\n우리가 어디로 가오리이까?","compact":"주님, 영원한 생명의 말씀이\n오직 주께만 있사오니,\n우리가 누구에게로 가오리까?","oneline":"영원한 생명의 말씀이 오직 주께만 있사오니.","comfort":"가장 소중한 진리가\n이미 당신 안에 머물고 있습니다.","original_tag":"신앙회의","pastor":"하용조"},{"ref":"요한복음 6:63","type":"선언형","tags":["소망","신뢰","평안","인도하심"],"full":"살리는 것은 영이니\n육은 무익하나이다.\n제가 여러분에게 이른 말은\n곧 영이요 생명임이라.","compact":"살리는 것은 영이니,\n제가 이른 말은 영이요 생명입니다.","oneline":"제가 이른 말은 영이요 생명임이라.","comfort":"당신을 살리는 진리가\n이미 주어져 있습니다.","original_tag":"신앙회의","pastor":"하용조"},{"ref":"Luke 5:20","type":"선언형","tags":["용서","평안","축복"],"full":"친구여, 당신의 죄가 용서받았나이다.","compact":"당신의 죄가 용서받았나이다.","oneline":"당신의 죄가 용서받았나이다.","comfort":"이미 그분께서 이루어주신\n은혜의 자리입니다.","original_tag":"Forgiveness","pastor":"Andy Stanley"},{"ref":"Matthew 28:18","type":"선언형","tags":["신뢰","보호","인도하심"],"full":"예수님께서 말씀하시기를\n'하늘과 땅의 모든 권세가\n나에게 주어졌노라'고 하셨나이다.","compact":"하늘과 땅의 모든 권세가\n나에게 주어졌나이다.","oneline":"모든 권세가 그분께 주어졌나이다.","comfort":"모든 것을 통치하시는 분이\n그 자리에 계시니까요.","original_tag":"신앙의 본질","pastor":"Andy Stanley"},{"ref":"Matthew 28:19-20","type":"선언형","tags":["보호","인도하심","평안","신뢰"],"full":"내가 너희에게 분부한\n모든 것을 가르쳐 지키게 하라.\n볼지어다, 내가 세상 끝날까지\n항상 너희와 함께 있으리라.","compact":"내가 세상 끝날까지\n항상 너희와 함께 있으리라.","oneline":"세상 끝날까지\n주님께서 당신과 함께 계시리라.","comfort":"그분께서는 이미 영원히\n함께하시겠다고 약속하셨어요.","original_tag":"신앙의 본질","pastor":"Andy Stanley"},{"ref":"Revelation 21:5","type":"선언형","tags":["소망","치유","축복"],"full":"보좌에 앉으신 이가\n말씀하시기를 '보라,\n내가 만물을 새롭게 하노라!'\n하셨나이다.","compact":"내가 만물을 새롭게 하노라!","oneline":"주님께서 만물을 새롭게 하시도다!","comfort":"낡은 것은 지나가고\n새것이 올 것이라고\n약속하신 분입니다.","original_tag":"신앙의 본질","pastor":"Andy Stanley"},{"ref":"John 6:35","type":"선언형","tags":["소망","평안","신뢰","보호"],"full":"예수님께서 말씀하시기를\n'내가 곧 생명의 떡이니,\n내게 오는 자는 결코\n주리지 아니할 것이요,\n나를 믿는 자는 영원히\n목마르지 아니하리라'\n하셨나이다.","compact":"내게 오는 자는 결코\n주리지 아니할 것이요,\n나를 믿는 자는 영원히\n목마르지 아니하리라.","oneline":"주님께 오는 자는 영원히\n주리거나 목마르지 아니하리라.","comfort":"모든 결핍을 채워주시겠다고\n스스로 약속하신 분입니다.","original_tag":"신앙의 본질","pastor":"John Piper"},{"ref":"John 11:25-26","type":"선언형","tags":["소망","치유","평안"],"full":"예수님께서 이르시기를\n'나는 부활이요 생명이니,\n나를 믿는 자는 죽어도\n살겠고, 무릇 살아서\n나를 믿는 자는 영원히\n죽지 아니하리라'고\n하셨나이다.","compact":"나는 부활이요 생명이니,\n나를 믿는 자는 영원히\n죽지 아니하리라.","oneline":"주님을 믿는 자는 영원히\n죽지 아니하리라.","comfort":"삶과 죽음을 초월하여\n영원히 함께하시겠다고\n약속하신 분입니다.","original_tag":"신앙의 본질","pastor":"John Piper"},{"ref":"1 Corinthians 15:54-55","type":"선언형","tags":["소망","평안","보호"],"full":"이 썩을 것이 썩지\n아니함을 입고,\n이 죽을 것이 죽지\n아니함을 입을 때에는\n'사망이 이김에 삼킨 바\n되었도다'라고 기록된\n말씀이 이루어지리이다.\n오 사망아, 너의 이기는 것이\n어디 있느냐?\n오 사망아, 너의 쏘는 것이\n어디 있느냐?","compact":"사망이 이김에 삼킨 바\n되었도다.\n오 사망아, 너의 쏘는 것이\n어디 있느냐?","oneline":"사망이 이김에\n삼킨 바 되었도다.","comfort":"가장 큰 승리를 이미\n이루신 분이 당신과\n함께하십니다.","original_tag":"신앙의 본질","pastor":"John Piper"},{"ref":"마태복음 25:40","type":"선언형","tags":["관계","인도하심","축복"],"full":"임금이 대답하여 이르시되,\n내가 진실로\n너희에게 이르노니,\n너희가 여기 내 형제 중\n지극히 작은 자 하나에게\n베푼 것이 곧\n내게 베푼 것이니라.","compact":"너희가 지극히 작은 자\n하나에게 베푼 것이 곧\n나에게 베푼 것이니라.","oneline":"지극히 작은 자에게\n베푼 것이 곧 나에게\n베푼 것이니라.","comfort":"그분은 언제나 당신의\n마음과 손길을 알아주실 겁니다.","original_tag":"신앙의 본질","pastor":"Timothy Keller"},{"ref":"마태복음 11:27","type":"선언형","tags":["신뢰","인도하심","소망"],"full":"내 아버지께서 모든 것을\n내게 주셨으니,\n아버지 외에는\n아들을 아는 자가 없고,\n아들과 또 아들의 소원대로\n계시를 받는 자 외에는\n아버지를 아는 자가 없느니라.","compact":"아버지 외에는\n아들을 아는 자가 없고,\n아들의 소원대로\n계시를 받는 자 외에는\n아버지를 아는 자가 없느니라.","oneline":"아들과 아들의 소원대로\n아버지를 알 수 있느니라.","comfort":"그분은 이미 당신에게\n모든 것을 드러내 보이셨습니다.","original_tag":"신앙의 본질","pastor":"Timothy Keller"},{"ref":"Matthew 21:5","type":"선언형","tags":["소망","평안","인도하심"],"full":"시온의 딸에게 이르라,\n'보라, 너의 왕이\n너에게 오시나니,\n온유하여 나귀 위에,\n곧 멍에 메지 않은 어린 나귀\n새끼 위에 타셨도다.'","compact":"보라, 너의 왕이\n너에게 오시나니,\n온유하여 나귀 위에\n타셨도다.","oneline":"보라, 너의 왕이\n온유하게 너에게 오시도다.","comfort":"그분은 이미 온유한\n모습으로 당신에게\n찾아오셨습니다.","original_tag":"신앙의 본질","pastor":"Dr. Timothy Keller"},{"ref":"Matthew 21:16","type":"선언형","tags":["감사","소망"],"full":"예수께서 그들에게 대답하시되,\n'그러하다, 너희는 성경에\n'어린 아이들과\n젖먹이들의 입에서\n주께서 찬송을 온전하게\n하셨도다' 기록된 것을\n읽어보지 못했느냐?'\n하시니라.","compact":"주께서 어린 아이들과\n젖먹이들의 입에서\n찬송을 온전하게 하셨도다.","oneline":"주께서 어린 아이들의\n입에서 찬송을 온전하게\n하셨도다.","comfort":"당신의 가장 작은 목소리에도\n주님은 온전한 찬송으로\n응답하실 겁니다.","original_tag":"신앙의 본질","pastor":"Dr. Timothy Keller"},{"ref":"1 Corinthians 2:2","type":"고백형","tags":["신뢰","결단","소망"],"full":"이는 내가\n너희 가운데 거하면서\n예수 그리스도와\n그가 십자가에\n못 박히신 것 외에는\n아무것도 알지 아니하기로\n작정하였음이라.","compact":"나는 예수 그리스도와\n그가 십자가에\n못 박히신 것 외에는\n아무것도 알지 않기로\n작정하였노라.","oneline":"오직 예수 그리스도와 그 십자가만을 알기로 작정하였노라.","comfort":"그분의 사랑만이\n당신의 유일한 자랑이 될 것입니다.","original_tag":"신앙의 본질","pastor":"Timothy Keller"},{"ref":"마가복음 10:43-45","type":"선언형","tags":["신뢰","소망"],"full":"인자가 온 것은\n섬김을 받으려 함이 아니라,\n도리어 섬기려 하고\n자기 목숨을\n많은 사람의 대속물로\n주려 함이니라.","compact":"인자가 온 것은\n섬김을 받으려 함이 아니라\n섬기려 하고,\n자기 목숨을 대속물로\n주려 함이니라.","oneline":"인자가 온 것은 섬기려 하고 목숨을 대속물로 주려 함이니라.","comfort":"그분은 당신을 섬기기 위해\n이미 모든 것을 내어주셨습니다.","original_tag":"신앙의 본질","pastor":"Timothy Keller"},{"ref":"Mark 1:10-11","type":"선언형","tags":["평안","축복"],"full":"하늘에서 소리가 나기를,\n'너는 나의 사랑하는 아들이라.\n내가 너를 기뻐하노라'\n하시니라.","compact":"너는 나의 사랑하는 아들이라.\n내가 너를 기뻐하노라.","oneline":"너는 나의 사랑하는 아들이라, 내가 너를 기뻐하노라.","comfort":"그분은 이미 당신을 향한\n사랑과 기쁨을 선포하셨습니다.","original_tag":"신앙의 본질","pastor":"Dr. Timothy Keller"},{"ref":"John 17:24","type":"선언형","tags":["소망","평안","인도하심"],"full":"아버지여,\n아버지께서 내게 주신 자들도\n내가 있는 곳에\n나와 함께 있게 하시어,\n세상 창조 전부터\n나를 사랑하시어\n내게 주신 나의 영광을\n그들도 보게 하시기를\n원하나이다.","compact":"아버지께서 내게 주신 자들도\n내가 있는 곳에\n나와 함께 있게 하시어,\n나의 영광을 보게 하시기를\n원하나이다.","oneline":"내게 주신 자들이 나와 함께 있어 나의 영광을 보게 하시기를 원하나이다.","comfort":"그분은 이미 당신이\n그분의 영원한\n사랑 안에 거하기를\n소망하고 계십니다.","original_tag":"신앙의 본질","pastor":"Dr. Timothy Keller"},{"ref":"Romans 8:16","type":"선언형","tags":["보호","평안"],"full":"성령께서 친히\n우리의 영과 더불어\n우리가 하나님의 자녀임을\n증언하시느니라.","compact":"성령께서 친히\n우리의 영과 더불어\n우리가 하나님의 자녀임을\n증언하시느니라.","oneline":"우리는 하나님의 자녀임이라.","comfort":"당신은 이미 그분의 사랑받는 자녀입니다.","original_tag":"신앙의 본질","pastor":"Dr. Timothy Keller"},{"ref":"Romans 5:5","type":"선언형","tags":["소망","평안","신뢰"],"full":"소망이 우리를\n부끄럽게 하지 아니함은,\n우리에게 주신\n성령을 통하여\n하나님의 사랑이 우리 마음에\n부어졌음이니라.","compact":"소망이 우리를\n부끄럽게 하지 아니함은,\n하나님의 사랑이\n성령을 통하여\n우리 마음에 부어졌음이니라.","oneline":"하나님의 사랑이 우리 마음에 부어졌음이라.","comfort":"그분은 이미 당신의 마음에\n소망과 사랑을 가득 채우셨습니다.","original_tag":"신앙의 본질","pastor":"Dr. Timothy Keller"},{"ref":"이사야 25:6-8","type":"선언형","tags":["소망","평안","축복"],"full":"만군의 여호와께서\n이 산에서 만민을 위하여\n기름진 것과\n오래 저장하였던 포도주로\n연회를 베푸시리니,\n사망을 영원히 멸하시고\n모든 얼굴에서\n눈물을 닦아주시며,\n자기 백성의 수치를\n온 세상에서\n제하시리라.","compact":"사망을 영원히 멸하시고\n모든 눈물을 닦아주시며,\n자기 백성의 수치를\n제하시리라.","oneline":"사망을 영원히 멸하시고 모든 눈물을 닦아주시리라.","comfort":"모든 것을 새롭게 하시고\n위로하실 분이 이미 약속하셨으니까요.","original_tag":"신앙의 본질","pastor":"팀 켈러"},{"ref":"요한계시록 19:9","type":"선언형","tags":["소망","축복","감사","평안"],"full":"천사가 내게\n말하기를 기록하라,\n어린 양의 혼인 잔치에\n청함을 받은 자들은\n복이 있도다.\n이것은 하나님의 참되신\n말씀이니라.","compact":"어린 양의 혼인 잔치에\n청함 받은 자들은\n복이 있도다.\n하나님의 참된 말씀이니라.","oneline":"어린 양의 혼인 잔치에 청함 받은 자들은 복이 있도다.","comfort":"이 약속은 변함없는 하나님의 진실한 말씀이에요.","original_tag":"신앙의 본질","pastor":"팀 켈러"},{"ref":"Deuteronomy 29:12-13","type":"선언형","tags":["신뢰","보호","인도하심","축복"],"full":"당신이 주\n당신의 하나님과\n언약 안에 들어가기 위해\n여기 서 있나니,\n주께서 오늘 당신과\n맹세로 맺으시는 이 언약은\n당신을 그의 백성으로\n확증하시고,\n그가 당신의 하나님이 되시리라\n약속하신 대로\n이루어질 것입니다.","compact":"주께서 당신을\n그의 백성으로\n확증하시고,\n당신의 하나님이 되시리라\n약속하신 대로\n이루실 것입니다.","oneline":"그가 당신의 하나님이 되시리라 약속하셨습니다.","comfort":"그 약속을 잊지 않고 늘 붙드시는 분이시니까요.","original_tag":"신앙의 본질","pastor":"Timothy Keller"},{"ref":"Galatians 3:13-14","type":"선언형","tags":["소망","축복","보호","신뢰"],"full":"그리스도께서 우리를 위해\n저주가 되사\n율법의 저주에서\n우리를 속량하셨나니,\n이는 믿음으로 말미암아\n아브라함에게 주신 복이\n이방인에게 미치게 하고\n성령의 약속을\n받게 하시려 함이라.","compact":"그리스도께서 우리를 속량하셨으니,\n믿음으로 아브라함의 복과\n성령의 약속을 받으리로다.","oneline":"믿음으로 성령의 약속을 받으리로다.","comfort":"이미 우리의 모든 저주를 담당하신 분이 계세요.","original_tag":"신앙의 본질","pastor":"Timothy Keller"},{"ref":"요한복음 1:1-3","type":"선언형","tags":["신뢰","보호","인도하심"],"full":"태초에 말씀이 계셨으니,\n이 말씀이 하나님과 함께 계셨고\n이 말씀은 곧 하나님이시니라.\n만물이 그로 말미암아 지은 바 되었으니,\n그가 없이는 지은 것이 하나도 없느니라.","compact":"말씀이 곧 하나님이시니라.\n그가 없이는 만물이\n존재하지 아니하나이다.","oneline":"말씀이 곧 하나님이시니라.","comfort":"모든 만물의 시작과\n근원이 거기 있으니까요.","original_tag":"신앙의 본질","pastor":"팀 켈러"},{"ref":"요한복음 1:11-13","type":"선언형","tags":["자녀양육","소망","축복","관계"],"full":"그가 자기 땅에 오셨으나\n자기 백성이 영접하지 아니하였나이다.\n그러나 그 이름을 믿고\n영접하는 자들에게는\n하나님의 자녀가 되는 권세를 주셨으니,\n이는 오직 하나님께로부터\n난 자들이니라.","compact":"그 이름을 믿고 영접하는\n자들에게는 하나님의 자녀가 되는\n권세를 주셨으니,\n오직 하나님께로부터\n난 자들이니라.","oneline":"그 이름을 믿는 자들에게는 하나님의 자녀가 되는 권세를 주셨느니라.","comfort":"당신은 이미 그분의 자녀이니까요.","original_tag":"신앙의 본질","pastor":"팀 켈러"},{"ref":"Galatians 5:22-23","type":"선언형","tags":["평안","소망","신뢰","결단"],"full":"오직 성령의 열매는\n사랑과 희락과 화평과\n오래 참음과 자비와\n양선과 충성과 온유와 절제이니,\n이 같은 것을 금지할\n법이 없느니라.","compact":"성령의 열매는 사랑과\n희락과 화평이니,\n이 같은 것을 금지할\n법이 없도다.","oneline":"성령의 열매는 사랑과 희락과 화평이니라.","comfort":"그 열매는 이미 당신 안에\n심겨져 있으니까요.","original_tag":"신앙의 본질","pastor":"Timothy Keller"},{"ref":"Matthew 1:21","type":"선언형","tags":["용서","소망","치유","보호"],"full":"그녀가 아들을 낳으리니\n이름을 예수라 하라.\n이는 그가 자기 백성을\n그들의 죄에서 구원할\n자이심이라.","compact":"아들을 낳으리니,\n그가 자기 백성을\n그들의 죄에서 구원할\n자이시니라.","oneline":"그가 자기 백성을 그들의 죄에서 구원할 자이심이라.","comfort":"이미 우리의 구원을\n이루실 분이 오셨어요.","original_tag":"신앙의 본질","pastor":"Dr. Tony Evans"},{"ref":"Matthew 1:22-23","type":"선언형","tags":["보호","평안","신뢰","소망"],"full":"이 모든 일이 주께서\n선지자로 말씀하신 것을\n이루려 하심이라.\n'보라, 처녀가 잉태하여\n아들을 낳을 것이요,\n그의 이름은 임마누엘이라 하리라.'\n이는 '하나님이 우리와\n함께 계시다'는 뜻이니라.","compact":"'처녀가 잉태하여\n아들을 낳으리니\n그의 이름은 임마누엘이라.'\n곧 '하나님이 우리와\n함께 계시다'는 뜻이니라.","oneline":"하나님이 우리와 함께 계시도다.","comfort":"그분은 늘 우리와\n함께 하시는 분이에요.","original_tag":"신앙의 본질","pastor":"Dr. Tony Evans"},{"ref":"Isaiah 9:6","type":"선언형","tags":["소망","평안","신뢰","보호"],"full":"이는 우리를 위하여\n한 아기가 났고,\n우리에게 한 아들을 주셨음이라.\n그의 어깨에는 정사를 메었으니,\n그의 이름은 기묘자요 모사요\n전능하신 하나님이요\n영존하시는 아버지요\n평강의 왕이라 불리우리라.","compact":"우리를 위해 한 아기가 났고\n한 아들을 주셨으니,\n그의 이름은 기묘자요 모사요\n전능하신 하나님이요\n평강의 왕이라.","oneline":"그는 전능하신 하나님이요 평강의 왕이시라.","comfort":"모든 것을 주관하시고\n평화를 주시는 분이\n이미 오셨어요.","original_tag":"신앙의 본질","pastor":"Dr. Tony Evans"},{"ref":"Genesis 3:15","type":"선언형","tags":["소망","보호","신뢰"],"full":"내가 너로 여자와 원수가 되게 하고,\n네 후손도 여자의 후손과\n원수가 되게 하리니,\n여자의 후손은 네 머리를\n상하게 할 것이요,\n너는 그의 발꿈치를\n상하게 할 것이니라.","compact":"여자의 후손이 네 머리를\n상하게 할 것이요,\n너는 그의 발꿈치를\n상하게 할 것이니라.","oneline":"여자의 후손이 네 머리를 상하게 하리라.","comfort":"이미 사탄의 머리를\n부수실 분이 약속하셨어요.","original_tag":"신앙의 본질","pastor":"Dr. Tony Evans"},{"ref":"히브리서 2:14","type":"선언형","tags":["보호","치유","신뢰","소망"],"full":"자녀들이 혈과 육에 속하였으매,\n그도 또한 같은 모양으로\n혈과 육을 함께 지니심은,\n죽음을 통하여\n죽음의 세력을 잡은 자\n곧 마귀를 멸하시려 함이라.","compact":"그가 혈과 육을 지니심은,\n죽음을 통하여\n마귀를 멸하시려 함이니라.","oneline":"죽음을 통하여 마귀를 멸하시리라.","comfort":"이미 우리의 가장 큰 대적을\n물리치신 분이 계세요.","original_tag":"신앙의 본질","pastor":"Tony Evans"},{"ref":"요한복음 1:49, 51","type":"선언형","tags":["신뢰","소망","보호","인도하심"],"full":"나다나엘이 고백하기를\n\"랍비여, 당신은 하나님의 아들이시요\n이스라엘의 임금이로소이다.\"\n이에 예수께서 이르시되\n\"진실로 진실로 너희에게 이르노니,\n하늘이 열리고\n하나님의 사자들이\n인자 위에 오르락 내리락\n하는 것을 보리라.\"","compact":"당신은 하나님의 아들이시오\n이스라엘의 임금이로소이다.\n하늘이 열리고 천사들이\n인자 위에 오르락 내리락\n하는 것을 보리라.","oneline":"하늘이 열리고 하나님의 사자들이 인자 위에 오르락 내리락 하리라.","comfort":"그분은 하늘과 땅을\n연결하시는 분이시니까요.","original_tag":"신앙의 본질","pastor":"Tony Evans"},{"ref":"에베소서 1:6","type":"선언형","tags":["감사","축복","소망","평안"],"full":"이는 그가 사랑하시는 자 안에서\n우리에게 거저 주시는 바,\n그의 은혜의 영광을\n찬송하게 하려는 것이니라.","compact":"그가 사랑하시는 자 안에서\n우리에게 거저 주신\n은혜의 영광을\n찬송하리로다.","oneline":"그의 은혜의 영광을 찬송하게 하려 하심이라.","comfort":"당신에게 값없이 베푸신\n그분의 은혜는 변치 않아요.","original_tag":"신앙의 본질","pastor":"이찬수"},{"ref":"에베소서 1:12","type":"선언형","tags":["감사","축복","소망","결단"],"full":"이는 우리가 그리스도 안에서\n전부터 바라던 그의 영광의\n찬송이 되게 하려 하심이라.","compact":"우리가 그리스도 안에서\n그의 영광의 찬송이 되게\n하시리라.","oneline":"우리가 그의 영광의\n찬송이 되리로다.","comfort":"당신은 이미 그분의 영광을\n드러낼 존재로\n부름 받았으니까요.","original_tag":"신앙의 본질","pastor":"이찬수"},{"ref":"에베소서 1:14","type":"선언형","tags":["신뢰","소망","축복","보호"],"full":"이는 우리 기업의 보증이 되사,\n그 얻으신 것을 속량하시고\n그의 영광을 찬송하게\n하려 하심이라.","compact":"성령은 우리 기업의 보증이\n되사, 우리로 그의 영광을\n찬송하게 하리라.","oneline":"성령이 우리 기업의 보증이\n되시리라.","comfort":"이미 당신의 영원한 기업을\n보증하신 분이 계세요.","original_tag":"신앙의 본질","pastor":"이찬수"},{"ref":"빌립보서 4:13","type":"고백형","tags":["신뢰","소망","결단","직장사업"],"full":"내게 능력을 주시는\n분 안에서, 저는 모든 것을\n할 수 있습니다.","compact":"능력 주시는 분 안에서,\n저는 모든 것을\n할 수 있습니다.","oneline":"내게 능력 주시는 분 안에서\n모든 것을 할 수 있나이다.","comfort":"이미 당신을 통해 일하고\n계신 분이 있으니까요.","original_tag":"신앙의 본질","pastor":"이찬수"},{"ref":"열왕기상 8:29-30","type":"선언형","tags":["평안","보호","용서","인도하심"],"full":"주께서 '내 이름이 그곳에\n있으리라' 말씀하신\n이 성전을 향해 주의 눈이\n밤낮으로 지켜보시오니,\n주의 종이 이 자리에서\n드리는 기도를 들으시옵소서.\n하늘에서 들으시고\n죄를 사하여 주시옵소서.","compact":"주께서 '내 이름이 거기\n있으리라' 하셨으니,\n이 자리의 기도를 들으시고\n사하여 주시옵소서.","oneline":"주께서 말씀하시기를\n'내 이름이 그곳에\n있으리라' 하셨나이다.","comfort":"당신의 이름을 두신 곳에서\n이미 듣고 계십니다.","original_tag":"신앙의 본질","pastor":"이찬수"},{"ref":"시편 42:2","type":"고백형","tags":["신뢰","소망","외로움","평안"],"full":"내 영혼이 하나님,\n살아 계시는 하나님을\n갈망하나이다.\n어느 때에 제가 나아가서\n하나님의 얼굴을\n뵐 수 있을까요?","compact":"내 영혼이 살아 계시는\n하나님을 갈망하나니,\n언제쯤 주님의 얼굴을\n뵐까요?","oneline":"내 영혼이 살아 계시는\n하나님을 갈망하나이다.","comfort":"그 갈망함 속에 이미 주님이\n찾아와 계십니다.","original_tag":"신앙의 본질","pastor":"이찬수"},{"ref":"시편 63:1","type":"고백형","tags":["신뢰","외로움","소망","불안"],"full":"하나님이여, 주는 나의\n하나님이시니, 제가 간절히\n주를 찾습니다.\n물이 없어 마르고\n황폐한 땅에서 내 영혼이\n주를 갈망하고, 내 육체가\n주를 앙모하나이다.","compact":"하나님이여 주는 나의\n하나님이시라.\n황폐한 땅에서 내 영혼이\n주를 갈망하고\n앙모하나이다.","oneline":"하나님이여, 주는 나의\n하나님이시라.","comfort":"황폐한 마음을 아시는 분이\n그곳에 함께 계십니다.","original_tag":"신앙의 본질","pastor":"이찬수"},{"ref":"다니엘 2:44","type":"선언형","tags":["소망","보호","신뢰","평안"],"full":"이 여러 왕들의 시대에\n하늘의 하나님께서\n한 나라를 세우실 것이니,\n그 나라는 영원히 망하지\n아니할 것이며, 그 권세가\n다른 백성에게 넘어가지도\n아니할 것입니다.\n도리어 이 모든 나라를 쳐서\n멸망시키고\n영원히 설 것입니다.","compact":"하늘의 하나님이 한 나라를\n세우시리니, 영원히 망하지\n아니하고\n영원히 설 것이라.","oneline":"하늘의 하나님이 한 나라를\n세우시리니,\n영원히 설 것이라.","comfort":"흔들림 없는 영원한\n통치자께서 이미 세우신\n나라 안에 당신이\n있으니까요.","original_tag":"신앙의 본질","pastor":"이찬수"},{"ref":"고린도전서 2:2","type":"고백형","tags":["결단","신뢰","소망","평안"],"full":"저는 여러분 가운데서\n예수 그리스도와 그분께서\n십자가에 못 박히신 것\n외에는 아무것도 알지\n아니하기로 작정하였습니다.","compact":"예수 그리스도와 그분의\n십자가 외에는 아무것도\n알지 아니하기로\n작정하였나이다.","oneline":"예수 그리스도와 그분의\n십자가 외에는 아무것도\n알지 아니하나이다.","comfort":"가장 중요한 것을 붙들고\n계신 당신을 주님이 아십니다.","original_tag":"신앙의 본질","pastor":"이찬수"},{"ref":"로마서 9:4-5","type":"선언형","tags":["신뢰","소망","감사","평안"],"full":"그리스도께서 육신으로는\n이스라엘 백성에게서\n나셨으니, 그분은 만물 위에\n계시며 세세에 찬양받으실\n하나님이십니다. 아멘.","compact":"그리스도는 만물 위에 계셔서\n세세에 찬양받으실\n하나님이시니라.","oneline":"그는 만물 위에 계셔서\n세세에 찬양받으실\n하나님이시니라.","comfort":"만물 위에 계신 그분이\n당신을 붙들고 계십니다.","original_tag":"신앙의 본질","pastor":"이찬수"},{"ref":"에베소서 2:14","type":"선언형","tags":["평안","관계","보호"],"full":"그분은 우리의 화평이십니다.\n우리 둘을 하나로 만드시고,\n우리 사이에 막혔던\n원수 된 담을 친히\n그 육체로 허무셨습니다.","compact":"그분은 우리의 화평이시며,\n우리 사이에 막혔던 담을\n허무셨습니다.","oneline":"그분은 우리의 참된\n화평이십니다.","comfort":"이미 그 자리에서 당신의\n평화를 이루신\n분이 계시니까요.","original_tag":"신앙의 본질","pastor":"이찬수"},{"ref":"누가복음 17:33","type":"선언형","tags":["소망","결단","신뢰"],"full":"누구든지 자기 생명을\n지키려 하는 이는\n결국 잃을 것이요,\n자기 생명을 잃는 이는\n도리어 그 생명을 얻게 될 것입니다.","compact":"자기 생명을 잃는 이가\n도리어 그 생명을 얻으리라.","oneline":"자기 생명을 잃는 자가 살리라.","comfort":"새로운 생명의 길을 열어주실 분이 있으니까요.","original_tag":"신앙의 본질","pastor":"이찬수"},{"ref":"빌립보서 3:20","type":"고백형","tags":["소망","신뢰","기다림"],"full":"우리의 시민권은 하늘에 있습니다.\n우리는 그곳으로부터 구원자,\n곧 주 예수 그리스도를\n간절히 기다립니다.","compact":"우리의 시민권은 하늘에 있으며,\n주 예수 그리스도를 기다립니다.","oneline":"우리의 시민권은 하늘에 있습니다.","comfort":"당신이 바라볼 참된 본향이 이미 정해져 있으니까요.","original_tag":"신앙의 본질","pastor":"이찬수"},{"ref":"스바냐 3:17","type":"선언형","tags":["평안","소망","보호","신뢰"],"full":"당신의 하나님 여호와께서\n당신 가운데 계십니다.\n그분은 구원하실 전능자이십니다.\n그분이 당신으로 인해\n기쁨을 이기지 못하시고,\n당신을 잠잠히 사랑하시며,\n노래하며 즐거워하실 것입니다.","compact":"하나님께서 당신 가운데 계시며,\n당신을 사랑하시고\n기뻐하실 것입니다.","oneline":"하나님께서 당신으로 인해 즐거이 기뻐하시리라.","comfort":"당신을 향한 그분의 기쁨은 이미 온전하니까요.","original_tag":"신앙의 본질","pastor":"이찬수"},{"ref":"마태복음 17:5","type":"선언형","tags":["신뢰","인도하심","소망"],"full":"빛나는 구름 속에서\n소리가 들려왔습니다.\n'이는 내 사랑하는 아들이요,\n내가 참으로 기뻐하는 자니,\n너희는 그의 말을 들으라.'","compact":"이는 내 사랑하는 아들이요,\n내가 기뻐하는 자니,\n그의 말을 들으세요.","oneline":"이는 내 사랑하는 아들이요 내가 기뻐하는 자니라.","comfort":"그분의 사랑받는 아들이 이미 당신을 인도하고 계시니까요.","original_tag":"신앙의 본질","pastor":"이찬수"},{"ref":"마가복음 16:7","type":"위로형","tags":["소망","용서","보호","인도하심"],"full":"가서 그의 제자들과\n베드로에게 이르세요.\n예수께서 당신들보다\n먼저 갈릴리로 가시나니,\n전에 말씀하신 대로\n당신들이 거기서 그분을 뵈오리라.","compact":"예수께서 당신들보다\n먼저 갈릴리로 가시니,\n말씀하신 대로 그곳에서\n뵙게 될 것입니다.","oneline":"말씀하신 대로 그곳에서 그분을 뵈오리라.","comfort":"당신의 실패도 아시는 분이 먼저 그곳에서 기다리고 계시니까요.","original_tag":"신앙의 본질","pastor":"이찬수"},{"ref":"마가복음 2:27-28","type":"선언형","tags":["인도하심","평안","신뢰","보호"],"full":"또 말씀하시기를,\n안식일은 사람을 위하여\n있는 것이요\n사람이 안식일을 위하여\n있는 것이 아니니라.\n그러므로 인자는\n안식일에도 주인이시니라.","compact":"안식일은 사람을 위하여\n있는 것이요,\n인자는 안식일의 주인이시니라.","oneline":"인자는 안식일에도 주인이시니라.","comfort":"그분의 손길이 닿지 않는 곳은 없으니까요.","original_tag":"신앙의 본질","pastor":"이찬수"},{"ref":"출애굽기 20:11","type":"선언형","tags":["평안","보호","감사","신뢰"],"full":"이는 엿새 동안에\n나 여호와가 하늘과 땅과\n바다와 그 가운데 모든 것을\n만들고 일곱째 날에\n쉬었음이라.\n그러므로 나 여호와가\n안식일을 복되게 하여\n그 날을 거룩하게 하였노라.","compact":"엿새 동안 모든 것을 만든\n여호와가 안식일을 복되게 하여\n거룩하게 하셨노라.","oneline":"나 여호와가 안식일을 복되게 하여 거룩하게 하였노라.","comfort":"당신의 쉼도 이미 그분이 복되게 하셨습니다.","original_tag":"신앙의 본질","pastor":"이찬수"},{"ref":"에스겔 36:26","type":"선언형","tags":["회개","치유","소망","평안"],"full":"또 새 영을 당신 속에 두고\n새 마음을 당신에게 줄 것이며,\n당신 육신에서\n굳은 마음을 제거하고\n부드러운 마음을 줄 것이라.","compact":"새 영과 새 마음을\n당신에게 주어,\n굳은 마음을\n부드러운 마음으로 바꿀 것이라.","oneline":"굳은 마음을 제거하고 부드러운 마음을 줄 것이라.","comfort":"당신의 마음을 가장 잘 아시는 분이 먼저 그 변화를 약속하셨습니다.","original_tag":"신앙의 본질","pastor":"이찬수"},{"ref":"요한복음 8:10-11","type":"위로형","tags":["용서","평안","회개","보호"],"full":"예수께서 일어나사\n여자 외에 아무도 없는 것을\n보시고 이르시되,\n여자여, 너를 고발하던\n그들이 어디 있느냐?\n너를 정죄한 자가 없느냐?\n대답하되 주여 없나이다.\n예수께서 이르시되,\n나도 너를 정죄하지\n아니하노니.","compact":"너를 고발하던 그들이 없구나.\n나도 너를 정죄하지\n아니하노니.","oneline":"나도 너를 정죄하지 아니하노니.","comfort":"당신의 모든 것을 아시는 분이 이미 당신을 용서하고 받아들이셨습니다.","original_tag":"신앙의 본질","pastor":"이찬수"},{"ref":"사무엘하 6:21","type":"고백형","tags":["인도하심","신뢰","소망","감사"],"full":"다윗이 말하되,\n이는 여호와 앞에서\n한 것이니라.\n그가 당신 아버지와\n그의 온 집을 버리시고\n나를 택하사,\n나를 여호와의 백성\n이스라엘의 주권자로\n삼으셨으니.","compact":"여호와께서 나를 택하사,\n그의 백성 이스라엘의\n주권자로 삼으셨으니.","oneline":"여호와께서 나를 택하사 주의 주권자로 삼으셨으니.","comfort":"당신도 이미 그분의 특별한 택하심을 받은 존재입니다.","original_tag":"신앙의 본질","pastor":"이찬수"},{"ref":"신명기 30:6","type":"선언형","tags":["소망","신뢰","인도하심","축복"],"full":"네 하나님 여호와께서\n네 마음과 네 자손의 마음에\n할례를 베푸사,\n너로 마음을 다하며\n뜻을 다하여\n네 하나님 여호와를\n사랑하게 하사,\n너로 생명을 얻게 하실 것이라.","compact":"하나님 여호와께서\n네 마음에 할례를 베푸사,\n너로 그분을 사랑하게 하여\n생명을 얻게 하실 것이라.","oneline":"너로 그분을 사랑하게 하여 생명을 얻게 하실 것이라.","comfort":"사랑할 마음을 주시는 분이 이미 그 마음을 품으셨습니다.","original_tag":"신앙의 본질","pastor":"이찬수"},{"ref":"마가복음 1:2-3","type":"선언형","tags":["인도하심","보호","소망","신뢰"],"full":"선지자 이사야의 글에\n기록되었듯이,\n'보라, 내가 내 사자를\n네 앞에 보내노니,\n그가 네 길을 준비하리라.'","compact":"내가 내 사자를\n네 앞에 보내어,\n그가 네 길을 준비하리라.","oneline":"내가 내 사자를 네 앞에 보내어 네 길을 준비하리라.","comfort":"당신의 앞길을 가장 먼저 생각하시는 분이 미리 모든 것을 준비하고 계십니다.","original_tag":"신앙의 본질","pastor":"이찬수"},{"ref":"요한복음 3:30","type":"고백형","tags":["결단","순종","신뢰","소망"],"full":"그분은 흥하여야 하겠고,\n나는 쇠하여야 하리라.","compact":"그분은 흥하고,\n나는 쇠하여야 하리라.","oneline":"그분은 흥하여야 하겠고, 나는 쇠하여야 하리라.","comfort":"더 큰 영광을 위해 자신을 내려놓으신 분의 고백입니다.","original_tag":"신앙의 본질","pastor":"이찬수"},{"ref":"로마서 14:8","type":"선언형","tags":["신뢰","보호","평안","소망"],"full":"우리가 살아도 주를 위하여 살고\n죽어도 주를 위하여 죽나니,\n그러므로 사나 죽으나\n우리는 주의 것이로다.","compact":"사나 죽으나\n우리는 주의 것이로다.","oneline":"사나 죽으나 우리는 주의 것이로다.","comfort":"당신은 이미 온전히 그분께 속한 존재입니다.","original_tag":"신앙의 본질","pastor":"이찬수"},{"ref":"고린도전서 1:27-29","type":"선언형","tags":["소망","신뢰","인도하심","보호"],"full":"그러나 하나님께서\n세상의 미련한 것들을 택하사\n지혜 있는 자들을\n부끄럽게 하려 하시고,\n세상의 약한 것들을 택하사\n강한 것들을\n부끄럽게 하려 하시며,\n세상의 천한 것들과\n멸시 받는 것들을 택하사\n있는 것들을 폐하려 하시나니.","compact":"하나님께서 세상의\n미련하고 약한 것들을 택하사\n강한 것들을 부끄럽게 하려\n하시는도다.","oneline":"하나님께서 세상의 약한 것들을 택하시어 강한 것들을 부끄럽게 하시도다.","comfort":"당신의 약함도 그분의 위대한 계획 속에 있습니다.","original_tag":"신앙의 본질","pastor":"이찬수"},{"ref":"요한복음 12:23-25","type":"선언형","tags":["소망","결단","인도하심","신뢰"],"full":"예수님께서 대답하셨습니다.\n인자가 영광을 얻을 때가 왔도다.\n진실로 진실로 말씀드리니,\n한 알의 밀이 땅에 떨어져\n죽지 아니하면\n그저 한 알 그대로 있으나,\n죽으면 많은 열매를 맺느니라.\n자기 생명을 사랑하는 자는\n그것을 잃을 것이요,\n이 세상에서 자기 생명을\n미워하는 자는\n영원한 생명을 얻도록\n보전할 것이니라.","compact":"인자가 영광을 얻을 때가 왔도다.\n한 알의 밀이 죽으면\n많은 열매를 맺듯이,\n자기 생명을 내어줄 때\n영원한 생명을 보전하리라.","oneline":"자기 생명을 내어줄 때 영원한 생명을 보전하리라.","comfort":"가치 있는 희생은 결코 헛되지 않을 것이라고 먼저 말씀하셨습니다.","original_tag":"신앙의 본질","pastor":"이찬수"},{"ref":"마태복음 5:13-14","type":"선언형","tags":["직장사업","관계","소망","결단"],"full":"너희는 세상의 소금이니,\n만일 소금이 그 맛을 잃으면\n무엇으로 다시 짜게 하리요?\n그 후에는 아무 쓸모없어\n밖에 버려져\n사람들에게 밟힐 뿐이니라.\n너희는 세상의 빛이니,\n산 위에 세워진 마을은\n숨겨질 수 없느니라.","compact":"너희는 세상의 소금이며\n세상의 빛이니,\n그 맛과 빛을 잃지 말라.\n숨겨질 수 없는 존재임이라.","oneline":"너희는 세상의 빛이니라.","comfort":"당신은 이미 세상의 맛과 빛으로 부름 받으신 존재입니다.","original_tag":"신앙의 본질","pastor":"이찬수"},{"ref":"창세기 18:19","type":"선언형","tags":["자녀양육","가정","인도하심","축복"],"full":"내가 그(아브라함)를 택한 것은\n그가 자기 자녀와 가솔에게\n명령하여 여호와의 길을 지키고\n의와 공의를 행하게\n하려고 함이니,\n이는 나 여호와가\n아브라함에게 말한 일을\n이루려 함이니라.","compact":"내가 아브라함을 택하여\n그의 자손들이 의와 공의를\n행하게 할 것이니,\n내가 말한 일을\n반드시 이루려 함이니라.","oneline":"내가 말한 일을 반드시 이루려 함이니라.","comfort":"이미 시작하신 분이 모든 것을 마칠 때까지 함께 하실 것입니다.","original_tag":"신앙의 본질","pastor":"이찬수"},{"ref":"요한복음 12:7","type":"선언형","tags":["신뢰","감사","인도하심","소망"],"full":"예수님께서 말씀하셨습니다.\n'그대로 두어라.\n그는 나의 장례를 위하여\n이것을 간직한 것이니라.'","compact":"예수님께서 '그대로 두어라.\n나의 장례를 위해\n간직한 것이니라'\n말씀하셨습니다.","oneline":"나의 장례를 위해 간직한 것이니라.","comfort":"때로는 말없이 드린 헌신이 가장 깊은 의미를 지닐 때가 있습니다.","original_tag":"신앙의 본질","pastor":"이찬수"},{"ref":"신명기 7:7-8","type":"선언형","tags":["신뢰","보호","축복","소망"],"full":"여호와께서 너희를 기뻐하시고\n너희를 택하신 것은\n너희가 다른 민족보다\n수가 많아서가 아니니라.\n사실 너희는 모든 민족 중에서\n가장 적으니라.\n다만 여호와께서 너희를\n사랑하셨기 때문이니라.","compact":"여호와께서 너희를 택하심은\n수가 많아서가 아니라,\n너희를 사랑하셨기 때문이니라.","oneline":"다만 여호와께서 너희를 사랑하셨기 때문이니라.","comfort":"크고 작음에 상관없이, 오직 사랑으로 당신을 택하신 분입니다.","original_tag":"신앙의 본질","pastor":"이찬수"},{"ref":"시편 42:1-2","type":"고백형","tags":["소망","외로움","신뢰","기다림"],"full":"하나님이여,\n사슴이 시냇물을 찾아\n갈급함 같이,\n내 영혼이 주님을 찾기에\n갈급하나이다.\n내 영혼이 하나님,\n살아 계시는 하나님을\n갈망하나니,\n내가 어느 때에 나아가서\n하나님의 얼굴을 뵈올까?","compact":"사슴이 시냇물을 찾듯,\n내 영혼이 주님을\n갈급하나이다.\n살아 계신 하나님을\n갈망하나이다.","oneline":"내 영혼이 살아 계신 하나님을 갈망하나이다.","comfort":"그 갈망하는 마음을 먼저 아시는 분이 계십니다.","original_tag":"신앙의 본질","pastor":"이찬수"},{"ref":"로마서 5:6","type":"선언형","tags":["신뢰","용서","치유","소망"],"full":"우리가 아직 연약할 때에,\n정해진 때에 그리스도께서\n경건하지 않은 자들을 위하여\n죽으셨도다.","compact":"우리가 아직 연약할 때,\n그리스도께서 경건하지 않은 자를 위하여\n죽으셨도다.","oneline":"우리가 연약할 때 그리스도께서 죽으셨도다.","comfort":"당신이 가장 약하다고 느낄 때조차도, 당신을 위해 모든 것을 내어주신 분입니다.","original_tag":"신앙의 본질","pastor":"이찬수"},{"ref":"고린도후서 5:13-14","type":"선언형","tags":["신뢰","관계","소망","감사"],"full":"우리가 만일 미쳤다고 할지라도\n하나님을 위한 것이요,\n정신이 온전하다고 할지라도\n여러분을 위한 것이니라.\n그리스도의 사랑이 우리를\n강권하시도다.\n우리가 생각하건대\n한 사람이 모든 사람을 대신하여\n죽었으니,\n모든 사람이 죽은 것과\n같으니라.","compact":"그리스도의 사랑이 우리를\n강권하시도다.\n한 사람이 모두를 대신하여\n죽었으니,\n우리가 그 안에서 살았음이라.","oneline":"그리스도의 사랑이 우리를 강권하시도다.","comfort":"당신을 붙드시는 사랑은 그 어떤 것보다 강력합니다.","original_tag":"신앙의 본질","pastor":"이찬수"},{"ref":"베드로전서 2:4-5","type":"선언형","tags":["소망","신뢰","보호","축복"],"full":"사람에게는 버림을 받았으나\n하나님께는 택하심을 입은,\n보배로운 산 돌이신 예수님께\n나아가십시오.\n여러분도 살아있는 돌들처럼\n신령한 집으로 세워지고,\n예수 그리스도를 통해\n하나님이 기쁘게 받으실\n신령한 제사를 드리는\n거룩한 제사장들이 될 것이니라.","compact":"하나님께 택하심을 입은\n보배로운 산 돌이신 예수님께\n나아가,\n여러분도 살아있는 돌처럼\n신령한 집으로 세워질 것이니라.","oneline":"여러분도 살아있는 돌처럼 신령한 집으로 세워질 것이니라.","comfort":"버려진 것처럼 느껴져도, 당신을 보배로운 돌로 여기시는 분이 계십니다.","original_tag":"교회의 사명","pastor":"Timothy Keller"},{"ref":"1 John 4:8","type":"선언형","tags":["신뢰","평안"],"full":"사랑하지 않는 자는\n하나님을 알지 못하나니,\n이는 하나님은 사랑이심이라.","compact":"하나님은 사랑이심이라.","oneline":"하나님은 사랑이심이라.","comfort":"그분은 언제나 사랑으로 당신을 품으시는 분이시니까요.","original_tag":"공동체","pastor":"Tony Evans"},{"ref":"에베소서 2:19","type":"선언형","tags":["가정","소망","평안"],"full":"그러므로 이제부터는\n당신은 더 이상 이방인이나\n나그네가 아니요,\n오직 성도들과 함께\n하나님의 한 시민이요,\n하나님의 권속이니라.","compact":"당신은 하나님의 한 시민이요,\n하나님의 권속이니라.","oneline":"당신은 하나님의 권속이니라.","comfort":"이미 당신의 자리와 소속을 분명히 해 주신 분이시니까요.","original_tag":"공동체","pastor":"이찬수"},{"ref":"이사야 63:16","type":"선언형","tags":["신뢰","보호","소망","가정"],"full":"주님은 우리의 아버지이시니,\n비록 아브라함이\n우리를 알지 못하고\n이스라엘이 우리를\n인정하지 아니할지라도,\n여호와여, 주님은 우리의\n아버지이십니다.\n옛날부터 주의 이름을\n우리의 구속자라 선언하셨습니다.","compact":"주님은 우리의 아버지이시며,\n우리의 구속자이심이라.","oneline":"주님은 우리의 아버지이심이라.","comfort":"이미 우리의 가장 깊은 관계를 정의해 주신 분이시니까요.","original_tag":"공동체","pastor":"이찬수"},{"ref":"이사야 43:21","type":"선언형","tags":["소망","감사","신뢰"],"full":"이 백성은 내가 나를 위하여\n지었으니,\n나를 찬송하게 하려 함이라.","compact":"이 백성은 내가 나를 위하여\n지었으니,\n나를 찬송하게 하려 함이라.","oneline":"내가 나를 위하여 지었나니.","comfort":"당신의 존재 목적을 가장 명확하게 말씀해주신 분이시니까요.","original_tag":"공동체","pastor":"이찬수"},{"ref":"요한복음 10:16","type":"선언형","tags":["인도하심","소망","보호"],"full":"또 이 우리에 들지 아니한\n다른 양들이 내게 있어,\n내가 인도하여야 할 것이니,\n그들도 내 음성을 듣고\n한 무리가 되어\n한 목자에게 있으리라.","compact":"내가 인도하여야 할 양들이\n있으니,\n그들도 내 음성을 듣고\n한 목자에게 있으리라.","oneline":"그들도 내 음성을 듣고 한 목자에게 있으리라.","comfort":"이미 모든 이들을 향한 계획을 가지고 계신 분이시니까요.","original_tag":"공동체","pastor":"이찬수"},{"ref":"갈라디아서 3:28","type":"선언형","tags":["관계","평안","소망"],"full":"너희는 유대인이나 헬라인이나,\n종이나 자유인이나,\n남자나 여자나 다\n그리스도 예수 안에서\n하나이니라.","compact":"그리스도 예수 안에서\n우리는 모두 하나이니라.","oneline":"그리스도 예수 안에서 다 하나이니라.","comfort":"모든 차이를 넘어 당신을 한 몸으로 부르신 분이시니까요.","original_tag":"공동체","pastor":"이찬수"},{"ref":"에베소서 2:16","type":"선언형","tags":["평안","용서","소망"],"full":"또 십자가로 이 둘을 한 몸으로\n하나님과 화목하게 하려 하심이라.\n원수 된 것을 십자가로 소멸하셨으니.","compact":"십자가로 우리를 하나님과\n한 몸으로 화목하게 하셨으니.","oneline":"십자가로 하나님과 화목하게 하셨도다.","comfort":"이미 모든 불화를 해결하고\n당신을 품으신 분이시니까요.","original_tag":"공동체","pastor":"이찬수"},{"ref":"시편 133:1-3","type":"선언형","tags":["관계","가정","축복","평안"],"full":"보십시오, 형제들이 연합하여\n함께 사는 것이 어찌 그리 선하고 아름다운지요!\n여호와께서 그곳에 복을 명령하셨으니, 곧 영원한 생명이로다.","compact":"형제들이 연합하여 동거함이 아름다우니,\n여호와께서 그곳에 복을 명령하셨도다.","oneline":"여호와께서 복을 명령하셨나니 곧 영생이로다.","comfort":"당신의 관계 속에도 영원한 생명의 복을\n부어주시겠다고 약속하신 분이시니까요.","original_tag":"공동체","pastor":"이찬수"},{"ref":"Ezekiel 36:26","type":"선언형","tags":["소망","회개","치유","인도하심"],"full":"제가 당신에게 새 마음을 주며,\n새 영을 당신 안에 두겠습니다. 당신의 몸에서 돌 같은 마음을 제거하고,\n살처럼 부드러운 마음을 주리라 말씀하셨습니다.","compact":"새 마음과 새 영을 당신 안에 두시고,\n돌 같은 마음을 제거하고 살 같은 마음을 주시리라.","oneline":"새 마음과 새 영을 당신에게 주시리라.","comfort":"이미 당신을 변화시키시겠다고\n약속하신 분이에요.","original_tag":"신앙 회의","pastor":"John Piper"},{"ref":"Ephesians 3:16-19","type":"위로형","tags":["신뢰","소망","평안","인도하심"],"full":"하나님의 영광스러운 풍성함을 따라, 그의 영으로 말미암아 당신의 속사람을 능력으로 강하게 하시고,\n믿음으로 그리스도께서 당신의 마음에 거하시기를 기도합니다.\n사랑 안에 뿌리를 내리고 굳게 서서, 그리스도의 사랑이 얼마나 넓고 길고 높고 깊은지 깨닫게 되시기를 바랍니다.","compact":"하나님께서 그의 영으로 당신의 속사람을 강하게 하시고, 믿음으로 그리스도께서 마음에 거하시기를 바랍니다.\n그리스도의 사랑이 얼마나 깊고 넓은지 깨닫게 되시기를 기도합니다.","oneline":"그리스도께서 당신의 마음에 거하시며, 그의 사랑을 깊이 깨닫게 되시기를 바랍니다.","comfort":"이미 당신의 마음을 강하게 하시겠다고\n약속하신 분이에요.","original_tag":"신앙 회의","pastor":"Timothy Keller"},{"ref":"Hebrews 13:5","type":"선언형","tags":["두려움","외로움","보호","평안"],"full":"하나님께서 말씀하시기를,\n'내가 결코 당신을 떠나지 아니하고\n당신을 버리지 아니하리라' 하셨습니다.","compact":"하나님께서 말씀하시기를,\n'내가 결코 당신을 떠나지 아니하고 버리지 아니하리라' 하셨으니.","oneline":"내가 결코 당신을 떠나지 아니하고 버리지 아니하리라.","comfort":"당신을 떠나지 않겠다고 먼저\n말씀하신 분이에요.","original_tag":"신앙 회의","pastor":"Timothy Keller"},{"ref":"Revelation 1:8","type":"선언형","tags":["신뢰","소망","인도하심","보호"],"full":"주 하나님께서 말씀하시기를,\n'나는 알파와 오메가요, 지금도 있고 전에도 있었고\n또 장차 올 자요 전능한 자라' 하시니라.","compact":"주 하나님께서 '나는 알파와 오메가요,\n전에도 있었고 장차 올 전능한 자'라 말씀하셨습니다.","oneline":"나는 알파와 오메가요, 전능한 자니라.","comfort":"시작과 끝이 되시는 분이\n당신과 함께 계세요.","original_tag":"신앙 회의","pastor":"Timothy Keller"},{"ref":"로마서 8:28","type":"선언형","tags":["소망","인도하심","신뢰","평안"],"full":"우리가 알거니와 하나님을 사랑하는 자들,\n곧 그의 뜻대로 부르심을 받은 자들에게는\n모든 것이 합력하여 선을 이루느니라.","compact":"하나님을 사랑하는 자들에게는\n모든 것이 합력하여 선을 이루느니라.","oneline":"모든 것이 합력하여 선을 이루느니라.","comfort":"지금도 당신을 위해\n일하고 계신 분이에요.","original_tag":"신앙 회의","pastor":"팀 켈러 (Timothy Keller)"},{"ref":"로마서 8:29","type":"선언형","tags":["인도하심","소망","보호","신뢰"],"full":"하나님께서는 미리 아신 자들을 또한\n그의 아들의 형상을 본받게 하시려고 예정하셨으니,\n이는 그 아들이 많은 형제 중에서 맏아들이 되게 하려 하심이니라.","compact":"하나님께서는 당신을 그의 아들의 형상을\n본받게 하시려고 예정하셨습니다.","oneline":"당신을 그의 아들의 형상을 본받게 하시려고 예정하셨습니다.","comfort":"당신의 최종 목적지는 이미\n주님 안에서 정해져 있으니까요.","original_tag":"신앙 회의","pastor":"팀 켈러 (Timothy Keller)"},{"ref":"로마서 8:30","type":"선언형","tags":["소망","축복","평안","신뢰"],"full":"하나님께서 예정하신 그들을 또한 부르셨고,\n부르신 그들을 또한 의롭다 하셨으며,\n의롭다 하신 그들을 또한 영화롭게 하셨느니라.","compact":"하나님께서 부르신 자들을 의롭다 하셨고,\n또한 영화롭게 하셨습니다.","oneline":"하나님께서 부르신 당신을 영화롭게 하셨습니다.","comfort":"이미 그 영광 가운데\n당신의 자리를 마련해 두셨으니까요.","original_tag":"신앙 회의","pastor":"팀 켈러 (Timothy Keller)"},{"ref":"John 3:14-15","type":"선언형","tags":["소망","신뢰","평안","축복"],"full":"모세가 광야에서 뱀을 든 것같이\n인자도 들려야 하리니,\n이는 그를 믿는 자마다 영생을 얻게 하려 함이니라.","compact":"인자가 들려야 하리니,\n이는 그를 믿는 자마다 영생을 얻게 하려 함이니라.","oneline":"믿는 자마다 영생을 얻으리라.","comfort":"영원한 생명이 이미\n당신의 것이 되었으니까요.","original_tag":"신앙 회의","pastor":"Timothy Keller"},{"ref":"Jonah 4:10-11","type":"선언형","tags":["보호","평안","인도하심","신뢰"],"full":"주님께서 말씀하시기를,\n\"네가 수고하지도,\n키우지도 않았으나\n하룻밤에 났다가\n하룻밤에 사라진\n이 식물도 아꼈거늘,\n하물며 좌우를 분별하지 못하는\n십이만 명과 많은 가축이 있는\n큰 성읍 니느웨를 내가 아끼지\n아니하겠느냐?\"\n하시니라.","compact":"주님께서 말씀하시기를,\n\"하물며 좌우를 분별하지 못하는\n많은 백성이 있는 큰 성읍을\n내가 아끼지 아니하겠느냐?\"\n하시니라.","oneline":"내가 이 큰 성읍을 아끼지 아니하겠느냐?","comfort":"당신의 작은 고민까지도 헤아리시는 분이시니까요.","original_tag":"신앙 회의","pastor":"Timothy Keller"},{"ref":"Hebrews 13:12-14","type":"위로형","tags":["소망","보호","평안","인도하심"],"full":"예수께서도 자기 피로\n백성을 거룩하게 하시려고\n성문 밖에서 고난을 받으셨으니,\n우리에게는 여기\n영구한 도성이 없고\n오직 장차 올 도성을 찾음이라.","compact":"예수께서 당신을\n거룩하게 하시려고\n고난받으셨으니,\n우리에게는 영구한\n도성이 없으나\n장차 올 도성을\n찾고 있습니다.","oneline":"우리는 영구한 도성이 없으나, 장차 올 도성을 찾고 있습니다.","comfort":"이미 당신을 위해 영원한 거처를 예비해 두셨으니까요.","original_tag":"신앙 회의","pastor":"Timothy Keller"},{"ref":"Jeremiah 29:7","type":"선언형","tags":["직장사업","가정","평안","축복"],"full":"내가 너희를\n사로잡혀 가게 한\n그 성읍의 평안을 구하고,\n그를 위하여 여호와께 기도하라.\n그 성읍이 평안함으로\n너희도 평안할 것임이라.","compact":"그 성읍의 평안을 구하고\n기도하라.\n그 성읍이 평안함으로\n너희도 평안하리라.","oneline":"그 성읍이 평안함으로 너희도 평안하리라.","comfort":"당신의 삶의 터전을 통해 당신에게 평안을 주시겠다고 먼저 말씀하셨으니까요.","original_tag":"신앙 회의","pastor":"Timothy Keller"},{"ref":"1 Corinthians 1:26-29","type":"위로형","tags":["신뢰","소망","평안","인도하심"],"full":"형제자매 여러분,\n부르심을 받았을 때의\n여러분 생각해보십시오.\n세상의 기준으로 볼 때\n지혜로운 자가 많지 않고,\n능력 있는 자도 많지 않으며,\n고귀한 가문\n출신도 많지 않았습니다.\n그러나 하나님께서는\n세상의 어리석은 것들을 택하사\n지혜로운 자들을 부끄럽게 하시며,\n세상의 약한 것들을 택하사\n강한 자들을 부끄럽게 하셨습니다.","compact":"하나님께서는 세상의\n어리석은 자들과\n약한 자들을 택하사\n강한 자들을\n부끄럽게 하셨습니다.","oneline":"하나님께서 약한 자들을 택하여 강한 자들을 부끄럽게 하셨습니다.","comfort":"하나님께서는 이미 당신의 약함을 통해 일하시기로 정하셨으니까요.","original_tag":"신앙 회의","pastor":"Timothy Keller"},{"ref":"1 Kings 18:1","type":"선언형","tags":["축복","인도하심","신뢰","소망"],"full":"여러 날 후에\n삼 년째 되던 해에\n여호와의 말씀이\n엘리야에게 임하여\n이르시기를,\n\"가서 아합에게 보이라.\n내가 지면에 비를 내리리라.\"\n하시니라.","compact":"여호와의 말씀이 임하여\n이르시기를,\n\"내가 지면에 비를\n내리리라.\"\n하시니라.","oneline":"내가 지면에 비를 내리리라.","comfort":"당신의 마른 땅에도 단비를 보내주시겠다고 말씀하셨으니까요.","original_tag":"신앙 회의","pastor":"Dr. Tony Evans"},{"ref":"Jeremiah 33:3","type":"선언형","tags":["소망","신뢰","인도하심","평안"],"full":"내게 부르짖으라,\n그리하면 내가 네게 응답하겠고,\n네가 알지 못하는\n크고 은밀한 일들을\n네게 보이리라.","compact":"내게 부르짖으면\n내가 응답하고,\n알지 못하는\n놀라운 일을 보이리라.","oneline":"내게 부르짖으라, 내가 응답하리라.","comfort":"이미 응답하시겠다고 약속하신 분이에요.","original_tag":"신앙 회의","pastor":"Jonathan Evans"},{"ref":"Galatians 2:20","type":"고백형","tags":["신뢰","소망","결단","평안"],"full":"나는 그리스도와 함께\n십자가에 못 박혔으니,\n이제는 내가 사는 것이 아니라\n오직 그리스도께서 내 안에\n사시는 것이라.\n내가 이제 육체\n가운데 사는 것은\n나를 사랑하시고\n나를 위해 자신을 내어주신\n하나님의 아들을 믿는\n믿음 안에서 사는 것이라.","compact":"나는 그리스도와 함께\n십자가에 못 박혔나니,\n이제 내가 사는 것은\n나를 사랑하시고\n자신을 내어주신\n아들을 믿는 믿음으로\n사는 것이라.","oneline":"이제 내가 사는 것은 나를 사랑하신 그리스도를 믿는 믿음 안에서 사는 것이라.","comfort":"당신의 삶 안에 이미 살아계신 분이 있으니까요.","original_tag":"신앙 회의","pastor":"Jonathan Evans"},{"ref":"Matthew 11:28","type":"위로형","tags":["평안","신뢰","두려움"],"full":"수고하고 무거운\n짐 진 자들아,\n다 내게로 오라.\n내가 너희를 쉬게 하리라.","compact":"수고하고 무거운\n짐 진 자들아,\n다 내게 오라.\n내가 너희를 쉬게 하리라.","oneline":"내가 너희를 쉬게 하리라.","comfort":"이미 당신의 짐을 덜어주시겠다고 말씀하신 분이 있어요.","original_tag":"신앙 회의","pastor":"Jonathan Evans"},{"ref":"John 14:23","type":"선언형","tags":["평안","보호","신뢰","소망"],"full":"예수께서 대답하여 이르시되,\n사람이 나를 사랑하면\n내 말을 지키리니,\n내 아버지께서 그를\n사랑하실 것이요,\n우리가 그에게 가서\n거처를 그와 함께 하리라.","compact":"나를 사랑하면\n내 말을 지키리니,\n아버지와 내가 그를 사랑하고\n그에게 거처를 함께 하리라.","oneline":"우리가 그에게 가서 거처를 그와 함께 하리라.","comfort":"이미 당신과 함께 거하시겠다고 말씀하신 분이에요.","original_tag":"신앙 회의","pastor":"Tony Evans"},{"ref":"1 John 5:14-15","type":"고백형","tags":["신뢰","소망","감사","인도하심"],"full":"우리가 그를 향하여\n가진 바 담대함이 이것이니,\n그의 뜻대로 무엇을 구하면\n우리를 들으시는 것이라.\n우리가 무엇이든지\n구하는 바를\n그가 들으시는 줄을 안즉,\n우리가 그에게 구한 그것을\n얻은 줄을 또한 아느니라.","compact":"그의 뜻대로 무엇이든 구하면\n우리를 들으시니,\n구한 것을 얻은 줄을 아느니라.","oneline":"그의 뜻대로 구하면 우리를 들으시는도다.","comfort":"당신의 기도를 이미 듣고 계신 분이에요.","original_tag":"신앙 회의","pastor":"Tony Evans"},{"ref":"John 15:16","type":"선언형","tags":["소망","신뢰","축복","인도하심"],"full":"너희가 나를 택한 것이 아니요,\n내가 너희를 택하여 세웠나니,\n이는 너희로 가서\n열매를 맺게 하고,\n또 너희 열매가\n항상 있게 하여,\n너희가 내 이름으로\n아버지께 무엇을 구하든지\n다 받게 하려 함이라.","compact":"내가 너희를 택하여 세웠으니,\n너희가 내 이름으로\n아버지께 무엇을 구하든지\n다 받으리라.","oneline":"너희가 내 이름으로 무엇을 구하든지 다 받으리라.","comfort":"당신을 먼저 택하고 세우신 분이 있으니까요.","original_tag":"신앙 회의","pastor":"Tony Evans"},{"ref":"에베소서 1:22-23","type":"선언형","tags":["신뢰","소망","보호","평안"],"full":"하나님께서 만물을\n그리스도의 발 아래에\n복종하게 하시고,\n그를 만물 위에\n교회의 머리로 삼으셨습니다.\n교회는 그의 몸이니,\n만물 안에서 만물을\n충만하게 하시는 분의\n충만함입니다.","compact":"하나님께서 만물을\n그리스도의 발 아래 두시고,\n그를 교회의 머리로\n삼으셨도다.\n교회는 그의 몸이니,\n만물을 충만하게 하시는 분의\n충만함이라.","oneline":"하나님께서 그를 만물 위에 교회의 머리로 삼으셨느니라.","comfort":"모든 것 위에 계신 분이 당신의 머리가 되시니까요.","original_tag":"신앙 회의","pastor":"이찬수"},{"ref":"베드로전서 2:25","type":"고백형","tags":["보호","인도하심","신뢰","평안"],"full":"전에 여러분은\n길 잃은 양과 같았으나,\n이제는 여러분 영혼의\n목자요 감독이신 분께로\n돌아왔습니다.","compact":"전에 길 잃은 양 같았으나,\n이제는 여러분 영혼의\n목자와 감독 되신 분께\n돌아왔느니라.","oneline":"이제 여러분 영혼의 목자 되신 이에게 돌아왔느니라.","comfort":"이미 당신의 목자와 감독이 되시는 분이 계시니까요.","original_tag":"신앙 회의","pastor":"이찬수"},{"ref":"에베소서 5:29","type":"선언형","tags":["보호","가정","신뢰"],"full":"그리스도께서 교회를\n양육하고\n보호하시는 것 같이,\n그분은 우리를 언제나\n사랑으로 돌보고\n지키시나이다.","compact":"그리스도께서 교회를\n돌보듯이,\n우리를 언제나 사랑으로\n지키시나이다.","oneline":"그리스도께서 우리를 사랑으로 양육하고 보호하시나이다.","comfort":"그분은 언제나 당신을 품에 안고 계시니까요.","original_tag":"신앙 회의","pastor":"이찬수"},{"ref":"고린도전서 4:19-20","type":"선언형","tags":["소망","신뢰","보호","평안"],"full":"주님의 나라인\n하나님의 나라는\n말에 있지 아니하고\n오직 능력에 있나이다.","compact":"하나님의 나라는\n말에 있지 아니하고\n오직 능력에 있나이다.","oneline":"하나님의 나라는 오직 능력에 있나이다.","comfort":"그분의 나라는 말뿐이 아닌\n실제적인 능력으로\n당신과 함께 하시니까요.","original_tag":"신앙 회의","pastor":"이찬수"},{"ref":"사도행전 11:26","type":"선언형","tags":["축복","소망","신뢰","평안"],"full":"제자들이 안디옥에서\n비로소 그리스도인이라\n일컬음을 받게 되었나이다.\n당신도 그 이름으로\n불리나이다.","compact":"당신은 비로소\n그리스도인이라 일컬음\n받게 되었나이다.","oneline":"당신은 그리스도인이라 불리나이다.","comfort":"당신의 이름은 이미 하나님의 자녀로 기록되어 있으니까요.","original_tag":"신앙 회의","pastor":"이찬수"},{"ref":"요한복음 13:15","type":"선언형","tags":["인도하심","결단","소망","순종"],"full":"제가 여러분에게\n행한 것같이\n여러분도 행하게 하려 하여\n제가 본을 보였노라.","compact":"여러분도 행하도록\n제가 친히 본을 보였노라.","oneline":"제가 친히 본을 보였노라.","comfort":"먼저 그 길을 걸으시며 당신의 길을 밝혀주신 분이 있으니까요.","original_tag":"신앙 회의","pastor":"이찬수"},{"ref":"갈라디아서 5:25","type":"선언형","tags":["인도하심","신뢰","순종","평안"],"full":"우리가 성령으로 말미암아\n살면,\n또한 성령의\n인도하심을 따라\n행하리라.","compact":"성령으로 살면,\n성령의 인도하심을 따라\n행하리라.","oneline":"성령으로 말미암아 우리는 행하리라.","comfort":"당신 안에서 역사하시는 성령님이 언제나 당신의 길을 인도하시니까요.","original_tag":"신앙 회의","pastor":"이찬수"},{"ref":"고린도전서 1:2","type":"선언형","tags":["축복","소망","신뢰","가정"],"full":"그리스도 예수 안에서\n거룩하여지고\n성도라 부르심을 받은\n당신은,\n주 예수 그리스도의\n이름을 부르는 모든 자들과\n함께하나이다.","compact":"그리스도 예수 안에서\n거룩하여지고\n성도라 부르심을 받은\n당신.","oneline":"당신은 성도라 부르심을 받았나이다.","comfort":"당신은 이미 거룩하게 구별된 하나님의 자녀이자 성도이니까요.","original_tag":"신앙 회의","pastor":"이찬수"},{"ref":"마태복음 6:7-8","type":"선언형","tags":["인도하심","신뢰","평안","보호"],"full":"당신이 구하기도 전에,\n당신에게 필요한 모든 것을\n하나님 아버지께서\n이미 다 아시느니라.","compact":"당신이 구하기도 전에\n하나님 아버지께서\n이미 아시나이다.","oneline":"하나님 아버지께서 당신의 필요를 이미 아시느니라.","comfort":"당신의 가장 깊은 필요까지도 다 알고 계신 분이니까요.","original_tag":"신앙 회의","pastor":"이찬수"},{"ref":"시편 23:4-5","type":"고백형","tags":["두려움","보호","평안","신뢰"],"full":"제가 사망의 음침한\n골짜기를 다닐지라도\n해를 두려워하지 않을 것은\n주님께서 저와 함께\n계시기 때문입니다.\n주님의 지팡이와 막대기가\n저를 언제나 안위하시고,\n제 원수들의 눈앞에서\n저를 위해 잔치를 베푸시며\n제 잔이 넘치게 하시나이다.","compact":"사망의 음침한 골짜기라도\n두렵지 않은 것은\n주님이 저와 함께하심이라.\n주님의 지팡이와 막대기가\n저를 안위하시고,\n제 잔이 넘치나이다.","oneline":"주님께서 저와 함께하시니 두렵지 않습니다.","comfort":"그 길 위에도 함께\n걸어주시는 분이 계시니까요.","original_tag":"신앙 회의","pastor":"이찬수"},{"ref":"열왕기상 19:5-6","type":"위로형","tags":["건강","보호","치유","인도하심"],"full":"그가 로뎀 나무 아래에\n누워 잠들었을 때,\n천사가 그를 어루만지며\n'일어나 먹으라'고 이르니라.\n그가 보니 머리맡에\n숯불에 구운 떡과\n한 병 물이 있었으니,\n그가 먹고 마시고\n다시 힘을 얻었나이다.","compact":"지쳐 잠든 그에게 천사가 나타나\n'일어나 먹으라' 하니,\n떡과 물이 준비되어 있었고\n힘을 얻었나이다.","oneline":"지쳐 잠든 그에게 필요한 것이 이미 준비되었나이다.","comfort":"지친 당신을 위해 미리\n필요한 것을 준비해 두신 분이 있으니까요.","original_tag":"신앙 회의","pastor":"이찬수"},{"ref":"마가복음 1:17-18","type":"선언형","tags":["인도하심","소망","직장사업","결단"],"full":"예수님께서 말씀하시기를\n\"나를 따라오십시오.\n내가 당신들을 사람 낚는\n어부가 되게 하리라.\"","compact":"나를 따라오십시오.\n내가 당신들을 사람 낚는\n어부가 되게 하리라.","oneline":"내가 당신들을 사람 낚는 어부가 되게 하리라.","comfort":"당신의 삶을 통해 이루실\n계획을 이미 말씀하신 분이에요.","original_tag":"신앙 회의","pastor":"이찬수"},{"ref":"창세기 18:18","type":"선언형","tags":["축복","소망","가정","인도하심"],"full":"아브라함을 통하여\n강대한 나라를 이루고,\n천하 만민이 그로 말미암아\n복을 받게 되리라.","compact":"아브라함을 통하여\n천하 만민이 복을 받게 되리라.","oneline":"천하 만민이 복을 받게 되리라.","comfort":"이미 당신의 삶을 통해\n복 주시겠다고 약속하신 분이에요.","original_tag":"신앙 회의","pastor":"이찬수"},{"ref":"고린도후서 5:18","type":"위로형","tags":["관계","평안","용서","신뢰"],"full":"모든 것이 하나님께로부터 왔나니,\n그분께서 그리스도를 통하여\n우리를 자신과 화목하게 하시고\n화목하게 하는 직분을\n우리에게 주셨습니다.","compact":"하나님께서 그리스도를 통하여\n우리를 자신과 화목하게 하셨습니다.","oneline":"하나님께서 우리를 자신과 화목하게 하셨습니다.","comfort":"당신과의 관계 회복을\n이미 이루신 분이에요.","original_tag":"신앙 회의","pastor":"이찬수"},{"ref":"마태복음 9:15","type":"위로형","tags":["평안","소망","감사","관계"],"full":"예수님께서 말씀하시기를\n\"혼인 잔치 손님들이\n신랑과 함께 있는 동안에\n어찌 슬퍼할 수 있으리이까?\"","compact":"신랑과 함께 있는 동안에\n어찌 슬퍼할 수 있으리이까?","oneline":"신랑과 함께 있는 동안에는 슬퍼할 수 없도다.","comfort":"가장 기쁜 소식을 가져오신\n분이 당신과 함께 계세요.","original_tag":"신앙 회의","pastor":"이찬수"},{"ref":"요한복음 15:11","type":"선언형","tags":["소망","평안","감사","축복"],"full":"내가 이 말을 너희에게 한 것은\n나의 기쁨이 너희 안에 머물러\n너희의 기쁨이 충만하게 하려 함이라.","compact":"나의 기쁨이 너희 안에 있어\n너희의 기쁨이 충만하게 하려 함이라.","oneline":"너희의 기쁨이 충만하게 하려 함이라.","comfort":"당신에게 온전한 기쁨을\n주시겠다고 약속하신 분이에요.","original_tag":"신앙 회의","pastor":"이찬수"},{"ref":"이사야 60:21-22","type":"선언형","tags":["소망","축복","인도하심","보호"],"full":"당신의 백성이 다 의롭게 되어\n영원히 땅을 차지할 것이며,\n그들은 내가 심은 가지요,\n내가 손으로 만든 것으로서\n나의 영광을 나타내리라.\n그 작은 자가 천 명을 이루겠고,\n그 약한 자가 강국을 이룰 것이라.\n때가 되면 나 여호와가 속히 이루리라.","compact":"당신의 백성이 다 의롭게 되어\n영원히 땅을 차지하리라.\n그 약한 자가 강국을 이룰 것이라.\n나 여호와가 속히 이루리라.","oneline":"나 여호와가 속히 이루리라.","comfort":"당신의 삶을 통해 영광 받으실 분이\n이미 모든 것을 계획하고 계시니까요.","original_tag":"신앙 회의","pastor":"이찬수"},{"ref":"히브리서 11:8","type":"위로형","tags":["신뢰","인도하심","불안","결단"],"full":"믿음으로 아브라함은\n부르심을 받았을 때에 순종하여,\n장래에 유업으로 받을 땅으로\n나아갔으니, 나아갈 바를\n알지 못하고 나아갔습니다.","compact":"아브라함은 부르심을 받았을 때,\n갈 바를 알지 못하고\n믿음으로 나아갔습니다.","oneline":"갈 바를 알지 못하고 믿음으로 나아갔습니다.","comfort":"당신의 길을 이미 알고 계신\n분이 인도하고 계세요.","original_tag":"신앙 회의","pastor":"이찬수"},{"ref":"창세기 22:12","type":"위로형","tags":["신뢰","순종","결단","인도하심"],"full":"네가 네 아들, 네 사랑하는 독자까지도\n나에게 아끼지 아니하였으니,\n이제야 내가 네가 하나님을\n경외하는 줄을 아노라.","compact":"네가 네 독자까지도 나에게\n아끼지 아니하였으니,\n이제야 내가 하나님을\n경외하는 줄을 아노라.","oneline":"내가 이제야 네가 하나님을 경외하는 줄을 아노라.","comfort":"당신의 마음을 이미\n알고 계신 분이에요.","original_tag":"신앙 회의","pastor":"이찬수"},{"ref":"출애굽기 15:1","type":"선언형","tags":["신뢰","보호","감사","소망"],"full":"이때에 모세와\n이스라엘 자손이 이 노래로\n주 여호와를 찬양하나이다.\n주님을 찬송하오니,\n주님은 높고 영화로우시며,\n말과 그 위에 탄 자들을\n바다에 던지셨음이로다.","compact":"주님은 높고 영화로우시며,\n능력으로 역사하셨나이다.","oneline":"주님은 지극히 높고 영화로우시며 능력으로 역사하시나이다.","comfort":"과거에 그러하셨던 분이\n지금도 당신과 함께 계십니다.","original_tag":"신앙 회의","pastor":"이찬수"},{"ref":"베드로전서 2:24","type":"선언형","tags":["치유","건강","용서","소망"],"full":"친히 나무에 달려\n그 몸으로 우리의 죄를\n담당하셨습니다.\n이는 우리로 하여금\n죄에 대하여 죽고\n의에 대하여 살게\n하시려는 것입니다.\n그분이 채찍에 맞으심으로\n여러분은 이미 나음을 얻었나이다.","compact":"그분이 채찍에 맞으심으로\n여러분은 나음을 얻었나이다.","oneline":"그가 채찍에 맞으심으로 당신은 나음을 얻었나이다.","comfort":"이미 당신을 위해 고난받으시고\n회복을 약속하신 분이십니다.","original_tag":"신앙 회의","pastor":"이찬수"},{"ref":"느헤미야 9:20","type":"선언형","tags":["인도하심","신뢰","보호","소망"],"full":"또한 주의 선한 영을 주시어\n그들을 가르치셨으며,\n주의 만나가 그들의 입에서\n끊어지지 않게 하셨고,\n그들의 목마름 때문에\n그들에게 물을 주셨나이다.","compact":"주의 선한 영으로 가르치시고,\n만나와 물로 끊임없이 공급하시도다.","oneline":"주의 선한 영으로 인도하시며 끊임없이 공급하시도다.","comfort":"지금까지 인도하셨던 분이\n앞으로도 당신을 인도하실 것입니다.","original_tag":"신앙 회의","pastor":"이찬수"},{"ref":"시편 127:2","type":"선언형","tags":["평안","신뢰","소망"],"full":"일찍 일어나고 늦게 누우며\n수고의 떡을 먹는 것이\n헛될 때가 있나이다.\n그러므로 여호와께서\n그의 사랑하시는 자에게는\n단잠을 주시도다.","compact":"여호와께서 그의 사랑하시는\n자에게는 단잠을 주시도다.","oneline":"여호와께서 사랑하시는 자에게 단잠을 주시도다.","comfort":"당신의 모든 수고를 아시고\n회복을 주시는 분이 계십니다.","original_tag":"위기대처","pastor":"이찬수"},{"ref":"누가복음 6:20","type":"선언형","tags":["재정어려움","소망","축복"],"full":"예수님께서 눈을 들어\n제자들을 보시고 이르시되,\n너희 가난한 자는 복이 있나니,\n하나님의 나라가 바로\n너희의 것임이로다.","compact":"너희 가난한 자는 복이 있나니,\n하나님의 나라가 너희의 것임이로다.","oneline":"하나님의 나라가 바로 당신의 것임이로다.","comfort":"지금 당신이 겪는 어려움 뒤에는\n영원한 약속이 기다리고 있습니다.","original_tag":"재정어려움","pastor":"팀 켈러"},{"ref":"이사야 61:1","type":"선언형","tags":["소망","인도하심","축복","직장사업"],"full":"주 여호와의 영이\n제게 임하셨으니,\n이는 여호와께서 제게\n기름을 부으시어\n가난한 자들에게\n아름다운 소식을 전하게\n하려 하심이라.","compact":"주 여호와께서 당신에게 기름을 부으사\n아름다운 소식을 전하게 하려 하심이라.","oneline":"주님께서 당신에게 아름다운 소식을 전하게 하려 하심이라.","comfort":"당신의 삶을 통해 주님의\n좋은 소식이 흘러가도록 부르셨습니다.","original_tag":"재정어려움","pastor":"팀 켈러"},{"ref":"Matthew 6:25","type":"위로형","tags":["불안","신뢰","평안","재정어려움"],"full":"그러므로 내가\n너희에게 이르노니,\n너희 생명을 위하여\n무엇을 먹을까,\n무엇을 마실까\n걱정하지 말라.\n또한 너희 몸을 위하여\n무엇을 입을까\n염려하지 말라.\n생명이 음식보다 소중하고,\n몸이 의복보다 소중하지\n아니한가요?","compact":"생명을 위하여 무엇을 먹을까 마실까,\n무엇을 입을까 염려하지 마십시오.","oneline":"삶을 위해 무엇을 염려할지라도, 생명은 그보다 귀한 것입니다.","comfort":"이미 당신의 모든 필요를 아시고\n준비하시는 분이 계십니다.","original_tag":"재정어려움","pastor":"Timothy Kell
