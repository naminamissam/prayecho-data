 그들의 하나님이 될 것이며, 그들은 나의 백성이 되리라.\n작은 자로부터 큰 자까지 모두가 나를 알게 될 것이라 주님께서 선언하십니다.","compact":"주님께서 법을 마음에 기록하고 당신의 하나님이 되시리니,\n모두가 주님을 알게 될 것입니다.","oneline":"나는 그들의 하나님이 될 것이며 그들은 나의 백성이 되리라.","comfort":"이미 당신의 마음속에 함께하시겠다고 약속하신 분이에요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"Psalm 19:1-6","type":"고백형","tags":["신뢰","감사","소망","평안"],"full":"하늘이 하나님의 영광을 선포하고, 궁창이 그의 손으로 지으신 놀라운 일을 나타냅니다.\n날마다 낮이 낮에게 말하고, 밤마다 밤이 지식을 전하는도다.\n온 땅에 통하는 주님의 영광이요 세상 끝까지 이르는 주님의 말씀이십니다.","compact":"하늘이 하나님의 영광을 선포하며,\n밤낮으로 주님의 위대한 창조를 나타냅니다.","oneline":"하늘이 하나님의 영광을 선포하는도다.","comfort":"말씀 없이도 온 세상을 다스리시는 분이에요.","original_tag":"신앙회의","pastor":"Dr. Timothy Keller"},{"ref":"Psalm 19:7-11","type":"고백형","tags":["신뢰","인도하심","소망","평안"],"full":"여호와의 율법은 완전하여 우리의 영혼을 소성시키고, 여호와의 증거는 확실하여 우둔한 자에게 지혜를 주시는도다.\n여호와의 교훈은 정직하여 마음에 기쁨을 주시고, 그의 계명은 순결하여 눈을 밝게 하시며,\n주님의 법규는 진실하여 영원히 의로우십니다.","compact":"주님의 율법은 완전하여 영혼을 소성시키고, 교훈은 마음에 기쁨을 주시며,\n그 계명은 눈을 밝게 하는도다.","oneline":"여호와의 율법은 완전하여 영혼을 소성시키는도다.","comfort":"주님의 말씀은 언제나 당신의 영혼을 회복시키고 기쁨을 주실 거예요.","original_tag":"신앙회의","pastor":"Dr. Timothy Keller"},{"ref":"Psalm 19:12-14","type":"고백형","tags":["회개","용서","보호","신뢰"],"full":"누가 자신의 허물을 온전히 깨달을 수 있겠습니까? 주님, 숨겨진 저의 허물들을 깨끗하게 하소서.\n주의 종이 고의적인 죄를 짓지 않도록 붙들어 주시며, 그 죄들이 저를 지배하지 못하게 하소서.\n나의 반석이시요 구속자이신 주님 앞에 저의 말과 묵상이 항상 기쁨이 되기를 원하나이다.","compact":"주님, 숨겨진 저의 허물들을 깨끗하게 하시고, 고의적인 죄로부터 저를 붙들어 주소서.\n저의 말과 묵상이 주님께 기쁨이 되기를 원합니다.","oneline":"주님, 숨겨진 허물에서 나를 깨끗하게 하소서.","comfort":"이미 당신의 모든 것을 아시고 깨끗하게 하시는 분이세요.","original_tag":"신앙회의","pastor":"Dr. Timothy Keller"},{"ref":"Galatians 3:13","type":"선언형","tags":["치유","용서","보호","소망"],"full":"그리스도께서 우리를 위하여\n친히 저주를 받으심으로,\n율법의 저주에서 우리를 속량하셨도다.","compact":"그리스도께서 우리를 위해 저주가 되시어 율법의 저주에서 우리를 속량하셨도다.","oneline":"그리스도께서 율법의 저주에서 우리를 속량하셨도다.","comfort":"이미 당신을 위해 모든 저주를 끊으신 분이에요.","original_tag":"신앙회의","pastor":"Dr. Timothy Keller"},{"ref":"Proverbs 16:9","type":"선언형","tags":["인도하심","신뢰","평안","소망"],"full":"사람이 마음으로 자기의 길을 계획할지라도,\n그 걸음을 인도하고 정하시는 분은 바로 여호와이심이라.","compact":"사람이 계획할지라도, 그 걸음은 주님께서 인도하시는도다.","oneline":"그 걸음을 인도하시는 분은 여호와이심이라.","comfort":"이미 당신의 모든 걸음을 인도하시겠다고 말씀하신 분이에요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"Proverbs 16:3","type":"선언형","tags":["직장사업","인도하심","신뢰","축복"],"full":"당신이 하는 모든 일을 여호와께 맡겨 드리십시오.\n그리하면 당신의 계획하는 모든 것이 견고하게 서고\n반드시 성공할 것이라 주님께서 약속하셨습니다.","compact":"당신의 모든 일을 주님께 맡기십시오.\n그리하면 계획하는 모든 것이 성공할 것입니다.","oneline":"네가 하는 일을 여호와께 맡기라 그리하면 네 계획이 성공하리라.","comfort":"이미 당신의 수고를 받으시고 이루시겠다고 약속하신 분이에요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"Proverbs 16:33","type":"선언형","tags":["인도하심","신뢰","평안","소망"],"full":"제비는 사람이\n뽑아 던질지라도,\n그 모든 일의 결정은\n오직 여호와께로부터\n나오는도다.","compact":"제비는 사람이 던져도,\n모든 결정은\n여호와께로부터 나옴이라.","oneline":"모든 결정은 오직 여호와께로부터 나오는도다.","comfort":"이미 당신의 모든 상황을\n결정하고 계신 분이에요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"Genesis 50:20","type":"고백형","tags":["소망","신뢰","보호","감사"],"full":"당신들이 저를\n해하려 하였지만,\n하나님께서는\n그것을 선으로 바꾸사\n오늘날처럼 많은 생명을\n구원하게 하셨도다.","compact":"사람들은 당신을\n해하려 했으나,\n하나님은 그것을 선으로 바꾸사\n큰 구원을 이루셨도다.","oneline":"하나님은 그것을 선으로 바꾸사 큰 구원을 이루셨도다.","comfort":"당신을 해하려던 모든 순간까지도\n선으로 바꾸시는 분이에요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"Hebrews 1:1-2","type":"선언형","tags":["신뢰","인도하심","소망","평안"],"full":"하나님께서는 옛적에\n선지자들을 통하여\n말씀하셨으나,\n이 마지막 날들에는\n모든 것의 상속자이신\n그의 아들을 통하여\n우리에게 말씀하셨도다.\n그 아들을 통해\n모든 우주를 창조하셨음이라.","compact":"하나님께서 그의 아들을 통해\n우리에게 말씀하셨으니,\n그 아들을 만유의\n상속자로 세우시고\n모든 우주를 창조하셨도다.","oneline":"하나님께서 그의 아들을 통하여 우리에게 말씀하셨도다.","comfort":"이미 아들을 통해 모든 것을\n말씀하고 만드신 분이에요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"Hebrews 1:3","type":"선언형","tags":["보호","신뢰","평안","용서"],"full":"그 아들은 하나님의\n영광의 광채이시며\n그 본체의 형상이시요,\n그의 능력의 말씀으로\n만물을 붙들고 계시는도다.\n친히 우리의 죄를 정결케 하시고\n지극히 높으신 분의\n우편에 앉으셨음이라.","compact":"그 아들은 하나님의\n영광의 광채이시며,\n능력의 말씀으로\n만물을 붙들고 계시는도다.\n우리의 죄를 정결케 하시고\n우편에 앉으셨음이라.","oneline":"그 아들은 능력의 말씀으로 만물을 붙들고 계시는도다.","comfort":"이미 능력의 말씀으로\n모든 것을 붙들고 계신 분이에요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"요한1서 4:4","type":"선언형","tags":["신뢰","보호","두려움","소망"],"full":"자녀들아, 너희는\n하나님께 속하였고\n또 그들을 이기었나니,\n이는 너희 안에 계신 이가\n세상에 있는 자보다 크심이라.","compact":"너희 안에 계신 분이\n세상에 있는 그 어떤 이보다 크시도다.","oneline":"너희 안에 계신 분이 세상보다 크시도다.","comfort":"당신 안에 계신 분은\n세상의 어떤 힘보다 강하시니까요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"예레미야 29:7","type":"선언형","tags":["평안","소망","직장사업","가정"],"full":"당신이 평안을 구하는\n그 성읍에\n평안이 임함으로,\n당신 또한 평안할 것이옵니다.","compact":"당신이 평안을 구하는 곳에\n평안이 임하고,\n당신 또한 평안하리라.","oneline":"그 평안함으로 당신도 평안하리라.","comfort":"당신이 있는 그곳에서부터\n평안을 주시겠다고 약속하신 분이에요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"1 Peter 1:6-7","type":"위로형","tags":["신뢰","소망","기다림","두려움"],"full":"이로 인해 당신은\n크게 기뻐하나이다.\n비록 이제 잠시 동안\n여러 가지 시험으로 인해\n슬퍼할 수밖에 없을지라도,\n당신의 믿음의\n진실함이 증명되어\n예수 그리스도께서\n나타나실 때에\n칭찬과 영광과 존귀를\n얻게 하려 함이니,\n불로 연단되어도\n없어질 금보다 더 귀한 것이옵니다.","compact":"당신의 믿음의 시련은\n금보다 귀하여,\n주님께서 나타나실 때\n칭찬과 영광을 가져다줄 것이옵니다.","oneline":"믿음의 시련은 금보다 귀하여, 칭찬과 영광을 얻게 하리라.","comfort":"지금 겪는 모든 순간이\n당신의 믿음을 더욱 빛나게 하는\n과정임을 아시는 분이에요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"Isaiah 43:2","type":"선언형","tags":["보호","두려움","신뢰","평안"],"full":"당신이 물 가운데로\n지날 때에도,\n내가 당신과 함께할 것이며\n강을 건널 때에도\n물이 당신을 덮치지 아니하리라.\n당신이 불 가운데로\n걸어갈지라도\n타지 않을 것이며,\n불꽃이 당신을 사르지도 못하리라.","compact":"당신이 물과 불 가운데로\n지날 때에도,\n내가 당신과 함께할 것이며\n당신은 타지 않으리라.","oneline":"내가 당신과 함께하리니, 물도 불도 당신을 해치지 못하리라.","comfort":"그 어떤 순간에도\n함께 하시겠다고 먼저 말씀하신 분이에요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"요한복음 8:32","type":"선언형","tags":["소망","평안","인도하심","신뢰"],"full":"진리를 깨달으시리니,\n그 진리가 당신을 참으로\n자유롭게 할 것이옵니다.","compact":"진리가 당신을 자유롭게 하리라.","oneline":"진리가 당신을 자유롭게 하리라.","comfort":"당신을 묶는 모든 것으로부터\n자유케 하시겠다고 약속하신 분이에요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"요한복음 1:14","type":"위로형","tags":["평안","신뢰","소망","감사"],"full":"말씀이 육신이 되어\n우리 가운데 거하시매,\n우리가 그분의 영광을 보나이다.\n이는 아버지의\n독생자의 영광이요,\n은혜와 진리가\n충만한 영광이옵니다.","compact":"말씀이 육신이 되어\n우리 가운데 거하시니,\n은혜와 진리가 충만하도다.","oneline":"은혜와 진리가 충만하신 분이 우리 가운데 계시도다.","comfort":"은혜와 진리가 가득하신 분이\n지금 당신 곁에 계시니까요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"Deuteronomy 7:7","type":"위로형","tags":["신뢰","소망","평안","축복"],"full":"주님께서 당신을 사랑하셨으므로\n당신에게 마음을 두시고\n택하신 것이옵니다.\n당신이 다른 어떤 민족보다\n많기 때문이 아니요,\n오히려 모든 민족 중에\n가장 적었음에도\n그리 하셨으니,\n이는 오직 주님께서\n당신을 사랑하셨기\n때문입니다.","compact":"주님께서 당신을 택하시고\n사랑하신 것은,\n당신이 크고 강해서가 아니라\n오직 주님의 사랑\n때문이었나이다.","oneline":"주님께서 당신을 사랑하셨으므로 당신을 택하셨나이다.","comfort":"당신이 어떤 모습이든, 그 모든 것을 아시면서 먼저 사랑하시기로 결정하신 분이에요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"Job 1:21","type":"고백형","tags":["신뢰","슬픔","감사","평안"],"full":"내가 어머니의 태에서\n벌거벗은 몸으로 나왔으니,\n벌거벗은 몸으로\n돌아갈 것이옵니다.\n주님께서 주셨고,\n또한 주님께서\n거두어가셨으니,\n주님의 이름이\n찬양을 받으시옵소서.","compact":"주님께서 주시고\n거두어가시니,\n주님의 이름이\n찬양을 받으시옵소서.","oneline":"주님께서 주셨고 거두어가셨으니, 주님의 이름이 찬양을 받으시옵소서.","comfort":"모든 것을 주관하시는 분이시기에, 당신의 마음을 붙드시는 분이에요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"요한복음 18:5-6","type":"선언형","tags":["신뢰","두려움","보호"],"full":"그들이 예수께 답하기를\n'나사렛 예수라' 하였더니,\n주님께서 '내가 그니라'\n말씀하셨습니다.\n주님께서 내가 그니라\n하셨을 때,\n그들이 뒤로 물러나\n땅에 엎드러졌으니\n그분이야말로\n참 하나님이십니다.","compact":"주님께서 '내가 그니라'\n하시니,\n그들이 뒤로 물러나\n땅에 엎드러졌습니다.","oneline":"주님께서 '내가 그니라' 선언하셨습니다.","comfort":"이미 그 자리에서 당신을 붙들고 계신 분이에요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"출애굽기 3:14","type":"선언형","tags":["신뢰","인도하심","소망"],"full":"하나님께서 모세에게\n말씀하셨습니다.\n'나는 스스로 있는 자이니라.'\n또 말씀하시기를\n'너는 이스라엘 자손에게\n이같이 전하라.\n스스로 있는 자가 나를\n너희에게 보내셨다 하라.'","compact":"하나님께서 '나는 스스로\n있는 자이니라'\n말씀하셨으니,\n영원히 계시는 분입니다.","oneline":"'나는 스스로 있는 자이니라' 영원하신 하나님이십니다.","comfort":"그 자리에 영원히 계시는 분이 있으니까요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"요한복음 8:58","type":"선언형","tags":["신뢰","소망","평안"],"full":"예수님께서 말씀하셨습니다.\n'진실로, 진실로\n내가 너희에게 말하노니,\n아브라함이 태어나기 전부터\n내가 있느니라.'","compact":"아브라함이 나기 전부터\n내가 있느니라,\n예수님이 선언하셨습니다.","oneline":"아브라함이 나기 전부터 내가 있느니라.","comfort":"과거도 현재도 미래도 주관하시는 분이시니까요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"요한복음 1:14","type":"선언형","tags":["신뢰","평안","감사","소망"],"full":"말씀이 육신이 되어\n우리 가운데 거하시매,\n우리가 그분의 영광을\n보았나니,\n이는 아버지의 독생자의\n영광이요\n은혜와 진리가 충만하였더라.","compact":"말씀이 육신이 되어\n우리 가운데 거하시매,\n은혜와 진리가 충만하였더라.","oneline":"말씀이 육신이 되어 우리 가운데 거하셨도다.","comfort":"당신과 함께하기 위해 오신 분이에요.","original_tag":"신앙회의","pastor":"팀 켈러 (Timothy Keller)"},{"ref":"히브리서 2:18","type":"위로형","tags":["두려움","불안","보호","치유"],"full":"주님께서 친히 시험을 받아\n고난을 당하셨으므로,\n시험받는 자들을 능히\n도우실 수 있느니라.","compact":"주님께서 시험을 받으셨으니,\n시험받는 자들을 능히\n도우실 수 있습니다.","oneline":"시험받는 자들을 능히 도우실 수 있느니라.","comfort":"당신의 고통을 이미 아는 분이에요.","original_tag":"신앙회의","pastor":"팀 켈러 (Timothy Keller)"},{"ref":"1 Corinthians 15:20","type":"선언형","tags":["소망","평안","신뢰"],"full":"그러나 이제 그리스도께서\n잠자는 자들의\n첫 열매가 되시어,\n죽은 자 가운데서\n다시 살아나셨느니라.","compact":"그리스도께서 죽은 자 가운데서\n다시 살아나셨으니,\n첫 열매가 되셨도다.","oneline":"그리스도께서 죽은 자 가운데서 다시 살아나셨느니라.","comfort":"당신의 마지막도 이미 이기신 분이세요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"Philippians 4:6-7","type":"위로형","tags":["불안","평안","신뢰","보호"],"full":"아무것도 염려하지 마십시오.\n오직 모든 일에\n기도와 간구로,\n감사함으로 당신의\n아뢰는 바를\n하나님께 알리십시오.\n그리하면 모든 지각에\n뛰어난\n하나님의 평강이\n그리스도 예수 안에서\n당신의 마음과 생각을\n지키시리라.","compact":"아무것도 염려하지 말고\n기도하십시오.\n하나님의 평강이\n당신의 마음과 생각을\n지키시리라.","oneline":"하나님의 평강이 당신의 마음과 생각을 지키시리라.","comfort":"이미 붙드시겠다고 먼저 말씀하신 분이에요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"Philippians 4:11-12","type":"고백형","tags":["재정어려움","신뢰","평안","소망"],"full":"내가 궁핍하므로\n말하는 것이 아니니라.\n나는 어떤 형편에든지\n자족하기를 배웠노니.\n나는 비천에 처할\n줄도 알고\n풍부에 처할 줄도 알아,\n모든 일 곧 배부르거나\n굶주리거나,\n풍부하거나 궁핍하거나,\n어떤 형편에든지\n일체의 비결을 배웠노라.","compact":"나는 어떤 형편에든지\n자족하기를 배웠노라.\n어떤 상황에서도\n일체의 비결을 배웠노라.","oneline":"나는 어떤 형편에든지 자족하기를 배웠노라.","comfort":"어떤 상황에서도 당신을 붙들어 주실 분이 함께 계시니까요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"다니엘 3:17-18","type":"고백형","tags":["신뢰","결단","두려움","보호"],"full":"왕이여, 만일 우리가 섬기는 하나님이 계시다면, 그분은 우리를 맹렬히 타는 풀무불 가운데에서\n능히 건져내실 것이요, 왕의 손에서도 우리를 건져내시리이다. 그렇게 하지 아니하실지라도,\n왕이여, 우리가 왕의 신들을 섬기지 아니하고 왕이 세우신 금 신상에게 절하지도 아니할 줄을 아옵소서.","compact":"우리가 섬기는 하나님은 능히 건져내실 것이요,\n그렇게 하지 아니하실지라도 우리는 주님을 섬기리이다.","oneline":"능히 건져내시겠고, 아니하실지라도 우리는 섬기리이다.","comfort":"어떤 상황 속에서도 당신과 함께하실 분이 계시니까요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"이사야 43:2","type":"선언형","tags":["보호","인도하심","신뢰","두려움"],"full":"네가 물 가운데로 지날 때에 내가 너와 함께 할 것이라.\n강을 건널 때에 물이 너를 침몰하지 못할 것이며,\n네가 불 가운데로 지날 때에 타지도 아니할 것이요, 불꽃이 너를 사르지도 못하리니.","compact":"네가 물과 불 가운데로 지날 때에 내가 너와 함께 할 것이라.\n물과 불이 너를 해치지 못하리니.","oneline":"네가 물과 불 가운데로 지날 때에 내가 너와 함께 할 것이라.","comfort":"험한 길에서도 당신과 동행하시겠다고 약속하신 분이에요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"베드로전서 1:7","type":"위로형","tags":["신뢰","소망","슬픔","감사"],"full":"이것은 불로 연단하여도 없어질 금보다 더 귀한 당신의 믿음의 확실함이,\n예수 그리스도께서 나타나실 때에 칭찬과 영광과 존귀를 얻게 하려 함이라.","compact":"불로 연단된 당신의 믿음은 금보다 더 귀하여,\n주님 나타나실 때 칭찬과 영광을 얻게 할 것이니라.","oneline":"당신의 믿음은 금보다 더 귀하여 칭찬과 영광을 얻게 할 것이니라.","comfort":"당신의 인내를 가장 아름답게 여기시는 분이에요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"시편 103:2-3","type":"선언형","tags":["건강","치유","감사"],"full":"여호와를 송축하라 내 영혼아,\n그의 은택을 잊지 말라. 네 모든 죄악을 사하시며,\n네 모든 병을 고치시는도다.","compact":"그의 은택을 잊지 말라.\n네 모든 병을 고치시는도다.","oneline":"네 모든 병을 고치시는도다.","comfort":"잊지 않으시는 분이에요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"1 John 1:1-4","type":"선언형","tags":["소망","신뢰","감사","평안"],"full":"태초부터 있던 생명의 말씀에 관하여 우리가 들은 바요, 눈으로 본 바요,\n주목하고 우리의 손으로 만진 바라. 이 생명이 나타나셨으므로 우리가 보았고\n증언하여 여러분에게 이 영원한 생명을 선포하나니, 이는 아버지와 함께 계시다가 우리에게 나타나신 분이심이라.","compact":"우리가 보고 만진 바, 태초부터 있던 생명의 말씀이 나타나셨으므로,\n우리가 여러분에게 영원한 생명을 선포하나이다.","oneline":"우리는 여러분에게 영원한 생명을 선포하나이다.","comfort":"이미 눈으로 보고 손으로 만진 생명을 전하고 계시니까요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"John 1:1","type":"선언형","tags":["신뢰","소망","보호","평안"],"full":"태초에 말씀이 계셨으니,\n이 말씀이 하나님과 함께 계셨고,\n이 말씀은 곧 하나님이시로다.","compact":"태초에 말씀이 계셨고,\n그 말씀은 곧 하나님이시로다.","oneline":"말씀이 곧 하나님이시로다.","comfort":"모든 것의 시작에 당신의 하나님이 계시니까요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"John 1:4-5","type":"선언형","tags":["소망","평안","보호","두려움"],"full":"그분 안에 생명이 있었으니, 이 생명은 모든 사람의 빛이었나이다.\n그 빛이 어둠 속에 비치었으나,\n어둠이 그 빛을 이기지 못하였나이다.","compact":"그 빛이 어둠 속에 비치었으나,\n어둠이 그 빛을 이기지 못하였나이다.","oneline":"어둠이 그 빛을 결코 이기지 못하였나이다.","comfort":"이미 당신 안에서 빛이 승리하고 있으니까요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"Isaiah 9:2","type":"위로형","tags":["소망","두려움","평안","인도하심"],"full":"어둠 속에 걷던 백성들이 큰 빛을 보았고,\n사망의 그늘진 땅에 거하는 자들 위에 빛이 비추었나이다.","compact":"어둠 속에 걷던 백성들이 큰 빛을 보았고,\n사망의 그늘진 땅에 빛이 비추었나이다.","oneline":"사망의 그늘진 땅 위에 빛이 비추었나이다.","comfort":"가장 깊은 어둠 속에서도 빛을 비추시겠다고 약속하신 분이에요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"요한복음 4:35","type":"선언형","tags":["소망","인도하심","직장사업","결단"],"full":"너희는 '넉 달이 지나야 추수할 때가 이르겠다' 하지 아니하느냐?\n그러나 나는 너희에게 이르노니,\n너희 눈을 들어 밭을 보라. 이미 희어져 추수하게 되었나이다.","compact":"너희 눈을 들어 밭을 보라.\n이미 희어져 추수하게 되었나이다.","oneline":"이미 밭이 희어져 추수하게 되었나이다.","comfort":"지금이 바로 수확할 때임을 알려주시는 분이에요.","original_tag":"신앙회의","pastor":"Dr. Timothy Keller"},{"ref":"Acts 4:11","type":"선언형","tags":["소망","인도하심","신뢰","보호"],"full":"그분은 '건축자들이 버린 돌이지만,\n이제는 모퉁이의 머릿돌이 되었나이다'라고 기록된 바로 그분이십니다.","compact":"건축자들이 버린 돌이 이제는 가장 귀한\n모퉁이의 머릿돌이 되었나이다.","oneline":"버려진 돌이 모퉁이의 머릿돌이 되었나이다.","comfort":"가장 쓸모없다 여겨졌던 것조차\n가장 귀하게 쓰시는 분이에요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"Acts 4:12","type":"선언형","tags":["소망","신뢰","보호","결단"],"full":"다른 어떤 이로서는\n구원을 받을 수 없나니,\n천하 사람 중에\n우리를 구원할\n다른 이름을 주신 일이\n없으시기 때문입니다.","compact":"구원은 다른 어떤 이로도\n받을 수 없나니,\n우리를 구원할 이름은\n오직 한 분뿐입니다.","oneline":"우리를 구원할 다른 이름은 없나이다.","comfort":"유일한 구원의 이름으로\n당신을 부르시고 계시니까요.","original_tag":"신앙회의","pastor":"Timothy Keller"},{"ref":"요한복음 1:12-13","type":"선언형","tags":["소망","신뢰","보호","자녀양육"],"full":"그분을 영접하는 자,\n곧 그 이름을 믿는 자들에게는\n하나님의 자녀가 되는\n권세를 주셨으니,\n이는 혈통이나\n육신의 뜻으로가 아니라\n오직 하나님께로부터\n난 자들이기 때문입니다.","compact":"그분을 믿는 자들에게는\n하나님의 자녀가 되는\n권세를 주셨나니,\n오직 하나님께로부터\n난 자들임이라.","oneline":"믿는 자들에게는\n하나님의 자녀가 되는\n권세를 주셨나이다.","comfort":"이미 당신을 자녀로 삼겠다고\n먼저 말씀하신 분이에요.","original_tag":"신앙회의","pastor":"팀 켈러"},{"ref":"John 17:23","type":"선언형","tags":["관계","평안","보호","신뢰"],"full":"내가 그들 안에,\n아버지께서 내 안에 계시나니,\n이는 그들이 완전히\n하나가 되게 하려 함이라.\n그리하여 세상이\n주께서 나를 보내신 것과,\n나를 사랑하심같이\n그들도 사랑하신 것을\n알게 될 것이니이다.","compact":"내가 그들 안에 있고\n아버지께서 내 안에 계시니,\n주께서 나를 사랑하심같이\n그들도 사랑하시나이다.","oneline":"주께서 나를 사랑하심같이\n그들도 사랑하시나이다.","comfort":"이미 그분께서 당신 안에 거하시고,\n당신을 사랑하고 계시니까요.","original_tag":"신앙회의","pastor":"Dr. Timothy Keller"},{"ref":"2 Corinthians 3:18","type":"선언형","tags":["소망","인도하심","축복","평안"],"full":"우리가 다 수건을 벗은 얼굴로\n거울을 보는 것 같이\n주의 영광을 보매,\n그와 같은 형상으로 변화하여\n영광에서 영광에 이르니,\n곧 주의 영으로 말미암음이니라.","compact":"우리가 주의 영광을 보매,\n그와 같은 형상으로 변화하여\n영광에 이르나니,\n이는 주의 영으로\n말미암음이니라.","oneline":"우리가 주의 영으로 말미암아\n그와 같은 형상으로 변화하여\n영광에 이르나이다.","comfort":"이미 당신을 온전히\n변화시키고 계신 분이 있으니까요.","original_tag":"신앙회의","pastor":"Dr. Timothy Keller"},{"ref":"1 John 3:2","type":"선언형","tags":["소망","평안","보호","인도하심"],"full":"사랑하는 여러분,\n이제 우리는 하나님의 자녀입니다.\n우리가 앞으로 어떻게 될지는\n아직 분명히 드러나지 않았으나,\n그분께서 나타나시면 우리가\n그분과 같이 될 것을 아나니,\n이는 우리가 그분을\n있는 그대로 볼 것이기 때문입니다.","compact":"우리는 하나님의 자녀이며,\n그분께서 나타나시면\n그분과 같이 될 것입니다.","oneline":"우리는 하나님의 자녀이며,\n그분과 같이 될 것입니다.","comfort":"이미 당신의 정체성이\n확정되어 있으니까요.","original_tag":"신앙회의","pastor":"Dr. Timothy Keller"},{"ref":"John 14:21","type":"선언형","tags":["관계","인도하심","신뢰","보호"],"full":"나의 계명을 가지고\n지키는 자라야\n나를 사랑하는 자니,\n나를 사랑하는 자는\n내 아버지께 사랑을 받을 것이요,\n나도 그를 사랑하여\n그에게 나를 나타내리라.","compact":"나를 사랑하는 자는\n내 아버지께 사랑을 받을 것이요,\n나도 그에게 나를 나타내리라.","oneline":"내가 그를 사랑하여\n그에게 나를 나타내리라.","comfort":"이미 당신을 향해\n마음 문을 여시겠다고\n약속하셨으니까요.","original_tag":"신앙회의","pastor":"Tony Evans"},{"ref":"2 Chronicles 20:12","type":"고백형","tags":["신뢰","인도하심","불안","두려움"],"full":"오 우리 하나님이여,\n주께서 그들을 심판하지\n아니하시겠나이까?\n우리를 치러 오는\n이 큰 무리 앞에\n우리가 능력이 없사오며,\n우리는 어떻게 해야 할지도\n알지 못하오니,\n오직 우리의 눈은\n주께로 향하나이다.","compact":"우리는 능력이 없고\n무엇을 해야 할지도 모르지만,\n오직 우리의 눈은\n주께로 향하나이다.","oneline":"오직 우리의 눈은 주께로 향하나이다.","comfort":"그 시선을 이미\n알고 계신 분이 계시니까요.","original_tag":"신앙회의","pastor":"Dr. Tony Evans"},{"ref":"2 Chronicles 20:15","type":"선언형","tags":["두려움","불안","보호","평안"],"full":"여호와께서 이같이\n말씀하시기를\n'너희는 이 큰 무리로 말미암아\n두려워하거나 놀라지 말라.\n이 전쟁은 너희에게\n속한 것이 아니요,\n하나님께 속한 것이니라.'","compact":"두려워하거나 놀라지 말라.\n이 전쟁은 너희에게\n속한 것이 아니요,\n하나님께 속한 것이니라.","oneline":"이 전쟁은 너희에게\n속한 것이 아니요,\n하나님께 속한 것이니라.","comfort":"이미 당신의 싸움이 아니라고\n말씀하신 분이 계시니까요.","original_tag":"신앙회의","pastor":"Dr. Tony Evans"},{"ref":"Romans 3:4","type":"선언형","tags":["신뢰","평안","보호","인도하심"],"full":"결코 그럴 수 없느니라!\n사람은 다 거짓말쟁이일지라도,\n오직 하나님께서는 참되시다.","compact":"사람은 다 거짓말쟁이일지라도,\n하나님께서는 참되시니라.","oneline":"하나님께서는 참되시니라.","comfort":"이미 참되시다고\n스스로 선언하신 분이 계시니까요.","original_tag":"신앙회의","pastor":"Tony Evans"},{"ref":"2 Corinthians 4:18","type":"위로형","tags":["소망","평안","인도하심","기다림"],"full":"우리가 보이는 것들을\n바라보지 않고,\n보이지 않는 것들을 바라봄은,\n보이는 것들은 잠시뿐이지만\n보이지 않는 것들은\n영원하기 때문입니다.","compact":"우리는 보이는 것이 아니라\n보이지 않는 것을 바라봅니다.\n보이는 것은 잠시뿐이지만\n보이지 않는 것은 영원합니다.","oneline":"보이는 것은 잠시뿐이지만\n보이지 않는 것은 영원합니다.","comfort":"이미 영원한 것을 바라보라고\n초대하신 분이 계시니까요.","original_tag":"신앙회의","pastor":"Tony Evans"},{"ref":"Lamentations 3:32-33","type":"선언형","tags":["소망","평안","신뢰","보호"],"full":"비록 그분께서\n근심을 주실지라도,\n그 풍성한 사랑과 자비하심으로\n반드시 불쌍히 여기실 것입니다.\n그분은 사람을 기꺼이\n괴롭히거나\n슬프게 하지 않으십니다.","compact":"그분은 풍성한 사랑과 자비로\n반드시 불쌍히 여기시며,\n사람을 기꺼이\n슬프게 하지 않으십니다.","oneline":"그분은 그 풍성한 사랑과 자비로 반드시 불쌍히 여기실 것입니다.","comfort":"그분은 우리의 아픔을 기뻐하지 않으시는 분입니다.","original_tag":"신앙회의","pastor":"Tony Evans"},{"ref":"Romans 8:37","type":"선언형","tags":["소망","신뢰","보호","결단"],"full":"아니라, 이 모든 일에 우리는\n우리를 사랑하시는\n그분으로 말미암아\n넉넉히 이기는 자들보다\n더 나은 승리자들입니다.","compact":"우리를 사랑하시는\n그분으로 말미암아\n우리는 이 모든 일에\n넉넉히 승리자입니다.","oneline":"우리는 우리를 사랑하시는 그분으로 말미암아 넉넉히 승리자입니다.","comfort":"이미 승리를 주시겠다고 약속하신 분이에요.","original_tag":"신앙회의","pastor":"Dr. Tony Evans"},{"ref":"Galatians 2:20","type":"고백형","tags":["신뢰","소망","결단","인도하심"],"full":"나는 그리스도와 함께\n십자가에 못 박혔습니다.\n이제는 내가 사는 것이\n아니요,\n오직 내 안에 그리스도께서\n사시는 것입니다.\n이제 내가 육체 가운데\n사는 삶은,\n나를 사랑하시어\n나를 위해 자신을 내어주신\n하나님의 아들을 믿는\n믿음 안에서 사는 것입니다.","compact":"이제는 내가 사는 것이\n아니요,\n오직 내 안에 그리스도께서\n사십니다.\n나는 나를 사랑하시어\n나를 위해 자신을 내어주신\n분을 믿는 믿음 안에서 삽니다.","oneline":"이제는 내가 사는 것이 아니요, 오직 내 안에 그리스도께서 사십니다.","comfort":"이미 당신 안에서 살고 계신 분이 있어요.","original_tag":"신앙회의","pastor":"Dr. Tony Evans"},{"ref":"Matthew 28:18","type":"선언형","tags":["보호","신뢰","인도하심","평안"],"full":"예수님께서 나아와\n그들에게 말씀하셨습니다.\n\"하늘과 땅의 모든 권세가\n내게 주어졌느니라.\"","compact":"하늘과 땅의 모든 권세가\n예수님께 주어졌습니다.","oneline":"하늘과 땅의 모든 권세가 내게 주어졌느니라.","comfort":"모든 권세를 가지신 분이 지금 당신과 함께 계십니다.","original_tag":"신앙회의","pastor":"Dr. Tony Evans"},{"ref":"2 Corinthians 5:17","type":"선언형","tags":["소망","치유","평안","결단"],"full":"그런즉 누구든지\n그리스도 안에 있으면\n새로운 피조물입니다.\n이전 것은 지나갔으니,\n보라, 새것이 되었도다!","compact":"그리스도 안에 있으면\n새로운 피조물입니다.\n이전 것은 지나갔으니\n새것이 되었도다!","oneline":"이전 것은 지나갔으니, 보라, 새것이 되었도다!","comfort":"이미 당신은 새로운 존재가 되었습니다.","original_tag":"신앙회의","pastor":"Tony Evans"},{"ref":"Galatians 5:1","type":"선언형","tags":["소망","평안","결단","보호"],"full":"그리스도께서 우리를\n자유롭게 하시려고\n자유를 주셨습니다.\n그러므로 굳건히 서서\n다시는 종의 멍에를\n메지 마십시오.","compact":"그리스도께서 우리를\n자유롭게 하시려고\n자유를 주셨습니다.","oneline":"그리스도께서 우리를 자유롭게 하시려고 자유를 주셨습니다.","comfort":"이미 당신은 자유를 선물 받았습니다.","original_tag":"신앙회의","pastor":"Jonathan Evans"},{"ref":"Exodus 17:15","type":"고백형","tags":["보호","신뢰","인도하심","소망"],"full":"모세가 제단을 쌓고\n그 이름을 '여호와 닛시'라\n불렀으니,\n이는 '여호와는\n나의 깃발'이라는\n뜻입니다.","compact":"'여호와는 나의 깃발'이십니다.","oneline":"여호와는 나의 깃발이십니다.","comfort":"당신의 삶에 깃발이 되어 함께하시는 분이 계십니다.","original_tag":"신앙회의","pastor":"Jonathan Evans"},{"ref":"2 Chronicles 15:4","type":"위로형","tags":["신뢰","인도하심","소망","평안"],"full":"그러나 그들이 고통 중에\n이스라엘의 주 하나님께로\n돌이키고\n그분을 찾았을 때,\n그분께서 자신을 그들에게\n찾게 하셨습니다.","compact":"고통 중에 주 하나님을\n찾았을 때,\n그분께서 자신을 그들에게\n찾게 하셨습니다.","oneline":"그분께서 자신을 그들에게 찾게 하셨습니다.","comfort":"당신이 찾을 때 기꺼이 응답하시는 분입니다.","original_tag":"신앙회의","pastor":"Dr. Tony Evans"},{"ref":"Exodus 3:14","type":"선언형","tags":["신뢰","보호","인도하심"],"full":"하나님께서 모세에게\n이르시되,\n나는 스스로 있는 자니라.\n또 이르시되,\n너는 이스라엘 자손에게\n이같이 이르기를\n'스스로 있는 자가 나를\n너희에게 보내셨다' 하라.","compact":"하나님께서 말씀하시되,\n나는 스스로 있는 자니라.\n'스스로 있는 자가 나를\n너희에게 보내셨다' 하라.","oneline":"나는 스스로 있는 자니라.","comfort":"그 이름으로 당신을 찾아오신 분이에요.","original_tag":"신앙회의","pastor":"Jonathan Evans"},{"ref":"Philippians 4:6","type":"위로형","tags":["불안","신뢰","평안","감사"],"full":"아무것도 염려하지 마시고,\n모든 일에 기도와 간구로,\n감사함으로 여러분의\n구할 것을 하나님께\n아뢰십시오.","compact":"아무것도 염려하지 마시고,\n감사함으로 여러분의\n구할 것을 하나님께\n아뢰십시오.","oneline":"감사함으로 당신의 구할 것을 하나님께 아뢰십시오.","comfort":"당신의 모든 염려를 아뢰시길 기다리시는 분이에요.","original_tag":"신앙회의","pastor":"Jonathan Evans"},{"ref":"1 Corinthians 15:58","type":"위로형","tags":["직장사업","소망","결단","인도하심"],"full":"그러므로 내 사랑하는 형제자매 여러분,\n흔들리지 말고 항상 주의 일에 더욱 힘쓰십시오.\n이는 여러분의 수고가 주 안에서 헛되지 않은 줄을 알기 때문입니다.","compact":"주의 일에 더욱 힘쓰십시오.\n당신의 수고가 주 안에서 헛되지 않음을 아십시오.","oneline":"당신의 수고는 주 안에서 헛되지 않습니다.","comfort":"당신의 땀방울을 모두\n헤아리시는 분이세요.","original_tag":"신앙회의","pastor":"Jonathan Evans"},{"ref":"Hebrews 13:5-6","type":"선언형","tags":["재정어려움","두려움","신뢰","보호"],"full":"돈을 사랑하지 말고 현재 가진 것에 만족하십시오.\n그분께서 '내가 결코 너를 떠나지 아니하고 버리지 아니하리라'고 친히 말씀하셨기 때문입니다.\n그러므로 우리는 담대히 말할 수 있습니다. '주는 나를 돕는 이시니 내가 두려워하지 아니하겠노라. 사람이 내게 무엇을 하리요?'","compact":"그분께서 '내가 결코 너를 떠나지 아니하고 버리지 아니하리라'고 말씀하셨습니다.\n그러므로 담대히 말하십시오. '주는 나를 돕는 이시니 내가 두려워하지 아니하겠노라.'","oneline":"내가 결코 너를 떠나지 아니하고 버리지 아니하리라.","comfort":"이미 당신을 붙드시겠다고\n먼저 말씀하신 분이에요.","original_tag":"신앙회의","pastor":"Jonathan Evans"},{"ref":"1 Kings 18:1","type":"선언형","tags":["인도하심","소망","신뢰"],"full":"오랜 시간 뒤, 셋째 해에\n주의 말씀이 엘리야에게 임하여 이르시되,\n'너는 가서 아합에게 보이라. 내가 비를 땅에 보내리라.'","compact":"주의 말씀이 임하여 이르시되,\n'내가 비를 땅에 보내리라.'","oneline":"내가 비를 땅에 보내리라.","comfort":"당신의 간구를 들으실 분이에요.","original_tag":"신앙회의","pastor":"Tony Evans"},{"ref":"Isaiah 65:24","type":"선언형","tags":["인도하심","신뢰","소망"],"full":"그들이 부르기 전에 내가 응답하겠고,\n그들이 아직 말하고 있을 때 내가 들으리라.","compact":"부르기 전에 내가 응답하겠고,\n말하고 있을 때 내가 들으리라.","oneline":"부르기 전에 내가 응답하리라.","comfort":"이미 당신의 마음을 아시고\n응답을 준비하신 분이에요.","original_tag":"신앙회의","pastor":"Tony Evans"},{"ref":"Romans 8:18","type":"위로형","tags":["슬픔","소망","평안"],"full":"생각하건대, 현재의 고난은\n장차 우리에게 나타날 영광과\n비교할 수 없도다.","compact":"현재의 고난은 장차 나타날\n영광과 비교할 수 없도다.","oneline":"현재의 고난은 장차 나타날 영광과 비교할 수 없습니다.","comfort":"영원히 사라지지 않을 소망이\n당신을 기다리고 있으니까요.","original_tag":"신앙회의","pastor":"Tony Evans"},{"ref":"Matthew 24:6","type":"위로형","tags":["불안","두려움","평안","보호"],"full":"전쟁과 전쟁 소문을 들을 것이나,\n부디 두려워하지 마십시오.\n이런 일이 반드시 있어야 하되, 아직 끝은 아니기 때문입니다.","compact":"전쟁과 소문을 들을 것이나,\n부디 두려워하지 마십시오. 아직 끝은 아니니라.","oneline":"두려워하지 마십시오. 아직 끝은 아니니라.","comfort":"이미 모든 것을 주관하시는 분이\n지켜보고 계세요.","original_tag":"신앙회의","pastor":"Tony Evans"},{"ref":"1 Thessalonians 4:16-17","type":"선언형","tags":["소망","평안","보호","축복"],"full":"주님께서 친히 호령과 천사장의 소리와 하나님의 나팔 소리와 함께 하늘로부터 강림하시리니,\n그리스도 안에서 죽은 자들이 먼저 일어날 것입니다.\n그 후에 살아남아 있는 우리도 그들과 함께 구름 속으로 끌어 올려 공중에서 주님을 만나리니, 그리하여 우리가 항상 주님과 함께 있으리라.","compact":"주님께서 친히 하늘로부터 강림하시리니,\n우리가 항상 주님과 함께 있으리라.","oneline":"우리가 항상 주님과 함께 있으리라.","comfort":"영원히 함께하시겠다고\n약속하신 분이 기다리십니다.","original_tag":"신앙회의","pastor":"Tony Evans"},{"ref":"2 Corinthians 1:9","type":"고백형","tags":["신뢰","소망","두려움","평안"],"full":"우리는 스스로를 의지하지 않고\n죽은 자를 살리시는 하나님을\n의지하게 하시려는 것이었도다.","compact":"스스로를 의지하지 않고\n죽은 자를 살리시는 하나님을 의지하게 하시려는 것이었도다.","oneline":"죽은 자를 살리시는 하나님을 의지할 것입니다.","comfort":"능치 못할 일이 없는 분이시기에\n모든 것을 되돌릴 수 있습니다.","original_tag":"신앙회의","pastor":"Tony Evans"},{"ref":"Matthew 6:8","type":"위로형","tags":["신뢰","평안","보호","인도하심"],"full":"여러분의 아버지께서는\n구하기 전에도 무엇이 필요한지\n이미 다 알고 계시도다.","compact":"아버지께서는 구하기 전에도\n필요한 것을 이미 다 알고 계십니다.","oneline":"이미 다 알고 계시도다.","comfort":"모든 것을 아시는 분이시기에\n당신의 마음을 이미 헤아리고 계십니다.","original_tag":"신앙회의","pastor":"Tony Evans"},{"ref":"John 20:17","type":"선언형","tags":["가정","소망","신뢰","축복"],"full":"나는 내 아버지 곧 너희 아버지께,\n내 하나님 곧 너희 하나님께\n올라가노라.","compact":"내 아버지, 너희 아버지께,\n내 하나님, 너희 하나님께 올라가노라.","oneline":"내 하나님이 곧 너희 하나님이심이라.","comfort":"그분께서는 우리를 당신의 자녀로 삼으시고,\n당신의 아버지와 동일한 분을 우리의 아버지로 삼아주셨으니까요.","original_tag":"신앙회의","pastor":"Tony Evans"},{"ref":"Colossians 1:27","type":"선언형","tags":["소망","신뢰","평안","축복"],"full":"하나님께서 이방인 가운데 이 비밀의 영광의 풍성함이 무엇인지 알게 하셨으니,\n곧 너희 안에 계신 그리스도요\n영광의 소망이심이라.","compact":"너희 안에 계신 그리스도요,\n영광의 소망이심이라.","oneline":"그리스도께서 당신 안에 계심이라.","comfort":"가장 귀한 분이 이미 당신 안에\n함께하고 계시니까요.","original_tag":"신앙회의","pastor":"Tony Evans"},{"ref":"Colossians 1:15-17","type":"선언형","tags":["신뢰","보호","인도하심","평안"],"full":"그분은 보이지 아니하시는 하나님의 형상이요,\n모든 피조물보다 먼저 나신 분이시니,\n만물이 그분으로 말미암아 창조되었고, 또한 그분 안에 모든 것이 함께 있도다.","compact":"그분 안에서 만물이 창조되었고,\n그분 안에서 모든 것이 함께 있도다.","oneline":"그분 안에서 모든 것이 함께 있도다.","comfort":"모든 것을 붙드시고 질서 있게\n이끄시는 분이 당신과 함께 계시니까요.","original_tag":"신앙회의","pastor":"Tony Evans"},{"ref":"2 Corinthians 4:16","type":"위로형","tags":["소망","치유","평안","신뢰"],"full":"그러므로 우리가 낙심하지 아니하노니,\n우리의 겉사람은 낡아지나\n우리의 속사람은 날마다 새로워지도다.","compact":"겉사람은 낡아지나\n우리의 속사람은 날마다 새로워지도다.","oneline":"속사람은 날마다 새로워지도다.","comfort":"영원한 것을 향해 나아가는 당신의\n속사람은 날마다 새로워지고 있으니까요.","original_tag":"신앙회의","pastor":"Tony Evans"},{"ref":"1 John 4:4","type":"선언형","tags":["보호","신뢰","소망","평안"],"full":"자녀들아, 너희는 하나님께 속하였고 그들을 이겼나니,\n이는 너희 안에 계신 이가\n세상에 있는 자보다 크심이라.","compact":"너희는 하나님께 속하였고 그들을 이겼나니,\n너희 안에 계신 이가 세상에 있는 자보다 크심이라.","oneline":"너희 안에 계신 이가 세상에 있는 자보다 크심이라.","comfort":"세상 모든 것보다 크신 분이 당신 안에 함께 계시니,\n이미 승리했음을 기억하세요.","original_tag":"신앙회의","pastor":"Tony Evans"},{"ref":"Isaiah 40:31","type":"선언형","tags":["소망","신뢰","치유","기다림"],"full":"오직 여호와를 앙망하는 자는 새 힘을 얻으리니,\n독수리가 날개 치며 솟아오름 같이 될 것이요,\n달음박질하여도 곤비하지 아니하며 걸어가도 피곤하지 아니하리라.","compact":"여호와를 앙망하는 자는 새 힘을 얻으리니,\n독수리같이 날아오르며 지치지 아니하리라.","oneline":"여호와를 앙망하는 자는 새 힘을 얻으리라.","comfort":"당신의 지친 발걸음을 새롭게 하실 분이\n이미 기다리고 계시니까요.","original_tag":"신앙회의","pastor":"Tony Evans"},{"ref":"Lamentations 3:25-26","type":"위로형","tags":["신뢰","기다림","소망","평안"],"full":"여호와께서는 자기를 기다리는 자들에게,\n자기를 찾는 영혼에게 선하시도다.\n사람이 여호와의 구원을 조용히 기다리는 것이 좋도다.","compact":"여호와께서는 자기를 기다리는 자들에게 선하시도다.\n여호와의 구원을 조용히 기다리는 것이 좋으리라.","oneline":"여호와께서는 자기를 기다리는 자들에게 선하시도다.","comfort":"당신을 향한 그분의 선하심은\n언제나 변함이 없으니까요.","original_tag":"신앙회의","pastor":"Tony Evans"},{"ref":"Psalm 130:5-6","type":"고백형","tags":["신뢰","소망","기다림"],"full":"내 영혼이 주님을 기다리며,\n그의 말씀에 소망을 둡니다.\n파수꾼이 아침을 기다리는 것보다 더 간절히 주님을 기다리나이다.","compact":"내 영혼이 주님을 기다리며\n그의 말씀에 소망을 둡니다.","oneline":"내 영혼이 그의 말씀에 소망을 둡니다.","comfort":"이미 그 자리에 오셔서\n당신을 기다리고 계신 분이에요.","original_tag":"신앙회의","pastor":"Tony Evans"},{"ref":"2 Kings 3:16-17","type":"선언형","tags":["인도하심","소망","보호","축복"],"full":"주님께서 말씀하시기를 ‘이 골짜기를 개천으로 가득 채워라.’\n또한 주님께서 말씀하시기를 ‘너희가 바람도 보지 못하고 비도 보지 못할지라도,\n이 골짜기에 물이 가득하여 너희와 너희 가축과 너희 짐승들이 마시게 될 것이라.’","compact":"너희가 바람도 비도 보지 못할지라도,\n이 골짜기에 물이 가득하여 너희가 마시게 될 것이라.","oneline":"바람도 비도 보지 못할지라도 물이 가득하게 될 것이라.","comfort":"눈에 보이지 않아도 이미 당신을 위해\n채우고 계신 분이십니다.","original_tag":"신앙회의","pastor":"Tony Evans"},{"ref":"Ephesians 3:20","type":"선언형","tags":["신뢰","소망","축복","평안"],"full":"우리 안에서 역사하시는 능력대로,\n우리가 구하거나 생각하는 모든 것보다\n훨씬 더 넘치도록 능히 하실 분께.","compact":"우리가 구하거나 생각하는 모든 것보다\n넘치도록 능히 하실 분께.","oneline":"우리가 구하는 것보다 넘치도록 능히 하실 분입니다.","comfort":"당신의 기대 그 이상으로\n일하시는 분이십니다.","original_tag":"신앙회의","pastor":"Tony Evans"},{"ref":"1 John 2:20","type":"선언형","tags":["인도하심","평안","신뢰"],"full":"그러나 여러분은 거룩하신 분에게서 기름 부음을 받았으니,\n모든 것을 아시나이다.","compact":"여러분은 거룩하신 분에게서 기름 부음을 받았으니\n모든 것을 아십니다.","oneline":"여러분은 거룩하신 분에게서 기름 부음을 받았습니다.","comfort":"이미 당신에게 지혜를 주시고\n모든 것을 알게 하시는 분이 계십니다.","original_tag":"신앙회의","pastor":"Tony Evans"},{"ref":"1 John 2:27","type":"선언형","tags":["인도하심","평안","신뢰","보호"],"full":"여러분은 그분에게서 받은\n기름 부음이 여러분 안에\n거하므로, 누구에게도 가르침을\n받을 필요가 없나이다.\n오직 그분의 기름 부음이\n모든 것을 여러분에게\n가르치며, 그것은 참되고\n거짓이 아니니, 가르침을\n받은 대로 여러분은\n그분 안에 거하나이다.","compact":"그분에게서 받은 기름 부음이\n여러분 안에\n거하므로, 모든 것을\n가르치며 참되니,\n여러분은 그분 안에 거하나이다.","oneline":"그분에게서 받은 기름 부음이 여러분 안에 거하나이다.","comfort":"이미 당신 안에 거하시며 모든 것을 가르쳐 주시는 분이 계십니다.","original_tag":"신앙회의","pastor":"Tony Evans"},{"ref":"Philippians 3:20","type":"고백형","tags":["소망","신뢰","평안","기다림"],"full":"우리의 시민권은\n하늘에 있으며,\n그곳으로부터 우리는\n구원자이신 주 예수 그리스도를\n간절히 기다리나이다.","compact":"우리의 시민권은\n하늘에 있으며,\n구원자이신 주 예수 그리스도를\n간절히 기다리나이다.","oneline":"우리의 시민권은 하늘에 있습니다.","comfort":"당신이 돌아갈 영원한 본향을 이미 마련해 두신 분이에요.","original_tag":"신앙회의","pastor":"Tony Evans"},{"ref":"Colossians 1:13","type":"선언형","tags":["보호","축복","평안","소망"],"full":"그분께서 우리를\n흑암의 권세에서\n건져내어,\n그가 사랑하시는\n아들의 나라로 옮기셨나이다.","compact":"그분께서 우리를\n흑암의 권세에서\n건져내어,\n사랑하시는 아들의 나라로 옮기셨나이다.","oneline":"그분께서 우리를 흑암의 권세에서 건져내셨습니다.","comfort":"어둠 속에서 당신을 건져내어 이미 안전한 곳으로 옮겨주신 분이에요.","original_tag":"신앙회의","pastor":"Tony Evans"},{"ref":"Philippians 3:12","type":"고백형","tags":["결단","소망","신뢰"],"full":"내가 이미 얻었다거나\n이미 목표에 도달하였다는\n것이 아니오라,\n오직 그리스도 예수께서\n나를 붙드신 그것을 붙잡으려고\n나는 달려가나이다.","compact":"내가 이미 얻은 것이\n아니오라,\n그리스도 예수께서 나를 붙드신\n그것을 붙잡으려고 달려가나이다.","oneline":"그리스도 예수께서 나를 붙드신 그것을 붙잡으려고 나는 달려갑니다.","comfort":"이미 당신을 놓지 않고 굳건히 붙잡고 계신 분이 계십니다.","original_tag":"신앙회의","pastor":"Tony Evans"},{"ref":"Philippians 3:13-14","type":"고백형","tags":["결단","소망","인도하심"],"full":"형제자매 여러분, 나는 아직\n내가 붙잡았다고 생각지\n아니하나니,\n오직 한 가지 일만 하노라.\n곧 뒤에 있는 것은 잊어버리고\n앞에 있는 것을 향하여\n나아가, 그리스도 예수 안에서\n하나님이 위에서 부르신 상을\n얻으려고\n목표를 향해 달려가나이다.","compact":"뒤에 있는 것은 잊어버리고\n앞에 있는 것을 향하여,\n하나님이 부르신 상을\n얻으려고\n목표를 향해 달려가나이다.","oneline":"뒤에 있는 것은 잊고 앞에 있는 것을 향해 달려갑니다.","comfort":"당신의 지난 모든 발걸음도 아시고, 앞으로 이끄실 분이 계십니다.","original_tag":"신앙회의","pastor":"Tony Evans"},{"ref":"사무엘상 17:45","type":"고백형","tags":["신뢰","두려움","보호","결단"],"full":"다윗이 블레셋 사람에게\n말하기를 '너는 칼과 창과\n단창을 들고 내게\n나아오지만,\n나는 네가 모욕하는\n이스라엘 군대의 하나님,\n곧 만군의 여호와의 이름으로\n네게 나아가노라.'","compact":"너는 칼과 창으로 내게\n나아오지만,\n나는 만군의\n여호와의 이름으로 네게\n나아가노라.","oneline":"나는 만군의 여호와의 이름으로 나아가노라.","comfort":"만군의 주님이 당신의 이름으로 이미 앞서 서 계십니다.","original_tag":"신앙회의","pastor":"김선교"},{"ref":"사무엘상 3:10","type":"고백형","tags":["인도하심","신뢰","순종"],"full":"여호와께서 임하여 서서\n전과 같이\n‘사무엘아, 사무엘아’\n하고 부르시니,\n사무엘이\n'말씀하옵소서, 주의 종이\n듣겠나이다' 하였나이다.","compact":"여호와께서\n'사무엘아, 사무엘아'\n부르시니,\n사무엘이\n'말씀하옵소서, 주의 종이\n듣겠나이다' 하였나이다.","oneline":"말씀하옵소서, 주의 종이 듣겠나이다.","comfort":"당신의 이름을 부르시며 듣기 원하시는 분이 그 자리에 계십니다.","original_tag":"신앙회의","pastor":"김선교"},{"ref":"마태복음 14:31","type":"위로형","tags":["불안","신뢰","보호"],"full":"예수님께서 즉시 손을 내밀어\n그를 붙잡으시며\n말씀하셨으니,\n'믿음이 적은 자여,\n어찌하여 의심하였느냐?'\n하시며\n그를 일으키셨나이다.","compact":"주님께서 즉시 손을 내밀어\n붙들어 주시며\n'왜 의심하였느냐'\n하시나이다.","oneline":"주님께서 즉시 손을 내밀어 붙들어 주시나이다.","comfort":"이미 붙드시겠다고 먼저 말씀하신 분이에요.","original_tag":"신앙회의","pastor":"김선교"},{"ref":"누가복음 23:43","type":"선언형","tags":["소망","평안","보호"],"full":"예수님께서 그에게\n말씀하시기를,\n'진실로 내가 너에게\n이르노니,\n오늘 네가 나와 함께 낙원에\n있으리라' 하시니이다.","compact":"내가 진실로 너에게\n이르노니,\n오늘 네가 나와 함께 낙원에\n있으리라.","oneline":"오늘 네가 나와 함께 낙원에 있으리라.","comfort":"그 자리에 먼저 서 계신 분이 있으니까요.","original_tag":"신앙회의","pastor":"김선교"},{"ref":"창세기 22:8","type":"고백형","tags":["신뢰","인도하심","소망"],"full":"아브라함이 대답하기를,\n'내 아들아, 번제로 드릴\n어린 양은 하나님께서 친히\n자신을 위하여 준비하시리라'\n하였나이다.","compact":"번제로 드릴 어린 양은\n하나님께서 친히 준비하시리라.","oneline":"하나님께서 친히 준비하시리라.","comfort":"이미 준비하시겠다고 먼저 말씀하신 분이에요.","original_tag":"신앙회의","pastor":"김선교"},{"ref":"창세기 22:12","type":"선언형","tags":["보호","신뢰","자녀양육","인도하심"],"full":"주의 사자가 이르시되,\n'그 아이에게 네 손을 대지 말라.\n그에게 아무 일도 하지 말라.\n네가 네 아들, 네 독자까지도\n내게 아끼지 아니하였으니,\n내가 이제야 네가 하나님을\n경외하는 줄을 아노라' 하시니이다.","compact":"그 아이에게 손을 대지 말라.\n네가 네 아들까지도 내게\n아끼지 아니하였으니,\n이제야 네가 하나님을\n경외하는 줄을 아노라.","oneline":"네 아들까지도 내게 아끼지 아니하였으니, 이제야 네가 하나님을 경외하는 줄을 아노라.","comfort":"그 마음을 이미 보시고\n인정해 주시는 분이에요.","original_tag":"신앙회의","pastor":"김선교"},{"ref":"이사야 62:4","type":"선언형","tags":["소망","평안","관계"],"full":"다시는 너를 버림받은 자라\n부르지 아니하시며,\n다시는 네 땅을 황무지라\n부르지 아니하시고,\n오직 너를 헵시바라\n(나의 기쁨) 하며\n네 땅을 쁄라라\n(결혼한 자) 하시리니,\n이는 여호와께서 너를\n기뻐하시며 네 땅이\n결혼한 것처럼 될 것임이라.","compact":"다시는 너를 버림받은 자라\n부르지 아니하며,\n오직 너를 헵시바라,\n네 땅을 쁄라라 하시리니,\n여호와께서 너를\n기뻐하실 것임이라.","oneline":"여호와께서 너를 기뻐하실 것임이라.","comfort":"가장 귀한 이름으로 이미\n불러주시는 분이에요.","original_tag":"신앙회의","pastor":"김선교"},{"ref":"데살로니가전서 5:18","type":"위로형","tags":["감사","평안","순종","인도하심"],"full":"범사에 감사하십시오.\n이것이 그리스도 예수\n안에서 여러분을 향하신\n하나님의 뜻이니이다.","compact":"범사에 감사하십시오.\n이것이 주님의 뜻이니이다.","oneline":"이것이 그리스도 예수 안에서 여러분을 향하신 하나님의 뜻이니이다.","comfort":"이미 당신을 향한\n가장 좋은 뜻을 가진\n분이 계시니까요.","original_tag":"신앙회의","pastor":"김선교"},{"ref":"고린도전서 12:27","type":"선언형","tags":["관계","소망","평안"],"full":"참으로 여러분은\n그리스도의 몸이요,\n각 지체의 한 부분이니이다.","compact":"여러분은 그리스도의 몸이요,\n지체의 각 부분이니이다.","oneline":"여러분은 그리스도의 몸이요 지체의 각 부분이라.","comfort":"소중한 자리로 이미\n부르신 분이에요.","original_tag":"신앙회의","pastor":"김선교"},{"ref":"시편 119:74","type":"고백형","tags":["신뢰","소망","기다림"],"full":"주님을 경외하는 자들이\n나를 보고 기뻐하는 것은,\n내가 주의 말씀을\n바라는 까닭이니이다.","compact":"주님을 경외하는 자들이\n나를 보고 기뻐하는 것은,\n내가 주의 말씀을\n바라는 까닭이니이다.","oneline":"내가 주의 말씀을 바라는 까닭이니이다.","comfort":"말씀으로 이미 소망을\n주시는 분이에요.","original_tag":"신앙회의","pastor":"김선교"},{"ref":"로마서 11:29","type":"선언형","tags":["신뢰","인도하심","소망","보호"],"full":"하나님의 은사, 곧 주님의\n선물과 부르심에는 결코\n후회하심이 없으시니라.\n주님의 선택은\n변치 않는 약속입니다.","compact":"하나님의 은사와 부르심에는\n후회하심이 없으시니,\n변치 않는 약속이옵니다.","oneline":"하나님의 부르심은 결코 변하지 않으십니다.","comfort":"이미 붙드시겠다고 먼저\n말씀하신 분이에요.","original_tag":"신앙회의","pastor":"김선교"},{"ref":"누가복음 23:42-43","type":"선언형","tags":["소망","평안","인도하심","치유"],"full":"주 예수님께서\n말씀하시기를,\n진실로 네게 이르노니\n오늘 네가 나와 함께\n낙원에 있으리라 하시니라.\n가장 절박한 순간에도\n주님은 함께하실 것을\n약속하셨습니다.","compact":"오늘 네가 나와 함께\n낙원에 있으리라.\n주님께서 약속하시니.","oneline":"오늘 당신은 주님과 함께 낙원에 있으리라.","comfort":"그 자리에 먼저 서 계신\n분이 있으니까요.","original_tag":"신앙회의","pastor":"김선교"},{"ref":"히브리서 4:12-13","type":"선언형","tags":["신뢰","인도하심","평안","결단"],"full":"하나님의 말씀은\n살아 있고 활력이 넘쳐,\n좌우에 날 선 어떤\n검보다도 예리합니다.\n우리의 마음과 생각을\n꿰뚫어 판단하시며,\n주님 앞에는 숨겨질 것이\n아무것도 없으리라.","compact":"하나님의 말씀은\n살아 있고 예리하여,\n마음의 생각과 뜻을\n판단하시리라.","oneline":"하나님의 말씀은 살아 움직여 모든 것을 꿰뚫으시리라.","comfort":"모든 것을 아시는 분이\n당신의 진심도\n알고 계시니까요.","original_tag":"신앙회의","pastor":"김선교 선교사"},{"ref":"시편 104:34","type":"고백형","tags":["감사","소망","평안","신뢰"],"full":"나는 주 여호와로\n말미암아 즐거워하고\n기뻐하오리다.\n주님 안에서 참된\n기쁨을 찾으리라.","compact":"나는 주 여호와로\n말미암아 기뻐하고\n즐거워하리로다.","oneline":"나는 주님 안에서 즐거워하리로다.","comfort":"진정한 기쁨은 이미\n당신 안에 심겨져 있으니까요.","original_tag":"신앙회의","pastor":"김선교"},{"ref":"창세기 2:18","type":"선언형","tags":["외로움","관계","가정","보호"],"full":"주 여호와 하나님께서\n이르시되, 사람이 혼자\n있는 것이 좋지 아니하니,\n내가 그를 위하여 돕는\n배필을 지으리라 하시니라.\n주님께서 당신의 외로움을\n아십니다.","compact":"사람이 혼자 있는 것이\n좋지 아니하니,\n내가 그를 위하여 돕는\n배필을 지으리라.","oneline":"내가 당신을 위해 돕는 배필을 지으리라.","comfort":"당신의 모든 필요를 이미\n알고 계신 분이에요.","original_tag":"신앙회의","pastor":"김선교"},{"ref":"마태복음 18:20","type":"선언형","tags":["관계","외로움","평안","보호"],"full":"주님께서 말씀하시기를,\n두세 사람이 내 이름으로 모인\n그곳에는,\n나도 그들 중에 있으리라.\n주님은 언제나\n당신과 함께하십니다.","compact":"두세 사람이\n내 이름으로 모인 곳에는,\n나도 그들 중에 있으리라.","oneline":"내가 당신들 중에 있으리라.","comfort":"이미 약속하신 분이\n당신과 함께 계시니까요.","original_tag":"신앙회의","pastor":"김선교"},{"ref":"디모데전서 2:4","type":"선언형","tags":["소망","평안","인도하심","신뢰"],"full":"하나님께서는\n모든 사람이 구원을 받고,\n진리에 대한 온전한\n지식에 이르기를 원하시느니라.\n주님의 사랑은\n모든 사람을 향합니다.","compact":"하나님은 모든 사람이\n구원을 받으며\n진리를 알기를 원하시느니라.","oneline":"하나님은 모든 사람이\n구원받기를 원하시느니라.","comfort":"당신을 향한 주님의 뜻은\n언제나 선하시니까요.","original_tag":"신앙회의","pastor":"김선교"},{"ref":"요한계시록 3:8","type":"선언형","tags":["인도하심","보호","소망","신뢰"],"full":"볼지어다, 내가 네 앞에\n열린 문을 두었으니,\n아무도 능히\n닫을 수 없으리라.\n내가 너의 모든 행위를 아노니,\n네가 비록 작은 능력을\n가졌을지라도,\n나의 말을 지키고\n내 이름을\n배반하지 아니하였도다.","compact":"내가 네 앞에\n열린 문을 두었으되,\n능히 닫을 자 없으리라.\n네 작은 능력으로도\n내 이름을 지켰도다.","oneline":"내가 네 앞에 열린 문을 두었으니,\n누구도 닫을 수 없으리라.","comfort":"당신이 걸어온 모든 길을\n이미 알고 계신 분이에요.","original_tag":"신앙회의","pastor":"김선교"},{"ref":"마태복음 25:21","type":"선언형","tags":["직장사업","결단","축복","감사"],"full":"주님께서 말씀하셨습니다.\n\"잘하였도다, 착하고\n충성된 종아!\n네가 작은 일에\n충성하였으니,\n내가 너에게\n많은 것을 맡기리라.\n네 주인의 즐거움에\n참여할지어다.\"","compact":"착하고 충성된 종아,\n네가 작은 일에\n충성하였으니\n내가 너에게\n많은 것을 맡기리라.","oneline":"네가 작은 일에\n충성하였으니\n내가 너에게\n많은 것을 맡기리라.","comfort":"당신의 수고를 잊지 않고\n기쁨으로 함께하실 분이에요.","original_tag":"신앙회의","pastor":"김선교"},{"ref":"히브리서 2:11","type":"위로형","tags":["관계","소망","평안","가정"],"full":"거룩하게 하시는 분과\n거룩하게 된 우리가 모두\n한 근원에서 나왔기에,\n주님께서는 우리를\n형제라고 부르시기를\n부끄러워하지 아니하십니다.","compact":"주님은 우리를\n형제라 부르시기를\n부끄러워하지 아니하십니다.","oneline":"주님은 우리를\n형제라 부르시기를\n부끄러워하지 아니하십니다.","comfort":"이미 우리를 자녀로 여기며\n품어주신 분이에요.","original_tag":"신앙회의","pastor":"김선교"},{"ref":"이사야 41:10","type":"선언형","tags":["두려움","보호","인도하심","신뢰"],"full":"두려워하지 마세요,\n내가 당신과 함께합니다.\n놀라지 마세요,\n내가 당신의 하나님이\n되기 때문입니다.\n내가 당신을 굳세게 하리라.\n참으로 당신을 도와주리라.\n참으로 나의\n의로운 오른손으로\n당신을 붙들 것입니다.","compact":"내가 당신과 함께하니\n두려워하지 마세요.\n내가 당신을 굳세게 하고\n나의 오른손으로\n붙들 것입니다.","oneline":"내가 나의 의로운\n오른손으로 당신을 붙들 것입니다.","comfort":"이미 당신을 붙드시겠다고\n먼저 말씀하신 분이에요.","original_tag":"신앙회의","pastor":"김선교"},{"ref":"요한복음 11:40","type":"선언형","tags":["소망","신뢰","결단"],"full":"예수님께서 말씀하셨습니다.\n\"내가 당신에게\n말하지 않았습니까?\n당신이 믿으면\n하나님의 영광을\n보게 될 것입니다.\"","compact":"당신이 믿으면\n하나님의 영광을\n보게 될 것입니다.","oneline":"당신이 믿으면\n하나님의 영광을\n보게 될 것입니다.","comfort":"그분이 당신에게\n보여주시겠다고\n약속하신 것이 있으니까요.","original_tag":"신앙회의","pastor":"김선교"},{"ref":"에베소서 1:17-18","type":"위로형","tags":["인도하심","소망","평안"],"full":"우리 주 예수\n그리스도의 하나님,\n영광의 아버지께서\n지혜와 계시의 영을\n당신에게 주셔서\n하나님을 알게 하시고,\n당신 마음의 눈을 밝히사\n그분의 부르심의\n소망이 무엇이며\n성도 안에서 그 기업의\n영광의 풍성함이 무엇인지\n알게 하실 것입니다.","compact":"영광의 아버지께서\n당신에게 지혜와\n계시의 영을 주사,\n그분의 소망과\n영광의 풍성함을\n알게 하실 것입니다.","oneline":"영광의 아버지께서\n지혜와 계시의 영을\n당신에게 주실 것입니다.","comfort":"그분은 당신이 알기를\n원하고 계신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한복음 20:21-22","type":"선언형","tags":["평안","인도하심","소망","보호"],"full":"예수님께서 다시\n말씀하셨습니다.\n\"당신에게 평강이\n있을지어다!\n아버지께서 나를\n보내신 것 같이,\n나도 당신을 보냅니다.\"\n그리고 이 말씀을 하시고\n그들을 향하여 숨을 내쉬며\n말씀하셨습니다.\n\"성령을 받으세요.\"","compact":"당신에게 평강이\n있을지어다!\n아버지께서 나를\n보내신 것 같이,\n나도 당신을 보냅니다.","oneline":"당신에게 평강이 있을지어다.","comfort":"그분이 당신에게\n평강을 주시겠다고\n약속하셨어요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"사도행전 4:29, 31","type":"위로형","tags":["인도하심","소망","신뢰","보호"],"full":"주님, 이제도 그들의 위협을\n굽어보시옵고,\n당신의 종들로 하여금\n담대히 하나님의 말씀을\n전하게 하여 주옵소서.\n그들이 기도를 마치자\n모인 곳이 진동했고,\n무리가 다\n성령으로 충만하여\n담대히 하나님의 말씀을\n전하였습니다.","compact":"그들이 기도하자\n모인 곳이 진동했고,\n다 성령으로 충만하여\n담대히 하나님의 말씀을\n전하였습니다.","oneline":"성령으로 충만하여\n담대히 하나님의 말씀을\n전하였습니다.","comfort":"당신의 간구를 들으시고\n응답하시는 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"에베소서 4:13","type":"선언형","tags":["소망","인도하심","결단"],"full":"우리가 모두 믿음 안에서,\n그리고 하나님의 아들을\n아는 일에 하나가 되어,\n온전한 사람을 이루고\n그리스도의 충만한\n장성함에 이르도록 하시리라.","compact":"믿음과 앎에 하나가 되어\n온전한 사람을 이루고\n그리스도의 장성함에 이르리라.","oneline":"그리스도의 충만한 장성함에 이르도록 하시리라.","comfort":"하나님께서 이미 당신을 온전케 하실 계획을 가지고 계십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"에베소서 4:14","type":"선언형","tags":["보호","불안","신뢰"],"full":"이는 우리가 이제부터\n더 이상 어린아이처럼\n흔들리지 않고,\n사람의 속임수와\n간사한 유혹에 빠져\n온갖 교훈의 풍조에 밀려\n요동하지 않게 하시려는 것입니다.","compact":"더 이상 어린아이처럼\n흔들리지 않고,\n속임수와 유혹에\n요동하지 않게 하시리라.","oneline":"요동하지 않게 하시려는 것입니다.","comfort":"하나님의 손이 당신을 견고하게 붙드시겠다고 약속하셨습니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"빌립보서 3:12","type":"고백형","tags":["결단","소망","신뢰"],"full":"내가 이미 모든 것을\n얻었거나,\n온전히 이루었다고\n말하지 않겠습니다.\n다만 그리스도께서\n나를 붙드신 그 목적을\n이루려고 앞으로 달려갑니다.","compact":"이미 얻었거나\n온전히 이루었다 함도 아닙니다.\n다만 그 목적을 향해\n달려갑니다.","oneline":"나는 아직 온전히 이루지 못하였습니다.","comfort":"완전하지 않아도 괜찮아요. 이미 당신을 붙드신 분이 계십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"이사야 52:7","type":"선언형","tags":["소망","인도하심","축복","감사"],"full":"좋은 소식을 전하고\n평화를 공포하며,\n구원의 복된 소식을 가져와\n‘네 하나님이 통치하신다!’고\n시온에게 말하는 자들의 발이\n어찌 그리 아름다운지요!","compact":"좋은 소식과 구원을 전하며\n'네 하나님이 통치하신다'고\n말하는 발이\n어찌 그리 아름다운지요!","oneline":"네 하나님이 통치하신다고 선포하는 발이 아름답도다!","comfort":"당신의 모든 발걸음 위에 하나님의 아름다운 뜻이 담겨 있습니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한복음 17:15","type":"선언형","tags":["보호","불안","평안","신뢰"],"full":"제가 간구하는 것은\n그들을 세상에서\n데려가시는 것이 아니요,\n다만 그들을 악으로부터\n보전하여 지켜주시기를\n위함입니다.","compact":"제가 비옵는 것은\n악에 빠지지 않도록\n보전하시기를 위함입니다.","oneline":"악에 빠지지 않도록 보전하시기를 위함입니다.","comfort":"세상 속에 있지만, 이미 주님께서 당신을 보호해 주시겠다고 기도하셨습니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"에베소서 4:11-12","type":"선언형","tags":["인도하심","직장사업","소망","축복"],"full":"주님께서는 어떤 이들은 사도로,\n어떤 이들은 선지자로,\n어떤 이들은 복음 전하는 자로,\n또 어떤 이들은 목사와 교사로\n세우셨으니,\n이는 성도들을 온전하게 하여\n봉사의 일을 하게 하고\n그리스도의 몸을 세우려 하심입니다.","compact":"주님께서는 당신에게\n직분을 주셨으니,\n성도들을 온전하게 하여\n그리스도의 몸을 세우려 하심입니다.","oneline":"그리스도의 몸을 세우려 하심이라.","comfort":"당신의 부르심은 그리스도의 몸을 온전하게 세우는 귀한 일에 사용될 것입니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"시편 34:1-3","type":"고백형","tags":["감사","신뢰","소망","외로움"],"full":"제가 항상 여호와를\n송축하리니,\n내 입술로 끊임없이\n주님을 찬양할 것입니다.\n내 영혼이 여호와를\n자랑하리니,\n고난당하는 자들이\n이를 듣고 기뻐할 것입니다.\n오, 저와 함께 여호와를\n광대하시다 하며\n그분의 이름을 함께 높이십시오!","compact":"내가 항상 여호와를\n송축하고 찬양하리니,\n내 영혼이 주님을\n자랑할 것입니다.","oneline":"내 영혼이 여호와를 자랑하리라.","comfort":"당신의 작은 고백이 누군가에게는 큰 기쁨이 될 수 있습니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"에베소서 1:22","type":"선언형","tags":["평안","보호","신뢰","두려움"],"full":"또 하나님께서는 만물을\n그리스도의 발아래에\n복종하게 하시고,\n그분을 만물 위에 있는\n교회의 머리로 삼으셨습니다.","compact":"만물을 그의 발아래\n복종하게 하시고\n그를 교회의 머리로\n삼으셨습니다.","oneline":"만물을 그의 발아래 복종하게 하셨느니라.","comfort":"모든 권세가 이미 그분의 발아래 있으니, 당신의 염려도 그분께 맡기십시오.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"에베소서 4:13-14","type":"선언형","tags":["소망","인도하심","평안","보호"],"full":"우리가 모두 하나님의 아들을\n믿는 것과 아는 일에\n하나가 되어,\n온전한 사람을 이루고\n그리스도의 충만한\n장성함에 이르도록 하시리니,\n이는 우리가 이제부터\n더 이상 어린아이처럼\n흔들리지 않고\n사람의 속임수와\n간사한 유혹에 빠져\n온갖 교훈의 풍조에 밀려\n요동하지 않게 하시려는 것입니다.","compact":"믿음 안에서 온전한 사람이 되어\n그리스도의 장성함에 이르리니,\n세상 풍조에 요동하지\n않게 하시리라.","oneline":"그리스도의 장성한 분량에 이르러 요동하지 않게 하시리라.","comfort":"하나님은 당신이 견고하게 성장하며 흔들리지 않기를 이미 결정하셨습니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"갈라디아서 5:22-23","type":"선언형","tags":["평안","소망","감사","결단"],"full":"오직 성령의 열매는\n사랑과 희락과 화평과\n오래 참음과 자비와\n양선과 충성과\n온유와 절제이니,\n이와 같은 것을 금지할\n어떤 법도 없습니다.","compact":"성령의 열매는 사랑,\n희락, 화평, 오래 참음,\n자비, 양선, 충성,\n온유, 절제이니,\n이를 금지할 법은 없습니다.","oneline":"성령의 열매를 금지할 법은 없느니라.","comfort":"하나님께서 당신 안에서 아름다운 열매를 맺게 하실 것이니, 누구도 이를 막을 수 없습니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"누가복음 2:10","type":"선언형","tags":["소망","평안","축복"],"full":"천사가 이르기를, 두려워하지 마십시오.\n보십시오, 제가 온 백성에게 미칠\n큰 기쁨의 좋은 소식을 전해드립니다.","compact":"두려워 마십시오. 제가 온 백성에게\n큰 기쁨의 좋은 소식을 전해드립니다.","oneline":"큰 기쁨의 좋은 소식을 전해드립니다.","comfort":"가장 먼저 소식을 전하며\n당신을 찾아오시는 분이 계시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"시편 57:7","type":"고백형","tags":["신뢰","결단","감사","소망"],"full":"하나님, 제 마음이 굳건히 정해졌습니다.\n제 마음이 굳게 정해졌사오니,\n제가 주를 향해 노래하고 찬송하겠나이다.","compact":"하나님, 제 마음이 굳게 정해졌으니,\n주께 노래하고 찬송하겠나이다.","oneline":"제 마음이 확정되었사오니, 제가 찬송하리이다.","comfort":"흔들리는 마음을 아시기에\n먼저 그 자리에서 당신을 붙들어 주실 거예요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"고린도후서 6:10","type":"위로형","tags":["소망","평안","감사","신뢰"],"full":"근심하는 사람처럼 보이나 항상 기뻐하며,\n가난한 사람처럼 보이나 많은 이를 부요하게 하고,\n아무것도 없는 사람처럼 보이나 모든 것을 가진 자입니다.","compact":"근심하는 듯하나 항상 기뻐하고,\n아무것도 없는 듯하나 모든 것을 가진 자입니다.","oneline":"아무것도 없는 자 같으나 모든 것을 가진 자로다.","comfort":"겉으로 보이는 모습 너머에\n참된 부요함을 아는 분이 있으니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"로마서 5:3-4","type":"위로형","tags":["소망","인도하심","신뢰","기다림"],"full":"이뿐만 아니라, 우리는 환난 중에도 기뻐합니다.\n이는 환난이 인내를 낳고, 인내가 연단을,\n연단이 소망을 이루는 줄 알기 때문입니다.","compact":"환난 중에도 기뻐하나니,\n이는 환난이 소망을 이루는 줄 앎이로다.","oneline":"환난은 소망을 이루는 줄 아나이다.","comfort":"힘든 과정 속에서도 당신을 향한\n큰 그림을 완성하고 계신 분이 있습니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"욥기 23:10","type":"선언형","tags":["신뢰","인도하심","소망","치유"],"full":"그러나 제가 가는 길을 그분이 아시나니,\n그가 저를 단련하신 후에는\n제가 순금같이 정결하게 될 것이옵니다.","compact":"제가 가는 길을 그가 아시나니,\n단련 후에는 순금같이 나오리라.","oneline":"그가 나를 단련하신 후에는 내가 순금같이 되어 나오리라.","comfort":"지금 겪는 모든 과정을 통해\n당신을 가장 빛나는 존재로 만드시려는 분이 계십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"누가복음 21:19","type":"선언형","tags":["인도하심","소망","신뢰","기다림"],"full":"너희의 인내로\n너희 영혼을 얻을 것이로다.","compact":"너희의 인내를 통해\n영혼을 얻으리라.","oneline":"너희의 인내로 너희 영혼을 얻으리라.","comfort":"지금 겪는 모든 시간을 통해\n더욱 단단히 서게 하실 분이 당신과 함께합니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한복음 14:16","type":"선언형","tags":["보호","평안","신뢰","외로움"],"full":"제가 아버지께 구하겠습니다.\n그리하면 그분께서 또 다른 보혜사를 여러분에게 주시어,\n영원토록 여러분과 함께 있게 하실 것입니다.","compact":"아버지께 구하여, 다른 보혜사를 주사\n영원토록 너희와 함께 있게 하리니.","oneline":"그가 영원토록 너희와 함께 있게 하리니.","comfort":"혼자가 아님을 아시기에\n가장 가까이에서 늘 붙들어 주실 분이 계시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한복음 14:26","type":"선언형","tags":["인도하심","평안","신뢰","소망"],"full":"보혜사이신 성령, 곧 아버지께서 내 이름으로 보내실 그분이\n여러분에게 모든 것을 가르치고,\n제가 여러분에게 말한 모든 것을 기억나게 하실 것입니다.","compact":"아버지께서 내 이름으로 보내실 성령이\n너희에게 모든 것을 가르치고 생각나게 하리라.","oneline":"그가 너희에게 모든 것을 가르치고 생각나게 하리라.","comfort":"모든 것을 아시고,\n알게 하실 분이 당신 안에 계십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"사도행전 1:8","type":"선언형","tags":["소망","인도하심","신뢰","축복"],"full":"오직 성령이 당신에게 임하시면,\n당신이 권능을 받고 예루살렘과 온 유대와\n사마리아와 땅 끝까지 이르러 내 증인이 될 것이로다.","compact":"성령이 임하시면 권능을 받고\n땅 끝까지 이르러 내 증인이 되리라.","oneline":"성령이 임하시면 권능을 받고 내 증인이 되리라.","comfort":"당신이 걸어갈 그 길에\n이미 가장 큰 능력을 주시겠다고 약속하신 분이 있으니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"로마서 8:28","type":"선언형","tags":["인도하심","신뢰","소망","평안"],"full":"우리가 아는 것은, 하나님을 사랑하는 자들,\n곧 그의 뜻대로 부르심을 받은 자들에게는\n모든 것이 합력하여 선을 이룰 것이로다.","compact":"하나님을 사랑하는 자들에게는\n모든 것이 합력하여 선을 이루느니라.","oneline":"모든 것이 합력하여 선을 이루느니라.","comfort":"지금의 모든 순간이 당신을 향한\n가장 좋은 계획으로 합쳐지고 있으니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"사사기 6:34","type":"위로형","tags":["인도하심","신뢰","보호","소망"],"full":"여호와의 영이\n기드온에게 임하시니,\n그가 힘을 얻어\n나아가게 되었습니다.","compact":"여호와의 영이\n그에게 임하시어,\n나아가게 하셨도다.","oneline":"여호와의 영이 당신에게 임하시리라.","comfort":"그분은 당신의 삶에도 성령으로\n찾아오시는 분입니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"누가복음 18:27","type":"선언형","tags":["신뢰","소망","인도하심","보호"],"full":"예수님께서 말씀하시기를,\n사람으로서는 할 수 없는\n일이라 할지라도,\n하나님께서는 모든 것을\n하실 수 있습니다.","compact":"사람으로 할 수 없는 것을\n하나님은 하실 수 있사옵니다.","oneline":"하나님께서는 모든 것을\n하실 수 있습니다.","comfort":"당신에게는 불가능해 보여도,\n그분에게는 아무것도 아닙니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"사사기 6:23","type":"선언형","tags":["두려움","평안","보호","신뢰"],"full":"주님께서 이르시기를,\n너는 안심하여라.\n두려워하지 말아라.\n너는 죽지 아니할 것이다.","compact":"주님께서 이르시기를,\n안심하고 두려워하지 말아라.\n죽지 아니하리라.","oneline":"너는 죽지 아니하리라.","comfort":"죽음조차도 이미 무력화시키신\n분의 선언입니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"야고보서 4:7","type":"선언형","tags":["보호","두려움","신뢰","평안"],"full":"그러므로 하나님께 복종하십시오.\n마귀를 대적하십시오.\n그리하면 마귀가 당신을\n피할 것입니다.","compact":"마귀를 대적하십시오.\n그리하면 마귀가 당신을\n피하리라.","oneline":"마귀가 당신을 피하리라.","comfort":"악한 영의 모든 권세 위에서\n이미 승리하신 분이 계십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"신명기 28:7","type":"선언형","tags":["보호","두려움","신뢰","축복"],"full":"주님께서 당신을 대적하려고\n일어선 원수들을 당신 앞에서\n패하게 하실 것입니다.\n그들이 한 길로 당신을\n치러 왔으나,\n당신 앞에서 일곱 길로\n도망하게 하시리라.","compact":"주님께서 당신의 원수들을\n패하게 하시리라.\n한 길로 왔던 그들이\n일곱 길로 도망하리라.","oneline":"주님께서 당신의 원수들을\n패하게 하시리라.","comfort":"이미 승리를 약속하신 분께서\n당신을 위해 싸우십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한복음 6:68","type":"고백형","tags":["신뢰","소망","인도하심","결단"],"full":"시몬 베드로가 아뢰기를,\n주님, 영원한 생명의 말씀이\n주님께 있사오니,\n저희가 누구에게로 가겠나이까?","compact":"주님, 영원한 생명의 말씀이\n주님께 있으니,\n저희가 누구에게로 가겠나이까?","oneline":"영원한 생명의 말씀이\n주님께 있사오니.","comfort":"갈 바를 알지 못해도,\n이미 영원한 길을 보이신\n분이 계십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"창세기 32:11","type":"고백형","tags":["두려움","보호","가정","신뢰"],"full":"제가 주님께 간구하오니,\n저의 형 에서의 손에서\n저를 건져주소서.\n제가 그를 두려워함은\n그가 와서 저와 저의 가족을\n해칠까 겁이 나기 때문입니다.","compact":"주님, 저의 형 에서의 손에서\n저를 건져주소서.\n그를 두려워하여 저와\n저의 가족을 해칠까\n겁이 나옵니다.","oneline":"주님, 저를 건져주소서.","comfort":"당신이 느끼는 두려움,\n그분의 귀에 이미 상달되었으니\n염려 마세요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"로마서 13:11","type":"위로형","tags":["소망","기다림","평안","인도하심"],"full":"또한 우리가 이 시기를 알듯이,\n잠에서 깨어날 때가\n벌써 되었습니다.\n우리의 구원이 처음 믿었던\n때보다 지금 더욱 가까이\n왔기 때문입니다.","compact":"우리의 구원이 처음 믿을\n때보다 지금 더 가까이\n왔음이라.","oneline":"우리의 구원이 이제 더욱\n가까이 왔음이라.","comfort":"기다림의 끝이 점점 더 가까워지고\n있다는 것을 기억하세요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한복음 11:27","type":"고백형","tags":["신뢰","소망","결단"],"full":"주님, 그러하옵니다.\n주는 그리스도시요\n세상에 오시는 하나님의\n아들이신 줄 제가 믿사옵니다.","compact":"주는 그리스도시요\n하나님의 아들이신 줄\n제가 믿나이다.","oneline":"제가 주를 하나님의 아들로 믿나이다.","comfort":"이 고백은 주님이 받으실\n가장 아름다운 진심입니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"욥기 13:15","type":"고백형","tags":["신뢰","두려움","소망","결단"],"full":"주께서 저를 죽이실지라도,\n저는 여전히 주님을\n신뢰할 것입니다.\n다만 저는 주님 앞에서\n제 행위를 아뢰겠습니다.","compact":"주께서 저를 죽이실지라도,\n저는 주님을 신뢰할 것입니다.","oneline":"주님을 신뢰하겠습니다.","comfort":"가장 절망적인 순간에도 붙드셨던\n분이 바로 주님이십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한1서 5:4","type":"선언형","tags":["소망","신뢰","보호"],"full":"하나님께로부터 난 자마다\n세상을 이기느니라.\n세상을 이기는 승리는 이것이니,\n곧 우리의 믿음이니라.","compact":"하나님께로부터 난 자는\n세상을 이기느니라.\n우리의 믿음으로 승리합니다.","oneline":"하나님께로부터 난 자는 세상을 이기느니라.","comfort":"이 승리는 이미 주님의 자녀에게 주어진 것이니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"호세아 10:12","type":"선언형","tags":["회개","인도하심","축복","소망"],"full":"너희가 공의를 심고\n인애를 거두라.\n너희 묵은 땅을 갈아엎으라.\n지금이 곧 주님을 찾을 때이니,\n마침내 주님께서 오사\n공의를 비처럼\n너희에게 내리시리라.","compact":"묵은 땅을 갈아엎으라.\n주님을 찾을 때이니,\n주님께서 공의를 비처럼\n내리시리라.","oneline":"주님께서 공의를 비처럼 내리시리라.","comfort":"그분은 마르지 않는 은혜의 비를 주시는 분이니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"마태복음 4:4","type":"선언형","tags":["신뢰","인도하심","소망"],"full":"예수께서 대답하시기를\n기록되었으되,\n사람이 떡으로만 살 것이\n아니요,\n하나님의 입으로부터 나오는\n모든 말씀으로 살 것이라\n하였느니라.","compact":"사람이 떡으로만 살 것이\n아니요,\n하나님의 말씀으로 살 것이니라.","oneline":"사람은 하나님의 말씀으로 살 것이니라.","comfort":"주님께서는 우리에게 가장 필요한 양식을 이미 허락하셨습니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"역대하 29:17","type":"고백형","tags":["감사","신뢰","회개","결단"],"full":"나의 하나님이시여,\n주님께서 마음을 감찰하시고\n정직을 기뻐하시는 줄\n제가 아옵니다.\n제가 정직한 마음으로\n이 모든 것을 기꺼이\n드렸사오며,\n이제 여기 주의 백성이\n주님께 자원하여 드리는 것을\n보오니 심히 기쁘옵니다.","compact":"주님께서 마음을 감찰하시고\n정직을 기뻐하심을 아나이다.\n주의 백성이 자원하여 드림을\n보니 기쁘옵니다.","oneline":"주께서 정직을 기뻐하시는 줄 제가 아나이다.","comfort":"주님은 그 마음에 담긴 진심을 가장 먼저 헤아리시는 분이십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"시편 51:10","type":"고백형","tags":["회개","소망","치유","평안"],"full":"하나님이시여,\n제 속에 정결한 마음을\n창조하시고\n제 안에 정직한 영을\n새롭게 하여 주소서.","compact":"제 속에 정결한 마음을\n창조하시고\n정직한 영을 새롭게 하소서.","oneline":"제 속에 정결한 마음을 창조하여 주소서.","comfort":"새로운 시작을 허락하시는 분이 바로 주님이십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"예레미야 31:11","type":"선언형","tags":["보호","신뢰","소망"],"full":"주님께서 야곱을 구원하시되,\n그들보다 강한 자의 손에서\n그들을 속량하셨습니다.","compact":"주님께서 야곱을 구원하시되,\n강한 자의 손에서\n속량하셨습니다.","oneline":"주님께서 강한 자의 손에서 구원하셨습니다.","comfort":"당신보다 먼저 모든 승리를 이루신 분이 계십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"예레미야 31:12","type":"선언형","tags":["축복","소망","평안","감사"],"full":"그들이 와서\n시온의 높은 곳에서\n찬송하며,\n주님께서 주시는 복 곧\n곡식과 새 포도주와\n기름과\n어린 양 떼와 소 떼를 얻고\n크게 기뻐하리라.\n그들의 심령은\n물 댄 동산 같겠고,\n다시는 근심이 없으리로다.","compact":"그들은 주님의 복을 얻고\n크게 기뻐하리라.\n그 심령은\n물 댄 동산 같겠고,\n다시는 근심이 없으리로다.","oneline":"그 심령은 물 댄 동산 같겠고, 다시는 근심이 없으리로다.","comfort":"메마른 영혼을 풍요롭게 하시는 분이 바로 주님이십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"예레미야 31:13","type":"선언형","tags":["슬픔","소망","평안"],"full":"그때에 처녀는 춤추며\n즐거워하겠고,\n청년과 노인도 함께\n즐거워하리니,\n이는 내가 그들의 슬픔을\n돌려 즐겁게 하며,\n그들을 위로하여\n그들의 근심으로부터\n기쁨을 얻게 할 것임이라.","compact":"내가 그들의 슬픔을\n돌려 즐겁게 하며,\n그들을 위로하여\n기쁨을 얻게 할 것이니라.","oneline":"내가 그들의 슬픔을 돌려 기쁨을 얻게 할 것이니라.","comfort":"당신의 모든 슬픔을 기쁨으로 바꾸시는 분이 주님이십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"시편 4:7","type":"고백형","tags":["감사","평안","소망","신뢰"],"full":"주님께서 제 마음에\n두신 기쁨은\n그들의 곡식과 새 포도주가\n풍성할 때보다 더 크옵니다.","compact":"주님께서 제 마음에\n두신 기쁨은\n세상의 풍요보다 더하니이다.","oneline":"주께서 내 마음에 두신 기쁨은 세상의 풍요보다 더하니이다.","comfort":"세상이 줄 수 없는 참된 기쁨이 당신 안에 이미 있습니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"시편 4:8","type":"고백형","tags":["평안","신뢰","보호","두려움"],"full":"제가 평안히 눕고\n자기도 하리니,\n저를 안전히 살게 하시는 이는\n오직 주 여호와이시옵니다.","compact":"제가 평안히 눕고\n자게 하시는 이는\n오직 주 여호와이십니다.","oneline":"나를 안전히 살게 하시는 이는 오직 여호와이시니이다.","comfort":"가장 깊은 안식은 주님 안에서 이미 약속된 선물입니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"레위기 11:45","type":"선언형","tags":["신뢰","보호","인도하심","감사"],"full":"주님께서 말씀하시기를,\n\"나는 너희의 하나님이 되려고\n너희를 애굽 땅에서\n인도하여 낸 여호와이니라.\"","compact":"나는 너희의 하나님이 되려고\n너희를 애굽에서\n인도해 낸 여호와이니라.","oneline":"나는 너희를 인도하여 낸 여호와 하나님이니라.","comfort":"당신의 하나님이 되시기 위해 먼저 손 내미신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"창세기 16:11","type":"선언형","tags":["소망","보호","슬픔","인도하심"],"full":"여호와의 사자가\n그에게 말씀하시기를,\n\"네가 임신하였으니\n아들을 낳으리라.\n그의 이름을 이스마엘이라 하라.\n이는 주님께서 너의 고통을\n들으셨음이니라.\"","compact":"주님께서 네 고통을 들으셨으니,\n아들을 낳으리라.\n이름을 이스마엘이라 하라.","oneline":"주님께서 네 고통을 들으셨음이니라.","comfort":"이미 당신의 아픔을 알고 계셨고, 듣고 계셨던 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"창세기 16:13","type":"고백형","tags":["보호","외로움","인도하심","신뢰"],"full":"하갈이 자기에게 말씀하신\n주님의 이름을,\n\"나를 살피시는 하나님\"이라\n불렀으니,\n이는 \"여기에서 내가 과연\n나를 살피시는 주님을 뵈었도다\"\n함이었습니다.","compact":"나를 살피시는 하나님.\n여기에서 주님을 뵈었도다.","oneline":"주님은 나를 살피시는 하나님이시니이다.","comfort":"당신의 모든 상황을 살피고 계시는 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"창세기 17:1","type":"선언형","tags":["신뢰","보호","인도하심","결단"],"full":"아브람이 99세였을 때,\n주님께서 그에게 나타나\n말씀하시기를,\n\"나는 전능한 하나님이니라.\n너는 내 앞에서 행하여\n온전하라.\"","compact":"나는 전능한 하나님이라.\n내 앞에서 온전히 행하라.","oneline":"나는 전능한 하나님이니라.","comfort":"당신을 붙들고 계신 분은 전능하신 하나님이시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"시편 126:5","type":"선언형","tags":["소망","슬픔","기다림","축복"],"full":"눈물을 흘리며\n씨를 뿌리는 자는,\n반드시 기쁨으로 거두리로다.","compact":"눈물을 흘려도,\n기쁨으로 거두리로다.","oneline":"눈물을 흘리며 씨를 뿌리는 자는 기쁨으로 거두리로다.","comfort":"당신의 눈물이 헛되지 않을 것이라고 먼저 약속하신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"시편 119:18","type":"고백형","tags":["인도하심","소망","결단","기다림"],"full":"주님, 제 눈을 열어주시어\n주님의 율법에서\n놀라운 것들을 보게 하소서.","compact":"제 눈을 열어\n주의 율법에서\n놀라운 것을 보게 하소서.","oneline":"주님의 율법에서 놀라운 것을 보게 하소서.","comfort":"당신의 간절한 소원을 기쁘게 들으시는 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"고린도후서 6:2","type":"선언형","tags":["소망","평안","인도하심"],"full":"주님께서 말씀하시기를,\n\"내가 은혜를 베풀 때에\n너에게 응답하였고,\n구원의 날에 너를 도왔도다.\"\n보라, 지금이 바로\n은혜 받을 만한 때이며,\n보라, 지금이 바로\n구원의 날이로다.","compact":"내가 은혜 베풀 때 응답하고,\n구원의 날에 너를 도왔도다.\n지금이 바로 은혜의 날이로다.","oneline":"지금이 바로 은혜 받을 만한 때요, 구원의 날이로다.","comfort":"이미 당신을 도우시고 응답하시기로 정하신 날이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"로마서 8:26","type":"위로형","tags":["불안","인도하심","평안","신뢰"],"full":"이와 같이 성령께서도\n우리의 연약함을 도우시나니,\n우리가 무엇을 어떻게\n기도해야 할지\n알지 못할 때에도,\n오직 성령께서 말할 수 없는\n탄식으로 우리를 위하여\n친히 간구하시느니라.","compact":"성령께서 우리의 연약함을\n도우시나니,\n우리가 기도할 바를\n알지 못해도\n친히 간구하시느니라.","oneline":"성령이 우리의 연약함을 도우시며 말할 수 없는 탄식으로 간구하시느니라.","comfort":"당신이 무슨 기도를 할지 몰라도, 이미 성령께서 당신을 위해 기도하고 계세요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"로마서 8:27","type":"위로형","tags":["평안","인도하심","신뢰","보호"],"full":"마음을 살피시는 분께서\n성령의 생각을 아시나니,\n이는 성령께서 하나님의 뜻대로\n성도들을 위하여\n간구하심이니라.","compact":"마음을 살피시는 분이\n성령의 생각을 아시나니,\n성령이 하나님의 뜻대로\n성도를 위하여\n간구하시니라.","oneline":"성령이 하나님의 뜻대로 성도를 위하여 간구하심이니라.","comfort":"당신의 마음과 성령의 기도를 모두 알고 계시는 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"예레미야 33:3","type":"선언형","tags":["소망","인도하심","신뢰","보호"],"full":"저에게 부르짖으십시오.\n제가 응답할 것이며,\n당신이 알지 못하는\n크고 은밀한 일들을\n보이겠습니다.","compact":"저에게 부르짖으세요.\n제가 응답하고\n알지 못하는\n크고 은밀한 일을\n보이겠습니다.","oneline":"제가 응답하고 크고 은밀한 일을 보이리라.","comfort":"당신의 부르짖음을 이미 듣고 계신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한계시록 3:20","type":"선언형","tags":["평안","관계","소망"],"full":"보십시오, 제가 문 밖에 서서\n두드리고 있습니다.\n누구든지 제 음성을 듣고\n문을 열면,\n제가 그에게로 들어가\n그와 함께 먹고\n그도 저와 함께 먹을 것입니다.","compact":"제가 문 밖에 서서 두드리니,\n문을 열면 제가 들어가\n함께 먹으리라.","oneline":"내가 그와 더불어 먹으리라.","comfort":"먼저 당신의 마음 문을 두드리고 계신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"이사야 40:30-31","type":"선언형","tags":["불안","소망","치유","인도하심","신뢰"],"full":"소년이라도 피곤하고 곤비하며,\n장정이라도 넘어지고 쓰러질지라도,\n오직 여호와를 앙망하는 자는\n새 힘을 얻을 것입니다.\n독수리가 날개 치며\n올라가듯 할 것이요,\n달려가도 지치지 않고\n걸어가도 피곤하지\n않을 것입니다.","compact":"여호와를 앙망하는 자는\n새 힘을 얻으리니,\n독수리처럼 날아오르고\n달려가도 피곤하지 않으리라.","oneline":"여호와를 앙망하는 자는 새 힘을 얻으리라.","comfort":"이미 당신에게 새 힘을 주시겠다고 약속하신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"마태복음 4:19-20","type":"선언형","tags":["인도하심","소망","결단","직장사업"],"full":"예수님께서 말씀하셨습니다.\n\"나를 따라오라.\n내가 너희를 사람을 낚는\n어부가 되게 하리라.\"\n그러자 그들은 곧 그물을\n버려두고 예수님을 따랐습니다.","compact":"나를 따라오라.\n내가 너희를 사람 낚는\n어부가 되게 하리라.","oneline":"내가 너희를 사람 낚는 어부가 되게 하리라.","comfort":"이미 당신의 길을 이끌어 주시겠다고 약속하신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"사도행전 9:15","type":"선언형","tags":["인도하심","소망","직장사업","결단"],"full":"주님께서 말씀하셨습니다.\n\"가라. 이 사람은 나의 이름을\n이방인들과 임금들,\n그리고 이스라엘 자손들에게\n전하기 위해\n내가 택한 그릇이니라.\"","compact":"주님께서 택하신 나의 그릇이라,\n나의 이름을 전하리라.","oneline":"이 사람은 내가 택한 나의 그릇이라.","comfort":"당신을 향한 특별한 계획을 가지고 계신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"사사기 6:12","type":"선언형","tags":["두려움","불안","보호","평안","신뢰"],"full":"여호와의 사자가 기드온에게\n나타나 말씀하셨습니다.\n\"큰 용사여, 여호와께서\n당신과 함께 계십니다.\"","compact":"큰 용사여, 여호와께서\n당신과 함께 계시도다.","oneline":"여호와께서 당신과 함께 계시도다.","comfort":"당신이 어떤 상황에 있든, 이미 그 자리에 함께 계신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"이사야 40:27","type":"위로형","tags":["불안","인도하심","신뢰","외로움"],"full":"야곱아, 어찌하여 네가 말하며\n이스라엘아, 네가 이르기를\n'내 길은 여호와께\n숨겨졌으며\n내 송사는 내 하나님에게서\n벗어난다' 하느냐?","compact":"어찌하여 네 길은 주님께\n숨겨졌고 네 송사는\n벗어난다고 하느냐?","oneline":"네 길은 주님께 숨겨지지 아니하였느니라.","comfort":"당신의 모든 길을 이미 알고 계신 분이니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"고린도후서 12:9-10","type":"선언형","tags":["신뢰","평안","두려움","소망"],"full":"주님께서 제게 이르시기를\n\"내 은혜가 네게 족하도다.\n내 능력은 약한 데서\n온전하여진다.\"\n하셨습니다.\n그러므로 저는 도리어\n크게 기뻐하며\n저의 여러 약한 것들에 대해\n자랑할 것입니다.\n이는 그리스도의 능력이\n제게 머물게 하려 함입니다.","compact":"내 은혜가 네게 족하도다.\n내 능력은 약한 데서\n온전해지느니라.","oneline":"내 은혜가 네게 족하도다.","comfort":"당신의 약한 부분까지도 이미 알고 온전케 하시겠다고 하신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"스가랴 4:6","type":"선언형","tags":["신뢰","인도하심","소망","보호"],"full":"만군의 여호와께서\n말씀하시길,\n이것은 사람의 힘으로도\n능으로도 되지 아니하고,\n오직 나의 영으로만\n이루어지리라.","compact":"이것은 사람의 힘이 아닌,\n오직 나의 영으로\n이루어지리라.","oneline":"오직 나의 영으로 이루어지리라.","comfort":"당신이 할 수 없는 일도 주님은 하실 수 있다고 먼저 말씀하신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"창세기 15:5","type":"선언형","tags":["축복","소망","신뢰","자녀양육"],"full":"주님께서 아브람을 밖으로\n이끌고 말씀하시길,\n“하늘을 올려다보아라.\n네가 저 별들을 셀 수 있다면\n세어보아라.\n너의 자손이 이처럼\n많아지리라.”","compact":"하늘의 별처럼 너의 자손이\n많아지리라.","oneline":"너의 자손이 하늘의 별처럼 많아지리라.","comfort":"약속을 먼저 말씀하시고 이루시는 분이시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"누가복음 24:52-53","type":"위로형","tags":["감사","평안","소망"],"full":"그들이 예수님께 경배하고,\n큰 기쁨으로 예루살렘으로\n돌아가, 늘 성전에서\n하나님을 찬송하니라.","compact":"그들이 큰 기쁨으로\n돌아가, 늘 하나님을\n찬송하니라.","oneline":"큰 기쁨으로 하나님을 찬송하니라.","comfort":"모든 것의 마지막은 기쁨과 찬송으로 끝날 것이라고 보여주는 약속과 같아요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"사도행전 1:11","type":"선언형","tags":["소망","신뢰","기다림","평안"],"full":"이르시되, “갈릴리 사람들아,\n어찌하여 하늘을 쳐다보고 서 있느냐?\n너희 가운데서 하늘로 올리우신 이 예수님은,\n너희가 그가 하늘로 가심을 본 그대로 다시 오시리라.”","compact":"너희 가운데서 하늘로 올리우신 이 예수님은, 본 그대로 다시 오시리라.","oneline":"주님은 본 그대로 다시 오시리라.","comfort":"다시 오시겠다는 약속을\n분명히 주신 분이시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"창세기 1:1","type":"선언형","tags":["신뢰","보호","소망","인도하심"],"full":"태초에 하나님께서\n천지를 창조하시니라.","compact":"태초에 하나님이\n온 세상을 창조하시니라.","oneline":"하나님이 천지를 창조하시니라.","comfort":"모든 것을 시작하신 분이\n당신의 삶도 주관하고 계시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"골로새서 1:16","type":"선언형","tags":["신뢰","보호","소망","평안"],"full":"만물이 그분에게서 창조되었으니,\n하늘과 땅에 있는 보이는 모든 것과 보이지 않는 모든 것,\n왕권들과 주권들, 통치자들과 권세들까지도,\n만물이 다 그분으로 말미암아 그분을 위하여 창조되었나이다.","compact":"만물이 그분으로 말미암아\n그분을 위하여 창조되었나이다.","oneline":"만물이 다 그분으로 말미암아 창조되었나이다.","comfort":"모든 것이 그분으로부터 시작되었고\n그분을 향해 가고 있어요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"사도행전 23:11","type":"선언형","tags":["인도하심","소망","보호","직장사업"],"full":"그 날 밤에 주께서 바울 곁에 서서\n말씀하시길, “담대하라!\n네가 예루살렘에서 나의 일을 증언한 것처럼,\n로마에서도 반드시 증언해야 할 것이니라.”","compact":"담대하라! 네가 로마에서도\n나의 일을 증언하리라.","oneline":"주님이 말씀하신 대로 로마에서도 증언하리라.","comfort":"주님이 당신의 길을 먼저 정해주시고\n함께 걸어가시겠다고 말씀하셨어요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한복음 16:13","type":"선언형","tags":["인도하심","평안","신뢰","보호"],"full":"그러나 진리의 성령이 오시면,\n그분께서 너희를 모든 진리 가운데로 인도하시리라.","compact":"진리의 성령이 오시면,\n너희를 모든 진리 가운데로 인도하시리라.","oneline":"진리의 성령이 너희를 모든 진리 가운데로 인도하시리라.","comfort":"홀로 헤매지 않도록\n먼저 길을 비추시겠다고 약속하신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한복음 11:5","type":"위로형","tags":["관계","평안"],"full":"예수님께서 본래\n마르다와 그 동생 마리아,\n그리고 나사로를 사랑하시었도다.","compact":"예수님께서 마르다와 그의 동생,\n그리고 나사로를 사랑하시었도다.","oneline":"예수님께서 그들을 사랑하시었도다.","comfort":"주님의 사랑은 언제나\n당신을 향하고 있어요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한복음 11:4","type":"선언형","tags":["건강","소망","치유","신뢰","평안"],"full":"예수께서 들으시고 말씀하시길,\n“이 병은 죽을 병이 아니라 하나님의 영광을 위함이요,\n하나님의 아들이 이로 말미암아 영광을 받게 하려 함이라.”","compact":"이 병은 죽을 병이 아니라\n하나님의 영광을 위함이라.","oneline":"이 병은 하나님의 영광을 위함이라.","comfort":"힘든 상황 속에서도\n주님의 선한 뜻이 숨어있을 수 있다고 말씀해주세요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한복음 11:11","type":"선언형","tags":["치유","소망","보호","신뢰","기다림"],"full":"이 말씀을 하신 후에 또 이르시되,\n“우리 친구 나사로가 잠들었도다.\n그러나 내가 그를 깨우러 가노라.”","compact":"우리 친구 나사로가 잠들었도다.\n그러나 내가 그를 깨우러 가노라.","oneline":"내가 그를 깨우러 가노라.","comfort":"주님이 당신의 상황에\n직접 개입하겠다고 말씀하신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"시편 131:1-2","type":"고백형","tags":["평안","신뢰","기다림","소망"],"full":"여호와여, 제 마음이 교만하지 않고, 제 눈은 오만하지 않습니다.\n저는 너무 큰일이나 감당 못할 놀라운 일에 힘쓰지 아니합니다.\n실로 제 영혼을 고요하고 평온하게 하여,\n젖 뗀 아이가 어머니 품에 있듯이, 제 영혼이 젖 뗀 아이와 같사옵니다.","compact":"제 영혼을 고요하고 평온하게 하여,\n젖 뗀 아이가 어머니 품에 있듯이, 제 영혼이 젖 뗀 아이와 같사옵니다.","oneline":"제 영혼이 젖 뗀 아이와 같도다.","comfort":"가장 안전한 품 안에,\n이미 당신이 있습니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"시편 23:1","type":"선언형","tags":["신뢰","평안","보호","축복"],"full":"여호와는 저의 목자시니,\n저에게는 부족함이 없으리로다.","compact":"여호와는 저의 목자시니,\n부족함이 없으리이다.","oneline":"저에게는 부족함이 없으리로다.","comfort":"모든 필요를 아시는 분이,\n당신의 곁에 계시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한복음 10:10","type":"선언형","tags":["소망","축복","보호","인도하심"],"full":"도둑이 오는 것은\n도둑질하고 죽이고\n멸망시키려는 것뿐이지만,\n내가 온 것은\n양들로 생명을 얻게 하고,\n더 풍성히 얻게 하려는 것이라.","compact":"내가 온 것은\n양들로 생명을 얻게 하고,\n더 풍성히 얻게 하려는 것이라.","oneline":"내가 온 것은 양들로 풍성한 생명을 얻게 하려는 것이라.","comfort":"생명의 풍성함을 약속하신 분이, 당신을 부르고 있습니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한복음 10:14-15","type":"선언형","tags":["신뢰","보호","인도하심","관계"],"full":"나는 선한 목자입니다.\n나는 내 양들을 알고,\n양들도 나를 압니다.\n아버지께서 나를 아시고\n내가 아버지를 아는 것과 같으니,\n나는 양들을 위하여\n목숨을 버리노라.","compact":"나는 선한 목자입니다.\n나는 내 양들을 알고,\n양들도 나를 아나니,\n나는 양들을 위하여\n목숨을 버리노라.","oneline":"나는 양들을 위하여 목숨을 버리노라.","comfort":"당신의 모든 것을 아시며, 지켜주시는 분이 계십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"다니엘 2:47","type":"선언형","tags":["신뢰","보호","인도하심","소망"],"full":"왕이 다니엘에게 대답하여 이르되,\n너희 하나님은 참으로\n모든 신들의 신이시며,\n모든 왕의 주재이시로다!\n네가 능히 이 은밀한 것을\n나타내었으니,\n네 하나님은 또 은밀한 것을\n나타내시는 이시로다.","compact":"너희 하나님은 참으로\n모든 신들의 신이시며,\n모든 왕의 주재이시로다!\n은밀한 것을 나타내시는 이시로다.","oneline":"너희 하나님은 모든 왕의 주재이시로다.","comfort":"당신의 모든 감춰진 마음과 미래를 이미 아는 분이 계십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"이사야 53:6","type":"선언형","tags":["용서","회개","치유","평안"],"full":"우리는 모두 양 같아서\n그릇 행하여 각기 제 길로 갔지만,\n여호와께서는 우리 모두의 죄악을\n그에게 담당시키셨도다.","compact":"우리는 모두 죄악으로\n각기 제 길로 갔지만,\n여호와께서는 우리 모두의 죄악을\n담당시키셨도다.","oneline":"여호와께서는 우리 모두의 죄악을 그에게 담당시키셨도다.","comfort":"당신의 짐을 덜어내실 분이 이미 모든 것을 감당하셨습니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한복음 7:37","type":"위로형","tags":["소망","치유","평안","인도하심"],"full":"명절의 가장 큰 날,\n예수님께서 서서 외쳐 이르시되,\n누구든지 목마르거든\n내게로 와서 마시라.","compact":"누구든지 목마르거든,\n내게로 와서 마시라.","oneline":"누구든지 목마르거든 내게로 오라.","comfort":"당신의 갈증을 영원히 해소해 주실 분이, 당신을 기다리고 있습니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한복음 4:13-14","type":"선언형","tags":["소망","치유","평안","축복"],"full":"예수께서 대답하여 이르시되,\n이 물을 마시는 자마다\n다시 목마르려니와,\n내가 주는 물을 마시는 자는\n영원히 목마르지 아니하리니,\n내가 주는 물은 그 속에서\n영생하도록 솟아나는 샘물이 되리라.","compact":"내가 주는 물을 마시는 자는\n영원히 목마르지 아니하리니,\n그 속에서 영생하도록\n솟아나는 샘물이 되리라.","oneline":"내가 주는 물은 영원히 목마르지 않게 하리라.","comfort":"당신의 가장 깊은 갈증까지도 채워주실 분이, 약속하고 계십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"시편 42:1","type":"고백형","tags":["외로움","소망","신뢰","기다림"],"full":"하나님이시여,\n사슴이 시냇물을 찾기에\n갈급함 같이,\n제 영혼이 주를 찾기에\n갈급하나이다.","compact":"사슴이 시냇물을 찾기에\n갈급함 같이,\n제 영혼이 주를 찾기에\n갈급하나이다.","oneline":"제 영혼이 주를 찾기에 갈급하나이다.","comfort":"당신의 깊은 갈급함까지도 알고 계신 분이, 당신의 마음을 만지십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"마태복음 11:28","type":"선언형","tags":["불안","슬픔","평안","치유"],"full":"수고하고 무거운 짐을 진 자들아,\n다 내게로 오라.\n내가 너희를 쉬게 하리라.","compact":"수고하고 무거운 짐 진 자들아,\n다 내게로 오라.\n내가 너희를 쉬게 하리라.","oneline":"수고하고 무거운 짐 진 자들아, 다 내게로 오라.","comfort":"당신의 모든 짐을 맡아주시고, 진정한 쉼을 주실 분이, 당신을 부르고 계십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"에스겔 11:19-20","type":"선언형","tags":["회개","치유","소망","평안"],"full":"내가 그들에게 한 마음을 주고\n그 속에 새 영을 주며,\n그 몸에서 돌 같은 마음을 제거하고\n살처럼 부드러운 마음을 주어,\n내 율례를 따르며\n내 규례를 지켜 행하게 하리니,\n그들은 내 백성이 되고\n나는 그들의 하나님이 되리라.","compact":"내가 그들에게 한 마음을 주고\n새 영을 주며,\n돌 같은 마음을 제거하고\n부드러운 마음을 주리니,\n나는 그들의 하나님이 되리라.","oneline":"내가 그들에게 돌 같은 마음을 제거하고 부드러운 마음을 주리라.","comfort":"당신의 변화와 회복을 이미 약속하신 분이, 당신의 마음을 붙드시겠다고 말씀하십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"시편 16:11","type":"선언형","tags":["소망","인도하심","평안","축복"],"full":"주께서 생명의 길을\n저에게 보이시리니,\n주의 앞에는 충만한 기쁨이 있고,\n주의 오른쪽에는\n영원한 즐거움이 있나이다.","compact":"주께서 생명의 길을 보이시리니,\n주의 앞에는 충만한 기쁨이 있고\n영원한 즐거움이 있나이다.","oneline":"주께서 생명의 길을 보이시리니, 영원한 즐거움이 있나이다.","comfort":"당신의 발걸음을 인도하실 분이, 가장 아름다운 길을 예비하고 계십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"누가복음 11:13","type":"선언형","tags":["소망","신뢰","축복","인도하심"],"full":"너희가 악할지라도\n좋은 것을 자식에게\n줄 줄 알거든,\n하물며 너희 하늘 아버지께서\n구하는 자에게 성령을\n주시지 않겠느냐 하시니라.","compact":"너희 하늘 아버지께서\n구하는 자에게 성령을\n주시지 않겠느냐 하시니라.","oneline":"하늘 아버지께서 구하는 자에게 성령을 주시리라.","comfort":"가장 좋은 것을 주시겠다고 약속하신 분이, 당신의 기도에 귀 기울이고 계십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요나 2:2","type":"고백형","tags":["슬픔","불안","신뢰","보호"],"full":"내가 받는 고난으로 말미암아\n여호와께 불러 아뢰었더니\n주께서 내게 대답하셨고,\n내가 스올의 뱃속에서\n부르짖었더니 주께서\n내 음성을 들으셨나이다.","compact":"내가 고난으로 여호와께\n아뢰었더니 주께서 내게\n대답하셨고, 주께서 내 음성을\n들으셨나이다.","oneline":"주께서 내 음성을 들으셨나이다.","comfort":"가장 깊은 곳의 부르짖음까지도 들으시는 분이, 당신의 기도를 듣고 계십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요나 2:7","type":"고백형","tags":["신뢰","외로움","슬픔","평안"],"full":"내 영혼이 너무나 피곤할 때에,\n제가 주님을 생각하였사오니,\n제 기도가 주님께 이르러\n주의 성전에 상달되었나이다.","compact":"내 영혼이 피곤할 때\n주님을 생각하였으니,\n내 기도가 주님께 이르렀나이다.","oneline":"내 기도가 주님께 이르렀나이다.","comfort":"당신의 간절한 기도는 이미 그분께 상달되었답니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요나 2:9","type":"고백형","tags":["감사","신뢰","소망","결단"],"full":"저는 감사하는 목소리로\n주님께 제사를 드리며,\n저의 서원을 주님께 갚겠나이다.\n참으로 구원은 오직 주님께\n속하였나이다.","compact":"감사하며 주님께 서원을\n갚겠나이다. 구원은 오직\n주님께 속하였나이다.","oneline":"구원은 오직 주님께 속하였나이다.","comfort":"당신의 모든 간구도 그분의 구원 안에 놓여 있습니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"시편 119:71","type":"고백형","tags":["신뢰","슬픔","소망","결단"],"full":"제가 고난당한 것이 제게\n유익이 되었사오니,\n이로 말미암아 제가 주의\n율례들을 배우게 되었나이다.","compact":"고난당한 것이 제게 유익이라,\n주님의 율례를 배우게 되었나이다.","oneline":"고난은 제게 유익이 되었나이다.","comfort":"당신이 겪는 어려움 속에서도 숨겨진 은혜가 있습니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"에베소서 2:1","type":"선언형","tags":["소망","치유","보호","축복"],"full":"하나님께서는 허물과 죄로\n죽었던 우리를 다시 살리셨도다.","compact":"허물과 죄로 죽었던 우리를\n살리셨도다.","oneline":"우리를 다시 살리셨도다.","comfort":"이미 당신을 사망에서 생명으로 옮겨 놓으신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"에베소서 2:5-6","type":"선언형","tags":["소망","감사","평안","축복"],"full":"허물로 죽었던 우리를\n그리스도와 함께 살리셨고,\n이 모든 것이 오직 은혜로\n된 구원입니다. 우리를 함께\n일으키사 그리스도 예수 안에서\n하늘에 함께 앉히셨습니다.","compact":"허물로 죽었던 우리를\n그리스도와 함께 살리셨고,\n우리를 하늘에 함께\n앉히셨나이다.","oneline":"우리를 그리스도와 함께 살리시고 하늘에 앉히셨나이다.","comfort":"당신의 자리는 이미 가장 높은 곳에 마련되어 있습니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한계시록 21:1, 3-4","type":"선언형","tags":["소망","슬픔","평안","치유"],"full":"보라, 하나님의 장막이\n사람들과 함께 있으매,\n하나님께서 친히 그들과\n함께 계실 것입니다.\n모든 눈물을 그들의 눈에서\n닦아 주시리니, 다시는 사망이\n없고 애통하는 것이나\n곡하는 것이나 아픈 것이\n다시는 없을 것이며,\n이전의 모든 것이 다\n지나갈 것입니다.","compact":"하나님께서 친히 사람들과\n함께 계셔서 모든 눈물을\n닦아 주시리니, 다시는 사망도\n슬픔도 아픔도 없을 것입니다.","oneline":"하나님이 모든 눈물을 그 눈에서 닦아 주시리라.","comfort":"이 모든 슬픔과 아픔은 영원히 지속되지 않습니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"이사야 9:6","type":"선언형","tags":["소망","평안","인도하심","축복"],"full":"한 아기가 우리에게 났고\n한 아들을 우리에게 주신 바\n되었으니,\n그의 어깨에는 통치가\n있을 것이요,\n그의 이름은 기묘한 조언자,\n전능하신 하나님,\n영원하신 아버지,\n평화의 왕이라 불릴 것입니다.","compact":"한 아들이 우리에게 주신 바\n되었으니, 그의 이름은 기묘한\n조언자, 전능하신 하나님,\n영원하신 아버지,\n평화의 왕이라 불릴 것입니다.","oneline":"그의 이름은 평화의 왕이라 불릴 것입니다.","comfort":"그분은 이미 당신의 삶의 모든 문제의 해결책이시며, 평안 그 자체이십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"이사야 7:14","type":"선언형","tags":["소망","평안","보호","신뢰"],"full":"그러므로 주님께서 친히\n한 징조를 너희에게 주실\n것입니다. 보라, 처녀가\n잉태하여 아들을 낳을 것이요,\n그의 이름을 임마누엘이라\n부를 것입니다.","compact":"주께서 친히 징조를 주실\n것이니, 처녀가 아들을 낳고\n그의 이름을 임마누엘이라\n부를 것입니다.","oneline":"그의 이름을 임마누엘이라 부를 것입니다.","comfort":"그분은 지금도 당신과 함께 계십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"시편 139:14","type":"고백형","tags":["감사","신뢰","소망","축복"],"full":"제가 주님께 감사드림은,\n저를 지으신 것이\n심히 기묘하고\n놀랍기 때문입니다.\n주님께서 행하시는 일들이\n얼마나 기이한지\n제 영혼이 너무나 잘 아나이다.","compact":"저를 지으심이\n심히 기묘하심에\n주께 감사하나이다.\n주님의 일이 기이함을\n제 영혼이 아나이다.","oneline":"저를 지으심이\n심히 기묘하심에\n감사하나이다.","comfort":"당신의 존재 자체가 그분의 놀라운 예술 작품입니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"출애굽기 20:1-2","type":"선언형","tags":["신뢰","보호","인도하심","축복"],"full":"하나님께서\n이 모든 말씀으로\n이르시되,\n'나는 너를 이집트 땅,\n종 되었던 집에서\n인도하여 낸\n너의 하나님 여호와이니라.'","compact":"나는 너를\n종 되었던 집에서\n인도하여 낸\n너의 하나님 여호와이니라.","oneline":"나는 너를\n인도하여 낸\n너의 하나님 여호와이니라.","comfort":"그분은 당신을 속박에서 풀어 자유케 하시는 하나님이십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"이사야 40:31","type":"선언형","tags":["소망","평안","인도하심","신뢰"],"full":"오직 여호와를 바라는 자는\n새 힘을 얻으리니,\n독수리가 날개를 치며\n솟아오름 같을 것입니다.\n달려도 지치지 않고,\n걸어가도 피곤하지\n아니하리로다.","compact":"오직 여호와를 바라는 자는\n새 힘을 얻으리니,\n달려도 지치지 않고\n피곤하지 아니하리로다.","oneline":"여호와를 바라는 자는\n새 힘을 얻으리라.","comfort":"이미 당신의 힘을 채워주시겠다고 약속하신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"이사야 55:1","type":"선언형","tags":["재정어려움","소망","축복","평안"],"full":"오호라, 목마른 자들아,\n모두 물로 나아오라.\n돈 없는 자도 오라.\n너희는 와서 사고 먹되,\n돈 없이 값 없이 와서\n포도주와 젖을 사라.","compact":"목마른 자들아,\n모두 물로 나아오라.\n돈 없이 값 없이 와서\n포도주와 젖을 사라.","oneline":"돈 없이 값 없이 와서\n포도주와 젖을 사라.","comfort":"당신이 빈손이라도 괜찮다고 먼저 말씀하신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한복음 4:14","type":"선언형","tags":["소망","평안","신뢰"],"full":"내가 주는 물을\n마시는 자는 영원히\n목마르지 아니하리니,\n내가 주는 물은\n그 사람 안에서\n영원한 생명으로\n솟아나는 샘물이 되리라.","compact":"내가 주는 물을\n마시는 자는 영원히\n목마르지 아니하리니,\n영원한 생명으로\n솟아나는 샘물이 되리라.","oneline":"내가 주는 물은\n영원히 목마르지\n않게 하리라.","comfort":"당신의 영원한 갈증을 아시고 채워주시겠다고 약속하신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"마태복음 5:3","type":"선언형","tags":["평안","소망","축복"],"full":"심령이 가난한 자는\n복이 있나니,\n천국이 그들의 것임이라.","compact":"심령이 가난한 자는\n복이 있나니,\n천국이 그들의 것임이라.","oneline":"심령이 가난한 자에게\n천국이 그들의 것임이라.","comfort":"당신의 마음 깊은 곳을 이미 아시고, 가장 좋은 것을 주시겠다고 선언하신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"출애굽기 3:11-12","type":"선언형","tags":["보호","인도하심","두려움","신뢰"],"full":"모세가 하나님께 아뢰기를,\n'제가 누구이기에\n바로에게 가며\n이스라엘 자손을\n이집트에서 인도하여\n내겠습니까?' 하니,\n하나님께서 이르시되\n'내가 반드시 너와\n함께 있으리라.'","compact":"하나님께서 이르시되\n'내가 반드시 너와\n함께 있으리라.'","oneline":"내가 반드시 너와\n함께 있으리라.","comfort":"당신이 누구이든 상관없이, 당신과 함께하시겠다고 약속하신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"고린도전서 3:6-7","type":"선언형","tags":["직장사업","인도하심","신뢰","소망"],"full":"나는 씨를 심었고\n아볼로는 물을 주었으되,\n오직 하나님께서\n자라나게 하셨나니.\n그런즉 씨를 심는 자나\n물을 주는 자는\n아무것도 아니로되,\n오직 자라나게 하시는 분은\n하나님뿐이시니라.","compact":"나는 심고\n아볼로는 물을 주었으나,\n오직 하나님께서\n자라나게 하셨나니.","oneline":"오직 자라나게 하시는 이는\n하나님뿐이시라.","comfort":"당신의 모든 수고를 보시고, 그 열매를 맺게 하시는 분이 계시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"마태복음 28:18-20","type":"선언형","tags":["보호","인도하심","평안","신뢰"],"full":"예수님께서 말씀하시기를\n'하늘과 땅의 모든 권세를\n내게 주셨으니,\n볼지어다, 내가 세상 끝날까지\n너희와 항상 함께 있으리라.'","compact":"하늘과 땅의 모든 권세를\n내게 주셨으니,\n내가 세상 끝날까지\n너희와 항상 함께 있으리라.","oneline":"내가 세상 끝날까지\n너희와 항상 함께 있으리라.","comfort":"당신이 어디에 있든, 끝까지 함께 하시겠다고 약속하신 분이 계세요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"마가복음 5:34","type":"선언형","tags":["건강","치유","평안","소망"],"full":"예수님께서 이르시되,\n'딸아, 네 믿음이 너를\n구원하였으니 평안히 가라.\n네 병에서 놓여\n건강할지어다.'","compact":"딸아, 네 믿음이 너를\n구원하였으니 평안히 가라.\n네 병에서 놓여\n건강할지어다.","oneline":"네 병에서 놓여\n건강할지어다.","comfort":"이미 당신의 믿음을 보시고 평안을 주시겠다고 말씀하신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"로마서 16:19","type":"위로형","tags":["순종","감사","관계","축복"],"full":"여러분의 순종함이\n모든 사람에게 들리는도다.\n그러므로 내가\n여러분으로 말미암아\n기뻐하나니,\n여러분이 선한 데\n지혜롭고 악한 데는\n미련하기를 원합니다.","compact":"여러분의 순종함이\n모든 사람에게 들리며,\n내가 여러분으로 말미암아\n기뻐하나니.","oneline":"너희의 순종함이 모든 사람에게 들리는도다.","comfort":"당신의 순종을 기뻐하시며 듣고 계신 분이 있어요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"로마서 16:20","type":"선언형","tags":["보호","평안","두려움","소망"],"full":"평강의 하나님께서\n머지않아 사탄을\n여러분의 발 아래서\n짓밟으실 것입니다.\n우리 주 예수 그리스도의\n은혜가 여러분과\n함께할 것입니다.","compact":"평강의 하나님께서\n사탄을 여러분의\n발 아래서 짓밟으시리라.","oneline":"하나님께서 사탄을 여러분 발 아래 짓밟으시리라.","comfort":"이미 여러분의 승리를 약속하신 분이 있어요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"에베소서 2:20-22","type":"고백형","tags":["신뢰","소망","평안","가정"],"full":"여러분은 사도들과\n선지자들의 터 위에\n세워진 자들이며,\n그리스도 예수님께서\n친히 모퉁잇돌이\n되셨습니다.\n그분 안에서 건물마다\n서로 연결되어\n주님 안에서 거룩한\n성전이 되어가고,\n여러분 또한 성령 안에서\n하나님이 거하실\n처소가 되기 위해\n함께 지어져 가고 있습니다.","compact":"여러분은 그리스도 안에서\n성령으로 하나님이\n거하실 성전이 되기 위해\n함께 지어져 가고 있습니다.","oneline":"하나님이 거하실 처소가 되기 위하여 함께 지어져 가느니라.","comfort":"이미 그분의 거하실 아름다운 터 위에 세워진 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"예레미야 15:16","type":"고백형","tags":["신뢰","소망","감사","평안"],"full":"만군의 하나님 여호와시여,\n저는 주의 이름으로\n불리는 자입니다.\n제가 주님의 말씀을\n얻었사오니,\n그 말씀은 제게\n기쁨과 제 마음의\n즐거움이 됩니다.","compact":"저는 주의 이름으로\n불리는 자이며,\n주의 말씀은 제\n기쁨과 마음의\n즐거움입니다.","oneline":"주의 말씀은 내게 기쁨과 마음의 즐거움이 되나이다.","comfort":"그 말씀으로 이미 당신을 향한 기쁨을 선포하신 분이 있어요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"사도행전 2:44-47","type":"선언형","tags":["소망","축복","인도하심","직장사업"],"full":"주님께서 구원받는\n사람들을 날마다\n더하게 하실 것입니다.","compact":"주님께서 구원받는\n사람을 날마다\n더하시리라.","oneline":"주께서 구원 받는 사람을 날마다 더하시리라.","comfort":"그분은 지금도 당신을 통해 역사하며 더하게 하시는 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"예레미야 29:11","type":"선언형","tags":["소망","평안","인도하심","두려움"],"full":"여호와의 말씀이니라.\n내가 너희를 향한\n나의 생각을 아노니,\n그것은 너희에게\n평안을 주려는 것이요\n재앙이 아니니라.\n너희에게 미래와\n희망을 주기 위함이라.","compact":"너희를 향한 나의\n생각은 평안이요,\n미래와 희망을\n주는 것이니라.","oneline":"너희에게 미래와 희망을 주는 것이니라.","comfort":"이미 그 미래와 희망을 위해 먼저 일하고 계신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한복음 15:4-5","type":"선언형","tags":["신뢰","인도하심","소망","축복"],"full":"내 안에 거하십시오.\n그러면 나도\n여러분 안에 거할 것입니다.\n내가 포도나무요\n여러분은 가지입니다.\n그가 내 안에,\n내가 그 안에 거하면\n많은 열매를 맺을 것이요,\n나를 떠나서는\n여러분이 아무것도\n할 수 없습니다.","compact":"내 안에 거하십시오,\n나도 여러분 안에\n거하리라.\n그러면 많은 열매를\n맺으리라.","oneline":"내 안에 거하라, 나도 너희 안에 거하리라.","comfort":"이미 당신 안에 거하시겠다고 약속하신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"로마서 8:15","type":"고백형","tags":["신뢰","불안","두려움","가정"],"full":"여러분은 다시금\n두려워하는 종의 영을\n받지 아니하고,\n하나님의 자녀가 되는\n입양의 영을 받았습니다.\n그러므로 우리는\n'아빠, 아버지'라고\n부르짖을 수 있습니다.","compact":"여러분은 종의 영이\n아닌 양자의 영을\n받았으니,\n'아빠, 아버지'라고\n부르짖을 수 있습니다.","oneline":"양자의 영을 받았으므로 우리가 아빠 아버지라고 부르짖느니라.","comfort":"그 목소리를 가장 먼저 듣고 계신 분이 있어요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"예레미야 20:7","type":"고백형","tags":["신뢰","두려움","소망","평안"],"full":"주님, 주께서 저를\n설득하시니\n제가 그 권유를\n따랐습니다.\n주께서는 저보다\n강하시어 결국\n승리하셨으니,\n비록 제가 종일토록\n사람들의 조롱거리가\n될지라도 주님께서\n저를 이기셨음을\n고백합니다.","compact":"주님은 저보다\n강하사 승리하셨으니,\n제가 사람들의\n조롱거리가 될지라도\n주님을 고백하나이다.","oneline":"주께서 저보다 강하사 이기셨도다.","comfort":"이미 당신을 붙드시고 승리하시겠다고 약속하신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"예레미야 20:9","type":"고백형","tags":["불안","슬픔","외로움","신뢰"],"full":"제가 '다시는 주님을\n선포하지 않고,\n주의 이름으로\n말하지 않으리라'\n다짐한다 하여도,\n제 마음은 불붙는\n것 같아서 뼈 속에\n사무치니 답답하여\n도저히 견딜 수가\n없나이다.","compact":"'다시는 주의 이름으로\n말하지 않으리라'\n하여도,\n제 마음이 불붙는\n것 같아 답답하여\n견딜 수 없나이다.","oneline":"내 마음이 불붙는 것 같아서 견딜 수 없나이다.","comfort":"당신의 깊은 마음까지 아시고, 그 답답함마저 헤아리시는 분이 계시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"예레미야 20:11","type":"선언형","tags":["보호","두려움","신뢰","평안"],"full":"그러나 주님은\n두려운 용사처럼\n저와 함께하시니,\n저를 박해하는 자들이\n넘어지고 결코\n이기지 못할 것입니다.\n그들은 어리석게\n행동하였으므로\n큰 수치를 당할 것이요,\n그 수치는 영원히\n잊히지 않을 것입니다.","compact":"주님은 용사처럼\n저와 함께하시니,\n저를 박해하는 자들이\n넘어지고 이기지\n못할 것입니다.\n그들의 수치는\n영원히 잊히지\n않을 것입니다.","oneline":"주님은 두려운 용사처럼 저와 함께하시므로, 박해하는 자들이 결코 이기지 못하리라.","comfort":"이미 당신의 편에 서서\n싸우시겠다고 약속하신\n분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"고린도전서 15:31","type":"고백형","tags":["결단","순종","신뢰","회개"],"full":"형제들이여, 제가\n그리스도 예수 우리 주 안에서\n여러분에게 대한\n저의 자랑을 걸고\n단언하노니, 저는\n날마다 자신에게\n죽노라 고백합니다.","compact":"저는 날마다\n그리스도 예수 우리 주 안에서\n자신에게 죽노라\n단언하나이다.","oneline":"나는 그리스도 안에서 날마다 죽노라.","comfort":"이미 당신의 영적 싸움을\n아시고, 그 길을\n먼저 걸으신 분이\n계시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"고린도전서 15:55","type":"선언형","tags":["소망","두려움","평안","치유"],"full":"오, 사망아, 네가\n승리한 곳은 어디에\n있느냐? 오, 사망아,\n네가 쏘는 독침은\n어디에 있느냐?","compact":"사망아, 네 승리가\n어디에 있느냐?\n네 독침이 어디에\n있느냐?","oneline":"사망아, 네가 쏘는 독침은 어디에 있느냐!","comfort":"더 이상 당신을\n해칠 힘이 없다고\n선포된 그곳에\n당신이 서 계시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"창세기 1:26","type":"선언형","tags":["소망","신뢰","인도하심","축복"],"full":"하나님께서 말씀하시기를,\n'우리의 형상을 따라,\n우리의 모양대로\n우리가 사람을 만들자.\n그리하여 그들로\n바다의 물고기와\n하늘의 새와 가축과\n온 땅과 땅 위를\n기어 다니는 모든\n생물을 다스리게 하자'고\n하셨습니다.","compact":"하나님께서\n'우리의 형상대로\n사람을 만들어\n모든 것을 다스리게\n하자'고 말씀하셨습니다.","oneline":"하나님께서 당신을 당신의 형상대로 만들고 모든 것을 다스리게 하셨으니.","comfort":"당신이 어떤 존재인지\n먼저 선포하신 분이\n계시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"갈라디아서 5:6","type":"선언형","tags":["신뢰","관계","순종","결단"],"full":"그리스도 예수 안에서는\n할례를 행하든\n행하지 않든\n아무런 효력이 없으며,\n오직 사랑으로\n역사하는 믿음만이\n중요합니다.","compact":"그리스도 예수 안에서는\n오직 사랑으로\n역사하는 믿음만이\n중요합니다.","oneline":"오직 사랑으로 역사하는 믿음만이 효력이 있나이다.","comfort":"이미 당신의 행위가 아니라\n사랑으로 일하는 믿음이\n중요하다고 말씀하신\n분이 있으니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"열왕기상 19:10, 18","type":"선언형","tags":["외로움","신뢰","소망","보호"],"full":"엘리야가 아뢰기를,\n'제가 만군의 주\n하나님을 위해\n열심이 특심하였사오나,\n이스라엘 자손은\n주의 언약을 버리고\n주의 제단을 헐었으며\n주의 선지자들을\n칼로 죽였나이다.\n오직 저만 홀로\n남았는데, 그들은\n제 생명마저\n빼앗으려 하나이다.'\n그러자 주께서\n이르시되, '그러나\n내가 이스라엘 가운데\n칠천 명을 남겨둘\n것이니, 그들 모두가\n바알에게 무릎 꿇지\n아니하고 바알에게\n입 맞추지 아니한\n자들이니라.'","compact":"엘리야가 '오직 저만\n남았나이다' 하고\n아뢰었으나, 주께서\n'그러나 내가\n바알에게 무릎 꿇지\n아니한 칠천 명을\n남기리라'고 하셨습니다.","oneline":"오직 저만 남았다고 느낄지라도, 주님은 남은 자들을 반드시 남겨두시리라.","comfort":"당신이 홀로라고\n느낄 때에도, 먼저\n당신의 편에 서서\n당신의 마음을 아시는\n분이 계시니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"디모데후서 2:20-21","type":"선언형","tags":["소망","결단","인도하심","축복"],"full":"큰 집에는 금 그릇과\n은 그릇만 있는 것이\n아니라, 나무 그릇과\n질그릇도 있어서\n귀하게 쓰이는 것도\n있고 천하게 쓰이는\n것도 있습니다.\n그러므로 누구든지\n이런 것들에서 자신을\n깨끗하게 하면,\n귀하게 쓰이는 그릇이\n되어 거룩하게 되고,\n주인의 쓰심에 합당하며\n모든 선한 일에\n준비된 자가 될 것입니다.","compact":"누구든지 자신을\n깨끗하게 하면,\n귀하게 쓰이는 그릇이\n되어 주인의 쓰심에\n합당하고 모든\n선한 일에 준비될\n것입니다.","oneline":"스스로를 깨끗이 하면, 주인의 쓰심에 합당한 귀한 그릇이 되리라.","comfort":"당신을 귀하게 여기고\n선한 일에 사용하시겠다고\n먼저 말씀하신 분이\n있으니까요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"창세기 28:13-14","type":"선언형","tags":["축복","소망","가정","보호"],"full":"주님께서 그 위에 서서\n말씀하셨습니다.\n'나는 여호와,\n너의 조부 아브라함과\n이삭의 하나님이니,\n네가 누워 있는 이 땅을\n너와 네 자손에게\n주리라. 네 자손이\n땅의 티끌 같이 되어\n사방으로 퍼져나갈\n것이며, 땅의 모든\n족속이 너와 네 자손을\n통해 복을 받으리라.'","compact":"주님께서 말씀하셨습니다.\n'네가 누워 있는 이 땅을\n너와 네 자손에게\n주리라. 땅의 모든\n족속이 너와 네 자손을\n통해 복을 받으리라.'","oneline":"땅의 모든 족속이 너와 네 자손을 통해 복을 받으리라.","comfort":"이미 약속하신 분이\n먼저 말씀하고 계십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"창세기 28:15","type":"선언형","tags":["보호","인도하심","신뢰","평안"],"full":"주님께서 말씀하셨습니다.\n'내가 너와 함께 있어\n네가 어디로 가든지\n너를 지키며, 너를\n이끌어 이 땅으로\n돌아오게 할지라.\n내가 네게 허락한\n모든 것을 다 이루기까지\n너를 결코 떠나지\n아니하리라.'","compact":"내가 너와 함께 있어\n너를 지키며, 네게\n허락한 것을 다\n이루기까지 너를\n떠나지 아니하리라.","oneline":"내가 네게 허락한 것을 다 이루기까지 너를 떠나지 아니하리라.","comfort":"이미 당신의 곁에서\n떠나지 않겠다고\n말씀하신 분이\n계십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"이사야 40:1","type":"위로형","tags":["평안","소망"],"full":"너희 하나님께서\n이르시되, '내 백성을\n위로하라, 위로하라'\n하셨습니다.","compact":"너희 하나님께서\n말씀하셨습니다.\n'내 백성을 위로하라.'","oneline":"내 백성을 위로하라.","comfort":"주님께서 당신에게\n위로가 전해지기를\n원하고 계십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"마태복음 1:23","type":"선언형","tags":["평안","보호","신뢰","소망"],"full":"보라, 처녀가 잉태하여\n아들을 낳을 것이요,\n그의 이름은 임마누엘이라\n불리리라 하셨으니,\n이는 '하나님이 우리와\n함께 계시다'는 뜻입니다.","compact":"그의 이름은 임마누엘이라\n불리리니, 이는 '하나님이\n우리와 함께 계시다'는 뜻입니다.","oneline":"하나님이 우리와 함께 계시다.","comfort":"이미 당신과 함께 계신\n분의 이름이 임마누엘입니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"시편 62:2","type":"고백형","tags":["신뢰","평안","보호","두려움"],"full":"오직 주님만이 저의\n반석이시오, 저의 구원이시오,\n저의 요새이시니,\n제가 크게 흔들리지\n아니할 것입니다.","compact":"오직 주님만이 저의 반석이시오\n저의 구원이시니,\n제가 크게 흔들리지\n아니할 것입니다.","oneline":"제가 크게 흔들리지 아니하리로다.","comfort":"흔들리지 않을 든든한\n반석이 되어주시겠다고\n약속하신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"요한복음 8:12","type":"선언형","tags":["인도하심","소망","평안","두려움"],"full":"예수님께서 말씀하셨습니다.\n'나는 세상의 빛이니,\n나를 따르는 자는 결코\n어둠에 다니지 아니하고\n생명의 빛을 얻으리라.'","compact":"나는 세상의 빛이니,\n나를 따르는 자는\n어둠에 다니지 아니하고\n생명의 빛을 얻으리라.","oneline":"나를 따르는 자는 어둠에 다니지 아니하고 생명의 빛을 얻으리라.","comfort":"어떤 어둠 속에서도\n당신을 인도할 빛이신\n분이 항상 그 자리에 계십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"신명기 1:30","type":"선언형","tags":["보호","신뢰","두려움","직장사업"],"full":"너희보다 먼저 가시는\n너희의 하나님 여호와께서\n애굽에서 너희를 위해\n모든 일을 행하신 것 같이,\n이제도 너희를 위하여\n싸우실 것입니다.","compact":"너희보다 먼저 가시는\n하나님 여호와께서\n이제도 너희를 위하여\n싸우실 것이며.","oneline":"하나님 여호와께서 이제도 너희를 위하여 싸우실 것이며.","comfort":"이미 당신을 위해 먼저\n싸우겠다고 약속하신\n분이 계십니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"에베소서 3:20-21","type":"선언형","tags":["소망","신뢰","인도하심","축복"],"full":"우리 안에서 역사하시는\n능력대로, 우리가 구하거나\n생각하는 모든 것에\n더 넘치도록 능히 하실\n분에게, 교회와 그리스도\n예수 안에서 영광이\n영원무궁하기를 원합니다.\n아멘.","compact":"우리가 구하거나 생각하는\n모든 것에 더 넘치도록\n능히 하실 분에게\n영광이 있기를 원합니다.","oneline":"우리가 구하거나 생각하는 모든 것에 더 넘치도록 능히 하실 분입니다.","comfort":"이미 당신의 생각보다\n훨씬 더 놀라운 일을\n계획하고 계신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"시편 8:3-4","type":"고백형","tags":["신뢰","소망","감사"],"full":"주의 손가락으로 만드신\n주의 하늘과, 주께서\n베풀어 두신 달과 별들을\n제가 봅니다.\n사람이 무엇이기에 주께서\n그를 생각하시며,\n인자가 무엇이기에 주께서\n그를 돌보시나이까?","compact":"주의 하늘과 달과 별들을\n보오니, 사람이 무엇이기에\n주께서 그를 돌보시나이까?","oneline":"사람이 무엇이기에 주께서 그를 돌보시나이까?","comfort":"당신이 누구인지 아시고,\n이미 깊이 생각하고\n돌보고 계신 분이에요.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"시편 8:1, 9","type":"고백형","tags":["감사","신뢰","소망","축복"],"full":"여호와 우리 주님,\n주의 이름이 온 땅에\n어찌 그리 아름다운지요!\n주의 영광이 하늘을 덮었나이다.\n여호와 우리 주님,\n주의 이름이 온 땅에\n어찌 그리 아름다운지요!","compact":"여호와 우리 주님,\n주의 이름이 온 땅에\n어찌 그리 아름다운지요!\n주의 영광이 하늘을 덮었나이다.","oneline":"여호와 우리 주님, 주의 이름이 온 땅에 어찌 그리 아름다운지요!","comfort":"당신을 향한 모든 것이\n가장 아름다운 주님의\n이름 안에 있습니다.","original_tag":"신앙회의","pastor":"이찬수"},{"ref":"시편 3:5-6","type":"고백형","tags":["두려움","보호","평안","신뢰"],"full":"제가 누워 자고 깨어나니,\n여호와께서 저를\n붙드심이로다.\n천만인이 저를 에워싸\n진 친다 하여도,\n저는 두려워하지\n아니할 것입니다.","compact":"제가 누워 자고 깨었
