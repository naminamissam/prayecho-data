er"},{"ref":"Proverbs 3:9-10","type":"선언형","tags":["재정어려움","축복","순종","감사"],"full":"네 재물과 네 모든 소산물의\n처음 익은 열매로\n여호와를 공경하라.\n그리하면 네 창고가\n가득히 차고,\n네 포도즙 틀에\n새 포도즙이 넘치리라.","compact":"주님을 공경하면 당신의 창고가 가득 차고\n포도즙 틀에 새 포도즙이 넘치리라.","oneline":"주님을 공경하면 넘치는 복이 있으리라.","comfort":"당신의 작은 순종을 통해\n넘치도록 채우실 분이 계십니다.","original_tag":"재정어려움","pastor":"Timothy Keller"},{"ref":"Proverbs 3:11-12","type":"위로형","tags":["인도하심","보호","슬픔"],"full":"내 아들아,\n여호와의 징계를\n업신여기지 말고\n그분의 꾸지람을\n싫어하지 말라.\n여호와께서는\n사랑하는 자를\n징계하시는도다,\n마치 아버지가\n기뻐하는 아들을\n대함과 같으니라.","compact":"여호와께서는 사랑하는 자를\n징계하시는도다.","oneline":"사랑하는 자를 징계하시는도다.","comfort":"그 징계조차도 사랑의 표현임을\n잊지 않으시는 분이에요.","original_tag":"재정어려움","pastor":"Timothy Keller"},{"ref":"Proverbs 10:25","type":"선언형","tags":["신뢰","보호","소망","평안"],"full":"폭풍이 지나가면\n악인은 사라지지만,\n의인은 영원히\n견고히 서리라.","compact":"의인은 영원히\n견고히 서리라.","oneline":"의인은 영원히 견고히 서리라.","comfort":"당신이 서 있는 자리를\n붙들어 주시는 분이 계십니다.","original_tag":"재정어려움","pastor":"Timothy Keller"},{"ref":"Romans 8:28","type":"선언형","tags":["인도하심","소망","신뢰","평안"],"full":"우리는 아노니,\n하나님을 사랑하는 자,\n곧 그분의 뜻대로\n부르심을 받은 자들에게는\n모든 것이 합력하여\n선을 이루리라.","compact":"모든 것이 합력하여\n선을 이루리라.","oneline":"모든 것이 합력하여 선을 이루리라.","comfort":"그 모든 여정을 통해 당신의 유익을 계획하시는 분이 계십니다.","original_tag":"재정어려움","pastor":"Timothy Keller"},{"ref":"열왕기상 19:18","type":"선언형","tags":["보호","소망","신뢰","결단"],"full":"그러나 내가 이스라엘 가운데에\n칠천 명을 남기리니,\n그들은 바알에게\n무릎을 꿇지 아니하고\n바알에게 입맞추지 아니한\n자들이라.","compact":"내가 이스라엘 가운데에\n칠천 명을 남기리라.","oneline":"내가 이스라엘 가운데에 남길 자들이 있으리라.","comfort":"보이지 않는 곳에서도 당신을 지켜보고 계시는 분이 있습니다.","original_tag":"재정어려움","pastor":"이찬수"},{"ref":"빌립보서 4:11-13","type":"선언형","tags":["소망","신뢰","결단","직장사업"],"full":"나는 비천에 처할 줄도 알고\n풍부에 처할 줄도 알아\n모든 일 곧 배부름과\n배고픔과 풍부와 궁핍에도\n처할 줄 아는 일체의 비결을\n배웠노라.\n내게 능력 주시는 분 안에서\n내가 모든 것을 할 수 있으리라.","compact":"내게 능력 주시는 분 안에서\n내가 모든 것을 할 수 있으리라.","oneline":"내게 능력 주시는 분 안에서 내가 모든 것을 할 수 있으리라.","comfort":"이미 당신에게 모든 것을 가능하게 하시는 분이 함께하십니다.","original_tag":"재정어려움","pastor":"이찬수"},{"ref":"누가복음 14:11","type":"선언형","tags":["인도하심","소망","신뢰"],"full":"무릇 자기를 높이는 자는\n낮아지고,\n자기를 낮추는 자는\n높아지리라.","compact":"자기를 낮추는 자는\n높아지리라.","oneline":"자기를 낮추는 자는 높아지리라.","comfort":"때가 되면 당신을 높이실 분이 계십니다.","original_tag":"재정어려움","pastor":"이찬수"},{"ref":"야고보서 4:10","type":"선언형","tags":["인도하심","소망","신뢰"],"full":"주 앞에서 스스로를 낮추십시오.\n그리하면 주께서 당신을\n높이실 것입니다.","compact":"주 앞에서 낮추면\n주께서 당신을 높이시리라.","oneline":"주께서 당신을 높이시리라.","comfort":"당신이 스스로를 낮춘 그 자리에서 높이실 분이 계십니다.","original_tag":"재정어려움","pastor":"이찬수"},{"ref":"Daniel 4:37","type":"선언형","tags":["신뢰","인도하심","보호"],"full":"이제 나 느부갓네살이\n하늘의 왕을 찬양하며\n높이고 영화롭게 하노니,\n그가 하시는 모든 일은 옳고\n그분의 길은 모두 의로우심이라.\n교만하게 행하는 자들을\n그분은 능히 낮추실 수 있으리라.","compact":"교만하게 행하는 자들을\n그분은 능히 낮추실 수 있으리라.","oneline":"교만하게 행하는 자들을 그분은 능히 낮추실 수 있으리라.","comfort":"모든 것을 주관하시며 당신의 마음까지도 아시는 분이 계십니다.","original_tag":"인간관계","pastor":"Andy Stanley"},{"ref":"John 15:15-16","type":"선언형","tags":["관계","소망","신뢰","보호"],"full":"내가 이제는 너희를 종이라\n부르지 아니하고\n친구라 불렀노니...\n너희가 나를 택한 것이 아니요,\n내가 너희를 택하였음이라.","compact":"너희를 친구라 불렀노니,\n너희가 나를 택한 것이 아니요,\n내가 너희를 택하였음이라.","oneline":"내가 너희를 택하여 친구라 불렀노라.","comfort":"가장 깊은 우정으로 부르시는 분이에요.","original_tag":"인간관계","pastor":"Andy Stanley"},{"ref":"Mark 6:34","type":"위로형","tags":["외로움","슬픔","보호"],"full":"예수께서 나오사\n큰 무리를 보시고\n목자 없는 양 같음을 인하여\n그들을 불쌍히 여기사\n여러 가지로 가르치시더라.","compact":"예수께서 무리를 보시고\n목자 없는 양 같음을 인하여\n불쌍히 여기셨도다.","oneline":"목자 없는 양 같음을 인하여 그들을 불쌍히 여기시도다.","comfort":"당신의 마음을 보시고 그냥 지나치지 않으시는 분이에요.","original_tag":"인간관계","pastor":"Andy Stanley"},{"ref":"John 10:11","type":"선언형","tags":["보호","인도하심","신뢰","두려움"],"full":"나는 선한 목자니라.\n선한 목자는 양들을 위하여\n자기 목숨을 내어주느니라.","compact":"나는 선한 목자니라.\n양들을 위하여\n목숨을 내어주느니라.","oneline":"나는 선한 목자니라.","comfort":"당신을 위해 자기 생명을 아끼지 않으시는 분이에요.","original_tag":"인간관계","pastor":"Andy Stanley"},{"ref":"John 10:3-4","type":"위로형","tags":["인도하심","보호","신뢰","외로움"],"full":"그가 자기 양들의 이름을 불러\n인도하여 내며,\n자신의 양들을 다 이끌어 낸 후\n앞서 가니,\n양들이 그의 음성을 알므로\n그를 따르느니라.","compact":"그는 자기 양들의 이름을 불러\n인도하며,\n앞서 가니\n양들이 그의 음성을 알므로\n따르느니라.","oneline":"그는 자기 양들의 이름을 각각 불러 인도하시느니라.","comfort":"당신의 이름을 아시며 앞서 인도하시는 분이에요.","original_tag":"인간관계","pastor":"Andy Stanley"},{"ref":"Acts 10:38","type":"선언형","tags":["치유","건강","보호","소망"],"full":"하나님께서 나사렛 예수를\n성령과 능력으로 기름\n부으사,\n그가 두루 다니시며\n선한 일을 행하시고\n마귀에게 눌린 모든 자를\n고치셨으니,\n이는 하나님께서 그와\n함께하셨음이라.","compact":"하나님께서 예수를\n성령과 능력으로 기름\n부으시고,\n두루 다니며\n마귀에게 눌린 모든 자를\n고치셨도다.","oneline":"하나님께서 그와 함께하시어\n마귀에게 눌린 모든 자를\n고치셨도다.","comfort":"그 선하신 능력이\n지금도 당신과\n함께하시는 분이에요.","original_tag":"인간관계","pastor":"Timothy Keller"},{"ref":"Colossians 2:9","type":"선언형","tags":["신뢰","소망","평안"],"full":"그리스도 안에는\n하나님의 신성의\n모든 충만이\n육체로 거하시니라.","compact":"그리스도 안에는\n하나님의 모든 충만이\n육체로 거하시느니라.","oneline":"그리스도 안에\n하나님의 모든 충만이\n거하시느니라.","comfort":"당신이 믿는 분은\n완전한 신성으로\n충만하신 분이에요.","original_tag":"인간관계","pastor":"Timothy Keller"},{"ref":"창세기 29:31","type":"선언형","tags":["외로움","슬픔","보호","소망","가정"],"full":"여호와께서 레아가\n미움을 받음을 보시고,\n그의 태를 여셨으나,\n라헬은 태가 닫혔더라.","compact":"여호와께서 레아가\n미움을 받음을 보시고,\n그의 태를 여셨도다.","oneline":"여호와께서 미움 받는 자를\n보시고 태를 여시느니라.","comfort":"당신의 마음을 보시고\n그냥 지나치지\n않으시는 분이에요.","original_tag":"인간관계","pastor":"Timothy Keller"},{"ref":"Romans 14:17","type":"선언형","tags":["평안","소망","감사","신뢰"],"full":"하나님의 나라는\n먹고 마시는 것에\n있지 아니하고,\n오직 성령 안에서 누리는\n의와 평강과 기쁨인 것입니다.","compact":"하나님의 나라는\n오직 성령 안에 있는\n의와 평강과 기쁨입니다.","oneline":"하나님의 나라는\n성령 안에서 의와\n평강과 기쁨인 것입니다.","comfort":"이미 당신의 마음속에\n자리하고 있는 선물이에요.","original_tag":"인간관계","pastor":"Dr. Timothy Keller"},{"ref":"Romans 15:7","type":"선언형","tags":["관계","용서","신뢰","보호"],"full":"그리스도께서 먼저 여러분을\n받아들이시어\n하나님께 영광을\n돌리신 것처럼,\n여러분도 서로를 받아들이십시오.","compact":"그리스도께서 이미 여러분을\n받아들이셨습니다.","oneline":"그리스도께서 이미 당신을\n받아들이셨도다.","comfort":"이미 그분의 넓은 품 안에\n당신이 있습니다.","original_tag":"인간관계","pastor":"Dr. Timothy Keller"},{"ref":"고린도전서 6:18-20","type":"선언형","tags":["신뢰","보호","결단","회개"],"full":"여러분은 여러분 자신의\n것이 아니요,\n하나님께서 값으로 치러\n사신 바 되었습니다.\n여러분의 몸은\n여러분 안에 계신\n성령님의 전인 것입니다.","compact":"여러분은 여러분 자신의\n것이 아니요,\n값으로 사신 바 되었으니,\n여러분의 몸은\n성령님의 전입니다.","oneline":"여러분은 여러분 자신의\n것이 아니요,\n값으로 치러 사신 바\n되었습니다.","comfort":"누군가가 당신을 위해\n모든 값을 지불했고,\n당신은 그분의 소유입니다.","original_tag":"인간관계","pastor":"Timothy Keller"},{"ref":"고린도전서 6:9-11","type":"선언형","tags":["용서","회개","신뢰","소망"],"full":"여러분 가운데 이전에는\n이와 같은 자들이 있었으나,\n이제는 주 예수\n그리스도의 이름과\n우리 하나님의 성령 안에서\n씻음과 거룩함과\n의롭다 하심을 받으셨나이다.","compact":"여러분은 주 예수\n그리스도의 이름과\n성령 안에서 씻음과\n거룩함과 의롭다 하심을\n받았습니다.","oneline":"여러분은 이미 씻음과\n거룩함과 의롭다 하심을\n받으셨습니다.","comfort":"이미 당신의 과거는\n깨끗하게 씻겨졌고,\n새로운 신분으로\n불리고 있습니다.","original_tag":"인간관계","pastor":"Timothy Keller"},{"ref":"고린도전서 6:12","type":"고백형","tags":["결단","평안","신뢰","인도하심"],"full":"모든 것이 내게 허락되었으나\n다 유익한 것이 아니요,\n모든 것이 내게 허락되었으나\n내가 무엇에든지 얽매이지\n아니하리이다.","compact":"모든 것이 허락되었으나\n다 유익하지 않으며,\n내가 무엇에도 얽매이지\n않으리이다.","oneline":"모든 것이 허락되었으나,\n내가 무엇에든지 얽매이지\n아니하리이다.","comfort":"당신에게는 진정한 자유가\n주어졌습니다.\n그 자유를 누리세요.","original_tag":"인간관계","pastor":"Timothy Keller"},{"ref":"Proverbs 17:17","type":"위로형","tags":["외로움","관계","보호","신뢰"],"full":"참된 친구는 언제나\n사랑이 끊이지 아니하며,\n형제는 위급한 때를 위하여\n태어나는 것과 같나이다.","compact":"친구는 사랑이 끊이지 않고,\n형제는 위급한 때를 위해\n태어난 것과 같으니이다.","oneline":"친구는 사랑이\n끊이지 아니하고,\n형제는 위급한 때를 위하여\n났나이다.","comfort":"가장 친밀한 친구이신 분이\n항상 당신 곁에 계십니다.","original_tag":"인간관계","pastor":"Timothy Keller"},{"ref":"Proverbs 18:24","type":"위로형","tags":["관계","외로움","보호","신뢰"],"full":"많은 친구를 가진 자는\n해를 입을 수도 있겠지만,\n형제보다 더 가까이\n붙어 있는\n친구도 있나이다.","compact":"형제보다 더 가까이\n붙어 있는 친구가\n있으니이다.","oneline":"형제보다 더욱 가까이\n붙어 있는 친구가\n있으리라.","comfort":"가장 가까이서 당신을\n붙들어 줄 분이\n이미 계십니다.","original_tag":"인간관계","pastor":"Timothy Keller"},{"ref":"Proverbs 27:17","type":"위로형","tags":["관계","소망","인도하심","신뢰"],"full":"철이 철을\n날카롭게 하는 것 같이,\n사람이 그의 친구의\n얼굴을 빛나게 하는\n것이옵니다.","compact":"철이 철을\n날카롭게 하듯,\n친구가 당신을\n빛나게 합니다.","oneline":"철이 철을\n날카롭게 하듯,\n친구가 당신을\n빛나게 하리라.","comfort":"당신을 더 빛나게 해 줄\n소중한 관계가\n당신 곁에 있습니다.","original_tag":"인간관계","pastor":"Timothy Keller"},{"ref":"John 15:13-15","type":"선언형","tags":["관계","소망","신뢰"],"full":"이보다 더 큰 사랑은 없으니,\n사람이 친구를 위하여\n자기 목숨을 버리는\n것입니다.\n나는 더 이상 너희를\n종이라 부르지\n아니하리니,\n종은 주인이 하는 일을\n알지 못하기 때문입니다.\n오히려 내가 너희를\n친구라 불렀나니,\n이는 내 아버지께 들은\n모든 것을 너희에게\n알려주었기 때문입니다.","compact":"나는 더 이상 너희를\n종이라 부르지\n아니하리니,\n내가 너희를 친구라\n불렀기 때문입니다.","oneline":"내가 너희를 친구라\n불렀노라.","comfort":"당신은 이미 그분의\n가장 친밀한 친구로\n초대받았습니다.","original_tag":"인간관계","pastor":"Timothy Keller"},{"ref":"Matthew 5:11-12","type":"위로형","tags":["불안","소망","보호"],"full":"나로 인하여 사람들이\n여러분을 모욕하고\n박해하며 온갖 거짓\n악한 말을 할 때,\n여러분에게 복이 있도다.\n하늘에서 받을 상이\n크니 기뻐하고\n즐거워하십시오.\n이는 이전의 선지자들도\n이와 같이 박해를\n받았음이라.","compact":"나로 인하여 박해받을\n때에도 복이 있나니,\n하늘에서 받을 상이\n크기 때문입니다.","oneline":"하늘에서 받을 상이\n크도다.","comfort":"당신의 수고를 잊지 않고\n상으로 갚으실 분이\n계십니다.","original_tag":"인간관계","pastor":"Timothy Keller"},{"ref":"John 4:13-14","type":"선언형","tags":["소망","평안","인도하심","축복"],"full":"이 물을 마시는 자마다\n다시 목마르려니와,\n내가 주는 물을 마시는\n자는 영원히 목마르지\n아니하리라.\n내가 주는 물은 그 속에서\n영생하도록 솟아나는\n샘물이 되리라.","compact":"내가 주는 물을 마시는\n자는 영원히 목마르지\n아니하리라.\n그 속에서 영생하도록\n솟아나는 샘물이 되리라.","oneline":"내가 주는 물은\n영생하도록 솟아나는\n샘물이 되리라.","comfort":"영원히 마르지 않는\n생수를 주시겠다고\n약속하신 분이에요.","original_tag":"인간관계","pastor":"Timothy Keller"},{"ref":"Psalm 73:25-26","type":"고백형","tags":["신뢰","두려움","외로움","평안"],"full":"하늘에서는 주 외에\n누가 내게 있으리이까.\n땅에서는 주 밖에\n나의 사모할 이 없나이다.\n내 육체와 마음은\n쇠약할지라도,\n하나님은 내 마음의\n반석이시요 영원한\n분깃이시로다.","compact":"내 육체와 마음은\n쇠약할지라도,\n하나님은 내 마음의\n반석이시요 영원한\n분깃이시로다.","oneline":"하나님은 내 마음의\n반석이시요 영원한\n분깃이시로다.","comfort":"흔들리는 마음을\n영원히 붙드실 분이\n계십니다.","original_tag":"인간관계","pastor":"Timothy Keller"},{"ref":"1 John 3:1","type":"선언형","tags":["가정","신뢰","축복"],"full":"보라, 아버지께서\n어떠한 사랑을 우리에게\n주사 하나님의 자녀라\n일컬음을 받게 하셨는가!\n우리가 그러하도다.\n세상이 우리를 알지\n못함은 그를 알지\n못함이라.","compact":"아버지께서 어떠한\n사랑을 우리에게 주사\n하나님의 자녀라\n일컬음을 받게 하셨는가!\n우리가 그러하도다.","oneline":"우리가 하나님의\n자녀라 일컬음을\n받나이다.","comfort":"하나님은 당신을\n너무나 사랑하여\n자녀로 삼으셨습니다.","original_tag":"인간관계","pastor":"Tony Evans"},{"ref":"1 John 3:2-3","type":"선언형","tags":["소망","가정","축복","인도하심"],"full":"사랑하는 자들아,\n우리가 지금은\n하나님의 자녀로다.\n장래에 어떻게 될지는\n아직 나타나지\n아니하였으나,\n그가 나타나시면\n우리가 그와 같을 줄을\n아는 것은 그의\n참모습 그대로 볼\n것임이라.","compact":"우리가 지금은\n하나님의 자녀로다.\n그가 나타나시면\n우리가 그와 같을 줄을\n아나니,\n그의 참모습 그대로\n볼 것임이라.","oneline":"우리가 지금은\n하나님의 자녀로다.\n장래에 우리가\n그와 같으리라.","comfort":"당신의 미래를\n가장 아름답게\n준비해 두신 분이\n계십니다.","original_tag":"인간관계","pastor":"Tony Evans"},{"ref":"시편 133:1, 3","type":"선언형","tags":["가정","관계","축복","소망"],"full":"보라 형제가 연합하여\n동거함이 어찌 그리\n선하고 아름다운고!\n그곳에서 여호와께서\n복을 명령하셨나니,\n곧 영생이로다.","compact":"형제가 연합하여\n동거함이 아름다우니,\n그곳에서 여호와께서\n복을 명령하셨나니\n곧 영생이로다.","oneline":"그곳에서 여호와께서\n복을 명령하셨나니\n곧 영생이로다.","comfort":"하나님의 복이\n머물 곳을 이미\n예비해 두셨습니다.","original_tag":"인간관계","pastor":"Tony Evans"},{"ref":"고린도전서 2:12","type":"선언형","tags":["인도하심","신뢰","감사","평안"],"full":"우리가 세상의 영을\n받지 아니하고\n오직 하나님으로부터\n온 영을 받았으니,\n이는 하나님께서\n우리에게 은혜로 주신\n것들을 알게 하려\n하심이라.","compact":"우리가 하나님으로부터\n온 영을 받았으니,\n이는 하나님께서\n우리에게 은혜로 주신\n것들을 알게 하려\n하심이라.","oneline":"하나님께서 은혜로\n주신 것들을 알게\n하심이라.","comfort":"가장 좋은 것을\n깨닫게 하실 영을\n이미 부어주셨습니다.","original_tag":"인간관계","pastor":"다윗의열쇠"},{"ref":"로마서 8:28 (원리 인용)","type":"선언형","tags":["인도하심","신뢰","소망","평안"],"full":"우리가 알거니와\n하나님을 사랑하는 자,\n곧 그의 뜻대로\n부르심을 입은\n자들에게는 모든 것이\n합력하여 선을\n이루느니라.","compact":"하나님을 사랑하는 자,\n곧 그의 뜻대로\n부르심을 입은\n자들에게는 모든 것이\n합력하여 선을\n이루느니라.","oneline":"모든 것이 합력하여\n선을 이루느니라.","comfort":"지금 당신의 모든\n상황을 가장 좋은\n길로 이끄실 분이\n계십니다.","original_tag":"인간관계","pastor":"김선교"},{"ref":"시편 133:1","type":"위로형","tags":["가정","관계","평안","감사"],"full":"보소서, 형제가\n한마음으로 함께 살아가니\n이 어찌 그리 선하고\n아름다운지요.","compact":"보소서, 형제가\n한마음으로 함께 살아가니\n선하고 아름답습니다.","oneline":"형제가 한마음으로 함께 살아가니 아름다운 것이옵니다.","comfort":"그 아름다움을 이미 허락하신 분이 곁에 계세요.","original_tag":"인간관계","pastor":"김선교"},{"ref":"잠언 4:8","type":"선언형","tags":["인도하심","축복","소망","신뢰"],"full":"주님을 높이시면,\n주님께서도 당신을\n높이 들어 올리실 것입니다.","compact":"주님을 높이십시오,\n그러면 주님께서 당신을\n높이 들어 올리실 것입니다.","oneline":"주님께서 당신을 높이 들어 올리실 것입니다.","comfort":"이미 높이 들어 올리실 뜻을 품고 계신 분입니다.","original_tag":"인간관계","pastor":"김선교"},{"ref":"디모데전서 4:4","type":"선언형","tags":["감사","평안","신뢰","축복"],"full":"하나님께서 지으신\n모든 것이 선하니,\n감사함으로 받으시면\n버릴 것이 아무것도 없습니다.","compact":"하나님께서 지으신\n모든 것이 선합니다.\n감사함으로 받으시면\n버릴 것이 없습니다.","oneline":"하나님께서 지으신 모든 것이 선한 것이옵니다.","comfort":"그분께서 이미 모든 것을 선하게 지으셨으니까요.","o ine":"제가 어찌 하나님께 죄를 지으리이까?","comfort":"당신의 마음 깊은 곳의 결단을 이미 아시는 분이 계십니다.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"갈라디아서 5:16","type":"선언형","tags":["인도하심","순종","평안","결단"],"full":"내가 이르노니,\n성령을 따라 행하십시오.\n그리하면 육체의 욕심을\n이루지 아니할 것입니다.","compact":"성령을 따라 행하시면,\n육체의 욕심을\n이루지 아니할 것입니다.","oneline":"성령을 따라 행하면\n육체의 욕심을\n이루지 아니하리라.","comfort":"당신의 발걸음을\n이미 인도하고 계신 분이\n있으니까요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"마태복음 20:28","type":"선언형","tags":["관계","소망","평안","인도하심"],"full":"인자가 온 것은\n섬김을 받기 위함이 아니라,\n도리어 많은 이들을\n섬기기 위함이며,\n자신의 목숨을\n많은 사람의 대속물로\n주시려 함입니다.","compact":"섬김을 받기 위함이 아니라,\n도리어 섬기려 하고\n자신의 목숨을\n대속물로 주시려 함입니다.","oneline":"인자는 섬기려 하고\n목숨을 대속물로\n주시려 왔습니다.","comfort":"이미 당신을 위해\n전부를 내어주신 분이\n계십니다.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"에베소서 4:29","type":"위로형","tags":["관계","평안","인도하심","결단"],"full":"더러운 말은\n당신의 입 밖에도\n내지 마십시오.\n오직 덕을 세우는 데\n필요한 선한 말을 하여\n듣는 이들에게 은혜를\n끼치십시오.","compact":"덕을 세우는 선한 말을 하여\n듣는 이들에게 은혜를\n끼치십시오.","oneline":"선한 말을 하여\n듣는 이들에게 은혜를\n끼치리라.","comfort":"당신의 말을 통해\n선한 영향력을\n주시려는 분이 계십니다.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"시편 141:3","type":"고백형","tags":["관계","신뢰","보호","결단"],"full":"오 주님, 제 입에\n파수꾼을 세우시고\n제 입술의 문을\n지켜 주시옵소서.","compact":"주님, 제 입술의 문을\n지켜 주소서.","oneline":"주님, 제 입술의 문을\n지켜 주시옵소서.","comfort":"스스로를 지키기 어려운 때,\n먼저 지켜주시겠다고\n말씀하시는 분이 계십니다.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"골로새서 4:6","type":"선언형","tags":["관계","인도하심","평안","결단"],"full":"당신의 말을 항상\n은혜 가운데서 소금으로\n맛을 냄과 같이 하십시오.\n그리하면 각 사람에게\n마땅히 대답할 것을\n알게 될 것입니다.","compact":"항상 은혜로운 말을 하시면,\n마땅히 대답할 것을\n알게 될 것입니다.","oneline":"은혜로운 말을 하면\n마땅히 대답할 것을\n알리라.","comfort":"당신의 말과 지혜를\n인도하시겠다고\n말씀하신 분이 있으니까요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"에베소서 6:4","type":"위로형","tags":["자녀양육","가정","인도하심","평안"],"full":"당신의 자녀들을\n노엽게 하지 마십시오.\n오직 주님의 교훈과\n훈계 안에서 그들을\n양육하실 수 있습니다.","compact":"자녀들을 노엽게 하지 마십시오.\n주님의 교훈 안에서\n양육하십시오.","oneline":"주님의 교훈 안에서\n자녀를 양육할 수 있습니다.","comfort":"당신의 자녀들을 위한\n가장 선한 길을\n이미 알고 계신 분이 있습니다.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"예레미야애가 2:18-19","type":"고백형","tags":["슬픔","자녀양육","외로움","신뢰"],"full":"오 시온의 딸이여,\n밤낮으로 눈물을\n강처럼 흘리십시오.\n주님 앞에 당신의 마음을\n물 쏟듯이 쏟아내세요.\n당신의 어린 자녀들을 위해\n주님께 손을 드십시오.","compact":"주님 앞에 마음을\n물 쏟듯이 쏟아내세요.\n당신의 자녀들을 위해\n주님께 손을 드십시오.","oneline":"주님 앞에 당신의 마음을\n물 쏟듯이 쏟아내십시오.","comfort":"당신의 깊은 슬픔을\n기꺼이 받아주시는 분이\n계십니다.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"고린도후서 2:15","type":"고백형","tags":["신뢰","소망","관계","축복"],"full":"우리는 구원받는 이들에게나\n멸망하는 이들에게나,\n하나님 앞에서\n그리스도의 향기로운\n존재입니다.","compact":"우리는 하나님 앞에서\n그리스도의 향기로운\n존재입니다.","oneline":"우리는 그리스도의\n향기로운 존재입니다.","comfort":"이미 당신의 존재 자체가\n향기로운 선물이니까요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"골로새서 3:10","type":"선언형","tags":["소망","신뢰","평안","인도하심"],"full":"당신은 새 사람을 입었으니,\n당신을 창조하신 분의\n형상을 따라 참된 지식으로\n새롭게 된 존재입니다.","compact":"당신은 새 사람을 입어,\n창조주의 형상을 따라\n새롭게 된 존재입니다.","oneline":"당신은 새롭게 된\n존재입니다.","comfort":"당신을 가장 잘 아시는 분이\n당신을 새롭게 하셨으니까요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"골로새서 2:6-7 (새번역)","type":"선언형","tags":["신뢰","평안","보호","소망"],"full":"당신은 그리스도 예수 안에\n뿌리를 깊이 박고,\n그분 안에서 견고하게\n세워진 존재입니다.","compact":"당신은 그리스도 안에\n깊이 뿌리박고\n굳건히 세워진 존재입니다.","oneline":"당신은 그리스도 안에\n견고하게 세워졌습니다.","comfort":"이미 가장 굳건한\n기초 위에 당신을\n세우신 분이 계시니까요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"고린도후서 10:4-5","type":"선언형","tags":["두려움","신뢰","보호","소망"],"full":"우리가 싸우는 무기는\n육신에 속한 것이 아니요,\n오직 어떤 견고한 진도\n무너뜨리는 하나님의 능력입니다.\n모든 생각을 사로잡아\n그리스도께 복종하게 할 것입니다.","compact":"우리의 무기는\n견고한 진을 무너뜨리는\n하나님의 능력입니다.","oneline":"하나님의 능력이 모든 진을 무너뜨릴 것입니다.","comfort":"이미 모든 것을 무너뜨리실 능력이 당신과 함께 있으니까요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"아가 1:5","type":"위로형","tags":["관계","신뢰","소망","평안"],"full":"예루살렘의 딸들아,\n내가 비록 검으나\n아름다우니,\n게달의 장막 같을지라도\n솔로몬의 휘장과도 같도다.","compact":"내가 비록 검으나\n아름다우니,\n솔로몬의 휘장과도 같도다.","oneline":"당신은 검어도 아름답도다.","comfort":"이미 당신의 아름다움을 알아주는 분이 계시니까요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"디모데전서 4:4-5","type":"선언형","tags":["감사","신뢰","축복","평안"],"full":"하나님께서 지으신\n모든 것이 선하매,\n감사함으로 받으면\n버릴 것이 없나니,\n하나님의 말씀과 기도로\n거룩하게 될 것입니다.","compact":"하나님이 지으신\n모든 것은 선하며,\n감사함으로 받으면\n거룩하게 될 것입니다.","oneline":"하나님이 지으신 모든 것은 선합니다.","comfort":"모든 것을 선하게 만드신 분이 당신의 삶도 그렇게 만드셨으니까요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"데살로니가전서 1:6","type":"고백형","tags":["소망","신뢰","평안"],"full":"당신은 많은 환난 가운데서도\n성령의 기쁨으로 말씀을 받아,\n주님을 본받는 자가 되었으니\n복됩니다.","compact":"당신은 많은 환난 속에서도\n성령의 기쁨으로\n주님을 본받는 자가 되었습니다.","oneline":"당신은 주님을 본받는 자가 되었습니다.","comfort":"이미 주님의 형상을 닮아가고 있는 당신이시니까요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"시편 34:1","type":"고백형","tags":["감사","신뢰","소망","결단"],"full":"내 영혼아,\n내가 여호와를\n항상 송축하리니,\n내 입술로 늘 주님을\n찬양할 것입니다.","compact":"내가 여호와를 항상 송축하며\n주님을 찬양하리이다.","oneline":"내가 항상 주님을 찬양하리이다.","comfort":"당신의 입술에서 시작되는 노래를 들으시는 분이 계시니까요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"디모데전서 4:3-4","type":"위로형","tags":["감사","신뢰","축복"],"full":"하나님께서 지으신\n모든 것이 선하오니,\n감사함으로 받으면\n버릴 것이 없나이다.\n믿는 자들이 감사함으로\n받을지니라.","compact":"하나님께서 지으신\n모든 것이 선하오니,\n감사함으로 받으시면\n버릴 것이 없나이다.","oneline":"하나님께서 지으신 모든 것이 선하도다.","comfort":"선한 것을 주시는 분임을 기억하세요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"다니엘 1:9","type":"위로형","tags":["인도하심","보호","축복","관계"],"full":"하나님께서 다니엘로 하여금\n환관장에게 은혜와 긍휼을\n얻게 하셨습니다.","compact":"하나님께서 당신에게\n은혜와 긍휼을\n얻게 하실 것입니다.","oneline":"하나님께서 은혜와 긍휼을 얻게 하셨도다.","comfort":"이미 그 마음속에 은혜를 부어주신 분이세요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"다니엘 1:17","type":"선언형","tags":["인도하심","직장사업","소망","신뢰"],"full":"하나님께서 이 네 소년에게\n학문과 모든 서적을\n깨닫는 능력을 주셨고,\n지혜를 허락하셨습니다.\n다니엘은 모든 환상과 꿈을\n깨달아 알았도다.","compact":"하나님께서 학문과\n지혜를 주셨으니,\n모든 것을 깨달아\n알게 하십니다.","oneline":"하나님께서 학문과 지혜를 주셨도다.","comfort":"지혜의 근원이신 분이 함께 하십니다.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"시편 78:72","type":"선언형","tags":["인도하심","신뢰","보호","자녀양육"],"full":"이에 그가 백성을\n자기 마음의 온전함으로\n기르시고,\n그의 손의 능숙함으로\n그들을 지도하였도다.","compact":"그가 온전한 마음과\n능숙한 손으로 당신을\n기르고 지도하십니다.","oneline":"그가 온전함으로 기르시고 지도하였도다.","comfort":"가장 온전한 분이 당신을 인도하고 계세요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"고린도전서 3:16","type":"선언형","tags":["평안","보호","신뢰","소망"],"full":"당신은 하나님의 성전인 것과\n하나님의 성령이 당신 안에\n계시는 것을 알지 못합니까?\n성령께서 당신 안에 거하십니다.","compact":"당신은 하나님의 성전이며,\n하나님의 성령이\n당신 안에 계십니다.","oneline":"하나님의 성령이 당신 안에 계시도다.","comfort":"이미 가장 거룩한 분이 당신 안에 거하고 계십니다.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"마가복음 10:52","type":"선언형","tags":["치유","소망","신뢰","결단"],"full":"예수께서 이르시되\n'가라, 네 믿음이\n너를 구원하였느니라' 하시니,\n그가 곧 보게 되어\n예수를 길에서 따랐도다.","compact":"예수님께서 '네 믿음이\n너를 구원하였느니라'\n말씀하셨으니, 당신도\n구원을 받을 것입니다.","oneline":"네 믿음이 너를 구원하였도다.","comfort":"믿음을 보고 움직이시는 분이\n당신 앞에 계십니다.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"빌립보서 2:13","type":"선언형","tags":["인도하심","소망","신뢰","결단"],"full":"너희 안에서 행하시는 이는\n하나님이시니, 자기의\n기쁘신 뜻을 위하여\n너희에게 소원을 두시고\n행하게 하시나니라.","compact":"당신 안에서 행하시는 분은\n하나님이시니, 그분의\n기쁘신 뜻을 위하여\n소원을 두고 행하게 하십니다.","oneline":"하나님이 당신 안에서 행하시도다.","comfort":"당신의 소원을 주시는 분이\n이미 당신 안에서 일하고 계세요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"누가복음 6:17-18","type":"선언형","tags":["치유","건강","소망","보호"],"full":"예수님께서 평지에 서시니,\n많은 백성이 병 고침을\n받으려고 모여들었습니다.\n악한 귀신에게 고통을\n당하던 사람들도 고침을\n받았도다.","compact":"예수님께서 병 고침을 주셨고,\n악한 귀신에게 고통받던\n이들도 고침을 받았나이다.","oneline":"고통받던 이들이 고침을 받았도다.","comfort":"당신을 고치시려는 분이\n이미 그 자리에 함께 계십니다.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"누가복음 17:19","type":"선언형","tags":["신뢰","치유","소망"],"full":"예수께서 그에게 말씀하시기를\n'일어나 가거라. 네 믿음이\n너를 온전하게 하였도다'\n하시니라.","compact":"일어나 가거라. 네 믿음이\n너를 온전하게 하였도다.","oneline":"네 믿음이 너를 온전하게 하였도다.","comfort":"믿음으로 나아갈 때,\n이미 그 모든 것이\n이루어졌다고 말씀하시는 분입니다.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"고린도전서 3:5-7","type":"선언형","tags":["인도하심","소망","신뢰","직장사업"],"full":"심는 이나 물 주는 이는\n아무것도 아니로되,\n오직 자라나게 하시는 분은\n하나님뿐이시니라.","compact":"심는 이나 물 주는 이는\n아무것도 아니요, 오직\n자라나게 하시는 분은\n하나님뿐이시니라.","oneline":"오직 자라나게 하시는 분은 하나님뿐이시니라.","comfort":"당신이 시작하고 애쓴\n모든 것 위에 이미\n뿌려진 은혜를\n자라게 하시는 분이에요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"고린도전서 3:9","type":"선언형","tags":["관계","보호","평안","인도하심"],"full":"우리는 하나님의 동역자들이요,\n당신은 하나님의 밭이요\n하나님의 집이시니라.","compact":"당신은 하나님의 밭이요,\n하나님의 집이시니라.","oneline":"당신은 하나님의 집이시니라.","comfort":"당신이 지금 서 있는\n그 자리, 그 모습 그대로\n이미 하나님의 소유이며\n거처입니다.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"고린도후서 6:9-10","type":"선언형","tags":["소망","평안","신뢰","불안"],"full":"무명한 자 같으나 유명한 자요,\n근심하는 자 같으나 항상 기뻐하며,\n아무것도 없는 자 같으나\n모든 것을 가진 자로다.","compact":"근심하는 자 같으나\n항상 기뻐하고,\n아무것도 없는 자 같으나\n모든 것을 가진 자로다.","oneline":"아무것도 없는 자 같으나 모든 것을 가진 자로다.","comfort":"겉으로는 그렇지 않다 해도,\n이미 당신의 존재 안에는\n모든 것이 담겨 있습니다.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"골로새서 1:24","type":"고백형","tags":["슬픔","소망","결단","신뢰"],"full":"나는 이제 당신들을 위하여\n받는 괴로움을 기뻐하며,\n그리스도의 남은 고난을\n그의 몸 된 교회를 위해\n내 육체에 채우노라.","compact":"나는 당신들을 위하여\n받는 괴로움을 기뻐하며,\n교회를 위해 고난을\n채우노라.","oneline":"나는 당신들을 위하여 받는 괴로움을 기뻐하노라.","comfort":"당신의 고통에도 이미\n의미가 부여되어 있음을\n고백하는 이가 있습니다.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"신명기 10:18-19","type":"선언형","tags":["보호","인도하심","재정어려움","평안"],"full":"하나님께서는 고아와\n과부를 위하여 정의를\n행하시며, 나그네를\n사랑하여 그에게 떡과\n옷을 주시는 분이시라.","compact":"하나님께서는 고아와\n과부를 위하여 정의를\n행하시며, 나그네를\n사랑하여 떡과 옷을\n주시나니.","oneline":"하나님께서는 나그네를 사랑하여 떡과 옷을 주시는 분이시라.","comfort":"연약한 자의 필요를\n헤아리시며 채우시는 분이\n그 자리에 계시니까요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"마태복음 10:42","type":"선언형","tags":["축복","감사","관계","결단"],"full":"누구든지 제자의 이름으로\n이 작은 자 중 하나에게\n냉수 한 그릇이라도\n주는 자는, 내가 진실로\n당신에게 이르노니,\n그 사람이 결단코 그 상을\n잃지 아니하리라.","compact":"작은 자에게 냉수 한\n그릇이라도 주는 자는,\n결단코 그 상을 잃지 아니하리라.","oneline":"냉수 한 그릇이라도 주는 자는 상을 잃지 아니하리라.","comfort":"당신의 작은 선행까지도\n기억하고 보상하시겠다고\n먼저 말씀하신 분이 있어요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"요한복음 13:17","type":"선언형","tags":["축복","순종","평안","결단"],"full":"당신이 이것을 알고 행하면,\n복이 있으리라.","compact":"이것을 알고 행하면,\n복이 있으리라.","oneline":"이것을 알고 행하면 복이 있으리라.","comfort":"선한 행동의 씨앗이 결코 헛되지 않을 것이라고 먼저 말씀하신 분이에요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"누가복음 22:26-27","type":"선언형","tags":["인도하심","신뢰","보호","평안"],"full":"당신 중에 큰 자는\n섬기는 자와 같을지니,\n나는 섬기는 자로 당신 중에 있노라.","compact":"나는 섬기는 자로\n당신 중에 있노라.","oneline":"나는 섬기는 자로 당신 중에 있노라.","comfort":"가장 높은 분이 가장 낮은 자리에서 당신과 함께하고 계십니다.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"마태복음 11:28-29","type":"선언형","tags":["평안","신뢰","두려움"],"full":"수고하고 무거운 짐을 진 자들아,\n다 내게로 오십시오.\n내가 당신을 쉬게 할 것입니다.\n나는 마음이 온유하고 겸손하니,\n나의 멍에를 메고 내게 배우십시오.\n그리하면 당신의 마음이\n진정한 쉼을 얻을 것입니다.","compact":"수고하고 무거운 짐을 진 자들아,\n다 내게로 오십시오.\n내가 당신을 쉬게 할 것입니다.","oneline":"내가 당신을 쉬게 할 것입니다.","comfort":"이미 당신의 쉼을 약속하신 분이 부르고 계시니까요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"이사야 40:29-31","type":"선언형","tags":["치유","평안","소망","신뢰"],"full":"피곤한 자에게는 능력을 주시며,\n무능한 자에게는 힘을 더하시는 분이시라.\n오직 주님을 앙망하는 자는 새 힘을 얻을 것이니,\n독수리가 날개치며 솟아오름 같을 것이요,\n달려도 지치지 않으며 걸어가도 피곤치 아니하리로다.","compact":"피곤한 자에게는 능력을 주시며,\n주님을 앙망하는 자는 새 힘을 얻으리로다.","oneline":"오직 주님을 앙망하는 자는 새 힘을 얻으리로다.","comfort":"당신의 지친 마음을 이미 알고 힘을 주시겠다고 약속하신 분이 계시니까요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"시편 116:12","type":"고백형","tags":["감사","신뢰","순종","결단"],"full":"주께서 내게 베푸신 모든 은혜를,\n내가 무엇으로 보답할 수 있을까요?","compact":"주께서 내게 베푸신 모든 은혜,\n무엇으로 보답할 수 있을까요?","oneline":"주께서 내게 베푸신 은혜, 무엇으로 보답할까?","comfort":"그 크신 은혜에 대한 당신의 마음을 주님은 이미 알고 계십니다.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"고린도전서 4:14-15","type":"위로형","tags":["가정","관계","보호"],"full":"내가 당신을 부끄럽게 하려고\n쓰는 것이 아니라,\n오직 나의 사랑하는 자녀와 같이\n권하려 하는 것입니다.\n그리스도 예수 안에서\n내가 복음으로 당신을 낳았음이라.","compact":"내가 사랑하는 자녀와 같이 당신에게 권하노니,\n내가 복음으로 당신을 낳았음이라.","oneline":"내가 나의 사랑하는 자녀와 같이 당신을 권합니다.","comfort":"당신을 사랑하는 마음으로 먼저 다가가시는 분이 있습니다.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"마가복음 1:41","type":"선언형","tags":["치유","건강","소망","보호"],"full":"예수께서 그를 불쌍히 여기사\n손을 내밀어 만지시며\n말씀하시기를 '내가 원하노니,\n깨끗함을 받으라' 하시니라.","compact":"예수께서 불쌍히 여기사 손을 대시며,\n'내가 원하노니, 깨끗함을 받으라' 하시니.","oneline":"내가 원하노니, 깨끗함을 받으십시오.","comfort":"주님은 당신의 아픔을 불쌍히 여기시고 치유하시기를 원하시는 분이십니다.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"마태복음 14:27","type":"위로형","tags":["두려움","불안","평안","보호"],"full":"예수께서 즉시 그들에게\n말씀하시기를 '안심하십시오.\n나입니다. 두려워하지 마십시오' 하시니라.","compact":"예수께서 '안심하십시오.\n나입니다. 두려워하지 마십시오' 하시니라.","oneline":"안심하십시오. 나입니다. 두려워하지 마십시오.","comfort":"두려움 속에서 당신을 부르시고 자신을 드러내시는 분이 계십니다.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"마태복음 5:7","type":"선언형","tags":["용서","축복","평안","관계"],"full":"긍휼히 여기는 자는 복이 있나니,\n그들이 긍휼히 여김을 받을 것임이라.","compact":"긍휼히 여기는 자는 복이 있나니,\n긍휼히 여김을 받을 것이라.","oneline":"긍휼히 여기는 자는 복이 있나니, 긍휼히 여김을 받을 것임이라.","comfort":"당신의 긍휼한 마음을 주님은 이미 보고 계시며 복 주시겠다고 약속하셨습니다.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"창세기 39:5","type":"위로형","tags":["보호","축복","인도하심","직장사업"],"full":"요셉이 보디발의 집과\n그의 모든 소유물을\n주관하게 한 그 때부터,\n여호와께서 요셉을 위하여\n애굽 사람의 집에 복을 내리셨나이다.","compact":"여호와께서 요셉을 위하여\n그 집에 복을 내리셨나이다.","oneline":"여호와께서 당신을 위하여 복을 내리실 것입니다.","comfort":"어려운 상황 속에서도 함께하시며 복 주시는 분이 계시니까요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"시편 16:2","type":"고백형","tags":["신뢰","소망","감사","평안"],"full":"주님, 제가 여호와께\n고백하나이다.\n주님은 저의 주님이시옵고,\n주님 밖에는 저에게\n어떠한 복도 없나이다.","compact":"주님은 저의 주님이시며,\n주님 밖에는\n저에게 복이 없나이다.","oneline":"주님은 저의 복이시옵니다.","comfort":"당신의 모든 복이 이미\n그분 안에 있음을 믿으니까요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"요한일서 4:7","type":"선언형","tags":["관계","소망","신뢰","가정"],"full":"사랑하는 자들아,\n사랑은 하나님께\n속한 것이니,\n사랑하는 자마다\n하나님으로부터 나서\n하나님을 안다 하셨습니다.","compact":"사랑은 하나님께\n속한 것이니,\n사랑하는 자마다\n하나님을 아나이다.","oneline":"사랑은 하나님께\n속한 것이옵니다.","comfort":"사랑의 근원이신 그분께서\n당신의 마음을 이미\n채우고 계시니까요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"요한복음 1:41-42","type":"고백형","tags":["소망","신뢰","감사","결단"],"full":"그가 먼저 자기의 형제\n시몬을 찾아 말하되,\n우리가 메시아를 만났나이다!\n(메시아는 번역하면\n그리스도라) 하며\n예수께로 데려왔나이다.","compact":"우리가 메시아를 만났나이다!","oneline":"주님, 제가 주님을 만났나이다.","comfort":"이미 당신의 삶에\n찾아오신 그분을\n확신하시면 되니까요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"사도행전 2:46-47","type":"선언형","tags":["축복","관계","소망","감사"],"full":"주님께서 구원 받는 사람을\n날마다 더하게 하셨사옵니다.\n그들의 삶과 공동체에\n충만한 복을 더하시나이다.","compact":"주께서 구원 받는 사람을\n날마다 더하게 하시나이다.","oneline":"주님께서 날마다 더하게 하시리라.","comfort":"이미 더하시고,\n앞으로도 더 채우실 분이\n함께 계시니까요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"마태복음 18:19-20","type":"선언형","tags":["소망","평안","신뢰","관계"],"full":"진실로 너희에게 이르노니,\n너희 중에 두 사람이\n땅에서 합심하여\n무엇이든지 구하면,\n하늘에 계신 내 아버지께서\n그들을 위하여\n이루게 하시리라.\n두세 사람이 내 이름으로\n모인 곳에는 나도\n그들 중에 있으리라.","compact":"너희가 합심하여\n무엇이든지 구하면\n이루게 하시리라.\n내 이름으로 모인 곳에는\n나도 너희 중에 있으리라.","oneline":"너희가 무엇이든지 구하면\n이루게 하시리라.","comfort":"이미 그분의 이름으로\n함께 모이셨으니,\n그분께서 그 자리에\n함께 계시니까요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"히브리서 10:24","type":"위로형","tags":["관계","가정","소망","평안"],"full":"주님 안에서 서로를 돌아보아\n사랑과 선한 행실로\n격려하고 지지하시옵소서.","compact":"서로를 돌아보아\n사랑과 선행을 격려하옵나이다.","oneline":"서로 사랑과 선행으로\n격려하소서.","comfort":"서로를 붙들고 격려하며\n함께 걸어갈 동반자들을\n이미 허락하셨으니까요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"마태복음 8:8","type":"고백형","tags":["신뢰","치유","건강","소망"],"full":"백부장이 대답하여\n아뢰옵나이다.\n주님, 제가 감히 주님을\n제 집에 모실 수 없사오니,\n다만 말씀으로만\n명하시옵소서.\n그리하시면 저의 하인이\n나을 것이옵나이다.","compact":"주님, 다만 말씀으로만\n명하시옵소서.\n그리하시면\n나을 것이옵나이다.","oneline":"다만 말씀으로만 명하시옵소서.","comfort":"말씀 한마디로 모든 것을\n치유하실 수 있는 분이\n이미 당신과 함께하시니까요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"고린도후서 2:15","type":"고백형","tags":["신뢰","소망","평안","보호"],"full":"우리는 구원을 얻는 자들에게나\n멸망하는 자들에게나,\n하나님께 드리는\n그리스도의 향기이로다.","compact":"우리는 하나님께 드리는\n그리스도의 향기이로다.","oneline":"당신은 그리스도의 향기이로다.","comfort":"당신이 누구인지\n이미 결정되어 있습니다.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"고린도후서 2:14","type":"선언형","tags":["감사","신뢰","보호","인도하심"],"full":"항상 그리스도 안에서\n우리를 승리하게 하시고,\n각처에서 우리를 통해\n그분을 아는 향기를\n나타내시는 하나님께\n감사하노라.","compact":"우리를 그리스도 안에서\n항상 승리하게 하시는\n하나님께 감사하노라.","oneline":"하나님께서 우리를\n항상 승리하게 하시는도다.","comfort":"승리는 이미 당신의\n것이라고 선포하셨어요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"요한1서 1:7","type":"선언형","tags":["용서","회개","치유","평안"],"full":"그분께서 빛 가운데\n계신 것 같이 우리도\n빛 가운데 행하면,\n우리는 서로 교제할 것이요,\n그 아들 예수님의 피가\n우리를 모든 죄에서\n깨끗하게 하실 것이라.","compact":"예수님의 피가 우리를\n모든 죄에서 깨끗하게\n하실 것이라.","oneline":"그 피가 당신을 모든\n죄에서 깨끗하게 하실\n것이로다.","comfort":"이미 흘려진 피로 인해\n당신은 깨끗합니다.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"마태복음 5:11-12","type":"선언형","tags":["두려움","불안","보호","소망","축복"],"full":"나로 인하여 사람들이\n너희를 욕하고 박해하며\n거짓으로 너희를 거슬러\n모든 악한 말을 할 때에도\n너희에게는 복이 있나니,\n기뻐하고 즐거워하라.\n하늘에서 너희의 상이 큼이라.","compact":"나로 인해 박해받을 때에도 너희에게 복이 있나니, 하늘에서 너희 상이 크도다.","oneline":"하늘에서 당신의 상이 크도다.","comfort":"그 어려움 속에서도 당신의 상은 이미 예비되어 있습니다.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"사도행전 2:16-17","type":"선언형","tags":["소망","인도하심","축복","평안"],"full":"하나님이 말씀하시기를,\n말세에 내가 내 영을\n모든 육체에 부어 주리니,\n너희의 자녀들은 예언할 것이요,\n너희의 젊은이들은 환상을 보고,\n너희의 늙은이들은 꿈을 꾸리라.","compact":"내가 내 영을 모든 육체에 부어 주리니, 너희의 자녀들은 예언할 것이요.","oneline":"내가 내 영을 모든 육체에 부어 주리라.","comfort":"그분의 영이 이미 당신 안에 부어졌습니다.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"마태복음 5:14","type":"고백형","tags":["소망","인도하심","평안","축복"],"full":"너희는 세상의 빛이라.\n산 위에 있는 동네가\n숨겨지지 못할 것이로다.","compact":"너희는 세상의 빛이로다.","oneline":"당신은 세상의 빛이로다.","comfort":"당신의 존재 자체로 이미 빛을 비추고 있습니다.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"요한복음 17:15-16","type":"위로형","tags":["보호","불안","신뢰","평안"],"full":"내가 비옵는 것은\n그들을 세상에서 데려가시기를\n위함이 아니요,\n다만 악에 빠지지 않게\n보전하시기를 위함이니이다.\n내가 세상에 속하지 아니함 같이\n그들도 세상에 속하지\n아니하였나이다.","compact":"악에 빠지지 않게 보전하시기를 위함이니이다.","oneline":"그분께서 당신을 악에서 보전하실 것이라.","comfort":"이미 당신을 위한 기도가 올려졌습니다.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"사도행전 9:6","type":"선언형","tags":["인도하심","신뢰","소망","결단"],"full":"너는 일어나 시내로 들어가라.\n네가 행할 것을\n네게 이를 자가 있으리라.","compact":"당신이 행할 것을 가르쳐 줄 이가 있을 것이라.","oneline":"당신이 행할 것을 가르쳐 줄 이가 있을 것이로다.","comfort":"이미 당신의 다음 걸음은 예비되어 있습니다.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"마태복음 11:29","type":"선언형","tags":["평안","불안","신뢰","치유","슬픔"],"full":"나는 마음이 온유하고 겸손하니,\n나의 멍에를 메고 내게 배우라.\n그리하면 너희 마음이\n쉼을 얻으리라.","compact":"나의 멍에를 메고 내게 배우라. 그리하면 당신의 마음이 쉼을 얻으리라.","oneline":"당신의 마음이 쉼을 얻으리라.","comfort":"그분 안에서 이미 모든 짐을 내려놓을 자리를 찾았습니다.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"빌립보서 3:12-14","type":"고백형","tags":["소망","결단","인도하심","신뢰"],"full":"제가 이미 모든 것을 얻었거나\n온전히 다 이루었다고\n말씀드리지 않습니다.\n오직 그리스도 예수님께\n붙잡힌 그 목표를 잡으려고\n달려갈 따름입니다.\n저는 뒤에 있는 것은 잊고\n앞에 있는 것을 붙잡으려\n푯대를 향해 나아갑니다.","compact":"제가 이미 모든 것을 얻었다고 말하지 않습니다. 오직 그리스도 예수님께 붙잡힌 그 목표를 향해 달려갈 따름입니다. 뒤의 것은 잊고 푯대를 향해 나아갑니다.","oneline":"오직 그리스도 예수님께 붙잡힌 그 목표를 향해 달려갈 따름입니다.","comfort":"그 길의 끝에서 당신을 기다리고 계신 분이 있으니까요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"시편 51:17","type":"위로형","tags":["회개","슬픔","치유","평안"],"full":"하나님께서 찾으시는 제사는\n바로 상한 심령입니다.\n오 주님, 상하고\n통회하는 마음을 결코\n멸시하지 않으시리이다.","compact":"상한 심령을 찾으시는 하나님이시여, 상하고 통회하는 마음을 결코 멸시하지 않으시리이다.","oneline":"상하고 통회하는 마음을 결코 멸시하지 않으시리이다.","comfort":"당신의 마음을 가장 잘 이해하고 계신 분이 있으니까요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"고린도후서 1:4","type":"선언형","tags":["슬픔","소망","관계"],"full":"주님은 우리의 모든 환난 속에서\n우리를 위로하시고,\n우리가 그 하나님께 받은\n위로로써 모든 환난 가운데\n있는 이들을 능히 위로할 수\n있게 하시는 분이시로다.","compact":"모든 환난 속에서 우리를 위로하시고, 그 위로로 다른 이들을 위로하게 하시는 분이시로다.","oneline":"모든 환난 속에서 우리를 위로하시는 분이시로다.","comfort":"당신의 아픔을 가장 잘 이해하시며, 그 아픔을 통해 다른 이들에게도 손 내밀게 하실 분이에요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"시편 1:3","type":"선언형","tags":["축복","소망","직장사업","인도하심"],"full":"그는 시냇가에 심겨진 나무가\n시절을 따라 풍성한 열매를 맺고\n그 잎사귀가 마르지 않음과\n같으니,\n그가 하는 모든 일이\n다 형통하게 될 것입니다.","compact":"시냇가에 심은 나무처럼 시절을 따라 열매 맺고 잎사귀 마르지 않으리니, 그가 하는 모든 일이 다 형통하리로다.","oneline":"그가 하는 모든 일이 다 형통하리로다.","comfort":"당신을 가장 좋은 자리에 심으시고 돌보시는 분이 있으니까요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"예레미야 17:7-8","type":"선언형","tags":["신뢰","소망","축복","보호","기다림"],"full":"그러나 여호와를 의지하며 여호와를 의뢰하는 사람은 복을 받을 것입니다.\n그는 물가에 심겨 뿌리를 강변에 뻗은 나무와 같으니,\n더위가 올지라도 두려워하지 않고 그 잎이 늘 푸르며, 가뭄이 드는 해에도 걱정 없이 끊임없이 열매를 맺을 것입니다.","compact":"여호와를 의지하고 의뢰하는 사람은 복을 받을 것입니다.\n물가에 심긴 나무처럼 가뭄에도 걱정 없이 늘 푸르며 결실이 그치지 않을 것입니다.","oneline":"여호와를 의지하며 의뢰하는 그 사람은 복을 받을 것이라.","comfort":"당신의 모든 필요를 아시고\n채우시겠다고 약속하신 분이에요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"에베소서 3:20","type":"선언형","tags":["소망","인도하심","신뢰","축복"],"full":"우리 안에서 역사하시는 놀라운 능력대로,\n우리가 구하거나 생각하는 모든 것보다\n훨씬 더 넘치도록 능히 행하실 그분께!","compact":"우리 안의 능력대로, 우리가 구하거나 생각하는 모든 것보다\n훨씬 더 넘치도록 능히 행하실 그분께!","oneline":"우리가 구하거나 생각하는 모든 것에 더 넘치도록 능히 하실 이에게!","comfort":"당신의 기도보다 더 큰 응답을\n준비하고 계신 분이 있으니까요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"누가복음 4:18-19","type":"선언형","tags":["치유","평안","소망","보호"],"full":"주의 성령이 제게 임하셨으니, 이는 가난한 자에게 복음을 전하게 하시려 저에게 기름을 부으시고 저를 보내사,\n포로 된 자에게 자유를, 눈먼 자에게 다시 보게 함을 선포하며,\n눌린 자를 자유롭게 하고, 주의 은혜의 해를 선포하게 하려 하심이라.","compact":"성령이 임하셨으니, 포로 된 자에게 자유를,\n눈먼 자에게 다시 보게 함을, 눌린 자에게 자유를 선포하게 하려 하심이라.","oneline":"포로 된 자에게 자유를, 눌린 자에게 자유를 선포하게 하려 하심이라.","comfort":"가장 고통스러운 자리에서\n당신을 일으키실 분이 있으니까요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"마가복음 12:30-31","type":"고백형","tags":["관계","신뢰","소망"],"full":"마음과 목숨과 뜻과 힘을 다하여 주 하나님을 사랑하고,\n네 이웃을 네 자신과 같이 사랑하라 하신 것이라.\n이보다 더 큰 계명은 없나이다.","compact":"마음 다해 주 하나님을 사랑하고 이웃을 사랑하는 것,\n이보다 큰 계명은 없나이다.","oneline":"사랑이 가장 큰 계명입니다.","comfort":"사랑의 본질을 먼저 깨닫고\n행하신 분이 계십니다.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"고린도전서 13:13","type":"위로형","tags":["소망","신뢰","평안","관계"],"full":"그러므로 믿음과 소망과 사랑, 이 세 가지는 항상 있을 것입니다.\n그중에 가장 으뜸은 사랑이니이다.","compact":"믿음과 소망과 사랑, 이 세 가지는 항상 있을 것입니다.\n그중에 으뜸은 사랑이니이다.","oneline":"가장 으뜸은 사랑이니이다.","comfort":"영원히 변치 않을 것이\n이미 당신에게 주어져 있습니다.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"출애굽기 34:14","type":"선언형","tags":["신뢰","보호","관계"],"full":"여호와께서는 질투라 이름하는,\n질투의 하나님이시옵니다.","compact":"여호와는 질투의 하나님이시니이다.","oneline":"여호와는 질투의 하나님이시니이다.","comfort":"당신을 향한 그분의 사랑이\n너무나 크고 유일하시기 때문입니다.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"야고보서 1:27","type":"고백형","tags":["관계","순종","결단","소망"],"full":"하나님 아버지 앞에서 정결하고 더러움이 없는 경건은,\n곧 고아와 과부를 그 환난 중에 돌보고,\n자신을 지켜 세속에 물들지 아니하는 그것이니이다.","compact":"참된 경건은 고아와 과부를 돌보고,\n자신을 지켜 세속에 물들지 않는 것입니다.","oneline":"참된 경건은 고아와 과부를 돌보는 것입니다.","comfort":"하나님께서 이미 가장 귀히 여기는 것을\n알고 계시니까요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"누가복음 10:28","type":"선언형","tags":["소망","평안","인도하심","결단"],"full":"예수께서 '네 대답이 옳도다.\n이를 행하면 살리라.'고 말씀하십니다.\n생명의 길이 여기 있나이다.","compact":"옳은 대로 행하면, 당신은 살리라.","oneline":"이를 행하면 살리라.","comfort":"이미 생명의 길을\n제시해주신 분이 계십니다.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"에베소서 2:4","type":"위로형","tags":["신뢰","소망","평안"],"full":"긍휼이 풍성하신 하나님께서,\n당신을 그 큰 사랑으로 사랑하셨나이다.","compact":"하나님께서 당신을 그 큰 사랑으로 사랑하셨나이다.","oneline":"하나님께서 그 큰 사랑으로 당신을 사랑하셨나이다.","comfort":"사랑받고 계신 그 자리에\n이미 그분이 함께하세요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"야고보서 1:5","type":"선언형","tags":["인도하심","소망","신뢰","축복"],"full":"지혜가 부족하시거든, 모든 사람에게 후히 주시고\n꾸짖지 아니하시는 하나님께 구하십시오.\n그리하면 하나님께서 당신에게 주실 것입니다.","compact":"꾸짖지 아니하시는 하나님께 지혜를 구하십시오.\n그리하면 주실 것입니다.","oneline":"하나님께 구하면 지혜를 주실 것입니다.","comfort":"이미 먼저 주시겠다고 약속하신 분이에요.","original_tag":"인간관계","pastor":"이찬수"},{"ref":"John 17:22","type":"선언형","tags":["소망","평안","관계","축복"],"full":"아버지께서 저에게\n주신 그 영광을,\n제가 그들에게 이미 주었나이다.\n이는 우리가 하나인 것처럼,\n그들도 하나가 되게\n하려 함입니다.","compact":"아버지께서 주신 영광을\n제가 이미 그들에게\n주었나이다.\n그들이 하나가 되게\n하려 함입니다.","oneline":"내가 이미 당신에게\n영광을 주었나이다.","comfort":"이미 당신의 그 자리에\n영광을 두신 분이 계셔요.","original_tag":"교만과 겸손","pastor":"Timothy Keller"},{"ref":"로마서 13:1","type":"선언형","tags":["신뢰","보호","평안","직장사업"],"full":"모든 권세는 하나님으로부터\n나지 않음이 없나니,\n이 세상의 모든 권세는\n하나님께서 정하신 바라.","compact":"모든 권세는 하나님으로부터\n나지 않음이 없나니,\n하나님께서 정하신 바라.","oneline":"이 세상의 모든 권세는\n하나님께서 정하신 바라.","comfort":"당신이 마주하는\n모든 권세 위에\n먼저 계신 분이 있으니까요.","original_tag":"리더십","pastor":"이찬수"},{"ref":"창세기 12:2","type":"선언형","tags":["축복","소망","인도하심","직장사업"],"full":"내가 너로 큰 민족을 이루고,\n너에게 복을 주어\n네 이름을 창대하게 하리라.\n그리하여 너는 복의 근원이 될지라.","compact":"내가 너에게 복을 주어\n네 이름을 창대하게 하리니,\n너는 복의 근원이 될지라.","oneline":"내가 너에게 복을 주어\n네 이름을 창대하게 하리라.","comfort":"이미 당신을 향한\n큰 계획과 복을\n말씀하신 분이에요.","original_tag":"영향력","pastor":"이찬수"},{"ref":"잠언 21:5","type":"위로형","tags":["재정어려움","직장사업","인도하심","소망"],"full":"부지런한 자의 계획은\n오직 풍부함에 이를 것이요,\n조급한 자는 오직\n궁핍함에 이를 따름이니라.","compact":"부지런한 자의 계획은\n풍부함에 이를 것이요,\n조급한 자는 궁핍함에\n이를 따름이니라.","oneline":"부지런한 자의 계획은\n풍부함에 이를 따름이니라.","comfort":"당신의 성실함을\n이미 보고 계시고,\n그 수고를 헛되게\n하지 않으실 분이에요.","original_tag":"영향력","pastor":"이찬수"},{"ref":"Jeremiah 29:11","type":"선언형","tags":["소망","인도하심","평안","보호"],"full":"내가 너희를 향한\n나의 계획을 알고 있노라,\n여호와의 말씀이니라.\n그것은 너희에게 해악이 아닌\n평안을 주며,\n너희에게 미래와 소망을\n주려는 계획이니라.","compact":"내가 너희를 향한\n나의 계획은 해악이 아닌\n평안을 주며,\n미래와 소망을 주려는\n계획이니라.","oneline":"내가 너희에게\n미래와 소망을 주려는\n계획을 갖고 있노라.","comfort":"이미 당신의 미래를\n계획하시고\n붙드시겠다고\n말씀하신 분이에요.","original_tag":"Temptation","pastor":"Jonathan Evans"},{"ref":"Matthew 16:18","type":"선언형","tags":["보호","신뢰","소망","평안"],"full":"내가 너에게 말하노니,\n너는 베드로라.\n이 반석 위에\n내가 나의 교회를 세우리니,\n음부의 권세가 결코\n그것을 이기지 못하리라.","compact":"이 반석 위에\n내가 나의 교회를 세우리니,\n음부의 권세가 결코\n그것을 이기지 못하리라.","oneline":"음부의 권세가 결코\n나의 교회를 이기지 못하리라.","comfort":"당신이 속한 공동체를\n붙들고 흔들리지 않게\n하시겠다고 약속하신 분이에요.","original_tag":"Temptation","pastor":"Jonathan Evans"},{"ref":"1 John 5:19","type":"고백형","tags":["신뢰","보호","자녀양육","평안"],"full":"우리는 우리가 하나님께\n속하였음을 아노라.\n온 세상이 악한 자의\n권세 아래 놓여 있음을 아노라.","compact":"우리는 우리가 하나님께\n속하였음을 아노라.","oneline":"우리는 하나님께 속한\n자녀임을 아노라.","comfort":"당신의 존재와 정체성을\n가장 먼저 인정해주시는 분이에요.","original_tag":"Temptation","pastor":"Tony Evans"},{"ref":"Galatians 1:4","type":"위로형","tags":["용서","보호","소망","평안"],"full":"그분께서는 우리를\n이 악한 세대에서\n건져내시기 위하여\n우리의 죄를 대신하여\n자신을 내어주셨으니,\n이는 우리 하나님 아버지의\n뜻을 따른 것이라.","compact":"그분께서는 우리를\n이 악한 세대에서\n건져내시기 위하여\n자신을 내어주셨으니,\n하나님 아버지의 뜻을\n따른 것이라.","oneline":"그분께서 우리를\n이 악한 세대에서\n건져내시기 위하여\n자신을 내어주셨도다.","comfort":"이미 당신을 구원하시려는\n뜻을 세우시고\n그 일을 이루신 분이에요.","original_tag":"Temptation","pastor":"Tony Evans"},{"ref":"John 8:31-32","type":"선언형","tags":["인도하심","소망","평안","보호"],"full":"예수님께서 자신을 믿었던\n유대인들에게 말씀하셨습니다.\n'너희가 내 말 안에 거하면\n참으로 내 제자가 되고,\n진리를 알게 될 것이며,\n그 진리가 너희를\n자유롭게 하리라.'","compact":"너희가 내 말 안에 거하면\n진리를 알게 될 것이며,\n진리가 너희를\n자유롭게 하리라.","oneline":"진리가 너희를 자유롭게 하리라.","comfort":"진정한 자유로\n인도하실 분을 믿으세요.","original_tag":"분노","pastor":"Tony Evans"},{"ref":"John 8:36","type":"선언형","tags":["소망","평안","보호","인도하심"],"full":"그러므로 아들이 여러분을\n자유롭게 하면,\n여러분은 참으로\n자유롭게 될 것입니다.","compact":"아들이 여러분을\n자유롭게 하면,\n참으로 자유롭게\n될 것입니다.","oneline":"아들이 여러분을\n참으로 자유롭게\n할 것입니다.","comfort":"이미 참된 자유를\n약속하신 분이에요.","original_tag":"분노","pastor":"Tony Evans"},{"ref":"Romans 7:14-24","type":"고백형","tags":["회개","슬픔","불안","결단"],"full":"나는 내가 행하는 것을\n깨닫지 못합니다.\n내가 원하는 것은\n행하지 아니하고,\n도리어 내가 미워하는 것을\n행하고 있습니다.\n오호라, 나는 곤고한 사람입니다!\n이 사망의 몸에서\n누가 나를 건져낼 수 있겠습니까?","compact":"내가 원하는 것은\n행하지 아니하고,\n미워하는 것을 행하고 있습니다.\n이 사망의 몸에서\n누가 나를 건져낼 수 있겠습니까?","oneline":"오호라, 나는 곤고한 사람입니다!","comfort":"그 고민을 누구보다 먼저 경험하고 솔직하게 고백한 이가 있습니다.","original_tag":"분노","pastor":"Tony Evans"},{"ref":"2 Corinthians 10:4-5","type":"고백형","tags":["신뢰","보호","결단","두려움"],"full":"우리의 싸움의 무기는\n육적인 것이 아니라,\n견고한 진을 무너뜨리는\n하나님의 능력으로 강력합니다.\n우리는 하나님을 아는 것을\n대적하여 높아진 모든 이론과\n모든 사상을 무너뜨리고,\n모든 생각을 사로잡아\n그리스도께 복종시키고 있습니다.","compact":"우리의 무기는\n견고한 진을 무너뜨리는\n하나님의 능력으로 강력합니다.\n모든 생각을 사로잡아\n그리스도께 복종시킵니다.","oneline":"모든 생각을 사로잡아 그리스도께 복종시킬 수 있습니다.","comfort":"주님 안에서 이미 강력한 무기를 받은 당신을 기억하세요.","original_tag":"분노","pastor":"Tony Evans"},{"ref":"Galatians 5:16","type":"선언형","tags":["순종","보호","결단","소망"],"full":"내가 이르노니,\n성령을 따라 행하라.\n그리하면 육체의 욕심을\n채우지 아니하리라.","compact":"성령을 따라 행하면\n육체의 욕심을 채우지 아니하리라.","oneline":"성령을 따라 행하면 육체의 욕심을 채우지 아니하리라.","comfort":"당신의 힘이 아니라 성령의 능력으로 이기게 하실 분이 계세요.","original_tag":"분노","pastor":"Dr. Tony Evans"},{"ref":"열왕기하 5:10-12","type":"선언형","tags":["치유","건강","신뢰","순종"],"full":"엘리사가 사자를 보내어\n말하기를 '너는 가서\n요단 강에 몸을 일곱 번 씻으라.\n네 살이 회복되어\n깨끗하게 되리라.' 하였습니다.","compact":"요단 강에 몸을\n일곱 번 씻으라.\n네 살이 회복되어\n깨끗하게 되리라.","oneline":"네 살이 회복되어 깨끗하게 되리라.","comfort":"때로는 익숙하지 않은 방식으로 치유하시는 분이에요.","original_tag":"분노","pastor":"이찬수"},{"ref":"열왕기하 5:15","type":"고백형","tags":["신뢰","회개","감사","결단"],"full":"나아만이 모든 군대와 함께\n하나님의 사람에게로 다시 돌아와\n그의 앞에 서서 말하기를\n'이제 제가 알게 되었습니다.\n이스라엘 외에는 온 천하에\n다른 신이 없나이다.\n청하건대 이 종에게서\n예물을 받아 주십시오.' 하였습니다.","compact":"이제 제가 알게 되었습니다.\n이스라엘 외에는 온 천하에\n다른 신이 없나이다.","oneline":"온 천하에 오직 주님만이 참된 신이심을 제가 아나이다.","comfort":"진정한 깨달음 앞에 겸손히 서신 당신의 모습을 기뻐하실 거예요.","original_tag":"분노","pastor":"이찬수"},{"ref":"이사야 35:1-10","type":"선언형","tags":["소망","슬픔","평안"],"full":"광야와 메마른 땅이 기뻐하며,\n사막이 백합화 같이 피어\n즐거워할 것입니다.\n주께 속량함을 받은 자들이\n돌아와 노래하며 시온에 이르러,\n그들의 머리 위에 영원한 희락을 띠고\n기쁨과 즐거움을 얻으리니,\n슬픔과 탄식이 사라지리로다.","compact":"주께 속량함을 받은 자들은\n영원한 희락과 기쁨을 얻으리니,\n슬픔과 탄식이 사라지리로다.","oneline":"슬픔과 탄식이 사라지리로다.","comfort":"가장 슬픈 순간에도 끝내 희망의 노래를 부르게 하실 분이에요.","original_tag":"상실과 슬픔","pastor":"John Piper"},{"ref":"창세기 1:1, 27, 31","type":"위로형","tags":["신뢰","소망","평안","감사"],"full":"태초에 하나님이\n천지를 창조하셨습니다.\n하나님이 자기 형상대로,\n곧 하나님의 형상대로\n사람을 창조하시되\n남자와 여자를 창조하시고,\n하나님이 지으신 그 모든 것을 보시니\n보시기에 심히 좋았더라.","compact":"하나님이 자기 형상대로\n사람을 창조하시고,\n지으신 모든 것을 보시기에\n심히 좋았더라.","oneline":"하나님이 지으신 모든 것을 보시기에 심히 좋았더라.","comfort":"당신이 얼마나 귀하고 아름다운 존재인지 늘 기억하고 계신 분이에요.","original_tag":"상실과 슬픔","pastor":"John Piper"},{"ref":"로마서 8:18","type":"선언형","tags":["소망","기다림","평안"],"full":"현재 우리가 겪는 고난은\n앞으로 우리에게 나타날 영광과\n결코 비교할 수 없음을 생각하나이다.","compact":"현재의 고난은\n앞으로 나타날 영광과\n비교할 수 없나이다.","oneline":"현재의 고난은 장차 나타날 영광과 비교할 수 없도다.","comfort":"그 영광의 길을 이미 예비해 두신 분이 계십니다.","original_tag":"상실과 슬픔","pastor":"John Piper"},{"ref":"이사야 53:5","type":"선언형","tags":["치유","평안","용서","감사"],"full":"그분께서 찔리심은\n우리의 허물 때문이요,\n그분께서 상하심은\n우리의 죄악 때문이었습니다.\n그분께서 징계를 받으심으로\n우리가 평화를 누리게 되었고,\n그분께서 채찍에 맞으심으로\n우리가 온전히 나음을 얻었나이다.","compact":"그분께서 징계 받으심으로\n우리는 평화를 얻었고,\n그분께서 채찍에 맞으심으로\n우리는 나음을 얻었나이다.","oneline":"그분께서 채찍에 맞으심으로 우리는 온전히 나음을 얻었나이다.","comfort":"그 고통을 감당하신 분이 이미 계십니다.","original_tag":"상실과 슬픔","pastor":"John Piper"},{"ref":"고린도후서 4:16-17","type":"선언형","tags":["소망","평안","기다림"],"full":"그러므로 우리가\n낙심하지 않사오니,\n우리의 겉사람은 낡아지나\n우리의 속사람은 날마다\n새로워지고 있나이다.\n우리가 잠시 받는\n가벼운 환난이 지극히 크고\n영원한 영광의 무게를\n우리에게 이루어 주고 있사옵니다.","compact":"겉사람은 낡아지나\n속사람은 날로 새로워지고,\n잠시 받는 환난이\n영원한 영광을 이루나이다.","oneline":"우리의 속사람은 날마다 새로워지고 영원한 영광을 이루나이다.","comfort":"이미 모든 것을 새롭게 하시는 분이 함께하십니다.","original_tag":"상실과 슬픔","pastor":"John Piper"},{"ref":"Luke 6:20-23","type":"선언형","tags":["소망","평안","축복"],"full":"가난한 자들은 복이 있나니,\n하나님의 나라가\n저희의 것이옵니다.\n지금 굶주리는 자들은\n복이 있나니,\n저희가 배부를 것이옵니다.\n지금 우는 자들은 복이 있나니,\n저희가 웃을 것이옵니다.\n인자로 말미암아\n사람들이 너희를 미워하고,\n추방하고, 욕하고,\n너희 이름을 악하다고\n버릴 때에는 복이 있나니,\n그 날에 기뻐하고\n뛰놀지어다.","compact":"가난하고, 굶주리고, 우는 자들에게\n복이 있나니,\n저희가 배부르고 웃을 것이며\n하나님의 나라를 얻으리이다.","oneline":"가난한 자, 굶주리는 자, 우는 자는 복이 있나니, 그들의 것이 하나님의 나라요, 배부르고 웃을 것임이라.","comfort":"그 모든 고난을 복으로 바꾸시는 분이 당신을 보고 계십니다.","original_tag":"상실과 슬픔","pastor":"Timothy Keller"},{"ref":"Colossians 1:13","type":"선언형","tags":["보호","감사","신뢰","소망"],"full":"주님께서는 우리를\n흑암의 권세에서 건져내사\n그의 사랑하는 아들의 나라로\n옮기셨나이다.","compact":"주님께서 우리를 흑암에서 건져내사\n사랑하는 아들의 나라로 옮기셨나이다.","oneline":"주님께서 우리를 흑암의 권세에서 건져내사 사랑하는 아들의 나라로 옮기셨나이다.","comfort":"이미 모든 것을 이루어 놓으신 분의 품 안에 계십니다.","original_tag":"상실과 슬픔","pastor":"Timothy Keller"},{"ref":"베드로전서 1:3","type":"고백형","tags":["감사","소망","신뢰","축복"],"full":"우리 주 예수 그리스도의\n아버지 하나님을 찬송하나이다.\n그분의 크신 긍휼로 말미암아\n예수 그리스도를\n죽은 자 가운데서\n부활하게 하심으로\n우리를 거듭나게 하사\n살아 있는 소망을 주셨사옵니다.","compact":"주님의 크신 긍휼로\n우리를 거듭나게 하사\n산 소망을 주셨나이다.","oneline":"주님의 크신 긍휼로 우리에게 산 소망을 주셨나이다.","comfort":"그 소망은 이미 주어져 당신 안에 뿌리내리고 있습니다.","original_tag":"상실과 슬픔","pastor":"Timothy Keller"},{"ref":"베드로전서 1:6-7","type":"위로형","tags":["소망","신뢰","기다림","불안"],"full":"그러므로 비록 지금\n여러 가지 시험으로 말미암아\n잠시 근심하게 될지라도\n오히려 크게 기뻐하나이다.\n불로 연단해도 없어질 금보다\n더 귀한 저희 믿음의 확실함이\n예수 그리스도께서\n나타나실 때에\n칭찬과 영광과 존귀를\n얻게 할 것임을 믿나이다.","compact":"여러 시험으로 근심하나,\n저희 믿음은\n불로 연단한 금보다 귀하여\n영광을 얻게 할 것이옵니다.","oneline":"저희 믿음은 불로 연단한 금보다 귀하여 영광과 존귀를 얻게 할 것이옵니다.","comfort":"그 모든 과정을 지켜보시고 귀하게 여기시는 분이 계십니다.","original_tag":"상실과 슬픔","pastor":"Timothy Keller"},{"ref":"베드로전서 1:8","type":"고백형","tags":["신뢰","감사","소망","평안"],"full":"주님을 보지 못하였어도\n사랑하옵니다.\n이제도 보지 못하나\n믿음으로 말할 수 없는\n영광스러운 즐거움으로\n기뻐하나이다.","compact":"주님을 보지 못하였어도 사랑하고\n믿음으로 영광스러운 즐거움으로\n기뻐하나이다.","oneline":"보지 못하나 믿음으로 말할 수 없는 영광스러운 즐거움으로 기뻐하나이다.","comfort":"보이지 않아도 이미 함께하시며 당신의 마음을 아시는 분입니다.","original_tag":"상실과 슬픔","pastor":"Timothy Keller"},{"ref":"Romans 8:38-39","type":"선언형","tags":["보호","신뢰","평안","두려움"],"full":"나는 확신하옵나니,\n사망이나 생명이나,\n천사들이나 권세자들이나,\n현재 일이나 장래 일이나,\n능력이나, 높음이나 깊음이나,\n그 어떤 피조물이라도 우리를\n우리 주 그리스도 예수 안에 있는\n하나님의 사랑에서 끊을 수 없나이다.","compact":"사망이나 생명,\n어떤 피조물이라도 우리를\n주 그리스도 예수 안에 있는\n하나님의 사랑에서 끊을 수 없나이다.","oneline":"그 어떤 피조물도 우리를 하나님의 사랑에서 끊을 수 없나이다.","comfort":"그 사랑은 영원히 당신을 붙들고 있습니다.","original_tag":"상실과 슬픔","pastor":"Timothy Keller"},{"ref":"디모데후서 4:6-8","type":"선언형","tags":["소망","기다림","결단","신뢰"],"full":"내가 이미 부어지는\n전제와 같이 되었고\n나의 떠날 때가 가까이 왔도다.\n나는 선한 싸움을 싸웠고,\n나의 달려갈 길을 마쳤고,\n믿음을 지켰나이다.\n이제 후로는 나를 위하여\n의의 면류관이 예비되었사오니,\n의로우신 재판장이신 주님께서\n그 날에 내게 주실 것이며,\n주님의 나타나심을 사모하는\n모든 자에게도 주실 것이옵니다.","compact":"선한 싸움 싸우고\n달려갈 길을 마치고\n믿음을 지켰나니,\n의의 면류관이 예비되어\n주님께서 주실 것이옵니다.","oneline":"선한 싸움 싸우고 믿음을 지킨 자에게 의의 면류관이 예비되었나이다.","comfort":"당신의 모든 노력과 믿음을 기억하고 상 주시는 분이 계십니다.","original_tag":"상실과 슬픔","pastor":"토니 에반스 (Tony Evans)"},{"ref":"이사야 40:6-8","type":"선언형","tags":["신뢰","소망","평안","보호"],"full":"모든 육체는 풀과 같고\n그 모든 아름다움은\n들의 꽃과 같으니,\n풀은 마르고 꽃은 시드는도다.\n여호와의 기운이 그 위에 불면\n이 백성도 실로 풀과 같도다.\n풀은 마르고 꽃은 시드나,\n우리 하나님의 말씀은\n영원히 서리라 하라.","compact":"모든 육체는 풀과 같아\n마르고 시드나,\n우리 하나님의 말씀은\n영원히 서리라.","oneline":"우리 하나님의 말씀은 영원히 서리라.","comfort":"변치 않는 말씀 위에 당신을 세우시는 분이 계십니다.","original_tag":"상실과 슬픔","pastor":"이찬수"},{"ref":"시편 23:1-3","type":"고백형","tags":["인도하심","신뢰","평안","보호"],"full":"여호와는 나의 목자이시니,\n내게 부족함이 없으리로다.\n그분께서 나를\n푸른 풀밭에 눕게 하시며,\n쉴 만한 물가로 인도하시나이다.\n내 영혼을 소생시키시고,\n자기 이름을 위하여\n의의 길로 인도하시는도다.","compact":"여호와는 나의 목자시니,\n내게 부족함이 없으리로다.\n나를 푸른 풀밭에 눕게 하시고,\n쉴 만한 물가로 인도하시나이다.","oneline":"여호와는 나의 목자시니 내게 부족함이 없으리로다.","comfort":"모든 길을 아시고 앞서 가시는 분이 당신의 목자이십니다.","original_tag":"상실과 슬픔","pastor":"이찬수"},{"ref":"고린도후서 1:3-4","type":"선언형","tags":["신뢰","평안","감사"],"full":"찬송하리로다!\n그분은 우리 주 예수 그리스도의\n하나님이시요, 자비의 아버지시요,\n모든 위로의 하나님이시옵니다.\n우리의 모든 환난 가운데서\n우리를 위로하사,\n우리가 하나님께 받는 위로로써\n모든 환난 중에 있는 자들을\n능히 위로하게 하시나이다.","compact":"모든 위로의 하나님께서\n우리의 모든 환난 중에\n우리를 위로하시고,\n그 위로로 다른 이들을\n위로하게 하시나이다.","oneline":"하나님은 모든 위로의 하나님이시요, 우리를 위로하시는 분이시도다.","comfort":"당신의 마음을 가장 잘 아시는 분이 위로로 가득 채워 주십니다.","original_tag":"상실과 슬픔","pastor":"이찬수"},{"ref":"마태복음 1:20-21","type":"선언형","tags":["보호","인도하심","평안","신뢰"],"full":"주님의 사자가\n꿈에 나타나 이르되,\n다윗의 자손 요셉아,\n네 아내 마리아\n데려오기를 두려워하지 말라.\n그녀에게 잉태된 자는\n성령으로 된 것이라.\n아들을 낳으리니\n이름을 예수라 하라.\n이는 그분께서\n자기 백성을\n그들의 죄에서\n구원하실 분이시기 때문이니라.","compact":"주님의 사자가\n요셉에게 이르시되,\n마리아 데려오기를\n두려워하지 말라.\n아들을 낳으리니\n이름을 예수라 하라.\n그분께서 백성을\n죄에서 구원하실 것임이라.","oneline":"그분께서 자기 백성을\n그들의 죄에서 구원하실 것이니\n두려워하지 말라.","comfort":"이미 모든 구원의 계획을 이루어 놓으신 분이 당신과 함께하십니다.","original_tag":"상실과 슬픔","pastor":"이찬수"},{"ref":"빌립보서 3:13-14","type":"고백형","tags":["결단","소망","신뢰","인도하심"],"full":"뒤에 있는 것은 잊어버리고,\n앞에 있는 것을 붙잡으려\n푯대를 향하여 달려가나이다.\n그리스도 예수 안에서\n하나님께서 위에서 부르신\n부름의 상을 위하여 나아가나이다.","compact":"뒤에 있는 것을 잊고\n앞에 있는 것을 향해,\n하나님이 부르신 상을 위하여\n달려가나이다.","oneline":"뒤에 있는 것을 잊고\n푯대를 향하여\n하나님의 부름의 상을 위해\n달려가나이다.","comfort":"그 길의 끝에서 당신을 기다리고 계시는 분이 있습니다.","original_tag":"상실과 슬픔","pastor":"이찬수"},{"ref":"시편 1:3-4","type":"선언형","tags":["축복","소망","인도하심"],"full":"그는 시냇가에 심은\n나무와 같아서,\n철을 따라 열매를 맺고\n그 잎사귀가 마르지 아니할 것입니다.\n그가 하는 모든 일은\n반드시 형통하리로다.","compact":"시냇가에 심은 나무처럼,\n그 잎사귀가 마르지 아니하며\n하는 모든 일이 형통하리로다.","oneline":"그가 하는 모든 일은\n형통하리로다.","comfort":"이미 뿌리내려 흔들림 없는 인생이 될 것을 선언하신 분이에요.","original_tag":"상실과 슬픔","pastor":"이찬수"},{"ref":"1 Peter 1:6","type":"위로형","tags":["슬픔","소망","불안","신뢰"],"full":"지금 잠시 여러 가지 시련으로 인해\n근심하고 슬퍼할지라도,\n이 모든 일 가운데\n크게 기뻐할 이유가 있습니다.","compact":"잠시 근심할지라도,\n이 모든 일 가운데\n크게 기뻐할 이유가 있습니다.","oneline":"이 모든 일 가운데\n크게 기뻐할 이유가 있습니다.","comfort":"이미 지나갈 고통이라 말씀하시며 소망을 주신 분이세요.","original_tag":"신앙 성숙","pastor":"Timothy Keller"},{"ref":"Matthew 6:33","type":"선언형","tags":["인도하심","재정어려움","평안","보호"],"full":"먼저 그의 나라와\n그의 의를 구하십시오.\n그리하면 이 모든 것을\n당신에게 더하여 주실 것입니다.","compact":"먼저 그의 나라와\n그의 의를 구하면,\n이 모든 것을\n더하여 주실 것입니다.","oneline":"이 모든 것을\n당신에게 더하여 주실 것입니다.","comfort":"모든 필요를 이미 알고 채우시겠다고 약속하신 분이에요.","original_tag":"신앙 성숙","pastor":"Timothy Keller"},{"ref":"1 John 2:12","type":"선언형","tags":["용서","회개","평안","보호"],"full":"사랑하는 자녀들아,\n내가 이 글을 쓰는 것은\n여러분의 죄가\n그분의 이름으로\n이미 용서되었기 때문입니다.","compact":"사랑하는 여러분의 죄가\n그분의 이름으로\n이미 용서되었습니다.","oneline":"여러분의 죄는\n그분의 이름으로\n이미 용서되었습니다.","comfort":"당신의 과거를 기억하지 않으시겠다고 말씀하신 분이에요.","original_tag":"신앙 성숙","pastor":"Tony Evans"},{"ref":"2 Corinthians 5:21","type":"선언형","tags":["용서","신뢰","소망","평안"],"full":"하나님께서는\n죄를 알지 못하신 그분을\n우리를 대신하여\n죄로 삼으셨습니다.\n이는 우리가 그분 안에서\n하나님의 의가 되게 하려 하심이라.","compact":"죄를 알지 못하신 그분을\n우리를 대신하여\n죄로 삼으셨으니,\n우리가 그분 안에서\n하나님의 의가 될 것입니다.","oneline":"우리는 그분 안에서\n하나님의 의가 될 것입니다.","comfort":"당신을 가장 온전하고 의로운 존재로 보시는 분이에요.","original_tag":"신앙 성숙","pastor":"Tony Evans"},{"ref":"1 John 2:13","type":"고백형","tags":["보호","신뢰","소망","평안"],"full":"아버지 된 이들이여,\n태초부터 계신 그분을 아시기에\n제가 여러분에게 씁니다.\n젊은이들이여,\n악한 자를 이겼기에\n제가 여러분에게 씁니다.\n어린 자녀들아,\n아버지를 알기에\n제가 여러분에게 씁니다.","compact":"여러분은 태초부터 계신\n그분을 알고,\n악한 자를 이겼으며,\n아버지를 압니다.","oneline":"여러분은 악한 자를\n이미 이겼습니다.","comfort":"이미 당신의 정체와 승리를 확정하신 분이에요.","original_tag":"신앙 성숙","pastor":"Tony Evans"},{"ref":"시편 23:6","type":"선언형","tags":["보호","인도하심","평안","소망"],"full":"내 평생에 선하심과\n인자하심이 반드시 나를 따르리니,\n내가 여호와의 집에\n영원히 살리로다.","compact":"선하심과 인자하심이\n평생 나를 따르리니,\n내가 여호와의 집에\n영원히 살리로다.","oneline":"선하심과 인자하심이\n평생 나를 따르리라.","comfort":"당신의 모든 길에 동행하시고 영원까지 인도하실 분이에요.","original_tag":"신앙 성숙","pastor":"이찬수"},{"ref":"전도서 3:11","type":"위로형","tags":["기다림","인도하심","소망","평안"],"full":"하나님이 모든 것을 지으시되\n때를 따라 아름답게 하셨고,\n사람들에게는 영원을 사모하는\n마음을 주셨습니다.","compact":"하나님이 모든 것을\n때를 따라 아름답게 하셨고,\n영원을 사모하는 마음을 주셨습니다.","oneline":"하나님이 모든 것을\n때를 따라 아름답게 하셨도다.","comfort":"당신의 마음속 영원한 갈망을 아시고 가장 좋은 때에 아름답게 이루실 분이에요.","original_tag":"신앙 성숙","pastor":"이찬수"},{"ref":"사무엘상 19:23","type":"선언형","tags":["인도하심","소망","보호","평안"],"full":"사울에게 하나님의 영이\n임하셨던 것처럼,\n하나님의 영이\n당신에게도 임하시도다.","compact":"하나님의 영이\n당신에게도 임하시도다.","oneline":"하나님의 영이 임하시도다.","comfort":"당신에게도 임하실 그 영이\n이미 함께 계십니다.","original_tag":"신앙 성숙","pastor":"이찬수"},{"ref":"시편 27:1","type":"고백형","tags":["두려움","신뢰","보호","소망"],"full":"여호와는 저의 빛이시며\n저의 구원이시니,\n제가 누구를 두려워하겠습니까?\n여호와는 제 생명의 능력이시니,\n제가 누구를 무서워하겠습니까?","compact":"여호와는 저의 빛이요 구원이시니,\n제가 누구를 두려워하겠습니까?","oneline":"여호와는 내 생명의 능력이시니 내가 누구를 무서워하리요.","comfort":"빛 되신 분이 이미\n당신의 앞을 비추고 계십니다.","original_tag":"신앙 성숙","pastor":"이찬수"},{"ref":"시편 27:4","type":"고백형","tags":["소망","신뢰","평안","감사"],"full":"제가 여호와께 바라는\n단 한 가지 소원이 있습니다.\n평생 주님의 집에 머물며\n주님의 아름다움을 바라보고,\n주님의 성전에서 주님을\n사모하는 것입니다.","compact":"제가 여호와께 바라는 한 가지,\n평생 주님의 아름다움을\n사모하는 것입니다.","oneline":"제가 평생 여호와의 아름다움을 사모하리이다.","comfort":"그 간절한 바람을\n듣고 계신 분이 있으니까요.","original_tag":"신앙 성숙","pastor":"이찬수"},{"ref":"이사야 6:1-3","type":"선언형","tags":["소망","평안","감사","신뢰"],"full":"스랍들이 서로 불러 이르되,\n거룩하다 거룩하다 거룩하다\n만군의 여호와여,\n그의 영광이 온 땅에 충만하도다.","compact":"만군의 여호와의 영광이\n온 땅에 충만하도다.","oneline":"그의 영광이 온 땅에 충만하도다.","comfort":"당신의 모든 공간을 이미\n그분의 영광이 채우고 있으니까요.","original_tag":"신앙 성숙","pastor":"이찬수"},{"ref":"사무엘상 17:37","type":"선언형","tags":["보호","신뢰","두려움","인도하심"],"full":"다윗이 또 이르되,\n여호와께서 저를 사자의 발톱과\n곰의 발톱에서 건져내셨으니,\n이 블레셋 사람의 손에서도\n반드시 건져내시리이다.","compact":"여호와께서 저를 건져내셨으니,\n이 블레셋 사람의 손에서도\n건져내시리이다.","oneline":"여호와께서 저를 블레셋 사람의 손에서도 건져내시리이다.","comfort":"이미 과거에 당신을 지키신 분이\n지금도 붙들고 계십니다.","original_tag":"신앙 성숙","pastor":"이찬수"},{"ref":"시편 131:2","type":"고백형","tags":["평안","신뢰","슬픔","외로움"],"full":"참으로 제가 제 영혼을\n고요하고 평온하게 하였습니다.\n마치 젖 뗀 아이가\n어머니 품에 있듯이,\n제 영혼이 젖 뗀 아이와 같도다.","compact":"제 영혼을 젖 뗀 아이가\n어머니 품에 있음 같이\n고요하고 평온하게 하였나니.","oneline":"내 영혼이 젖 뗀 아이처럼 평온하나이다.","comfort":"이미 당신의 영혼을 품에 안고\n평안을 주시는 분이 계십니다.","original_tag":"신앙 성숙","pastor":"이찬수"},{"ref":"시편 3:5","type":"고백형","tags":["보호","평안","신뢰","감사"],"full":"제가 누워 자고 깨어났으니,\n이는 여호와께서 저를\n붙들어 주셨기 때문입니다.","compact":"제가 누워 자고 깨었으니,\n여호와께서 저를 붙드심이로다.","oneline":"여호와께서 나를 붙드심이로다.","comfort":"밤새 당신을 붙들어 주신 분이\n지금도 함께 계십니다.","original_tag":"신앙 성숙","pastor":"이찬수"},{"ref":"시편 16:8","type":"선언형","tags":["신뢰","평안","보호","결단"],"full":"저는 언제나 여호와를\n제 앞에 모십니다.\n그분이 제 오른편에 계시기에,\n제가 결코 흔들리지 아니하리로다.","compact":"제가 여호와를 항상\n제 앞에 모시고\n그분이 제 오른편에 계시기에,\n흔들리지 아니하리로다.","oneline":"그가 나의 오른쪽에 계시므로 내가 흔들리지 아니하리로다.","comfort":"이미 당신의 오른편에\n굳건히 서 계신 분이 있습니다.","original_tag":"신앙 성숙","pastor":"이찬수"},{"ref":"창세기 1:27","type":"선언형","tags":["소망","신뢰","보호","가정"],"full":"하나님이 당신의 형상대로\n사람을 창조하시니,\n곧 하나님의 형상대로\n창조하셨으며, 그들을\n남자와 여자로 창조하셨도다.","compact":"하나님이 당신의 형상대로\n사람을 창조하셨으니,\n남자와 여자로 창조하셨도다.","oneline":"하나님이 당신의 형상대로 우리를 창조하셨도다.","comfort":"당신이 누구인지 먼저 아시는\n분이 계시니까요.","original_tag":"사회적 책임","pastor":"Timothy Keller"},{"ref":"창세기 9:9-10","type":"선언형","tags":["보호","신뢰","소망","축복"],"full":"내가 내 언약을 세우리니,\n너희와 너희 후손에게,\n그리고 너희와 함께하는\n모든 생물에게로다.\n이는 방주에서 나온 모든 것,\n곧 땅의 모든 짐승에게까지\n이를 것이니라.","compact":"내가 내 언약을 너희와\n모든 생물에게 세우리라.","oneline":"내가 너희와 언약을 세우리라.","comfort":"이미 약속하시고\n잊지 않으시는 분이 계시니까요.","original_tag":"사회적 책임","pastor":"Timothy Keller"},{"ref":"Hebrews 4:9-10","type":"위로형","tags":["평안","신뢰","기다림","소망"],"full":"그러므로 하나님의 백성에게는\n참된 안식이 남아 있으니,\n이는 하나님께서\n당신의 일을 마치고\n쉬신 것같이,\n그분의 안식에 들어가는 자도\n자기 일을 쉬기 때문이니라.","compact":"하나님의 백성에게는\n참된 안식이 남아 있으니,\n그 안식에 들어가는 자도\n자기 일을 쉬게 되리라.","oneline":"하나님의 백성에게는 참된 안식이 남아 있도다.","comfort":"당신을 쉬게 하시겠다고 먼저 말씀하신 분이 계시니까요.","original_tag":"직장스트레스","pastor":"Timothy Keller"},{"ref":"Matthew 11:28","type":"선언형","tags":["평안","두려움","신뢰"],"full":"수고하고 무거운 짐 진 자들아\n다 내게로 오라.\n내가 너희를 쉬게 하리라.","compact":"수고하고 무거운 짐 진 자들아\n내게로 오라.\n내가 너희를 쉬게 하리라.","oneline":"내가 너희를 쉬게 하리라.","comfort":"당신의 짐을 덜어주시겠다고 먼저 말씀하신 분이 계시니까요.","original_tag":"직장스트레스","pastor":"Timothy Keller"},{"ref":"시편 90:12","type":"고백형","tags":["인도하심","결단","소망","신뢰"],"full":"저희에게 저희 날을 세는\n지혜를 가르치시어,\n지혜로운 마음을\n얻게 하여 주소서.","compact":"저희에게 날 계수함을\n가르치시어,\n지혜로운 마음을 얻게 하소서.","oneline":"지혜로운 마음을 얻게 하소서.","comfort":"당신의 지혜를 먼저 구하도록 이끄시는 분이 계시니까요.","original_tag":"직장스트레스","pastor":"이찬수"},{"ref":"요한복음 10:10-11","type":"선언형","tags":["소망","보호","축복","평안"],"full":"도둑이 오는 것은\n오직 훔치고 죽이며\n멸망시키려는 것뿐이지만,\n내가 온 것은 양들로 하여금\n생명을 얻게 하고,\n더 풍성히 누리게 하려 함이라.\n나는 선한 목자니,\n선한 목자는 양들을 위하여\n자기 목숨을 내어 주느니라.","compact":"내가 온 것은 양들로\n생명을 얻고 더 풍성히\n누리게 하려 함이라.\n나는 선한 목자니라.","oneline":"내가 온 것은 양들로 생명을 얻고 더 풍성히 누리게 하려 함이라.","comfort":"당신에게 가장 좋은 것을 주시겠다고 먼저 약속하신 분이 계시니까요.","original_tag":"직장스트레스","pastor":"이찬수"},{"ref":"Deuteronomy 8:18","type":"선언형","tags":["재정어려움","보호","축복","신뢰"],"full":"오직 주 너의 하나님을\n기억하십시오.\n재물을 얻을 능력을\n주시는 분은\n바로 그분이시며,\n그분의 언약을 오늘과 같이\n굳게 세우시는도다.","compact":"재물을 얻을 능력을\n주시는 분은 하나님이시며,\n그분의 언약을\n굳게 세우시는도다.","oneline":"재물을 얻을 능력을 주시는 분은 하나님이심이라.","comfort":"이미 당신의 필요를 아시고 능력을 주겠다고 말씀하신 분이세요.","original_tag":"두려움","pastor":"Tony Evans"},{"ref":"Daniel 10:12-13","type":"위로형","tags":["두려움","인도하심","평안"],"full":"천사가 말했습니다.\n'다니엘아,\n두려워하지 마십시오.\n네가 깨달음을 얻고자\n마음을 정하고 하나님 앞에\n겸손히 한 첫날부터,\n네 말은 들으신 바 되었고,\n내가 그 말씀에\n응답하러 왔느니라.'","compact":"두려워하지 마십시오.\n당신의 말은 들으신 바 되었고,\n그 응답을 가지고 제가 왔습니다.","oneline":"당신의 간절한 기도는 들으신 바 되었고, 응답이 왔느니라.","comfort":"당신의 기도를 가장 먼저 듣고 응답하고 싶어 하신 분이에요.","original_tag":"두려움","pastor":"Dr. Tony Evans"},{"ref":"시편 51:11","type":"고백형","tags":["외로움","인도하심","신뢰","회개"],"full":"나를 주님의 면전에서\n쫓아내지 마시고,\n주님의 거룩한 영을\n내게서 거두지 마소서.","compact":"나를 주 앞에서\n쫓아내지 마시며,\n주의 성령을 내게서\n거두지 마소서.","oneline":"주님의 성령을 내게서 거두지 마소서.","comfort":"당신이 간절히 구하는 그 영을 이미 약속하신 분이에요.","original_tag":"두려움","pastor":"김선교"},{"ref":"다니엘 3:25","type":"위로형","tags":["보호","치유","두려움","평안"],"full":"왕이 말하기를\n'보라, 내가 보니\n결박되지 아니한 네 사람이\n불 가운데로 다니는데,\n아무런 해도 입지\n아니하였고,\n그 넷째의 모양은\n하나님의 아들과 같도다'\n라고 하였습니다.","compact":"결박되지 아니한 이들이\n불 가운데로 다니되\n상하지도 아니하였고,\n그 넷째의 모양은\n하나님의 아들과 같도다.","oneline":"어떤 불 가운데서도 상하지 아니하며, 하나님의 아들이 함께하심이라.","comfort":"어떤 상황 속에서도 당신을 지키며 함께 걷는 분이 계시니까요.","original_tag":"두려움","pastor":"이찬수"},{"ref":"이사야 43:1-2","type":"선언형","tags":["두려움","보호","평안","인도하심","소망"],"full":"너를 창조하신 여호와께서\n지금 말씀하시느니라.\n너는 두려워하지 말라.\n내가 너를 구속하였고,\n너를 지명하여 불렀나니\n너는 내 것임이라.\n네가 물 가운데로 지날 때에\n내가 너와 함께 할 것이요,\n네가 불 가운데로 지날 때에도\n타지 아니할 것이니라.","compact":"너는 두려워하지 말라.\n너는 내 것임이라.\n네가 물이나 불 가운데로\n지날 때에도\n내가 너와 함께 할 것이라.","oneline":"두려워하지 말라. 너는 내 것이요, 내가 너와 함께 할 것이라.","comfort":"당신이 어떤 상황에 있든지, 주님은 이미 당신과 함께 계시겠다고 약속하신 분이에요.","original_tag":"두려움","pastor":"이찬수"},{"ref":"여호수아 1:9","type":"선언형","tags":["두려움","평안","인도하심","보호","소망"],"full":"내가 네게 명령한 것이\n아니냐?\n강하고 담대하십시오.\n두려워하지 말며\n놀라지 마십시오.\n네가 어디로 가든지\n네 하나님 여호와가\n너와 함께 할 것임이라.","compact":"강하고 담대하십시오.\n네 하나님 여호와가\n당신이 어디로 가든지\n함께하실 것입니다.","oneline":"네 하나님 여호와가 당신과 함께할 것임이라.","comfort":"주님이 먼저 강하고 담대하라고 말씀하시며, 늘 함께 하시겠다고 약속하신 분이에요.","original_tag":"두려움","pastor":"이찬수"},{"ref":"여호수아 1:3","type":"선언형","tags":["인도하심","축복","소망","직장사업"],"full":"내가 모세에게 말한 바와 같이,\n당신의 발바닥으로 밟는 모든 곳을\n내가 당신에게 주었노라.","compact":"당신의 발바닥으로 밟는 모든 곳을\n내가 당신에게 주었노라.","oneline":"당신의 발바닥으로 밟는 모든 곳을 내가 주었노라.","comfort":"이미 당신의 발걸음을 인도하고,\n설 곳을 허락하겠다고 말씀하신 분이세요.","original_tag":"두려움","pastor":"이찬수"},{"ref":"요한복음 11:23-24","type":"선언형","tags":["소망","치유","슬픔"],"full":"예수께서 말씀하시길,\n'네 오라비가 다시\n살아날 것이라.'","compact":"네 오라비가 다시 살아나리라.","oneline":"다시 살아날 것이라.","comfort":"생명을 주시는 분의 약속이\n당신을 붙들고 있습니다.","original_tag":"두려움","pastor":"이찬수"},{"ref":"출애굽기 16:8","type":"선언형","tags":["재정어려움","인도하심","보호","감사"],"full":"여호와께서 저녁에는 고기로 먹이시고,\n아침에는 떡으로 배불리시리니,\n이는 주님께서 당신의 원망하는 말을 들으셨음이라.","compact":"여호와께서 저녁에는 고기로,\n아침에는 떡으로 배불리시리니.","oneline":"주님께서 당신을 배불리 먹이시리라.","comfort":"당신의 모든 필요를 들으시고\n채우시는 분이 계십니다.","original_tag":"두려움","pastor":"이찬수"},{"ref":"마태복음 5:14-15","type":"선언형","tags":["소망","인도하심","결단","직장사업"],"full":"당신은 세상의 빛입니다. 산 위에 있는\n마을이 숨겨지지 못하듯이,\n당신은 숨겨질 수 없는 존재입니다.","compact":"당신은 세상의 빛입니다.\n당신은 숨겨지지 않을 것입니다.","oneline":"당신은 세상의 빛입니다.","comfort":"당신의 가치를 이미 알고,\n세상에 드러내시려는 분이 계십니다.","original_tag":"두려움","pastor":"이찬수"},{"ref":"열왕기하 6:16-17","type":"위로형","tags":["두려움","보호","평안","신뢰"],"full":"두려워하지 마십시오.\n우리와 함께 한 자가 그들과 함께 한 자보다 많으니이다.\n주께서 당신의 눈을 여셔서 보게 하시니,\n불말과 불병거가 산에 가득하여 당신을 둘렀도다.","compact":"두려워하지 마십시오. 우리와 함께 한 자가 더 많으니이다.\n주께서 당신을 둘러 보호하시리라.","oneline":"두려워 마십시오, 주께서 당신을 둘러 보호하시리라.","comfort":"당신이 보지 못해도 이미 둘러싸고\n지키시는 분이 계십니다.","original_tag":"두려움","pastor":"이찬수"},{"ref":"고린도전서 10:13","type":"선언형","tags":["두려움","신뢰","보호","소망"],"full":"하나님은 미쁘시기에,\n당신이 감당하지 못할 시험 당함을 허락하지 아니하시고,\n시험 당할 즈음에 또한 피할 길을 내사 능히 감당하게 하시리라.","compact":"하나님은 미쁘시기에 감당할 시험만 허락하시고,\n피할 길을 내사 능히 감당하게 하시리라.","oneline":"하나님은 당신이 감당할 시험만 허락하시고 피할 길을 내실 것입니다.","comfort":"당신을 먼저 생각하고 피할 길을\n마련하시는 분이 함께 계십니다.","original_tag":"두려움","pastor":"이찬수"},{"ref":"Psalm 71:14","type":"고백형","tags":["소망","신뢰","감사","기다림"],"full":"그러나 나는 끊임없이 소망을 품고,\n더욱더 주님을 찬양할 것입니다.","compact":"나는 끊임없이 소망하며\n더욱더 주님을 찬양하리라.","oneline":"나는 계속해서 소망을 품을 것입니다.","comfort":"당신의 소망이 어디에 뿌리내려야 할지\n이미 아시는 분이 계십니다.","original_tag":"상실과슬픔","pastor":"John Piper"},{"ref":"1 Thessalonians 5:9-10","type":"선언형","tags":["소망","평안","보호","신뢰"],"full":"하나님께서는 우리를 진노에 이르도록 정하지 아니하시고,\n우리 주 예수 그리스도로 말미암아 구원을 얻게 하셨으니,\n우리가 깨어 있든지 자고 있든지 그와 함께 살게 하려 하심이라.","compact":"하나님은 우리를 진노가 아닌 구원에 이르게 하셨고,\n우리가 그와 함께 살게 하려 하셨습니다.","oneline":"하나님은 당신을 구원으로 이끄셨습니다.","comfort":"당신의 마지막까지도 이미 계획하고\n준비하신 분이 계십니다.","original_tag":"상실과슬픔","pastor":"John Piper"},{"ref":"2 Chronicles 20:15","type":"선언형","tags":["두려움","불안","신뢰","보호","직장사업"],"full":"여호와께서 이같이 말씀하시되,\n'이 큰 무리로 말미암아 두려워하거나 놀라지 말라.\n이 전쟁은 당신에게 속한 것이 아니요, 하나님께 속한 것임이라.'","compact":"이 큰 무리로 두려워하거나 놀라지 마십시오.\n이 전쟁은 하나님께 속한 것입니다.","oneline":"이 전쟁은 당신의 것이 아니요, 하나님의 것입니다.","comfort":"당신이 감당할 수 없다고 느끼는 싸움도 이미\n당신의 것이 아님을 선언하신 분이 계십니다.","original_tag":"상실과슬픔","pastor":"Jonathan Evans"},{"ref":"요한일서 3:1","type":"고백형","tags":["자녀양육","관계","소망","감사"],"full":"보십시오, 아버지께서 우리에게 얼마나 큰 사랑을 베푸셔서\n하나님의 자녀라 불리게 하셨는지요.\n우리는 진정 그분의 자녀입니다.","compact":"아버지께서 우리에게 큰 사랑을 베푸사,\n우리가 하나님의 자녀라 불립니다.","oneline":"우리는 진정 하나님의 자녀입니다.","comfort":"그 사랑의 부름은 변치 않는 사실이니까요.","original_tag":"상실과슬픔","pastor":"이찬수"},{"ref":"전도서 3:11","type":"위로형","tags":["기다림","인도하심","소망","신뢰"],"full":"하나님께서는 모든 것을 지으시되\n때를 따라 아름답게 하셨고,\n사람들에게 영원을 사모하는\n마음을 주셨습니다.\n그러나 그분이 하시는 일의\n처음과 끝은 우리가 헤아릴\n수 없게 하셨습니다.","compact":"하나님은 모든 것을\n때를 따라\n아름답게 만드셨고,\n그분의 깊은 지혜는\n우리가 다 헤아릴 수 없습니다.","oneline":"하나님은 모든 것을 때를 따라 아름답게 만드셨습니다.","comfort":"지금이 아니더라도 그분의 손길은 언제나 아름다움을 향하고 있으니까요.","original_tag":"상실과슬픔","pastor":"이찬수"},{"ref":"예레미야 애가 3:22-23","type":"선언형","tags":["신뢰","소망","감사","보호"],"full":"여호와의 인자와 긍휼이\n무궁하시므로 우리가\n진멸되지 아니하는 것입니다.\n그분의 인자와 긍휼은\n매일 아침 새로우니,\n주의 성실하심이\n참으로 크십니다.","compact":"주의 인자와 긍휼은\n끝이 없고 아침마다 새로우니,\n주님의 성실하심이 크십니다.","oneline":"주의 성실하심이 아침마다 새로우니 참으로 크시도다.","comfort":"오늘도 변함없이 당신을 기다리고 계신 분의 성품이니까요.","original_tag":"상실과슬픔","pastor":"이찬수"},{"ref":"창세기 13:14-15","type":"선언형","tags":["보호","축복","인도하심","소망"],"full":"롯이 아브람을 떠난 후에\n여호와께서 아브람에게\n이르셨습니다.\n'네 눈을 들어 네가 있는\n곳에서 북쪽과 남쪽,\n동쪽과 서쪽을 바라보아라.\n네게 보이는 이 모든 땅을\n내가 너와 네 자손에게\n영원히 주리라.'","compact":"주님께서 아브람에게\n말씀하셨습니다.\n'네게 보이는 모든 땅을\n내가 너와 네 자손에게\n영원히 주리라.'","oneline":"보이는 모든 땅을 내가 너와 네 자손에게 영원히 주리라.","comfort":"그분이 먼저 보여주셨고, 먼저 약속하셨으니까요.","original_tag":"상실과슬픔","pastor":"이찬수"},{"ref":"신명기 33:29","type":"선언형","tags":["축복","소망","감사","보호"],"full":"이스라엘이여, 당신은\n참으로 행복한 사람입니다.\n여호와의 구원을\n당신처럼 얻은 백성이\n어디 있겠습니까?","compact":"당신은 행복한 사람입니다.\n여호와의 구원을\n당신처럼 얻은 백성은 없습니다.","oneline":"당신은 진정 행복한 사람이로다!","comfort":"이미 당신을 행복하게 여기시는 분이 계시니까요.","original_tag":"상실과슬픔","pastor":"이찬수"},{"ref":"시편 126:1","type":"고백형","tags":["소망","감사","기다림","평안"],"full":"여호와께서 시온의\n포로들을 다시 고향으로\n돌려보내셨을 때,\n우리는 마치 꿈을 꾸는\n것 같았나이다.","compact":"주님께서 시온의 포로들을\n돌려보내셨을 때,\n우리는 마치 꿈을 꾸는\n것 같았습니다.","oneline":"우리는 마치 꿈을 꾸는 것 같았도다.","comfort":"그 꿈같은 기쁨을 주시는 분은 언제나 당신 편이니까요.","original_tag":"상실과슬픔","pastor":"이찬수"},{"ref":"시편 126:2","type":"고백형","tags":["감사","소망","평안","축복"],"full":"그때 우리의 입에는\n웃음이 가득하고,\n우리의 혀에는 찬양이\n넘쳤나이다.\n뭇 나라들 가운데서도\n'여호와께서 그들을 위하여\n큰일을 행하셨다'고\n말하였도다.","compact":"우리 입에는 웃음이,\n혀에는 찬양이 가득했습니다.\n뭇 나라들도 '주님께서\n큰일을 행하셨다'고\n말했도다.","oneline":"우리 입에는 웃음이 가득하고 우리 혀에는 찬양이 찼었도다.","comfort":"그 기쁨의 날을 반드시 주실 분을 기억하세요.","original_tag":"상실과슬픔","pastor":"이찬수"},{"ref":"시편 126:3","type":"고백형","tags":["감사","소망","평안","축복"],"full":"여호와께서 우리를 위하여\n참으로 큰일을 행하셨으니,\n우리는 이로 인해 기뻐합니다.","compact":"주님께서 우리를 위해\n큰일을 행하셨으니,\n우리는 기쁩니다.","oneline":"우리는 기쁘도다!","comfort":"당신의 기쁨을 위해 항상 일하시는 분이니까요.","original_tag":"상실과슬픔","pastor":"이찬수"},{"ref":"시편 126:5-6","type":"선언형","tags":["소망","기다림","치유","평안"],"full":"눈물을 흘리며 씨앗을\n뿌리는 자는 반드시\n기쁨으로 그 열매를\n거두리이다.\n울며 씨를 뿌리러\n나갔던 자는 분명히\n기쁨으로 곡식 단을\n가지고 돌아오리이다.","compact":"눈물로 씨앗을 뿌리는 자는\n기쁨으로 거두리이다.\n울며 나갔던 자는\n기쁨으로 곡식 단을\n가지고 돌아오리이다.","oneline":"눈물을 흘리며 씨를 뿌리는 자는 기쁨으로 거두리로다.","comfort":"지금 흘리는 눈물까지 기억하며 기쁨의 열매를 준비하시는 분이 계시니까요.","original_tag":"상실과슬픔","pastor":"이찬수"},{"ref":"갈라디아서 6:9","type":"선언형","tags":["소망","기다림","인도하심","결단"],"full":"우리가 선을 행하다가\n낙심하지 마십시오.\n포기하지 아니하면\n반드시 때가 이르러\n좋은 열매를 거두게\n될 것입니다.","compact":"선을 행하되 낙심하지 마십시오.\n포기하지 않으면\n때가 이르매 거두리로다.","oneline":"포기하지 아니하면 때가 이르매 거두리로다.","comfort":"당신의 성실함을 기억하며 열매 맺을 때를 기다리시는 분이 계시니까요.","original_tag":"상실과슬픔","pastor":"이찬수"},{"ref":"야고보서 5:16","type":"고백형","tags":["소망","신뢰","평안"],"full":"의로운 이의 간절한 기도는\n큰 능력을 발휘합니다.","compact":"의로운 이의 간절한 기도는\n큰 능력을 발휘합니다.","oneline":"간절한 기도는 큰 능력을 발휘합니다.","comfort":"이미 그 기도가 얼마나 강력한지 말씀하신 분이 있으니까요.","original_tag":"상실과슬픔","pastor":"이찬수"},{"ref":"요한1서 4:18","type":"위로형","tags":["두려움","평안","보호"],"full":"사랑 안에는\n어떠한 두려움도 없습니다.\n온전한 사랑이\n모든 두려움을\n내쫓기 때문입니다.\n두려움에는 벌이 따르기에,\n두려워하는 자는\n사랑 안에서\n온전함을 이루지 못합니다.","compact":"사랑 안에는\n두려움이 없으니,\n온전한 사랑이\n모든 두려움을\n내쫓습니다.","oneline":"온전한 사랑이 모든 두려움을 내쫓습니다.","comfort":"두려움보다 먼저\n당신을 사랑으로\n붙드시겠다고 하신\n분이 있어요.","original_tag":"상실과슬픔","pastor":"이찬수"},{"ref":"시편 34:8","type":"위로형","tags":["신뢰","소망","감사","평안"],"full":"여호와 하나님의\n선하심을 직접\n맛보아 아십시오.","compact":"여호와의 선하심을\n맛보아 아십시오.","oneline":"여호와의 선하심을 맛보아 아십시오.","comfort":"당신의 모든 감각으로\n느껴보라고 먼저\n초청하신 분이 계세요.","original_tag":"상실과슬픔","pastor":"이찬수"},{"ref":"고린도전서 15:54-55","type":"선언형","tags":["소망","치유","평안","신뢰"],"full":"이 썩을 육체가\n썩지 아니함을 입고,\n이 죽을 육체가\n죽지 아니함을\n입을 때에는,\n'사망이 삼켜지고\n승리하였도다'\n기록된 말씀이\n이루어질 것입니다.\n오 사망아,\n너의 승리가 어디 있느냐?\n오 사망아,\n너의 쏘는 것이 어디 있느냐?","compact":"사망을 삼키고\n이기리라 기록된\n말씀이 이루어질 것입니다.\n사망아,\n너의 승리가 어디 있느냐?","oneline":"사망을 삼키고 이기리라 기록된 말씀이 이루어질 것입니다.","comfort":"가장 큰 절망 속에서도\n승리를 선포하신\n분이 계십니다.","original_tag":"상실과슬픔","pastor":"이찬수"},{"ref":"고린도전서 15:57","type":"고백형","tags":["감사","신뢰","소망"],"full":"우리 주 예수\n그리스도로 말미암아\n우리에게 승리를 주시는\n하나님께 감사드립니다.","compact":"우리에게 승리를 주시는\n하나님께 감사드립니다.","oneline":"우리에게 승리를 주시는 하나님께 감사드립니다.","comfort":"감사할 승리를\n이미 예비하시고\n주시겠다고 하신\n분이 계세요.","original_tag":"상실과슬픔","pastor":"이찬수"},{"ref":"고린도전서 15:58","type":"위로형","tags":["직장사업","결단","소망","인도하심"],"full":"그러므로 사랑하는 여러분,\n굳건히 서서\n흔들리지 마십시오.\n항상 주의 일에\n더욱 힘쓰십시오.\n이는 여러분의 수고가\n주 안에서 결코\n헛되지 않음을\n알기 때문입니다.","compact":"여러분의 수고가\n주 안에서 결코\n헛되지 않을 것임을\n아십시오.","oneline":"여러분의 수고는 주 안에서 결코 헛되지 않습니다.","comfort":"당신의 노고를\n이미 보고 계시며\n헛되지 않음을\n보장하신 분이 있습니다.","original_tag":"상실과슬픔","pastor":"이찬수"},{"ref":"스가랴 4:6","type":"선언형","tags":["인도하심","신뢰","소망","보호"],"full":"그가 내게 대답하여\n말하기를,\n'여호와께서\n스룹바벨에게 하신\n말씀이 이러하니라.\n만군의 여호와가\n말하노니,\n이는 힘으로 되지 아니하며\n능력으로 되지 아니하고,\n오직 나의 영으로 되리라'\n하시니라.","compact":"이는 힘으로 되지 아니하며\n능력으로 되지 아니하고,\n오직 나의 영으로 되리라.","oneline":"오직 나의 영으로 될 것입니다.","comfort":"당신의 힘이 아닌\n그분의 영으로\n이루시겠다고 먼저\n약속하신 분이에요.","original_tag":"상실과슬픔","pastor":"이찬수"},{"ref":"히브리서 11:1","type":"고백형","tags":["신뢰","소망","불안","인도하심"],"full":"믿음은 우리가\n바라는 것들의 실체이며,\n눈에 보이지 않는 것들의\n분명한 증거입니다.","compact":"믿음은 바라는 것들의\n실체이며,\n보이지 않는 것들의\n증거입니다.","oneline":"믿음은 바라는 것들의 실체입니다.","comfort":"보이지 않는 것에 대한\n확실한 실체를\n이미 말씀하신\n분이 계세요.","original_tag":"상실과슬픔","pastor":"이찬수"},{"ref":"Joshua 1:9","type":"선언형","tags":["두려움","불안","보호","인도하심","신뢰"],"full":"내가 네게 명령하지\n아니하였느냐?\n강하고 담대하라.\n두려워하지 말며\n낙심하지 말라.\n네가 어디로 가든지\n네 하나님 여호와가\n너와 함께할 것임이라.","compact":"네 하나님 여호와가\n너와 함께할 것임이라.","oneline":"네 하나님 여호와가 너와 함께할 것입니다.","comfort":"당신이 어디를 가든지\n이미 함께하시겠다고\n약속하신 분이 있어요.","original_tag":"Leadership Challenges","pastor":"Andy Stanley"},{"ref":"Matthew 28:18-20","type":"선언형","tags":["인도하심","보호","신뢰","소망","두려움"],"full":"예수님께서 나아와\n말씀하시기를,\n'하늘과 땅의\n모든 권세가\n내게 주어졌느니라.\n그러므로 너희는 가서\n모든 민족을\n제자로 삼아,\n아버지와 아들과\n성령의 이름으로\n세례를 베풀고,\n내가 너희에게\n명령한 모든 것을\n가르쳐 지키게 하라.\n보라,\n내가 세상 끝날까지\n항상 너희와\n함께 있으리라'\n하시니라.","compact":"하늘과 땅의\n모든 권세가\n내게 주어졌느니라.\n보라,\n내가 세상 끝날까지\n항상 너희와\n함께 있으리라.","oneline":"내가 세상 끝날까지 항상 너희와 함께 있으리라.","comfort":"모든 권세를 가지신\n분이 지금 당신과\n함께하시겠다고\n직접 말씀하고 계세요.","original_tag":"Leadership Challenges","pastor":"Andy Stanley"},{"ref":"John 17:17","type":"고백형","tags":["신뢰","인도하심","평안"],"full":"진리로 그들을\n거룩하게 하옵소서.\n아버지의 말씀은\n진리입니다.","compact":"아버지의 말씀은 진리입니다.","oneline":"아버지의 말씀은 진리입니다.","comfort":"흔들리지 않는\n진리이신 분이\n당신의 길을\n비추고 계세요.","original_tag":"삶의 목적","pastor":"Timothy Keller"},{"ref":"마태복음 5:14-16","type":"위로형","tags":["소망","인도하심","결단","직장사업"],"full":"너희는 세상의 빛이니라.\n산 위에 세워진 마을은\n숨겨질 수 없습니다.\n사람들이 등불을 켜서\n그릇 아래에 두지 않고\n등경 위에 두어\n집 안 모든 사람에게 비추듯이,\n너희도 너희의 빛을\n사람들 앞에 비추어,\n그들이 너희의 선한 행실을\n보고 하늘에 계신 너희 아버지께\n영광을 돌리게 하라.","compact":"너희는 세상의 빛이니, 너희의 빛을 사람들 앞에 비추십시오.","oneline":"너희는 세상의 빛이니라.","comfort":"당신 안에 이미 빛을 심으신 분이, 그 빛을 드러내시겠다고 하신 분이 있어요.","original_tag":"삶의 목적","pastor":"Timothy Keller"},{"ref":"디도서 2:14","type":"선언형","tags":["용서","소망","축복","보호"],"full":"그분께서 우리를 대신하여\n자신을 주셨으니,\n이는 모든 불법에서\n우리를 속량하시고\n깨끗하게 하셔서,\n선한 일에 열심인\n당신의 특별한 백성이\n되게 하려 하심입니다.","compact":"모든 불법에서 우리를 속량하시고 당신의 특별한 백성이 되게 하려 하심입니다.","oneline":"당신의 특별한 백성이 되게 하려 하심입니다.","comfort":"이미 당신을 당신의 것으로 삼으시기로 작정하신 분입니다.","original_tag":"삶의 목적","pastor":"이찬수"},{"ref":"Genesis 12:1-4","type":"선언형","tags":["축복","인도하심","소망","보호"],"full":"주님께서 아브람에게 이르시되,\n\"네 고향과 친척과\n아버지의 집을 떠나\n내가 네게 보여줄 땅으로 가라.\n내가 너를 큰 민족으로 만들고,\n너에게 복을 주어\n네 이름을 위대하게 하리니,\n너는 복의 근원이 될지라.\n너를 축복하는 자에게는\n내가 복을 내리고,\n너를 저주하는 자에게는\n내가 저주하리니,\n땅의 모든 족속이\n너로 말미암아 복을 얻으리라.\"","compact":"내가 너를 큰 민족으로 만들고 너에게 복을 주어 네 이름을 위대하게 하리니, 너는 복의 근원이 될지라.","oneline":"너는 복의 근원이 될지라.","comfort":"당신을 통해 흘려보내실 축복을 이미 계획하신 분입니다.","original_tag":"신앙의 목적","pastor":"Timothy Keller"},{"ref":"1 Peter 2:9","type":"선언형","tags":["소망","보호","축복","감사"],"full":"그러나 여러분은\n택함 받은 족속이요,\n왕 같은 제사장들이요,\n거룩한 나라이요,\n하나님의 특별한\n소유된 백성입니다.\n이는 당신을 어둠에서 불러내어\n그의 놀라운 빛 가운데로\n인도하신 이의 아름다운 덕을\n선포하게 하려 하심입니다.","compact":"여러분은 택함 받은 족속이요, 왕 같은 제사장이며, 하나님의 특별한 소유된 백성입니다.","oneline":"여러분은 하나님의 특별한 소유된 백성입니다.","comfort":"당신을 특별하게 부르신 분이 이미 당신과 함께하십니다.","original_tag":"신앙의 목적","pastor":"Timothy Keller"},{"ref":"마태복음 28:19-20","type":"선언형","tags":["인도하심","보호","소망","평안"],"full":"그러므로 너희는 가서\n모든 민족을 제자로 삼아\n아버지와 아들과\n성령의 이름으로\n세례를 베풀고,\n내가 너희에게 분부한\n모든 것을 가르쳐 지키게 하라.\n보라, 내가 세상 끝날까지\n너희와 항상 함께 있으리라.","compact":"내가 세상 끝날까지 너희와 항상 함께 있으리라.","oneline":"내가 세상 끝날까지 너희와 항상 함께 있으리라.","comfort":"끝까지 당신과 함께하시겠다고 약속하신 분이에요.","original_tag":"신앙의 목적","pastor":"하용조"},{"ref":"Luke 15:20","type":"위로형","tags":["용서","회개","소망","평안"],"full":"그러나 그가 아직\n멀리 있을 때에\n그의 아버지가 그를 보고\n측은히 여겨 달려가서\n그의 목을 안고\n입을 맞추었습니다.","compact":"아버지가 그를 보고 측은히 여겨 달려가 목을 안고 입을 맞추었습니다.","oneline":"당신의 아버지가 멀리서도 당신을 보고 달려오십니다.","comfort":"이미 당신을 향해 달려오고 계신 분이 있으니까요.","original_tag":"Purpose in Life","pastor":"Andy Stanley"},{"ref":"Luke 15:24","type":"선언형","tags":["회개","소망","용서","축복"],"full":"'내 아들은 죽었다가\n다시 살아났고,\n잃었다가 다시 찾았노라.'\n하여 그들이 기뻐하며\n잔치를 벌였도다.","compact":"내 아들은 죽었다가 다시 살아났고, 잃었다가 다시 찾았노라.","oneline":"당신은 잃었다가 다시 찾은 자요, 죽었다가 다시 살아난 자입니다.","comfort":"당신의 돌아옴을 기뻐하며 잔치를 준비하시는 분이 계십니다.","original_tag":"Purpose in Life","pastor":"Andy Stanley"},{"ref":"다니엘 4:37","type":"고백형","tags":["신뢰","인도하심","보호","평안"],"full":"그러므로 이제 나\n느부갓네살은\n하늘의 왕을 찬양하며\n칭송하며 경배합니다.\n그분의 모든 일은 진실하고\n그분의 행하심은 의로우시므로,\n교만하게 행하는 자를\n그분께서 능히 낮추심입니다.","compact":"그분의 모든 일은 진실하고 그분의 행하심은 의로우시므로, 교만하게 행하는 자를 그분께서 능히 낮추심입니다.","oneline":"교만하게 행하는 자를 능히 낮추시는 분이십니다.","comfort":"당신의 모든 상황을 주관하시고 높고 낮음을 정하시는 분이 있으니까요.","original_tag":"겸손","pastor":"이찬수"},{"ref":"베드로전서 5:5-6","type":"선언형","tags":["신뢰","인도하심","축복","평안"],"full":"젊은 자들아,\n장로들에게 순종하고\n겸손으로 서로를 섬기세요.\n하나님은 교만한 자를\n대적하시지만,\n겸손한 자에게는\n은혜를 주시나니,\n하나님의 능하신 손 아래에서\n겸손하십시오.\n때가 되면 주님께서 친히\n당신을 높이실 것입니다.","compact":"하나님의 능하신 손 아래에서 겸손하십시오. 때가 되면 주님께서 당신을 높이시리라.","oneline":"때가 되면 주님께서 친히 당신을 높이실 것입니다.","comfort":"당신을 높이시겠다고 먼저 말씀하신 분이 계십니다.","original_tag":"겸손","pastor":"이찬수"},{"ref":"사도행전 13:22","type":"선언형","tags":["인도하심","소망","신뢰","직장사업"],"full":"주님께서 다윗을 세우시고\n말씀하시기를,\n\"내가 이새의 아들\n다윗을 만나니\n내 마음에 합한 사람이라.\n내 모든 뜻을 다 이루게 하리라\"\n하셨습니다.","compact":"주님은 자신의 마음에 합한 사람을 통해 그분의 뜻을 다 이루실 것입니다.","oneline":"주님께서 당신을 통해 그분의 모든 뜻을 다 이루실 것입니다.","comfort":"이미 당신을 향한 그분의 계획을 선언하신 분입니다.","original_tag":"하나님의 주권","pastor":"존 파이퍼 (John Piper)"},{"ref":"사도행전 13:30","type":"선언형","tags":["소망","치유","보호","신뢰"],"full":"하나님께서 죽은 자들\n가운데서 그분을 다시\n살리셨나이다.","compact":"하나님께서 죽은 자들\n가운데서 그분을\n살리셨나이다.","oneline":"하나님께서 그분을 살리신지라.","comfort":"모든 것을 다시 살리실\n능력이 있는 분이시니까요.","original_tag":"하나님의 주권","pastor":"존 파이퍼 (John Piper)"},{"ref":"John 4:23-24","type":"선언형","tags":["신뢰","인도하심","소망","평안"],"full":"그러나 진정으로\n예배하는 자들이\n영과 진리로 아버지께\n예배할 때가 오나니,\n곧 지금이라. 이는\n아버지께서 이렇게\n예배하는 자들을\n찾으시기 때문입니다.\n하나님은 영이시니,\n예배하는 자는 영과\n진리로 예배할지니라.","compact":"아버지께서 영과\n진리로 예배하는\n자들을 찾으시는도다.","oneline":"아버지께서 영과 진리로\n예배하는 당신을 찾으십니다.","comfort":"이미 당신을 간절히\n찾고 계신 분입니다.","original_tag":"신앙의 깊이","pastor":"John Piper"},{"ref":"James 4:15","type":"고백형","tags":["신뢰","인도하심","소망","결단"],"full":"당신은 이렇게\n말해야 마땅합니다.\n\"주의 뜻이라면,\n우리가 살기도 하고\n이것이나 저것을\n하리이다.\"","compact":"주의 뜻이라면,\n우리가 살고 이 일을\n하리이다.","oneline":"주의 뜻이라면,\n우리가 이 일을 이루리이다.","comfort":"당신의 삶의 모든 과정을\n주님이 뜻하실 때까지\n붙드시는 분입니다.","original_tag":"진로고민","pastor":"Tony Evans"},{"ref":"Romans 8:28","type":"선언형","tags":["신뢰","소망","인도하심","평안"],"full":"우리가 알거니와\n하나님을 사랑하는 자,\n곧 그분의 뜻대로\n부르심을 받은\n자들에게는 모든 것이\n합력하여 선을 이루리라.","compact":"하나님을 사랑하는\n자들에게는 모든 것이\n합력하여 선을 이루리라.","oneline":"모든 것이 합력하여\n당신에게 선을 이룰 것입니다.","comfort":"당신의 모든 것을 주관하여\n선으로 인도하실 분이 계십니다.","original_tag":"진로고민","pastor":"Tony Evans"},{"ref":"고린도전서 9:14","type":"선언형","tags":["재정어려움","직장사업","보호","축복"],"full":"이와 같이 주께서도\n복음을 전하는\n자들이 복음으로\n말미암아 살도록\n명하셨나이다.","compact":"주님께서 복음 전하는\n자들이 복음으로 살도록\n명하셨나이다.","oneline":"주님께서 당신의 섬김에\n필요한 모든 것을 친히\n명하셨습니다.","comfort":"당신의 사명을 위한\n모든 것을 이미 준비하신\n분입니다.","original_tag":"진로고민","pastor":"김선교"},{"ref":"다니엘 6:16","type":"선언형","tags":["보호","신뢰","소망","평안"],"full":"왕이 다니엘에게\n이르기를, 네가 항상\n섬기는 너의 하나님께서\n너를 구원하시리라\n하였나이다.","compact":"네가 항상 섬기는\n하나님께서 너를\n구원하시리라.","oneline":"네 하나님께서 너를 구원하시리라.","comfort":"그분의 구원은 이미\n선포된 약속이에요.","original_tag":"진로고민","pastor":"이찬수"},{"ref":"다니엘 6:22","type":"고백형","tags":["보호","신뢰","감사","치유"],"full":"나의 하나님이 이미\n그의 천사를 보내어\n사자들의 입을\n봉하셨으니, 사자들이\n나를 상해하지\n못하였나이다.","compact":"나의 하나님이 천사를\n보내어 사자들의 입을\n봉하셨으므로 나를\n상해하지 못하였나이다.","oneline":"나의 하나님이 천사를\n보내어 사자들의 입을\n봉하셨나이다.","comfort":"보이지 않는 곳에서\n이미 일하고 계신\n분이 있어요.","original_tag":"진로고민","pastor":"이찬수"},{"ref":"여호수아 24:15","type":"고백형","tags":["결단","신뢰","가정","순종"],"full":"여호와를 섬기는 것이\n너희에게 좋지 않게\n보이거든 오늘\n섬길 자를 택하라.\n그러나 오직 나와\n내 집은 여호와를\n섬기겠노라.","compact":"오늘 섬길 자를 택하라.\n오직 나와 내 집은\n여호와를 섬기겠노라.","oneline":"오직 나와 내 집은\n여호와를 섬기겠노라.","comfort":"당신의 믿음의 고백을\n이미 붙들고 계신\n분이 있어요.","original_tag":"진로고민","pastor":"이찬수"},{"ref":"마가복음 1:17","type":"선언형","tags":["인도하심","소망","직장사업","결단"],"full":"예수께서 말씀하시되,\n나를 따라오라.\n내가 너희를 사람을\n낚는 어부가 되게 하리라.","compact":"나를 따라오라.\n내가 너희를 사람 낚는\n어부가 되게 하리라.","oneline":"내가 너희를 사람 낚는\n어부가 되게 하리라.","comfort":"당신의 길을 이미\n정하시고 부르신\n분이 함께하세요.","original_tag":"진로고민","pastor":"이찬수"},{"ref":"마가복음 1:37-38","type":"선언형","tags":["인도하심","소망","결단","직장사업"],"full":"만나서 이르되\n모든 사람이 주를\n찾나이다 이르시되\n우리가 다른 가까운\n마을들로 가자\n거기서도 전도하리니\n내가 이를 위하여\n왔노라 하시고","compact":"예수께서 말씀하시되,\n다른 마을로 가서\n전도하리니 내가 이를\n위하여 왔노라.","oneline":"내가 이를 위하여 왔노라.","comfort":"당신의 사명을 이미\n정하시고 시작하신\n분이 있어요.","original_tag":"진로고민","pastor":"이찬수"},{"ref":"창세기 9:1","type":"선언형","tags":["축복","가정","소망","자녀양육"],"full":"하나님이 노아와\n그 아들들에게 복을\n주시며 이르시되,\n생육하고 번성하여\n땅에 충만하라.","compact":"하나님이 복을\n주시며 이르시되,\n생육하고 번성하여\n땅에 충만하라.","oneline":"생육하고 번성하여 땅에 충만하라.","comfort":"당신의 삶에 이미 복을 선포하신 분이 있어요.","original_tag":"진로고민","pastor":"이찬수"},{"ref":"로마서 1:1","type":"고백형","tags":["소망","인도하심","결단","직장사업"],"full":"예수 그리스도의 종\n바울은, 하나님의 복음을\n위하여 사도로 부르심을\n받고 택정함을 입었나이다.","compact":"바울은 하나님의 복음을\n위하여 사도로 부르심을\n입었나이다.","oneline":"하나님의 복음을 위하여 택정함을 입었나이다.","comfort":"당신을 향한 특별한 부르심을 이미 계획하신 분이 계세요.","original_tag":"진로고민","pastor":"이찬수"},{"ref":"디모데전서 4:7-8","type":"선언형","tags":["소망","축복","신뢰","평안"],"full":"허탄한 이야기를 버리고\n경건에 이르도록 자신을\n훈련하십시오.\n육체의 훈련은 잠시\n유익하지만, 경건은 모든\n일에 유익하여 지금과\n오는 세상에 약속이 있나이다.","compact":"경건은 범사에 유익하니\n금생과 내생에 약속이\n있나이다.","oneline":"경건에는 금생과 내생의 약속이 있나이다.","comfort":"미래를 넘어 영원까지 약속하신 분이 당신의 삶을 지켜보세요.","original_tag":"진로고민","pastor":"이찬수"},{"ref":"디모데전서 4:9","type":"고백형","tags":["신뢰","소망","평안","결단"],"full":"이 말씀은 참으로 미쁘며,\n모든 사람이 받아들일 만한\n말씀입니다.","compact":"이 말씀은 참되며,\n모든 사람이 받을 만하도다.","oneline":"이 말씀은 모든 사람이 받을 만하도다.","comfort":"당신의 마음에 새겨진 그 진리를 이미 아시는 분이 있어요.","original_tag":"진로고민","pastor":"이찬수"},{"ref":"베드로전서 5:7","type":"위로형","tags":["불안","신뢰","평안","보호"],"full":"여러분 모든 염려를\n주님께 맡기십시오.\n주님께서 친히 여러분을\n돌보심이니라.","compact":"모든 염려를 주님께\n맡기십시오.\n주님께서 친히 여러분을\n돌보심이니라.","oneline":"주님께서 친히 여러분을 돌보심이니라.","comfort":"이미 여러분의 짐을 함께 지시겠다고 말씀하신 분이에요.","original_tag":"진로고민","pastor":"이찬수"},{"ref":"마태복음 4:23","type":"위로형","tags":["건강","치유","소망","신뢰"],"full":"예수님께서 온 갈릴리에\n두루 다니시며,\n그들의 회당에서 가르치시고\n천국 복음을 전파하시며\n백성 중 모든 병과 모든\n약한 것을 고치셨으니.","compact":"예수님께서 모든 병과\n모든 약한 것을 고치셨으니.","oneline":"예수님께서 모든 병과 약한 것을 고치셨으니.","comfort":"그 능력으로 지금도 함께하시며 치유하시는 분이에요.","original_tag":"진로고민","pastor":"이찬수"},{"ref":"잠언 22:6","type":"선언형","tags":["자녀양육","소망","보호","인도하심"],"full":"마땅히 행할 길을\n아이에게 가르치십시오.\n그리하면 그가 늙어서도\n그 길을 떠나지 아니하리라.","compact":"아이에게 마땅히 행할 길을\n가르치십시오.\n그리하면 늙어도 그 길을\n떠나지 아니하리라.","oneline":"늙어도 그 길을 떠나지 아니하리라.","comfort":"자녀의 미래까지도 주님께서 약속으로 붙들어 주시니까요.","original_tag":"진로고민","pastor":"이찬수"},{"ref":"마태복음 9:35-36","type":"위로형","tags":["슬픔","외로움","치유","평안"],"full":"예수님께서 모든 도시와\n마을에 두루 다니시며\n모든 병과 모든 약한 것을\n고치시니라.\n무리를 보시고 불쌍히\n여기셨으니, 이는 그들이\n목자 없는 양과 같이\n고생하며 기진함이었도다.","compact":"예수님께서 무리를 보시고\n불쌍히 여기셨으니, 이는\n그들이 목자 없는 양과\n같았도다.","oneline":"그들을 불쌍히 여기셨도다.","comfort":"어떤 상황이든 먼저 헤아리고 안아주시는 분이에요.","original_tag":"진로고민","pastor":"이찬수"},{"ref":"Matthew 1:23","type":"위로형","tags":["평안","소망","보호","신뢰"],"full":"보십시오, 처녀가 잉태하여\n아들을 낳으리니,\n그의 이름을 임마누엘이라\n부르리라 하셨으니, 이는 곧\n'하나님이 우리와 함께\n계시다'는 뜻이시니라.","compact":"그의 이름을 임마누엘이라\n부르리니, 곧 '하나님이\n우리와 함께 계시다'는\n뜻이니라.","oneline":"하나님이 우리와 함께 계시다.","comfort":"이미 가장 큰 이름으로 약속하신 분이에요.","original_tag":"하나님과의 관계","pastor":"Timothy Keller"},{"ref":"Isaiah 7:14","type":"선언형","tags":["소망","신뢰","보호","인도하심"],"full":"그러므로 주님께서 친히\n너희에게 한 징조를\n주시리니, 보십시오,\n처녀가 잉태하여 아들을\n낳고 그의 이름을 임마누엘이라\n부르리라.","compact":"주님께서 친히 너희에게\n징조를 주시리니, 처녀가\n아들을 낳고 그의 이름을\n임마누엘이라 부르리라.","oneline":"주님께서 친히 너희에게 징조를 주시리라.","comfort":"하나님께서 직접 계획하시고 보여주신 증거니까요.","original_tag":"하나님과의 관계","pastor":"Timothy Keller"},{"ref":"예레미야 15:16","type":"고백형","tags":["감사","평안","소망","신뢰"],"full":"내가 주님의 말씀을\n얻었사오니,\n주의 말씀은 내게 기쁨이 되며\n내 마음의 즐거움이옵니다.","compact":"주의 말씀은 내게 기쁨과\n내 마음의 즐거움이옵니다.","oneline":"주의 말씀은 내게 기쁨이옵니다.","comfort":"말씀 속에서 이미\n위로를 얻게 하시는 분이세요.","original_tag":"고난과 역경","pastor":"이찬수"},{"ref":"빌립보서 3:12","type":"고백형","tags":["소망","결단","인도하심","신뢰"],"full":"내가 이미 얻은 것도 아니요,\n온전히 이루었다 함도 아니로다.\n오직 그리스도 예수께\n붙잡힌 바 된 그것을\n붙잡기 위해 달려갈 뿐이옵니다.","compact":"내가 이미 얻은 것도 아니요,\n다만 그리스도 예수께\n붙잡힌 바 된 그것을\n붙잡기 위해 달려가노라.","oneline":"그리스도 예수께\n붙잡힌 바 된 그것을\n붙잡으려 달려가노라.","comfort":"이미 여러분의 길을\n이끌고 계시는 분이에요.","original_tag":"고난과 역경","pastor":"이찬수"},{"ref":"빌립보서 1:28","type":"위로형","tags":["두려움","보호","평안","신뢰"],"full":"무슨 일에든지\n대적하는 자들로 인하여\n두려워하지 마십시오.\n이는 하나님께로부터 난 것이며,\n여러분에게는\n구원의 증거가 되기 때문입니다.","compact":"무슨 일에든지\n두려워하지 마십시오.\n이는 하나님께로부터 난\n구원의 증거입니다.","oneline":"두려워하지 마십시오.\n이는 하나님께로부터 난 것입니다.","comfort":"하나님께서는 이미\n여러분을 구원하시겠다고\n약속하신 분이에요.","original_tag":"고난과 역경","pastor":"이찬수"},{"ref":"요한복음 10:10","type":"선언형","tags":["소망","축복","평안"],"full":"제가 온 것은 양으로\n생명을 얻게 하고,\n더욱 풍성한 삶을\n누리게 하기 위함입니다.","compact":"제가 온 것은 생명을 주어\n더욱 풍성히\n누리게 하려 함입니다.","oneline":"제가 온 것은\n풍성한 생명을 주려 함입니다.","comfort":"이미 가장 좋은 것을\n주시기로 작정하신 분이에요.","original_tag":"고난과 역경","pastor":"이찬수"},{"ref":"마가복음 7:29","type":"선언형","tags":["치유","건강","자녀양육","신뢰"],"full":"예수께서 말씀하시되,\n이 믿음의 고백을 하였으니\n돌아가십시오.\n귀신이 당신의 딸에게서\n이미 나갔습니다.","compact":"당신의 믿음을 보셨으니,\n귀신이 당신 딸에게서\n나갔도다.","oneline":"귀신이 당신의\n딸에게서 나갔느니라.","comfort":"이미 역사를 시작하신 분이십니다.","original_tag":"고난과 역경","pastor":"이찬수"},{"ref":"시편 19:1","type":"선언형","tags":["감사","신뢰","소망"],"full":"하늘이 하나님의\n영광을 선포하며,\n창공이 그분의 손으로\n이루신 일을 분명히 보여주는도다.","compact":"하늘이 하나님의\n영광을 선포하고,\n그분의 손으로 하신 일을\n나타내는도다.","oneline":"하늘이 하나님의\n영광을 선포하는도다.","comfort":"모든 것을 창조하시고\n아름답게 펼쳐 보이시는 분이에요.","original_tag":"소망","pastor":"Timothy Keller"},{"ref":"요한계시록 15:3","type":"선언형","tags":["신뢰","소망","감사","인도하심"],"full":"주 하나님, 전능하신 이시여,\n당신께서 하시는 일이\n참으로 크고 놀라우시도다.\n만국의 왕이시여,\n당신의 길은 의롭고 참되시도다.","compact":"주 하나님, 전능하신 이시여,\n당신의 일이 크고\n놀라우시도다.\n당신의 길은 의롭고\n참되시도다.","oneline":"주 하나님, 전능하신 이시여,\n하시는 일이 크고 놀라우시도다.","comfort":"크고 놀라운 일을\n지금도 행하고 계신 분이에요.","original_tag":"소망","pastor":"Timothy Keller"},{"ref":"이사야 9:1","type":"선언형","tags":["소망","평안","보호"],"full":"전에 고통 받던 자들에게는\n이제 더 이상 흑암이 없으리로다.\n주님께서 멸시받던 땅을\n영화롭게 하셨습니다.","compact":"고통 받던 자들에게는\n이제 흑암이 없으리로다.\n주님께서 영화롭게 하셨습니다.","oneline":"고통 받던 자들에게는\n이제 더 이상 흑암이 없으리로다.","comfort":"가장 어두운 곳에도\n빛을 비추시는 분이에요.","original_tag":"소망","pastor":"이찬수"},{"ref":"이사야 9:2","type":"선언형","tags":["소망","인도하심","평안"],"full":"흑암 속에 거하던 백성이\n이제 큰 빛을 보게 될 것이며,\n죽음의 그늘진 땅에\n머물던 자에게 빛이 비추는도다.","compact":"흑암에 행하던 백성이\n큰 빛을 보고,\n사망의 그늘진 땅에\n빛이 비치도다.","oneline":"흑암에 행하던 백성에게\n큰 빛이 비치도다.","comfort":"어둠 가운데 헤매는\n당신에게 빛으로 찾아와\n주시는 분이에요.","original_tag":"소망","pastor":"이찬수"},{"ref":"빌립보서 3:14","type":"고백형","tags":["결단","소망","인도하심","직장사업"],"full":"저는 푯대를 향하여\n그리스도 예수 안에서\n하나님이 위에서 부르신\n부름의 상을 받기 위해\n계속 달려가고 있나이다.","compact":"푯대를 향하여,\n위에서 부르신\n부름의 상을 위해\n달려가고 있나이다.","oneline":"위에서 부르신\n부름의 상을 향해 달려갑니다.","comfort":"당신의 가장 큰 목표를\n향한 걸음을\n응원하고 계신 분이에요.","original_tag":"소망","pastor":"이찬수"},{"ref":"마태복음 5:10","type":"선언형","tags":["소망","평안","보호"],"full":"의를 위하여\n박해를 받은 자는\n복이 있나니,\n하늘나라가 바로\n그들의 것임이니라.","compact":"의를 위해\n박해받은 자는\n복이 있나니,\n천국이 그들의 것임이라.","oneline":"의를 위해 박해받은 자에게 천국이 그들의 것임이라.","comfort":"고통 중에도 이미 영원한 상을 약속하신 분이에요.","original_tag":"소망","pastor":"이찬수"},{"ref":"누가복음 6:22-23","type":"선언형","tags":["소망","두려움","평안"],"full":"사람들이 주님으로 인하여\n당신을 미워하고 멀리하며\n비난하고 악하다 할 때에는,\n복이 있도다.\n그 날에 기뻐하고 뛰놀십시오.\n하늘에서 받을 상이 크기 때문입니다.","compact":"주님으로 인해\n고난받을 때 복이 있나니,\n하늘에서 받을 상이 큼이라.","oneline":"하늘에서 받을 상이 매우 큼이라.","comfort":"모든 고난을 기억하시고 더 큰 상으로 갚으시는 분이에요.","original_tag":"소망","pastor":"이찬수"},{"ref":"다니엘 1:8-9","type":"선언형","tags":["인도하심","신뢰","보호","직장사업"],"full":"다니엘이 뜻을 정해\n자신을 더럽히지 않으려 할 때,\n하나님께서 그로 하여금\n환관장에게 은혜와 긍휼을\n얻게 하셨나이다.","compact":"뜻을 정한 다니엘에게\n하나님께서 은혜와 긍휼을\n얻게 하셨나이다.","oneline":"하나님께서 은혜와 긍휼을 얻게 하셨도다.","comfort":"뜻을 정한 당신에게도 동일한 은혜를 베푸실 분이에요.","original_tag":"소망","pastor":"이찬수"},{"ref":"히브리서 11:24-26","type":"선언형","tags":["소망","신뢰","기다림","축복"],"full":"믿음으로 모세는\n장성하여 바로 공주의 아들이라\n불리기를 거절하고,\n그리스도를 위한 수모를\n애굽의 모든 보화보다\n더 큰 재물로 여겼으니,\n이는 하나님께서 주실 상을\n바라보았기 때문이옵니다.","compact":"하나님께서 주실 상을\n바라보며 믿음으로 고난을\n택하였나이다.","oneline":"상 주심을 바라보는 자에게 반드시 상 주시리라.","comfort":"하늘에 쌓아두신 귀한 상이 당신을 기다리고 있으니까요.","original_tag":"소망","pastor":"이찬수"},{"ref":"고린도후서 10:4","type":"선언형","tags":["보호","신뢰","두려움","결단"],"full":"우리의 싸움의 무기는\n육신에 속한 것이 아니요,\n오직 하나님을 통하여\n견고한 진을 무너뜨리는\n강력한 능력이라.","compact":"우리의 무기는 오직\n견고한 진도 무너뜨리는\n하나님의 능력이라.","oneline":"하나님의 능력은 견고한 진
